body:
  text: 卷之六草部蔓草類兔絲子本經味辛平主續絶傷補不足益氣力肥健汁去面皯久服明目輕身延年別録甘養陰強肌堅筋骨主莖中寒精自出溺有餘瀝口苦燥渴寒血為積正義兔絲蔓生施於草上柔細且長而極堅韌子又多脂故為養陰通絡上品其味微辛則陰中有陽守而能走與其他滋陰諸藥之偏於膩滯者絶異繆仲淳謂五味之中辛通四氣經言辛以潤之兔絲子之屬是也與辛香燥熱之辛迥乎不同所解極為剴切本經續絶傷補不足益氣力肥健於滋補之中皆有宣通百脈溫運陽和之意不僅以物質主治而含有天然之氣味性情此吾國藥物之學不言理化而實得化學之最上乘者汁去面皯亦柔潤肌膚之功用久服則陰液足而目自明陽氣長而身自輕皆有至理弗疑為仙佛家欺人之語別録所謂養陰強肌堅筋骨亦陰陽兩調之義莖寒精滑則元陽不運而至陰不攝也溺有餘瀝則腎陽不布而大氣不舉也若夫口苦燥渴明為陰液之枯涸寒血成積亦為陽氣之不宣惟此善滋陰液而又敷布陽和流通百脈所以治之以視地黃輩之專於補陰守而不走者固有間矣廣義甄權謂治男女虛冷添精益髓去腰疼膝冷皆益陰通陽之用又治消渴熱中則滋津液以潤燥熱也大明謂補五勞七傷潤心肺皆滋陰生液之義又治鬼交泄精則寧心安腎以除淫夢凡草木之實多有補心固中之義以其堅重之質斂而不散自能攝納心神而兔絲富有脂液尤益精髓而收渙散之元氣耳景嶽謂止鬼交安夢寐即此義大明又主尿血則以真陰不守下元不固而言若相火偏亢宜於清泄者必非其治王海藏謂補肝臟風虛則肝陰耗竭木失火涵而風陽恣動以此填陰息風固專補肝陰之正治也蘇頌引抱朴子仙方一味酒浸曝搗日服治腰膝去風明目久服令人光澤正與海藏同意石頑謂兔絲辛溫質黏與杜仲之壯筋暖腰膝無異老人肝腎虛腰痛膝脛痠軟冷者合補骨脂杜仲用之凡陽強不痿大便燥結小水赤澀者弗用以其助陽壽頤謂兔絲之溫乃溫和潤澤之溫非溫燥剛烈可比若津枯便燥何必不宜況陽強不痿亦有陰竭陽亢為病小水赤澀又有津液燥涸之一候非皆實火使然石頑所論殊有語病而乃誤認此藥為辛溫助陽可乎附録無根草發明此即兔絲子之苗也李氏綱目以本經汁去面皯一節録為苗之主治而未廣其用趙恕軒本草綱目拾遺有之頤按此草吾鄉甚多深秋之時蔓延於豆莢注當為豆類植物莖枝之上密如蛛網而人不知用雖藥肆所未收然亦非無用之物茲據趙氏所引補之採藥録此藥無根無葉生在草柴上纏結而生名無根金絲草色有紫有黃頤按吾鄉亦稱黃金絲草老則色黃未老時作淡緑淺黃色初生時未始無根逮蔓延他草之上則蜿蜒糾結求其根而不可得蓋借他物之餘氣而生有絲無葉最為蔓草中特殊之情性百草鏡無根金絲草即兔絲苗也生毛豆莖上者佳藥鑑無根金絲草莖細而赤無葉無根惟有青色細纍附於莖際蔓延極長其性涼葉微甘利水治濕熱李氏草祕纏豆條無葉無花子即兔絲子最涼血解痘瘡毒藥性考金絲草無根葉用苗功在涼血治癰疽腫毒味苦寒能止吐衄崩漏便咯諸血解諸藥毒瘴癘疔癰惡瘡臺志功水通淋百草鏡治癃淋濁痢帶下黃疸預解痘毒敷紅絲疔壽頤按淋濁帶下多濕熱蘊結故以利水清熱之品為治黃疸亦濕熱之鬱於里者也慈惠小編小便不通諸藥無效以金絲草一握同韭葉根頭煎湯洗小肚即通壽頤按此草深秋而生得肅降之氣故性頗寒觀趙氏所採全以清熱涼血解毒為功益可知石頑謂兔絲性溫助陽不無誤會五味子本經味酸溫主益氣咳逆上氣勞傷羸瘦補不足強陰益男子精別録養五臟除熱生陰中肌正義五味子雖具五味而以酸收為主故補五臟之陰而注重於攝腎納氣又其氣溫和味陰而氣陽故於補陰之中亦寓通陽之意本經以益氣為主治之綱領者是收攝渙散以為補益元氣之用亦陰長陽生而自充之義益氣二字所賅者廣繆氏經疏謂肺主諸氣補肺所以益氣偏於一邊甚非古人真旨主咳逆上氣則專以肝腎不納氣不歸元而泛溢上逆者言得此酸收攝納而逆上自已止就虛證一邊著想故即繼之以勞傷羸瘦不足諸症而痰熱窒塞氣湧促急之實病必非其治強陰益精則補陰而兼能通陽之效耳別録所謂養五臟即本經補不足益氣之義又謂除熱則陰虛內熱得此益陰收攝而熱自除與實熱之宜於涼瀉者不同又謂生陰中肌則義不可解蓋有誤字是當存而不論廣義成無己謂肺欲收急食酸以收之以酸補之芍藥五味之酸以收逆氣而安肺壽頤按此指肺氣虛滿而言故宜酸以收之若感邪襲肺痰壅氣逆則為實證五味酸收即同鴆毒惟小青龍湯專治寒飲喘嗽則麻與桂甘半夏薑辛諸物溫辛大隊泄散有餘而特以五味調劑其平即古聖制方之妙用與單用獨用者不可同日而語甄權謂治中下氣蓋謂能補中而又下氣然治中二字殊未穩愜疑有脫誤又謂止嘔逆則胃陰虛而失其順降耳大明謂消食治反胃亦即此義大明又謂明目暖水臟壯筋骨亦益陰通陽之效又謂治奔豚冷氣則攝納腎氣之渙散也故東垣謂收耗散之氣治瞳子散大海藏謂治喘咳則喘有二途一為寒飲積肺之實喘須以小青龍法之薑辛五味並用而非合麻黃之開肺不能有功但證雖屬實苟其積年宿恙逢寒輒發者肺脾正氣久已積衰不開肺則勢不可解而小青龍究非常服之藥近惟鹽山張壽甫之從龍湯一方追隨小青龍之後收攝耗散降氣滌飲標本兩顧盡善盡美確能補古人未備之法方論詳張氏衷中參西録云治外感痰喘服小青龍湯病未全愈或愈而復發者繼服此湯龍骨牡蠣各一兩生杭芍五錢清半夏四錢蘇子四錢牛蒡子三錢熱者酌加生石膏一為腎氣上泛之虛喘則下元不攝泛溢奔騰沖激擾肺惟五味既能斂肺金之耗散而又收攝腎氣上下並治雙方兼利尤為針對然若認證不清不問虛實而惟知酸收一法則為害亦有不可勝言者矣發明五味子酸而性溫本是溫和之溫與溫燥不同生津止渴潤肺胃而益腎陰功用皆在陰分孫真人謂五六月宜服五味子湯以益肺金之氣千金方五味子湯治傷燥咳唾有血痛引胸肋皮膚乾枯五味子五分桔梗五分甘草五分紫菀五分續斷五分竹茹桑根白皮一錢生地黃二錢赤小豆一撮在上則滋源在下則補腎張潔古引孫氏千金月令又曰夏月季夏之間困乏無力無氣以動以五味黃耆門冬少加黃柏服之使人精神頓加皆其滋陰之捷效別録以除熱為一大綱甄權藥性論亦謂除熱氣日華子稱其除煩熱其意固皆在虛熱一邊本非以治實火之大熱證獨寇宗奭惑於本經性溫一説竟謂治肺虛寒不取其除熱一説而又曰今食之多致虛熱蓋用之不當酸收太過閉而生熱是為不善用藥之咎必非藥性之真且亦誤解本經性溫之旨惟東垣又謂此為火熱必用之藥治嗽以之為君則又大有語病矣丹溪謂黃昏嗽乃火氣浮入肺中不宜用涼藥宜五味子五倍子斂而降之壽頤按此即陰火上衝激肺之嗽陰虛火浮故當黃昏陰盛之時虛焰發動乃始作嗽宜以收攝肺腎為治然惟脈虛舌紅無痰者乃合若舌膩有痰亦當知所顧忌禁忌東垣謂有外邪者不可用石頑謂風邪在表痘疹初發一切停飲及肺家有實熱者禁之天門冬本經味苦平主諸暴風濕偏痹強骨髓殺三蟲去伏尸久服輕身益氣延年別録甘大寒保定肺氣去寒熱養肌膚益氣力利小便冷而能補正義天門冬肥厚多脂本經雖曰苦平其實甚甘氣薄味厚純以柔潤養液為功本經主暴風蓋指液枯內動之風而言滋潤益陰則風陽自息此即治風先治血之義痹亦血不榮經之病正與風燥相因而至故治風者亦能治痹非以祛外來之風痹惟濕為陰寒之邪痹病固亦有因於濕者然必無甘寒陰藥可治濕痹之理蓋傳寫者誤衍之天冬柔潤豈可以療陰霾之濕邪痹著繆氏經疏以尊經之故指濕字為濕熱已是曲説須知濕熱宜於清理安有滋膩助虐之法仲淳解別録所主諸症又處處牽定濕熱二字遂致此藥之真情性竟無一條適合作繭自縛是之謂矣張石頑反謂三蟲伏尸皆濕熱所化亦為仲淳所誤須知濕熱生蟲非勞瘵之蟲也本經又曰強骨髓則固益液滋陰之正旨三蟲伏尸即血枯液燥之勞瘵甘寒清潤原以滋燥澤枯是以治之久服輕身益氣延年則以養陰益液而極言其功效耳別録謂保定肺氣則以肺熱葉焦燥金受灼而言甘寒潤燥本是補肺正將去寒熱者亦陰虛液耗之乍寒乍熱非外感邪甚之寒熱可知養肌膚益氣力皆陰液充足之義利小便者肺金肅降而水道之上源自清亦津液滂霈而膀胱之氣化自旺固非為濕熱互助之水道不利言也而結之以冷而能補一句則可知天冬偏於寒冷惟燥火熾盛灼爍陰液者宜之而陽氣式微者即有不勝其任之意此別録所以有大寒二字而六朝以來諸家本草固無一非以治燥火之證也廣義甄權謂治肺氣咳逆喘息促急則以肺金枯燥氣促不舒而言故宜此甘寒柔潤以滋養之則氣逆可平喘急可定即名醫別録保定肺氣之意張潔古亦謂治血熱侵肺上氣喘促皆為虛熱一邊著想而濁痰閉塞之喘促咳逆必非其治甄權又謂治肺痿生癰吐膿除熱則痿即肺熱葉焦甘寒潤之宜也而癰則痰火俱盛咯吐膿血只可苦寒清泄斷不宜此柔潤多脂之藥一虛一實大有徑庭連類及之不無誤會而潔古因此遂有苦以泄滯血一語實與此藥情性不符不可不辨唯在肺癰欲愈膿痰已減之時濁垢既去正氣已傷余焰尚盛則天冬大寒能泄餘熱氣清而不甚厚膩庶幾近之此病情有始傳未傳之分邪熱有輕重緩急之辨必不可渾而言之漫無區別權又謂止消渴除熱則清火潤燥是為正治又謂久服令人肌體滑澤除身上一切穢惡寒氣不潔之疾則即別録之所謂養肌膚耳大明謂潤五臟則滋養臟陰固柔潤多脂之明效又謂補五勞七傷吐血治嗽則陰虛多火者宜之如脾陽不旺恐其滑下作瀉亦不可過於寒涼致傷中土沖和之氣王海藏謂治痿厥嗜臥足下熱而痛是即肺熱成痿陰虛多火之候孫真人亦謂陽事不起宜常服之正以陰精消爍廢而不用故宜益陰以滋其燥而庸俗之見反有恣用溫燥剛烈之藥冀以起萎者豈不灼盡其垂竭之脂膏耶瀕湖謂潤燥滋陰清金降火概括言之能舉其大禁忌景嶽謂虛寒假熱脾腎溏泄忌之石頑謂脾虛而泄瀉惡食者雖有當用之症亦莫輕投壽頤則謂證屬虛寒本無選到此等純陰之理惟虛熱熾甚之時似此陰寒潤下亦只當去其太甚適可而止知其用之太過必令脾胃受戕鶩溏減食反貽過中之纍卒歸不治繆仲淳謂陰虛水涸火起下焦而上炎者誠為要藥惟大寒而苦不利脾胃陰虛之人脾胃多弱又損其胃則是絶其後天生氣之源旨哉言乎茜根本經味苦寒主寒濕風痹黃疸補中別録止血內崩下血膀胱不足踒跌蠱毒正義茜根性寒所主多血熱失血之症古今説解都無異義而本經主治獨以寒濕二字為冠最為不倫雖各本無不盡同然病情藥性大相矛盾此必古人傳寫之訛不可望文生義曲為附和風痹指血瘀血熱痹著不行而言茜草寒涼又色赤入血而能通瘀活絡是以主之古人論痹本有熱痹一候此必不可與上文寒濕連屬讀之而謬謂可治寒痹濕痹也黃疸本屬熱證此則並能清熱逐瘀繆仲淳謂指畜血發黃而不專於濕熱其説甚是補中以清熱言熱淫於裡則中氣傷惟去其熱清其血則中得其補經文最簡皆當觀其會通並非泛泛言之別録止血以血熱湧泄而言一以清血中之熱一以通壅積之瘀斯血循故道而不橫逆崩中亦以龍雷太亢之時而言如其所失太多陽氣已餒即非所宜踒跌必有血瘀瘀則蘊而生熱故宜清熱行瘀蠱毒皆南方熱淫之毒清血熱者必能解毒陳藏器謂蘘荷與茜主蠱為最惟膀胱不足一證殊屬費解姑且存而不論以俟知者廣義大明止鼻洪尿血月經不止痔瘻瘡癤皆指火邪太亢者言之又謂治産後血運則惟肝陽有餘惡瘀不暢者為宜而血脫髮暈不可概用瀕湖謂通經脈則以血熱瘀結者為宜又謂治骨節風痛活血行血亦惟血熱痹著者宜之即本經治風痹別録主踒跌之義也發明瀕湖謂茜根赤色而氣溫味微酸而帶咸色赤入營氣溫行滯味酸主肝而咸走血專於行血活血俗方治女子經水不通以一兩煎酒服之甚效絡石本經味苦溫主風熱死肌癰傷口乾舌焦癰腫不消喉舌腫水漿不下別録微寒大驚入腹邪氣養腎主腰髖痛堅筋利關節考正癰傷繆氏經疏謂傷宜作瘍壽頤按仲淳以後世文義言之癰瘍二字盡人能知頗似古書傳寫之誤然周禮醫師瘡瘍者造焉鄭注身傷曰瘍知瘍之與傷古人通用不必為舊本改字絡石據太平御覽引吳普説落石一名鱗石一名明石一名縣石一名雲華一名雲英一名云丹名醫別録又曰一名石磋一名略石一名明石一名領石一名縣石貌視之頗似石藥類蓋附石而生故得諸名蘇恭唐本草注云俗名耐冬以其包絡石木而生故名絡石瀕湖綱目所載形色甚詳即山石上及人家牆壁上蔓生之一種也今吾吳藥肆中謂之絡石藤與別録所謂石龍藤其義亦合正義絡石氣味本經謂之苦溫蓋以隆冬不調而功能通經活血言之故以為溫然本經主治純是熱證則非溫熱可知故別録改作微寒而御覽引李當之説且以為大寒也此物蔓生而甚堅韌節節生根故善走經脈通達肢節本經主風熱死肌別録養腎主腰髖痛堅筋利關節皆即正義其治癰腫喉舌腫口乾舌焦皆苦寒瀉降之功也別録謂其除邪氣則以邪熱而言凡本經別録邪氣二字所賅最廣其實各有所主並非泛辭讀者當以意逆之自能悟到不可混作一例看惟大驚入腹四字則不甚可解當付闕疑耳廣義蘇恭謂療産後血結大良蓋以瘀露不通而言苦瀉破瘀且善通絡是以主之又謂主蝮蛇瘡毒心悶則清熱泄降固解毒之良藥又謂刀斧傷瘡傅之立瘥則又外治止血之神丹矣藏器謂主一切風即本經治風熱死肌別録利關節之義今用以舒筋活絡宣通痹痛甚驗外臺謂喉痹腫塞喘息不通須臾欲絶者一味水煎呷之神驗木連發明木連薜荔俱見陳藏器本草拾遺薜荔與絡石一類蔓延樹上節節生根性情功用皆與絡石相似藏器謂葉酸平主風血暖腰腳蘇頌謂治背癰亦主下痢大明謂治癧瘍惡瘡疥癬瀕湖治血淋痛澀皆疏通經隧清熱逐瘀之意木蓮即薜荔之實其大如杯蒂小上豐而平有似蓮房故得蓮名亦曰木饅首瀕湖謂消腫散毒止血下乳治腸痔陰㿗功用亦與絡石相近石頑謂利水止血通乳要藥綱目引集簡方木饅頭二枚豬前蹄一個爛煮食之並飲其汁一日即通則通脈之捷仍本乎蔓延有力之性情今吾鄉俗謂之木龍通子龍以蔓生取義通則名之以其能也但瀕湖又謂其主久痢普濟方又治遺精脫腸則此物著樹有力隆冬不調通中有守又不專在滑瀉見功較之木通王不留行等走竄迅疾亦易傷陽者不可同日語矣瓜蔞本經括樓根味苦寒主消渴身熱煩滿大熱補虛安中續絶傷別録根除腸胃中痼熱八疸身面黃唇口乾燥短氣止小便利通月水實主胸痹莖葉味酸寒主中熱傷暑考證瓜蔞今之通稱本經別録俱作括樓爾雅則作栝樓釋草果裸之實栝樓毛詩果裸之實傳云果裸栝樓也説文則作𦯚蔞其説解云果蓏也呂氏春秋王善生高誘注善或作瓜䒷𤬏也壽頤按呂覽善字乃菩字之誤郝懿行爾雅義疏曰裸當為蓏栝樓當為䒷蔞皆假借也説文在木曰果在地曰蓏䒷蔞實兼二名李瀕湖本草綱目謂此物蔓生附木故得兼名栝樓即果裸二字音轉亦作䒷𧁾工後又轉為瓜蔞愈轉愈失其真矣壽頤按瀕湖之説固是然玉篇云䒷蔞齊人謂之瓜蔞可知瓜蔞之稱亦舊惟𤬏字則玉篇在後收字中曰䒷𤬏土瓜也知䒷𤬏二字乃是最後之孳生非漢魏時之所固有今靈樞癰疽發於膺名曰甘疽色青其狀如谷實䒷𤬏而甲乙經十一卷則作瓜蔞亦可為今本靈樞晚出之明證也壽頤聞五十年前吾吳藥肆有瓜蔞子栝樓子兩種之別其所謂栝樓子者有斑駁文如苦瓜子形與瓜蔞子絶異蓋不知是何物之子同光間有某顯宦之家人服藥醫方開栝樓子市肆中遂以斑駁者與之而此顯宦固知栝樓即瓜蔞之別稱見之以為有誤傳肆中人問之則以市上瓜蔞子栝樓子本非一物為對該宦又問子既不同則設有醫生用瓜樓根者市上又將有何種之別而肆人乃謂止有天花粉一物其宦遂謂市肆欺人發縣笞責二百板自是以後蘇省藥肆遂聯合不復用栝樓子是亦可備藥物界中一則故事其所謂栝樓子者壽頤寄迹蘭溪始親見之與苦瓜子亦復不同苦瓜子扁方有稜兩端有類方勝而所謂栝樓子者形亦橢圓有稜角有斑駁色而不類方勝其果比瓜蔞實較小僅如核桃正圓而色深赤但未見根葉何狀山中野生不少金衢藥肆皆備之其用與蔞實不異蓋亦同類之異種者耳正義仲景方蔞根蔞實分別主治而本經止有栝樓根一條知上古治療尤以根為之主也本經氣味雖曰苦寒然僅微苦而已故瀕湖謂微苦降火苦不傷胃本經主治以消渴二字為之總綱正與仲景凡渴者必加蔞根同意此中古藥物學一以貫之之真傳成聊攝謂津液不足則為渴蔞根味苦微寒潤枯燥而通行津液瀕湖謂味甘微苦酸其莖葉味酸酸能生津感召之理其治身熱煩滿大熱者燥熱耗津氣機枯澀則煩而中滿非痰濕實結之胸滿此與蔞實之專治胸痹結痛者不同彼以子之滑痰滌垢則能通泄痰濁之窒塞而萎根但以清熱潤燥為功則痰濕之實滿必非其治此有幾微疑似之別讀者不可以不辨所謂補虛安中者亦以熱則耗傷陰液即中氣虛而不安清其熱益其陰斯虛可補而中可安亦非泛言一切之虛弱也其能續絶傷者莖葉蔓生柔而且韌則通行絡脈而續絶傷又以情性言之不僅在物質之治療矣別録除腸胃痼熱亦以燥熱而言治疸及身面黃則惟津液已耗者為宜而濕滯之未化者尚非其治唇乾口燥固即消渴短氣者亦以熱傷中氣而言非痰濕窒塞之短氣其能止小便利者溺愈利則津液愈耗此能益陰生津則津液回而溲不復多蓋與下消證之飲一溲二者相類其能通月水者亦為熱熾灼爍血瘀不利而言清以潤之斯陰得滋養而衝任自調矣瓜蔞實清熱滑潤空松而不堅實故能疏達胸膈開通痹塞別録專主胸痹正與仲景治結胸滿痛胸痹心痛徹背同意丹溪謂胸中有痰乃肺受火逼失其降下之令此能潤下以助降氣又能洗滌垢膩鬱熱宜為治痰之要藥莖葉治中熱傷暑以其清芬涼爽故善滌暑又其味微酸自能振刷精力以御酷暑之炎熱亦猶孫真人所謂季夏之間困乏無力宜服五味子湯以收耗散之氣使人精神頓加也廣義大明謂蔞根治熱狂時疾以燥熱而言不為無理然若痰食熱結而為昏狂則必非甘寒一派所能勝任甚者且以助桀為虐近二百年凡自命為葉派真傳者輒以玄參生地二冬知母諸藥名為養陰退熱而熱愈結者比比而是壽頤於陽明熱病之醫案評議中言之詳矣茲不復贅日華又謂通小腸其意蓋謂清熱滋液即以通利小水而泄熱下行然不知小腸功用全與小便無涉此亦六朝以後之通病且正與別録之止小便利相反日華之本草不可為訓有如此者又謂消腫毒乳癰發背痔瘻瘡癤則果屬實熱固為可用然消腫泄結蔞根不如蔞實為佳以其實有消痰軟堅之功而根則止能清熱彼為活潑而根則呆鈍各有性靈亦不可等而視之瀕湖謂瓜蔞實潤肺燥降火治咳嗽滌痰結利咽喉止消渴利大腸消癰腫瘡毒皆以通泄消結為義自有實在功用可據勝於大明之顢頇多矣發明蔞實入藥古人本無皮及子仁分用之例仲景書以枚計不以分量計是其確證蓋蔞實既老其殼空松故能通胸膈之痹塞而子又多油善滌痰垢黏膩一舉兩得物理學之正旨如此自日華子大明本草有其子炒用一説而景嶽之本草正只用其仁張石頑之逢原亦云去殼紙包壓去油則皆不用其殼大失古人專治胸痹之義且諸瘍陽證消腫散結又皆以皮子並用為捷觀瀕湖綱目附方頗多全用者十之九古人衣鉢最不可忽惟近今市肆以蔞實既老皮肉不黏剖之不能成塊凡用全瓜蔞者皆乘其未老之時摘取曝乾而剖為數塊方能皮肉黏合以取美觀然力量甚薄卻無功效所以不佞欲用其全者寧以蔞皮蔞仁分列為二乃能得其老者始有實驗若但書全瓜蔞三字則用如不用亦治醫者不可不知藥物之真性情也即使但用其皮亦是老而力足疏通中滿確有奇能惟景嶽謂蔞仁氣味惡劣善令噁心嘔吐中氣虛者不可用是從閲歷經驗得來且動大便令人滑泄苟非實結慎勿妄投即搗碎去油僅用其霜亦非大府實結不可輕使石頑又謂蔞根寒降凡胃虛吐逆陰虛勞嗽誤用反傷腎氣久必泄瀉喘咳病根更深凡痰飲色白清稀者禁用皆是至言弗以尋常藥物率爾操觚也正訛景嶽又謂本草言瓜蔞仁補虛勞大謬壽頤按據綱目引大明謂子炒用補虛勞云云則景嶽所據即指日華本草而言病情藥性本極悖謬日華蓋誤讀本經補虛安中四字而膽敢為此妄説日華之罪豈不上通於天是可知本經言簡不善讀之貽禍不可勝言日華所見本多鄙陋殊不足責後之學者讀古人書不可不自具隻眼天花粉發明天花粉蘇頌圖經本草別有專條即是瓜蔞之根瀕湖削之併入蔞根條中是矣然藥肆之所謂天花粉者即以蔞根切片用之有粉之名無粉之實其搗細澄粉之法千金方已言之瀕湖引周憲王説亦有之蓋出朱氏救荒本草壽頤按明史列傳周定王橚太祖第五子以國土夷曠庶草蕃蕪考核其可以佐飢饉者四百餘種繪圖疏之名救荒本草與瀕湖所引不異王以洪熙元年薨子憲王有敦嗣則著書者非憲王瀕湖序例亦言洪武初著書云云又確是定王時事惟其書明史志不載蓋已失傳但瀕湖明人親見其書不知何以與史不合史又稱憲王博學或有所附益之歟今吾嘉人頗喜制之載入邑乘視為土産之一法於冬月掘取蔞根洗盡其外褐色之皮帶水磨細去滓澄清換水數次然後曝乾精瑩潔白絶無纖塵沸湯瀹服雖稠滑如糊而毫不黏滯秀色鮮明清徹如玉與其他市品之羼入雜質者絶不相同益胃生津洵推妙品最宜於老弱病後無黏膩礙化之弊雖同此蔞根而幾經淘洗渣滓皆去苦寒本性亦已消除淨盡更不慮其有寒中滑泄之變尤為全其所長去其所短非原質之可以同日語矣王瓜本經味苦寒主消渴內痹瘀血月閉寒熱痠疼益氣愈聾一名土瓜別録根療諸邪氣熱結鼠瘻散癰腫留血婦人帶下不通下乳汁止小便數不禁逐四肢骨節中水考證王瓜之名最古月令四月王瓜生爾雅釋草鉤郭注鉤𤬏也一名王瓜實如瓝瓜正赤味苦陸氏釋文引字林云匏𤬏王瓜也廣雅䗃𤬏王瓜也呂覽孟夏紀王善生高誘注善或作瓜䒷𤬏也又淮南時則篇高注亦曰上瓜栝樓也據高氏説似瓜蔞王瓜即是一物惟本草經陶注謂今土瓜生籬院間亦有子熟時赤如彈丸李瀕湖綱目載王瓜蔓葉根實形狀極詳確非瓜蔞郝氏爾雅義疏亦曰王瓜五月開黃華華下結子形似小瓜今京師名為赤雹子説與瀕湖合壽頤按此物蓋西北土産而南中無之故江浙人恆不知為何物高誘謂即䒷𤬏近人皆以為高氏之誤壽頤則謂栝樓二字確為果蓏之轉音則王瓜同是蓏屬而施於籬落垣牆亦何必不可同得是名高氏所云未為大謬且誘是東漢建安時人其時必有所受之不可以今人之見強古人以從吾者況乎張稚讓張揖之字曹魏人著廣雅者呂忱著字林者之所謂匏𤬏郭景純郭璞字注爾雅者之所謂䗃𤬏亦何必非果蓏之轉音故孫強等加增玉篇亦謂工䒷𧁾即是土瓜蓋其形既似古多有異物同名之例何獨於此而必齦齦以譏高氏即如呂覽之所謂王善善字誠誤鎮詳畢氏校本改善為菩謂菩與萯通此即夏小正之四月王萯秀亦即鄭注月令之所引今月令王萯生也郝氏之爾雅義疏及高郵王氏之廣雅疏證皆用畢秋帆本徑謂呂覽孟夏紀是王菩然陽湖孫星衍輯刻本草經亦即以王瓜作䒷蔞解惟其名可通其實自別而氣味情性又復相近此則言藥物學之不可不辨者仲景蜜煎導條下有土瓜根大豬膽汁皆可謂導一説即是此物蓋搗取根汁作灌腸用肘後方中亦載之然今則灌腸通大便之藥別有良法仲景舊説已為大輅椎輪不復適用亦正不足辨矣正義本經主治不言用根用實瀕湖則列入根之主治條中苦寒清熱頗與瓜蔞根相近宜乎古人命名栝樓䒷𤬏大同小異正不獨以蔓生結實且各有根可用之形色相似也本經謂主消渴是即蔞根治渴之旨其治內痹瘀血月閉者則熱灼津枯血燥瘀結痹塞不通耳蓋土瓜根産於北地以視蔞根苦寒過之故能通熱結之血瘀亦與別録言蔞根通月水同義非泛治諸虛不足之痹著瘀血月閉也寒熱痠疼亦以熱勝而血液不足則為疼酸所謂益氣者亦以熱能傷氣去熱即所以益氣又即本經蔞根補虛安中之義其能愈聾者聾必耳中隆隆皆氣火上騰為病苦降清火斯內無震動而耳自聰矣別録治諸邪氣熱結五字作一句讀所謂邪氣者即熱邪也鼠瘻癰腫無非熱結留血之病帶下注原作之顯誤據別録原文改與不通雖似病狀絶異然此之不通仍以瘀熱而言帶下固多有濕盛熱爍灼成濁垢者導其熱清其瘀則帶下自已其止小便數亦與蔞根止小便利同一功用讀本經別録所載主治幾無一不與蔞根同符合轍宜乎高誘之以王瓜栝樓為一物矣廣義大明謂土瓜根主天行熱疾酒黃病壯熱心煩悶消撲損瘀血破癥癖子生用潤心肺治黃病炒用治肺瘻吐血腸風瀉血赤白痢甄權謂子主蠱毒約而言之無一非清火滑泄通瘀之義葛本經葛根味甘平主消渴身大熱嘔吐諸痹起陰氣解諸毒葛谷主下利十歲以上別録療傷寒中風頭痛解肌發表出汗開腠理療金瘡止脅風痛生葛汁大寒療消渴傷寒壯熱花主酒病考異利李氏綱目繆氏經疏皆作痢後出字茲從孫氏問經堂輯本繆氏經疏本脅下有痛字茲從李氏綱目正義葛根氣味俱薄性本輕清而當春生長迅速故最能升發脾胃清陽之氣氣又偏涼則能清熱鮮者多汁尤能助胃之津液且離土未久涼氣更足則專治胃火本經以為消渴主藥別録亦稱生葛汁大寒專療消渴其旨如是蓋古人之所謂生者即今之所謂鮮者也且消渴為病雖曰胃熱熾甚然其病機不僅在於火旺而在燥令太過胃氣下行有降無升所以飲雖多而渴不解食雖多而人益羸多飲多溲病皆因於降之太速惟葛根既能勝熱又升清氣助胃輸化而舉其降氣之太過斯消可減而渴可已此病情物理之自然感應者可知本經主治精微玄妙非躁心人所易領悟若僅認為清火生津則淺之乎讀古人書矣其治身有大熱者則即傷寒之陽明大熱與別録所謂治傷寒壯熱同壽頤竊謂此傷寒二字所當注意乃難經所稱傷寒有五之二曰傷寒必不可與溫病熱病之熱視同一例仲景本論葛根為陽明主藥乃表寒初傳陽明遏抑其清陽之氣陽不敷布則氣不疏達而身熱乃益甚惟以葛之輕清者升發之則清陽得以疏達而熱乃自解讀仲景書陽明協熱自利葛根苓連之主治其旨當可恍然豈謂葛果太寒能治陽明大熱耶惟能悟到此旨則初傳陽明而太陽未罷者主以葛根湯及太陽病項背強𠘧𠘧者主以桂枝加葛根湯皆可一以貫之矣別録謂葛根療傷寒中風頭痛解肌發表出汗開腠理皆以此輕揚升清之藥宣通遏抑之清陽則肌表解腠理開得微汗而身熱自已頭痛胥蠲此頭痛亦陽和不布氣不上達之病正與肝膽陽升沖激顛頂之頭痛相為對峙凡古人以葛根專為主陽明無不在此範圍之內亦與柴胡專主少陽皆因肝膽之氣遏郁不申為病故宜以升舉之藥疏而通之柴葛專長皆在此升陽二字此皆與今之大江以南溫熱病之陽明少陽有熱無寒有升無降胃火膽火猖狂肆虐者正得其反所以柴葛之治宜於北而有不可統於南法乎古而有不可概乎今者近之孟英王氏懸為厲禁畏如砒鴆詎非無故而今鹽山張氏壽甫衷中參西録一書可為酌古準今溝通中外之傑作乃又習用柴葛所在有功學者能以此兩家心得引而申之自可辨別淄澠之味微有不同此則吾道中危微精一之心傳萬不可渾侖吞棗者壽頤所以每謂陶節庵柴葛解肌之法坑陷南中人命實已不鮮只讀魏氏續類案一書已可得其大概即吾吳陸九芝封翁提倡陽明深得此中三昧而獨於柴葛二者尚未免拘泥仲師家法但知守經而不能通權達變蓋亦賢者之一蔽此又善讀世補齋文者不可不放開界限持玉尺以衡度其長短庶可為九芝先生補過籲此中微旨玄之又玄傷寒溫病之界眼止此麻黃柴葛三物功用微有不同而成敗得失捷於反掌無如六朝以降風溫病中亦無不柴葛麻升一陶同冶此南人溫病之所以最多壞症然隋唐以上著書者皆是北人所見所聞習與性成尚非無故逮乎陶氏尚文系出餘杭而所著六書亦惟襲取古人餘緒則又何説繆氏仲淳又是吳人而本草經疏且謂葛根湯治陽明胃經溫病邪熱頭痛發渴煩悶鼻乾云云則全以傷寒之病混入溫熱病中而即以傷寒之方移作溫病之治亦焉往而不誤盡蒼生耶本經葛根又主嘔吐壽頤謂此亦胃之清氣不升則敷布無權而食不得入非可以治胃火上逆之嘔吐亦猶小柴胡湯主少陽證之脅滿默默不食欲嘔為少陽抑鬱不申者立法而膽肝火熾橫逆上擾者亦必有胸脅搘滿不食嘔惡之症則必非柴胡溫升所可妄試否則焰已然矣猶復煽而揚之為禍尚堪言耶又能治痹者則葛之蔓延甚長而根又入土甚深柔韌有餘故能直走經絡以通痹著之氣血解諸毒者則根在土中秉中土沖和之性百毒得土則化是其義也起陰氣壽頤竊疑陰字為陽字之訛蓋葛之升舉清陽人盡知之若曰起陰則自古及今從未有作陰藥用者不應本經獨有異説其為傳寫者無心之誤可知而繆氏經疏竟謂同一切補腎益精藥作丸餌則起陰令人有子云云是創作邪僻藉以附會經文究之補腎益精之劑成方不少何有不倫不類雜以此物者仲淳乃能向壁虛構欺人乎吾只見其自欺而已葛谷即葛之實質地重墜則入下焦而萌芽未露則所稟春升之氣猶未發泄其力獨厚藉以升脾胃陷下之氣尤有專長故能治十年之久利此以滑泄不禁之自利而言固即仲師葛根湯主治陽明自利之義然即有滯下久淹中陽之氣陷入下焦者亦可以此振動脾家清氣休息痢中固自有此一種宜於參用東垣益氣法者不可謂滯下之皆須蕩滌而無補法也別録葛根止脅風痛則即蔓延深遠宣通脈絡之義與肝絡不疏及肝氣橫逆之脅痛又各不同讀者亦須識此同中之異不可混作一例看花主酒病者酒為濕邪最困脾陽花更輕揚取以鼓舞脾胃厭厭不振之氣而升舉之耳廣義甄權謂治天行上氣嘔逆壽頤按此亦胃之清氣遏郁不通而為嘔逆非肺胃氣火上壅之上氣凡古稱葛根止嘔皆當辨此同中之異若胃熱上衝嘔惡不止及胃虛氣逆之嘔吐而亦以升清者助之殆矣權又謂開胃下食則亦脾胃陽衰不司運化而不能食不知飢之症錢仲陽七味白朮散治胃虛食少頗有奇功葛根輔助胃氣實效如是權又謂解酒毒則即別録花主酒病之義大明謂止血痢則以久痢氣陷之虛證而言未為不是若熱毒正盛而妄與升清未有不敗大明又謂治胸膈煩熱發狂則誤以為專清陽明之藥附會古法而不知適得其反同為陽明大熱而至狂惑火升氣升恣肆已極而更欲與以升舉之藥是以狂為未足而必使之逾垣上屋也毫釐之差千里之謬日華子藥物學之謬戾有如此者徐之才謂殺巴豆百藥毒則解毒之理上已言之而又能解巴豆毒者則誤服巴豆下泄必甚中州陽氣未有不陷下者以此舉之亦正恰好況乎性本寒涼能勝熱毒者乎開寶本草謂作粉止渴解酒去煩熱壽頤按去滓澄粉尤其精華所粹解渴解酲宜也然必識得同中之異苟有不宜於升舉脾胃者皆當知所禁忌王孟英醫案中有熱病已解調服藕粉一杯而即神志昏迷發熱益甚者孟英謂市中藕粉無真多是葛粉升提氣火助之發揚其説甚確山雷嘗治蘭溪萬通當友某君喉腫發腐牙疳齦腐身熱如焚其勢已危然與以大劑犀羚白虎清降泄化之藥服二劑已有轉機喉開知飢而家人飼以藕粉一碗越日病勢陡變更延余視之而神瞀脈壞不可為矣是亦葛粉送其命也豈獨習醫之人不可不識透此意外爻象即在病家亦不得概以葛粉為服食常品而不辨其利害矣潔古謂升陽生津脾虛作渴者非此不除弗多用恐傷胃氣壽頤按消渴多是實熱若但渴而不消則亦多實火止宜清火生津尚非乾葛之無投不可若潔古之所謂脾虛作渴則與實火之渴不同正以脾陽下陷胃津不布因而渴飲升舉脾胃之氣而液自和是為葛根之針對症治潔古老人之見確非俗子顢頇可比其以多用為之戒律固惟恐升發太過反以擾動之耳東垣謂乾葛其氣輕浮鼓舞胃氣上行以生津液治脾胃虛弱泄瀉之聖藥壽頤按東垣老人最精於脾胃虛證升清一法是其獨得之祕故於葛根情性言之極其允當正惟脾胃虛弱泄瀉號為聖藥則彼夫胃有實火之嘔吐必非其宜學者亦可兩兩對勘之而其理自明瀕湖謂散鬱火壽頤按惟其火鬱不伸故宜升而發之使其疏達則夫火焰飈舉方盛之時必非升提之藥所可混治奈何無識者流猶囂囂然群謂葛根專治陽明大熱而竟與白虎湯一例視之可乎禁忌丹溪謂斑痘已見紅點不可用葛根升麻湯恐表虛反增斑爛壽頤按痘在乍發未齊之時或頭面獨不見點者稍用升葛本是要藥若已發多便不可再丹溪此説防其太過是亦保赤之良圖若斑之發也已是胃熱極盛之候清胃解毒猶恐無濟萬不可更與升發助其烈焰而宋金以來猶皆謂升麻葛根發斑主劑此壞症之所以不可復救而橫夭之所以接踵也可哀哉仲淳謂五帶七傷上盛下虛之人暑月雖有脾胃病不宜服壽頤按上盛下虛則滋填其下涵而潛之惟恐不及又安有妄與升陽拔動本根撼之立蹶之理即非暑月亦不可投仲淳説理終未中肯壽頤謂溫病熱病熱在陽明不可誤師古人成法妄用葛根説已詳前不可不懸為厲禁防己本經味辛平主風寒溫瘧熱氣諸癇除邪利大小便別録療水腫風腫去膀胱熱傷寒熱邪氣中風手腳攣急通腠理利九竅止泄散癰腫惡結諸瘑疥癬瘡正義防己氣味本經止言辛平別録乃言苦溫壽頤按此藥專治溫熱而利水道苦能泄降是也若以為溫殊與病情相反本經主風寒溫瘧熱氣病機在溫熱二字初非注重於風寒一層別録溫字恐有誤會又治諸癇者癇症多緣痰阻此能利水即能開泄痰飲又謂除邪者即濕熱痰飲之邪耳利大小便者以濕熱互阻而二便皆澀者言之濕去熱除則二便自利本經主治固無一非濕與熱蒸水停不化之病也別録療水腫風腫亦以濕邪入絡則為腫非能治脾腎虛寒之腫故即繼之以去膀胱熱一句正以膀胱蘊熱水道不通則水濕留於絡中而肌膚浮腫此能利水泄熱溲溺通而腫自已其兼治風腫者空松之質亦能疏風耳又治中風手腳攣急亦即風濕痹著而經絡不舒故此為專藥通腠理利九竅散癰腫惡結無非疏通開泄之功又能止泄者亦惟脾為濕困水並於腸則為泄瀉此能利膀胱之水溺道分清而泄利自止亦非治虛寒之泄瘑字集韻同瘑玉篇瘑訓為瘡則與疥癬蟲瘡同為濕熱蘊於膚腠之病而此皆主之清熱逐濕效自可睹必非溫藥明甚廣義甄權謂治濕風口面喎斜手足拘痛壽頤謂當注重濕字即別録所謂療中風手腳攣急亦止治濕邪之痹著及風濕在絡之實邪非猝然中風之癱瘓不仁可知又謂散留痰肺氣喘嗽亦專以濕痰言之潔古謂治中下濕熱腫泄腳氣行十二經則純乎泄導水濕之邪耳故陶弘景謂防己為療風水要藥發明防己紋如車輻體質空松蘇頌謂折其莖吹之氣從中貫故專以通泄疏導為用而味又辛則外達肌膚下通二便昔人謂其散風者亦以輕能外達言之實則疏達而清利濕熱是其專職頗與木通體用相近則專治濕熱有餘二便不利而實非風家主藥名曰防己者以脾為己土喜燥惡濕濕淫於內則氣化不行而水失故道為腫為瘡為腳氣皆己土受邪之病而此能防堤之是為古人命名之真義非所謂名之以其能者耶古今主治無不從濕熱二字著想此物産於漢中範子計然已有此説故名漢防己藏器雖謂治風用木防己治水用漢防己張石頑亦有根苗分治之説然今市肆中皆無二者之分別正不必拘牽舊説執而不化東垣李氏獨謂其如人之險而健幸災樂禍能力亂階又歷舉其三不可用貶之最甚然持論皆不切實説詳瀕湖綱目而石頑逢原亦歷歷言之而又謂十二經濕熱壅塞不通下注腳氣膀胱積熱非此不可真行經之仙藥忽抑忽揚殊覺無謂要之藥以治病對證自有奇功譬如巴豆烏附大毒最厲苟能用得其宜起病乃極迅速何必專言其短等於吹毛求疵反以眩惑人心望而生畏且以啓後學之疑非藥物學之正旨矣東垣又謂此是血分藥瀉血中濕熱説亦不確此物空松氣疏以達行經利水正其以氣用事且味薄質輕豈可認作瀉血攻破之劑金元名醫議論顢頇大都如此最易眩惑後人不可不辨木通本經通草味辛平主去惡蟲除脾胃寒熱通利九竅血脈關結令人不忘別録味甘療脾疸常欲眠心煩噦出音聲治耳聾散癰腫諸結不消及金瘡惡瘡鼠瘻踒折雍鼻息肉墮胎去三蟲考異關結瀕湖綱目及繆氏經疏皆作關節文義固為淺顯然孫氏問經堂輯刻本經則作關結亦自有義茲從孫本以存古人之真存疑本經通草一名附支御覽引吳普本草謂神農黃帝辛雷公苦葉青蔓延生汁白陶弘景注本草云繞樹藤生莖有細孔兩頭皆通含一頭吹之則氣出彼頭者良壽頤按此即通草命名之義自南唐陳士良食性本草謂此即今之木通而世之所謂通草則是通脫木李氏瀕湖綱目一仍陳氏之説而繆仲淳以後諸家皆宗之至今似已成為定論然尋繹陶氏所謂莖有細孔兩頭皆通吹之氣出云云其形固與今之木通相似惟木通之味大苦而本經止稱其辛微嫌不類且別録又以為甘則尤為可疑但本經別録所載主治固無一與今之木通不合者意者雷公謂之為苦最得其真而別録之甘字有誤歟抑別録亦誤認通脫木為通草乃以其淡而無味遂以甘淡之義謂之甘歟壽頤竊以甘之一字終覺木通不類是以高郵王氏廣雅疏證於附支通草一條雖亦引食性本草莖名木通一名而並不直言陳説之是且謂後世本注原作木顯誤改草諸家無能證明其説者蓋以其失傳久矣云云則念孫氏父子固亦有疑於古之通草未必果為今之木通也茲以古人所説通草主治尚與今人所用之木通情性尚無注原作與往義不可解據文意改不合姑仍瀕湖之意徑以木通標作正名而附志所疑如此以俟知者更詳之正義木通質輕而細孔通達其味大苦故善泄降祛濕而專治濕熱之蘊結不通本經去惡蟲者凡蟲皆濕熱結滯之所生也除脾胃寒熱疑傳寫者羡一寒字正惟脾胃有熱故宜苦泄通利以除之而寒則非其治矣濕與熱蒸則上之陽竅不清而下之陰竅不利苦以降之通以導之九竅有何不利之有血脈關結是指血熱積瘀而關閉結塞清熱以通其經隧斯血脈通而關結開今本關結乃作關節則但以支節言之雖最為習見之字然身之有關節止是百體之一端不如從古作血脈關結則以全體而言所賅者廣此可知見大見小不可同日語矣能令人不忘者熱盛濕蒙則神志憒憒清而通利之自然神情塏爽此以濕痰矇蔽及熱邪重灼而言固非泛治血液不足之健忘也別録謂療脾疸其為濕熱顯而易知常欲眠者亦濕熱薰蒸恆令人倦怠嗜臥此能導熱燥濕譬於炎熇酷熱之時人多神思頽唐沉沉欲睡必有涼飈乍起掃蕩鬱蒸而後氣宇澄清精神煥發此非正氣疲憊之嗜臥及少陰病之但欲寐所可等視者心煩亦熱痰內擾使然此能清熱開痰泄而通之是以可治噦即厄逆痰氣壅塞升而不降乃厄忒有聲故宜苦降宣通以順胃氣下降之令其非胃虛胃寒之厄亦可於病情藥理得之耳聾者氣逆之上蒙清竅者也癰腫結核惡瘡鼠瘻固多痰熱濕熱阻其經隧之病亦猶本經之治血脈關結踒鳥禾切音倭説文本訓足跌即跌僕損傷之病絡脈不通血瘀結滯易生蘊熱金瘡失血亦生內熱此能清熱通利是以主之雍者鼻息之不通瘜肉則痰熱之凝結降之清之泄之通之宜其可治但苦降之力甚鋭且通行百脈所以能墮胎孕合本經別録諸治觀之固無往而非苦泄宣通利濕清火消痰行瘀之猛將矣廣義甄權謂治五淋利小便壽頤按木通之力固未始不可以通淋閉利小便乃本經別録所未言而甄氏言之貌視之似可以補古人所未備然細繹經文主治通淋利水皆在不言之中而反不直敘此病者正以淋閉諸證有虛有實病源各各不同固注原作因顯誤改不僅濕熱互阻壅遏不通之一候此藥通淋止可以治有餘之濕熱若一切虛閉而亦妄事疏鑿則豈徒無益而已然後知古人不録此等證候非無深意而明以言之者反足以貽誤後人流弊滋重此則本經言簡意賅後學固不可不熟思深味而唐宋以後諸家本草正有不可同年而語者乃瀕湖綱目竟謂本經別録皆不言及利小便治淋之功甄權日華子輩始發揚之則亦未悟古人言外之旨矣日華謂通小腸東垣亦謂導小腸火壽頤按此藥利九竅熱泄火降無一不通何分腸胃而日華東垣必以小腸特提殊非藥理之真蓋自六朝以降皆謂小溲由小腸而來凡能通利小便者無不認作清小腸之火百口一辭久成習慣此必不可不辨者後之學者慎弗更以此等偽言自汙齒頰否則貽人口實吾道之恥百世不可湔矣日華又謂能下乳汁壽頤按乳子而乳汁不通雖云絡脈之不利實多血液之不充如木通王不留行諸物迅速遄行説者謂為通乳聖藥不知竭澤而漁一往無前不顧其後體之實者猶難為繼而孱弱者其奚以堪惟豬蹄湯一法以豬前蹄一隻濃煮清湯去浮面之油和入木通汁飲之於行血之中隱寓養陰之法通乳汁而不致傷陰堪為良法通草發明此今之所謂白通草也陳藏器本草云通脫木生山側葉似萆麻其莖空心中有瓤輕白可愛女工取以飾物俗亦名通草爾雅所謂離南活脫也陳藏器唐開元時人為三原縣尉著本草拾遺活脫今爾雅作活莌陸氏釋文莌或作莌郭注草生江南高丈許大葉莖中有瓤正白爾雅又有倚商活脫郭注即離南也陳氏本草引爾雅作離南活脫蓋以莌字罕見乃合爾雅前後兩條並言之耳山海經中山經其草多寇脫郭注寇脫草生南方高丈許似荷葉莖中有瓤正白零陵人植而日灌之以為樹即此壽頤按陳氏説與郭景純合則唐人所謂脫木者即今之通草無疑而確非本經之通草陶注本經通草繞樹藤生而此則是草類但高大似樹惟瀕湖綱目亦列於蔓草類中且釋之曰蔓生山中大者圍數寸殊與郭氏陳氏所説不合豈瀕湖曾見其確是蔓生乎抑以其性情效力有似木通而連類及之遂亦姑妄言之乎究竟白通草片大於掌生於草莖中則此草之莖其巨如甌蔓草無此大本當以爾雅及山海經之郭注為是瀕湖列於蔓草殊未敢信茲姑依綱目並録於木通之後亦以其功用之相類耳其氣味則李東垣用藥法象謂甘淡寒無毒壽頤按此甘字非大甜之謂實即淡字如泉水米麥皆是味甘之例此物無氣無味以淡用事故能通行經絡清熱利水性與木通相似但無其苦則通降之力緩而無峻厲之弊雖能通利不甚傷陰濕熱之不甚者宜之而壅遏閉結之症必不能及木通之捷效東垣謂利陰竅治五淋除水腫癃亦惟輕症乃能有功耳又謂瀉肺利小便與燈草同功蓋皆色白而氣味輕清所以亦能上行泄肺之熱閉宣其上竅則下竅自利説亦可取乃又謂宜生用之則輕清之藥豈有炒用之笨伯耶汪石山謂明目退熱亦輕清上行之效又謂下乳催生則清淡者能滑利通竅耳瀕湖謂色白氣寒味淡體輕氣寒降也味淡升也附白梗通發明白梗通吾吳藥肆有之不知是何草之梗其大過於拇指外皮微黑中心純白輕虛之甚切薄片用之其色澤頗與白通草相似但不如白通草之柔韌味淡氣清功用與白通草等而古今本草皆無此物姑並録之以備藥籠所需且近時白通草之價漸貴而梗通則廉入藥功力殊無軒輊是可取也白斂本經味苦平主癰腫疽創散結氣止痛除熱目中赤小兒驚癇溫瘧女子陰中腫痛別録甘微寒下赤白殺火毒考證斂孫氏問經堂輯刻本草經如此別本多作蘞壽頤按斂蘞似古今字然許氏説文云蘞白蘞也或作蘞毛詩蘞蔓於野陸璣詩疏蘞似栝樓葉盛而細其莖葉煮以哺牛除熱爾雅萰菟荄玉篇萰白蘞也則從草斂之字由來亦古本經謂一名兔核蘇恭謂蔓生枝端有五葉根似天門冬一株下有十許壽頤按蔓生五葉與陸氏詩疏似栝樓時兔核以根形得名萰與蘞兔與菟荄與核皆古字通用創今本經作瘡此古今字下赤白李瀕湖綱目引作帶下赤白以為出於本經而問經堂本無之繆氏經疏無帶字茲從孫本系於別録又從繆本刪帶字廣義白斂苦泄能清濕熱而通壅滯癰腫疽瘡多濕火為病古人所謂癰疽本外瘍之通稱此疽字非近世之所謂陰疽結氣以熱結而言苦泄宣通則能散之痛青者熱結之不通經文以止痛與除熱並言則非泛治一切諸痛可知目赤乃濕熱上凌驚癇多氣火之上菀溫瘧本是熱痰窒塞陰中腫痛亦濕火結於肝腎之絡總之皆苦泄宣通之作用醫經主治未嘗不與陸氏詩疏同條共貫也別録以治赤白亦泄導濕熱之濁垢曰殺火毒則約而言之耳廣義日華子謂治發背則古之背疽多是火毒此與太陽經寒邪凝結之背疽不同不可含渾又謂瘰癧而上疱瘡亦即本經主癰腫之義又謂治腸風痔漏血痢刀箭瘡撲損生肌止痛則於本經別録之外多一層涼血破血化瘀生新之義又可作瘍家外治末藥蓋苦而善泄義固相因石頑逢原謂性寒解毒敷腫瘍瘡有解散之功以其味辛也金匱薯蕷丸用之專取其辛涼散結以解風氣百疾之蘊蓄壽頤謂金匱論虛勞以血虛而運行不利必有乾血既主大黃蟅蟲丸方專治乾血而薯蕷丸雖大隊補藥然亦以白斂之宣通清熱者為輔能守能行乃流利而不滯石頑謂解風氣蘊畜尚非古人本旨石頑又謂同地膚子治淋濁失精同白茇注疑為及之誤治金瘡失血皆辛散之功正訛寇宗奭謂白斂服餌方少用惟斂瘡方多用之故名白斂壽頤按此藥功用全以流動泄散見長正與斂字之義相反説文此字本從草僉其從斂者原是別體乃古人音近通用之例與收斂之義毫不相涉此胡可偽託字義妄言以欺人者寇氏不知文字之學望文生義致有此誤本不足責然欲發明藥物情性而説來適得其反貽誤後人其罪不小向壁杜撰強作解事荒謬極矣張景嶽之本草正即因寇氏此説遂曰性斂治諸瘡不斂生肌止痛生肌止痛四字尚無不是然此乃苦泄解熱之功非欲以收斂瘡毒一盲百盲是之謂乎石頑謂癰疽已潰不可用其説甚怪須知瘍家辨症必以虛實寒熱為據非可以未潰已潰標示治法如果潰瘍尚有熱毒此藥何嘗不宜若非實熱即在未潰之時亦豈清涼之藥所可浪用者耶石頑又謂陰疽色淡不起胃氣弱者非其所宜壽頤謂此説亦大有語病是是非非不可不辨白斂苦泄果屬陰疽不起誠非所宜若曰色淡則殊不盡然蓋瘍症之陰陽虛實本不在色紅色淡之分若曰腫瘍色淡皆是陰寒必色紅者乃為陽熱將見陰證則十九而強陽證十一而弱無怪乎林屋山人王鴻緒之證治全生集動輒陽和湯誤盡天下後世然世之普通外科俗書固無不如此説法所以壽頤每謂世間竟無一部稍稍明瞭之外科書而內科家言一及外科又無一不貌似神非隔靴搔癢石頑能為此説可知此公於瘍科一門亦未嘗有實在經驗要之治瘍雖曰小道其實亦不可不研究一番而輔之以十年閲歷否則信口説來無一非門外漢之語氣矣覆盆子本經蓬藟味酸平主安五臟益精氣長陰令堅強志倍力有子一名覆盆別録覆盆子甘平無毒益氣輕身令發不白考證本經止有蓬藟而曰一名覆盆又説文茥缺盆也廣雅蒛盆陸英莓也爾雅茥缺盆郭注覆盆也毛詩葛藟纍之陸璣詩疏似燕薁亦連蔓是覆盆缺盆陸英陸荊皆即古之所謂藟也李瀕湖綱目詳言一類五種雖微有別然亦自言覆盆蓬藟功用相近又言實是一類而二種茲故以本經別録兩者合為一條李氏綱目謂蓬藟一名覆盆出於別録茲據孫淵如問經堂輯刻本草經則出於本經蓋所據大觀本黑白字之白字定為本經也長陰令堅綱目引本經令下衍人字遂不成句茲據孫本無人字發明覆盆為滋養真陰之藥味有微酸能收攝耗散之陰氣而生精液故寇宗奭謂益腎縮小便服之當覆其溺器語雖附會尚為有理本經主安五臟臟者陰也凡子皆堅實多能補中況有酸收之力自能補五臟之陰而益精氣凡子皆重多能益腎而此又專入腎陰能堅腎氣故曰長陰令堅強志倍力有子皆補益腎陰之效也久服輕身不老則極言其功耳別録益氣輕身令發不白仍即本經之意惟此養陰非以助陽本經別録並未言溫其以為微溫微熱者皆後人臆測之辭一似凡補腎者皆屬溫藥不知腎陰腎陽藥物各有專主滋養真陰者必非溫藥讀本草者必以本經為主而別録輔之後人雜説徒多紛亂不可不分別以觀也萆薢本經味苦平主腰背痛強骨節風寒濕周痹惡創不瘳熱氣別録甘主傷中恚怒陰痿失溺老人五緩關節老血考異萆薢瀕湖綱目於首行注曰別録中品似出於別録而本經無之然所録主腰背痛以下一節亦注以本經二字則固本經所有者也茲據孫淵如輯刻本草經亦有此條則綱目注以別録者誤腰背綱目作腰脊茲從孫本創今本作瘡發明萆薢蔓生故性能流通脈絡而利筋骨入藥用根則沉墜下降故主治下焦雖微苦能泄而質輕氣清色味皆淡則清熱理濕多入氣分少入血分本經主腰背痛乃腎有濕熱濁氣不去而腰膂為之疼痛非腎虛無濕之腰痛所可渾同施治強骨節者宣通百脈濕濁去而正氣自強非能補益以助其強固此藥理之至易辨者楊氏有萆薢分清飲專治濕熱淋濁正是此意惟方中有益智仁溫而且澀性正相反不能並列殊有誤會瀕湖綱目謂萆薢能治陽明之濕而固下焦故能去濁分清立説甚允然又謂楊氏此方治真元不足下焦虛寒小便頻數云云則與萆薢性情兩相背謬殆為智仁一物而展轉誤認甚非藥理之真讀古人書慎勿為其所眩本經又主風寒濕周痹壽頤謂惟濕熱痹著最為合宜若曰風寒必非此苦泄淡滲者所能幸效又治惡瘡不瘳熱氣者豈非為濕與熱蒸之主藥乎別録謂主傷中亦惟脾為濕困者宜之決非補中之藥又治恚怒頗不可解又謂陰萎失溺則非濕熱閉結者亦有痿躄不仁溲溺不利之證必非可以起虛痿又謂治老人五緩關節老血且語太浮泛且與萆薢真性不相符合何可輕信不謂繆仲淳因此二語竟謂此藥為補益下元之要藥又謂甘入脾而益血以滲泄利濕之效用而説到補陰上去可謂顢頇已極不如石頑逢原謂古人或稱攝精或稱利水何其兩説相懸不知濕濁去而腎無邪熱之擾腎氣自能收攝頗能窺見玄奧也甄權謂主冷氣𤸷痹腰腳癱緩不遂男子䐴腰痛久冷䐴公對切音憒玉篇為腰忽痛也壽頤按此即周痹陰萎之證然惟濕熱為患乃宜此藥甄氏冷氣久冷之説大誤甄又謂治腎間有濕膀胱宿水是也而今本李瀕湖綱目引此兩句脫一濕字乃作腎間有膀胱宿水遂令人無從索解俗本誤人真是不小繆氏經疏引此不誤王好古謂補肝虛亦不可訓尤奇者莫如日華本草竟謂補水臟堅筋骨益精明目頭旋癇疾中風失音云云龐雜之極最為蕪穢壽頤每謂唐宋人藥物之學固多有未可盡信者而必以大明氏謂荒謬之尤不知瀕湖何所取裁亦為之作抄書胥而不加芟剃耶忍冬別録味甘溫無毒主寒熱身腫發明忍冬乃金銀花之藤葉隆冬不調故得此名別録稱其甘溫者蓋即以藤蔓之能耐霜雪非具溫和之氣不能有此力量實則主治功效皆以清熱解毒見長必不可以言溫故陳藏器謂為小寒且明言其非溫甄權則稱其味辛蓋惟辛能散乃以解除熱毒權説是也今人多用其花實則花性輕揚力量甚薄不如枝蔓之氣味俱厚古人止稱忍冬不言為花則並不用花入藥自可於言外得之觀綱目所附諸方尚是藤葉為多更是明證別録謂主治寒熱身腫蓋亦指寒熱癰腫之瘡瘍而言與陳自明外科精要之忍冬酒忍冬丸同意方亦載李氏綱目本條非能泛治一切腫脹甄權謂治腹脹滿恐有誤會雖微辛能散而性本寒涼必非通治脹滿之藥甄又謂能止氣下澼則熱毒蘊於腸府之闢積滯下此能清之亦猶陳藏器謂治熱毒血痢耳藏器又謂治水痢則為大便自利之水泄惟熱利或可用之而脾腎虛憊之自利非其所宜瀕湖謂治諸腫毒癰疽疥癬楊梅諸惡瘍散解毒則今人多用其花壽頤已謂不如藤葉之力厚且不僅煎劑之必須即用以煎湯洗滌亦大良隨處都有取之不竭真所謂簡便賤三字畢備之妙藥也百部別録味甘微溫主咳嗽上氣發明百部善於殺蟲蟲為濕熱所生即勞瘵家肺中有蟲亦是虛熱此其專藥似不可謂之性溫故甄權以為甘大明以為苦蘇恭且以為微寒繆氏經疏直謂別録為誤蓋亦有理然即曰微溫亦如紫菀溫潤專治肺咳之例究非溫熱之溫故凡有咳嗽可通用之本是草根而多者可數十莖性專下降故治上氣瀕湖謂百部亦天門冬之類故皆治肺病殺蟲但百部氣溫而不寒寒嗽宜之天門冬性寒而不熱熱嗽宜之頤謂瀕湖此説尚嫌太泥實則門冬甘膩止可治燥熱之嗽而肺有寒飲痰滯者皆其大忌百部雖曰微溫然潤而不燥且能開泄降氣凡嗽無不宜之而尤為久嗽虛嗽必需良藥程鍾齡醫學心悟止嗽散頗有捷效功力實在紫菀百部二味宣通肺氣千金方謂一味取汁濃煎可愈三十年嗽有自來矣石頑謂肺熱勞瘵喘嗽有寸白主者宜之蟯蟲痢及傳尸骨蒸多用之又謂脾胃虛人弗用以其味苦傷胃之故壽頤謂專主上氣正其味苦之功凡嗽皆肺氣上逆非此不治若嫌其微傷胃土中和以參術補中之品相輔而行可也鉤藤別録甘微寒主治小兒寒熱十二驚癇發明鉤藤其質甚輕氣味俱薄自別録即以為專治小兒寒熱弘景且謂療小兒不入餘方蓋氣本輕清而性甘寒最合於幼兒稚陰未充稚陽易旺之體質能治驚癇者癇病者肝焰生風氣火上燔沖激腦神經之病此物輕清而涼能泄火能定風甄權謂主小兒驚啼瘈瘲熱壅客忤胎風瀕湖謂治大人頭旋目眩平肝風除心熱皆可一以貫之惟瀕湖又謂其發斑疹則本於錢仲陽之紫草散方用鉤藤鉤子紫草茸等分為末溫酒調服壽頤按仲陽之所謂斑疹即是痘瘡及瘄子非今人時病中之所謂發斑鉤藤輕能透發清能解熱而佐以紫草涼血活血助其流動又以酒輔之能發亦能清火洵是不亢不卑穩妥之法牽牛子別録苦寒有毒下氣療腳滿水腫除風毒利小便發明牽牛善泄濕熱通利水道亦走大便故別録謂其苦寒至李氏東垣以其兼有辛蘞氣味遂謂是辛熱雄烈壽頤按此物甚滑通泄是其專長試細嚼之惟其皮稍有辛味古今主治皆用之於濕熱氣滯實腫脹滿二便不通則東垣以為辛熱張石頑和之亦謂辛溫皆屬不確當以別録之苦寒為正又蘞氣戟人喉舌細味之亦在皮中所謂有毒蓋即在此古方中凡用末子均稱止用頭末正以其皮黏韌不易細碎只用頭末則棄其皮而可無辛蘞之毒頗有意味可思觀別録主治專破氣分之壅滯泄水濕之腫滿除風利便固皆以實病言之此藥功用已包舉無遺甄權申之則曰治痃癖氣塊利大小便東垣謂除氣分濕熱三焦壅結瀕湖謂逐痰飲通大腸氣祕風祕殺蟲亦皆主結滯壅塞立論而甄權乃又謂除虛腫則誤矣日華本草謂治腰痛蓋亦指濕熱阻塞腰脊不利之症惟言之殊不分明究屬非是東垣又有專論言其傷人元氣瀕湖綱目詳載之語極繁冗瀕湖謂自宋以後北人常用以取快及劉守真張子和輩又以為通用下藥明之目擊其害故極力闢之但此藥治水氣在脾喘滿腫脹壽頤按水氣在脾蓋言脾無運化之權以致水行不循常道發為腫脹而言然果是脾虛積水則溫養以助氣化猶虞不及豈有用此峻利之藥可治虛證之理李氏此説失於檢點不可為訓下焦郁遏腰背脹重壽頤按此亦以濕熱結滯言非腎虛證凡此似是而非虛實疑似之處不可不辨及大腸風祕氣祕卓有殊功但病在血分及脾胃虛弱而痞滿者則不可取快一時及常服暗傷元氣也一宗室夫人年幾六十平生苦腸結病旬日一行甚於生産服養血潤燥藥則泥膈不快服硝黃通利藥則若罔知如此三十餘年矣時珍診其人體肥膏粱而多憂鬱日吐酸痰碗許乃寬又多火病此乃三焦之氣壅滯有升無降津液皆化為痰飲不能下滋腸府非血燥比也潤劑留滯硝黃徒入血分不能通氣俱為痰阻故無效也乃用牽牛末皂莢膏丸與服即便通利自是但覺腸結一服就順亦不妨食且復精爽蓋牽牛能走氣分通三焦氣順則痰逐飲消上下通快矣外甥柳喬素多酒色病下極脹痛二便不通不能坐臥立哭呻吟者七晝夜醫用通利藥不效遣人叩豫豫思此乃濕熱之邪在精道壅脹隧路病在二陰之間故前阻小便後阻大便病不在大腸膀胱也乃用楝實茴香穿山甲諸藥入牽牛加倍水煎服一服而減三服而平牽牛能達右腎命門走精隧人所不知惟東垣李明之知之故明之治下焦陽虛天真丹用牽牛以鹽水炒黑佐沉香杜仲破故紙官桂諸藥深得補瀉兼施之妙方見醫學發明又東垣治脾濕太過通身浮腫喘不得臥腹如鼓海金沙散亦以牽牛為君則東垣未盡棄牽牛不用但貴施之得道耳壽頤按病在二陰之間等句不妥此乃氣滯痰凝諸府俱不通利所謂不通則痛若謂二陰之間前阻小便後阻大便則似二便之上源有一處總彙即從此分開為大小便此是漢唐以後醫家不知小溲來路往往説得離奇竟堪噴飯今之生理學説不如是也凌霄花本經紫葳味酸微寒主婦人産乳余疾崩中癥瘕血閉寒熱羸瘦養胎考證本經止有紫葳初無凌霄之名即吳普李當之諸家本草載諸藥別名甚多亦未見有此爾雅釋草苕陵苕郭注一名凌時本草云此七字爾雅注文詩苕之華云其黃矣毛傳苕陵苕也鄭箋陵苕之華紫赤而繁詩正義引某氏曰本草云陵時一名陵苕至蘇恭唐本草注引爾雅注乃有一名凌霄四字孫淵如輯刻本草經頗疑其非壽頤按今凌霄花入藥治療之功與本經主治符合今本爾雅注及詩正義凌時之名皆謂出於本草然世所傳弘景吳普諸本皆無凌時一名竊疑凌時即凌霄之訛唐本草所引爾雅注一名凌霄蓋所據即郭氏本之未誤者棲霞郝氏爾雅義疏謂霄苕聲近其説甚是此蘇恭以後諸本草皆以凌霄為紫葳之別名者皆屬可信故即以凌霄花為定名欲其盡人能知適於應用云爾李瀕湖謂俗稱赤豔者曰紫葳葳此花赤豔故名以世俗相傳之土語為古名詞作説解附會巧合壽頤按紫葳葳三字今吳人尚有此諺語信是注一本作倍足證此花即是古紫葳矣考異味酸太平御覽引作味鹹與吳普本草扁鵲説合正義凌霄之花色黃而赤正入血分味微酸而氣微寒吳普謂神農雷公岐伯皆作辛扁鵲苦鹹能清血分之熱故可以活血行滯而亦可以治帶下崩中本草經專主婦人産乳余疾正以初産乳子之時陰血已虛孤陽偏旺最宜此酸鹹微寒直入血分藉以固護既耗之元陰而收攝浮遊之陽焰可見古人之治産後皆以助陰抑陽為主正與晚近庸俗之見産後妄用溫補耗爍陰液者兩得其反又主崩中則專以亢陽妄行不能自攝之崩中而言非謂可以統治血虛不守之崩陷癥瘕血閉蓋亦為血熱太甚灼爍成瘀者言之亦非陰寒凝結之癥瘕閉塞可知又曰寒熱羸瘦則又血虛內熱形消臞瘠者耳其又能養胎者以胎元既結之時元陰凝聚如注疑為於之誤下往往虛陽升浮於上而此能養之亦助陰涵陽之要旨也廣義甄權治産後奔血不定淋瀝蓋皆以血熱妄行而言酸以吸攝而又鹹寒則能止其疏泄即本經治産乳余疾之義權又謂治大小腸不利腸中結實則指實熱閉結之證花性輕揚自能去實今單方治血痢結滯及血熱腸紅皆有捷驗蓋本於此大明治酒查熱毒風刺則輕能上揚寒以勝熱效固可知又治崩中帶下則本經已言之矣別録謂莖葉苦平主痿躄則肺熱葉焦乃生痿躄此本苦寒所以能清肺熱日華以治熱風身癢遊風風疹瘀血帶下謂花葉根莖同功蓋即引伸別録清肺之義亦猶花治酒查耳瀕湖又治喉痹皆以苦寒泄降導熱下行為用何首烏發明首烏之根入土甚深而藤蔓延長極多且遠能入夜交纏含至陰之氣且有凝固能力所以專入肝腎補養真陰且味固甚厚稍兼苦澀性則溫和皆與下焦封藏之理符合故為填益精氣備有陰陽平祕作用非如地黃之偏於陰凝可比據李翱有何首烏傳此傳亦詳載瀕湖綱目則自唐時始知其用有赤白二種遂以為有入氣入血之分用者必兼而用之亦即調劑陰陽兩得其平之至理開寶本草謂治瘰癧消癰腫療頭面風瘡蓋以根深入土藤又遠蔓故能有宣通經絡之效且赤者直入血分故耳瀕湖綱目謂外科呼為瘡帚及紅內消斗門方亦有專治瘰癧結核一條且謂根如雞卵亦類癧子恐未免近於附會開寶又謂治五痔止心痛益血氣黑髭發悅顏色久服長筋骨益精髓亦治婦人産後及帶下諸疾則皆以養陰補血為義無甚深意大明謂治腹藏一切痼疾冷氣又無非溫潤以補益五臟耳好古謂瀉肝風仍是陰不涵陽水不養木乃致肝木生風此能補陰則治風先治血血行風自滅亦其所宜但此是滋補以息風必不可誤以為瀉肝金元人之談醫多有用藥是而議論甚謬者丹溪東垣之書亦皆頻頻有之於王海藏何譏焉明邵應節有七寶美髯丹一方進御世宗盛行於世只是滋填肝腎方雖平穩實亦不過尋常之理耳石頑謂其性稟陰中之陽以産於南方者為勝若北産則雖大不足珍以其地偏於陰無陽生之力立論雖奇尚亦有理石頑又謂治津血枯燥大腸風祕以鮮首烏數錢煎服即通以其滋水之性最速不及封藏即已下泄與蓯蓉之潤燥通大便無異壽頤按鮮者生氣未漓通絡走竄之力愈迅故有此效凡虛瘧日久不止並無痰濕積滯者重用生首烏加入補中益氣湯內振動脾胃清陽之氣亦甚捷效此不僅取其澀味可以固攝亦以生用力速宣布脾陽尤易得力耳若欲其專補下焦厚重有力則必以久蒸久曬方能味厚入陰填塞善守正與生用之利於速行者兩得其反此皆以天然之情性而分別其效力吾國藥學之精義在此若彼化學家專論物質胡足以知此藤名夜交藤瀕湖止稱莖葉治風瘡疥癬作浴湯甚效今以治夜少安寐蓋取其入交纏之義能引陽入陰耳然不寐之源亦非一端苟不知從病源上著想而惟以此為普通用品則亦無效但止堪供佐使之助固是調和陰陽者故亦有利無害使君子發明使君子始見開寶本草謂其甘溫無毒治小兒五疳小便白濁殺蟲療瀉利壽頤按小兒疳積多食物太過胃力不及消化以注原為馴顯誤改致腸亦窒滯日積月纍腹繃如鼓濕與熱蒸乃生蟲積使君專於殺蟲而健運化最為五疳馴良之藥瀕湖謂殺蟲藥多是苦辛惟使君棐子甘能殺蟲亦其異也壽頤按其他殺蟲諸物多峻利而氣味亦烈惟此二者氣味皆和然殺蟲極捷故小兒疳積方中必以此為主藥石頑謂殺蟲而不傷脾胃並治大人小兒蟲病蓋甘溫是溫和之溫殊非溫燥可比故能助飲食之運化而疏導腸中積滯且富有脂液所以滑利流通開寶所謂小便白濁者即指疳積而言凡小兒腹膨有積每每小便如粉漿此蓋腎中輸尿之路分泄不清即以飲食所化之精液併入小溲而出所見最多非大人之赤白濁可比不當誤認又謂其主瀉痢亦是疳積中之一症惟其消化失職以致大便改常或為腹瀉或為積滯此物既能助消化且去積滯故並治之即瀕湖所謂能益脾胃除虛熱治小兒百病之意也壽頤按無病之人不當有蛔蟲之屬凡是諸蟲皆當殺之使盡今俗人之見似乎腸胃當有此蟲則食物乃能消化其説最是可嗤瀕湖綱目亦曰俗醫謂殺蟲至盡無以消食鄙俚之言也樹有蠹屋有蟻國有盜禍耶福耶可知世俗相傳不經之説亦已久矣馬兜鈴發明馬兜鈴開寶本草稱其苦寒甄權則謂之平瀕湖則曰微苦辛壽頤按味固稍苦而氣甚清雖能清熱卻非大苦大寒之品東垣謂味厚氣薄陰中微陽瀕湖加一辛字蓋亦以其輕而能散固亦隱隱有辛開之作用者開寶謂主肺熱咳嗽痰結喘促正以形質空虛中雖有實而亦片片如紙有若木蝴蝶之臨風飛揚故同為宣通肺氣化痰開閉之藥其能治喘促者以肺有痰濁鬱結則呼吸不揚而喘促隨之此能通其結塞斯氣道利而喘促自寧此與虛喘家濁陰上逆宜於攝納鎮墜之治者一輕一重用藥相反而同為定喘之兩大法門甄權謂主肺氣上急咳逆連連潔古謂去肺中溫熱固皆肺實氣壅之正治也開寶又謂治血痔瘻瘡則清利宣通因為瘡家血熱壅結之良藥且血痔腸漏皆屬大腸濕熱之窒滯此能清熱開泄是以主之若潔古以為清肺而又以為補肝則殆誤會錢仲陽補肺阿膠散之真旨要之仲陽意中只為肺受燥火之害熱壅不宣故用牛蒡杏仁兜鈴皆屬開宣清熱主治特以熱傷肺陰乃主阿膠非諸藥皆是補肺正將瀕湖已謂錢氏此方非以兜鈴補肺乃取其清熱降氣使邪去而肺安壽頤按宣肺之藥紫菀微溫兜鈴微清皆能疏通壅滯止嗽化痰似此二者有一溫一清之分宜辨寒咳熱咳寒喘熱喘主治究竟紫菀本非大溫兜鈴亦非大寒而能抉壅疏通皆有捷效洵乎同為肺金窒塞之良藥矣頤又按近今市肆中別有所謂洋兜鈴者止有片片之兜鈴實而無其外囊形狀稍巨作淡褐色肆中人謂是同類異種似屬可信用者取其色澤鮮明頗行於世然氣味更清力量更薄究其功用不如杜兜鈴為佳而價值則較貴尚不知究為何物如謂果即兜鈴之別種則其外囊又何以棄而不用且此藥之所以開肺者性情專在於殼瀕湖所謂體輕而虛熟則懸而四開有肺之象者是也乃偏去其外則未免有買櫝還珠之憾矣山豆根發明山豆根蘇頌圖經謂其蔓如大豆因有此名開寶本草雖謂氣味甘寒然其實甚苦沈存中夢溪筆談已言本草之誤其功用則開寶謂解諸藥毒止痛消瘡腫毒發熱咳嗽治入及馬急黃殺蟲蓋苦寒泄降其味甚厚故能解毒而療瘡瘍之腫痛兼能殺毒治黃皆惟大熱之實證為宜又治發熱咳嗽則以肺胃熱咳言之非不問虛實寒熱可為咳嗽之通用品也今人專以治咽喉腫痛則本於圖經謂含之咽汁解咽喉腫毒甚妙石頑謂水浸含漱煎湯細呷皆可蓋凡藥用根多取其下行能降而此又大寒大苦則直折火毒之上炎亦惟實熱閉塞者始為合宜而風邪外束之喉痛尚須辛涼開泄者則必不可早投反恐遏抑不宣重增其困石頑所謂解痘疹熱毒及喉痹者意固不差但近今喉痧為病最多而有外感表尚未罷及肺胃實熱如焚兩候先後不同投藥即因而大異如有表者先投寒降則外邪不散適以內攻如熱熾者誤授輕揚則烈火見風頓成焦土臨症者豈可不辨之於早而石頑逢原竟謂喉證皆屬陰氣上逆故用苦寒以降之真令人無可索解矣瀕湖謂研末湯服治腹脹喘滿酒服治女人血氣腹脹丸服治下痢則必皆屬實熱壅塞者庶乎相投而言之不詳其弊亦甚又謂磨汁服止卒患熱厥心腹痛五種痔漏研汁塗諸熱腫禿瘡蛇狗蜘蛛傷則清火解毒之顯而易見者耳禁忌石頑謂脾胃虛寒作瀉者禁用威靈仙發明威靈仙開寶本草謂為苦溫瀕湖謂微辛不苦性善通行故得此名開寶謂主治諸風宣通五臟去腹內冷滯心膈痰水久積癥瘕痃癖氣塊腰膝冷疼東垣謂推新舊積滯消胸中痰唾皆以走竄消克為能事積濕停痰血凝氣滯諸實宜之味有微辛故亦祛風然惟風寒濕三氣之留瘀隧絡關節不利諸病尚為時宜而性頗鋭利命名之義可想而知乃唐人著威靈仙傳竟謂治中風不語手足不遂口眼喎斜云云則大有誤會矣石頑謂痘疹毒壅於上不能下達腰下膝脛起灌遲者用為引下立效其性利下壯實者有殊效氣虛者服之必致虛瀉血虛而痛不因風濕者不可服割人藤發明割人藤張石頑本經逢原謂即葎草之俗稱其苗極長蔓延最速莖有毛刺極密老則螫人肌膚江浙間遍野有之吾鄉土語割人藤三字婦孺皆知據李氏綱目引唐本草律草謂即別録之勒草蜀注似為衍字圖經謂之葛勒蔓李謂莖有細刺善勒人膚故名勒草云云則土語割人之名即從葛勒轉展為之且蔓生如葛故有葛名其形則綱目詳言之蘇恭謂氣味苦寒主五淋利小便蘇頌謂療膏淋久痢石頑謂散瘀血蓋苦泄寒降皆主濕熱壅塞之實證而亦可為外瘍陽毒之外敷者也天仙藤青木香發明天仙藤之名綱目引蘇頌圖經本草有之然今之所通用者乃土青木香之苗蔓土青木香入土甚深一莖直行小者甚細年久者亦或大如拇指其味甚苦而氣極清芬力能舒郁開胸醒脾胃清濕熱長夏鬱蒸之令脾胃清陽之氣受其矇蔽而恆覺無氣以動倦怠納呆者以少許細嚼吞之即覺神情為之一振去濕化濁甚有捷效蓋香本天地之正氣自能掃蕩陰霾而苦味泄降更能導去蘊積之濁垢而恢復其胸中太和之元氣功不在廣木香茅朮藿香之下而又能久藏不腐且氣味亦不以年久改變堅貞之性草藥中尤不易得其藤亦能宣通經隧導達鬱滯疏肝行氣止心胃痛最為土産良藥觀圖經天仙藤之主治頗不相合實非古之所謂天仙藤而瀕湖又謂土青木香為馬兜鈴之根又謂天仙藤能流氣活血治心腹痛又引孫大仁集效方謂治疝氣痛以天仙藤一兩好酒煎服神效庶為近之土茯苓發明土茯苓自瀕湖綱目始入本草謂昔人不知用此近弘治正德間楊梅瘡盛行率用輕粉藥取效毒留筋骨潰爛終身乃用此遂為要藥時醫無從考證往往指為萆薢然其根苗迥然不同但功用頗相近蓋亦萆薢之類根苗形狀詳見綱目茲不備録又謂陶弘景注石部禹餘糧云南中平澤有一種藤生葉如拔契根作塊有節似拔契而色赤味如薯蕷亦名禹餘糧言昔禹行山乏食採此充糧故有此名拔契音拔乞萆薢之別種李謂此即土茯苓也故今尚有仙遺糧冷飯糰之名陳藏器本草有草禹餘糧亦即此謂食之當谷不飢調中止泄健行不睡壽頤按此則利濕而兼有補土之功綱目謂氣味淡平健脾胃強筋骨去風濕利關節止泄瀉治拘攣骨痛惡瘡癰腫解汞粉銀硃毒壽頤按此物蔓生而根又節節連貫性又利濕去熱故能入絡搜剔濕熱之蘊毒其解水銀輕粉毒者彼以升提收毒上行而此以滲利下導為務故為專治楊梅毒瘡深入百絡關節疼痛甚至腐爛及毒火上行咽喉痛潰一切惡症雖西學亦以為梅毒唯一良劑瀕湖綱目言之最詳但淡而無味極其平和之物斷非少數所能奏績李氏所録數方未免言之太易必不足用今惟專用大劑採取鮮根熬膏常服並以為日食常用之品能服食至數十百斤以多為貴則一味自可治最重最危之症已得實驗數人此則未經前人道破之語患者非用此法必無第二良藥可救雖西國專科研究注射藥水亦不能及蓋彼法雖能速效且無劫毒內攻之害但日久亦必復作終不除根若多服此藥永無後患此則十餘年之親驗者也凡服此者不可飲茶茗犯之確能脫髮必令如牛山之濯濯亦無他患藤黃發明瀕湖綱目謂藤黃點蛀牙自落石頑謂性毒而能攻毒點牙即落毒能傷骨傷腎可知趙氏綱目拾遺謂三黃寶蠟丸黎洞丸俱用藤黃以其善解毒也中藤黃毒者食海蜇即解趙又引百草鏡謂藤黃出外洋及粵中乃藤脂也形似筆管者良大塊者不佳又引粵志廣中産黃藤熬汁即藤黃性最寒以青魚膽和之治眼疾治癰疽止血化毒斂金瘡亦能殺蟲治刀斧木石傷及湯火傷有治一切諸傷神效方金不換治跌打刀傷方治外科一筆消消毒散等方皆佳詳見趙氏本書茲不具録壽頤按藤黃雖曰有毒然除寶蠟丸黎洞丸外本不入口其能退消外瘍癰腫及止血定痛斂金瘡則粵志謂其性最寒者是矣且本是藤之脂膏熬成性極黏膩故能生肌止血且藤本蔓延善入經絡此又治跌打消癰腫之原理究屬有毒故能殺蟲能療癬疥附諸葛岐藤黃治愈走馬牙疳之事實丁卯三月岐偕友數人偶至仁塘觀優有潘氏子年四歲患走馬牙疳起才三日牙齦腐化門牙已脫數枚下唇亦潰穿其勢甚劇問尚有可救之理否詢其由則在發麻之後其為邪熱入胃毒火猖狂一發難遏證情危險路人皆知告以止有白馬乳汁涼飲並不時洗之塗以溺桶之垢即人中白內服大劑白虎湯或有可救但勢已穿唇效否不敢必耳因書生石膏生知母生打寒水石象貝等為方與之其時同遊者有老醫倪君景遷因謂之曰牛黃研末外滲腐爛之處亦或可治遂彼此各散後數日則此兒竟已痊愈但下唇缺不能完因詢其用何物療治乃得速效若是則曰用倪先生説亟購藤黃屑而摻之果然一摻則腐勢即定滋水不流漸以結靨落痂止三日耳內服石膏等一方亦僅三服此兒獲愈誠二位先生再造之恩也云云因知鄉愚無識誤聽牛黃為藤黃然以此一誤而竟治愈極重之危證開藥學中從古未有之實驗確是此孩有福病不當死得此意外之良藥然從此可知藥物功力未為古今本草所發明者數亦何限岐無意中經此見聞則藤黃確能速愈走馬牙疳録為藥學史中闢一新紀元是胡可以不志嘗考李氏綱目蔓草類中曾載藤黃而功用甚略至趙恕軒本草綱目拾遺言之甚詳雖曰有毒而可為內服之藥則本非大毒之品趙引粵志且謂其性最寒能治眼疾又謂性酸澀療癰疽止血化毒斂金瘡亦能殺蟲又同麻油白蠟熬膏敷金瘡湯火等傷止疼止血收口取效如神而其餘消腫圍毒之用又甚多可知此藥竟是外科中絶妙良品而世多不知用者誤於李氏海藥本草有毒之兩字而張石頑更以能治蟲牙蛀齒點之即落而附會為毒能損骨傷腎於是畏之甚於蛇蠍尚不知石頑之説殊不可信今之畫家常以入口雖曰與花青並用可解其毒岐愚以為亦理想之談耳既曰性寒毒於何有然後知能愈牙疳正是寒涼作用且味酸性澀止血止疼收口殺蟲皆其所以能治牙疳之切實發明而今而後此藥之大功可以表暴於天下後世是為藤黃之大幸而亦斯世斯民之大幸也夫白毛藤發明此草莖葉皆有柔細白毛故以為名吾鄉野生極多趙氏綱目拾遺藤部載之謂除骨節風痙痛清濕熱治黃疸水腫小兒蛔結腹痛止血淋疝氣蓋清熱逐濕通絡而又能殺蛔止疝者亦除濕導熱之功吾鄉人恆用以治支節酸楚等症甚有捷效雞血藤膠發明此藥亦僅見於趙氏綱目拾遺今市肆皆有此藤亦有已熬成膏者活血宣絡本是蔓生之天性而色本殷紅專入血分一望可知趙氏謂産緬甸及雲南壯筋骨已痠痛治老人氣血虛弱手足麻木癱瘓及風痛濕痹調經帶下胃寒痛等症蓋兼有溫養作用於物理形色上求之自可想見惟趙氏竟謂治虛損及乾血勞子宮虛冷多年不育皆能有子云云則太過之辭不可輕信壽頤嘉城中近鄰錢氏竇岩先生名師儀竹汀宮詹之孫也其如君體質清臞陰虛血虧本無疑義所生女為仁和王文勤文韶之五子婦文勤本錢氏姑壻文勤開府雲南贈以雞血藤膠信為補血良藥乃以服驢皮膠法用好酒蒸化服之未及三四兩而暴崩如注幾於脫陷經壽頤多方補澀始幸得安然後知此物溫通之力甚猛活血是其專長用之過劑已鑄大錯書此以為門外漢不識藥性喜服溫補者之大戒
