body:
  text: 卷之五草部芳草類昌蒲本經味辛溫主風寒濕痹咳逆上氣開心孔補五臟通九竅明耳目出聲音主耳聾癰瘡溫腸胃止小便利別録四肢濕痹不得屈伸小兒溫瘧身積熱不解可作浴湯考異主耳聾癰瘡溫腸胃止小便利十二字瀕湖綱目以為出於本經而問經堂輯本無之御覽引本經有生石上一寸九節者久服輕身云云大觀本則無生石上三字有一寸九節者良七字注當為六字作黑字則大觀本以此七字注同上為出於名醫別録者也昌今本作菖考左氏傳昌歜杜注昌蒲菹周禮醢人昌本鄭注昌本昌蒲根切之三四寸為菹説文䒢昌蒲也廣雅邛昌陽昌蒲也呂氏春秋冬至後五旬七日昌始生淮南説山訓昌羊字皆作昌則從草之菖孳生後矣正義本經之菖蒲即今之石昌蒲根也御覽引經有生石上及一寸九節云云是其明證且本經上品別有香蒲云生池澤是石昌蒲與池沼之香蒲截然不同則吾吳土語亦名池沼中之香蒲為昌蒲者非是昌蒲芳香清洌得天地之正故能振動清陽而闢除四時穢濁不正之氣但香蒲之氣味情性殊與昌蒲相近故本經必以生石上及一寸九節別之味辛氣溫則主風寒濕邪之痹著治咳逆上氣者以寒飲濕痰之壅塞膈上氣窒不通者言之辛能開泄溫勝濕寒凡停痰積飲濕濁矇蔽胸膈氣滯舌苔白膩或黃厚者非此芬芳利竅不能疏通非肺胃燥咳及腎虛之咳逆上氣可比開心孔補五臟者亦以痰濁壅塞而言蕩滌邪穢則關竅通靈而臟氣自得其補益非溫燥之物能補五臟真陰也而俗人謬謂昌蒲能開心竅反以導引痰涎深入心包比之開門迎賊者過矣且清芬之氣能助人振刷精神故使耳目聰明九竅通利凡寒飲閉塞肺氣不宣令人音喑昌蒲能逐飲宣竅則聲自開視以虛勞金破之不鳴顯然有別主耳聾以下十九字其義殊與上文不類大觀本不在白字之中恐是後人羼入是當存而不論其止小便利一説蓋指清氣下陷收攝無權之證辛溫能升舉下陷之氣或可治之別録主肢痹不得屈伸則即經之主風寒濕痹復疊無別殊是蛇足溫瘧亦時行之氣而兼有濕痰矇蔽昌蒲滌痰化濕闢除穢濁裨助正氣故能治之然瘧之虛實寒熱各各不同偏舉小兒似嫌泛濫且作浴湯外治其效亦鮮別録此條皆非精要大是可疑或後人有所點竄歟廣義甄權治耳鳴則濕熱蒙其清氣而甲木少陽之氣鬱而不伸者即開通九竅之功效也若肝腎陰虛浮陽注陽下原有之疑衍刪上擾之耳鳴則非辛溫所宜矣甄權又治頭風淚下亦惟寒風外束者為宜若肝陽自擾之頭風又不可一例論治甄氏又謂治鬼氣瀕湖謂治中惡卒死客忤則是陰濕穢濁時行不正之氣固芳香闢穢正治也大明謂除煩悶止心腹痛霍亂轉筋皆指寒濕交互汩沒真陽者昌蒲秉芳冽正氣自能勝寒濕而行氣定痛後人藿香正氣等方以及腦麝闢疫丸散皆即此例然昌蒲雖溫辟惡可言而溫中尚嫌不足其直中三陰之大痛吐瀉轉筋冷汗脈伏色青等證宜於大劑薑附連萸者亦非此和平淡泊之藥所能獨當大任香蒲本經味甘平主五臟心下邪氣口中爛臭堅齒明目聰耳正義香蒲即今池沼之蒲瀕湖謂叢生水際葉有脊而柔者是也江南下濕之地處處有之葉長四五尺根巨如拇指芬芳之氣頗與石昌蒲近似但形之巨細長短殆十倍之而有餘古人午日有艾虎蒲劍之制即是此物不解弘景何以謂南海人亦不復識惟其氣味性情皆近石昌蒲故本經主治亦與昌蒲大同小異主五臟心下邪氣蓋亦以開泄痰濁言之治口中臭爛則清芬能闢除穢惡也堅齒明目聰耳又即昌蒲利竅聰明之效力耳壽頤竊謂古人昌蒲為菹殆即用此則柔嫩時自可作蔬彼石昌蒲之細小而堅硬者必不可作蔬菜食也但今人亦不嗜此姑不備考瀕湖以為氣寒蓋以其生長水濱而云然然氣味辛香甚烈未免溫燥綱目此説殆難盡信蒲黃本經味甘平主心腹膀胱寒熱利小便止血消瘀血正義蒲黃乃蒲萼中之黃粉即其花蕊故能走心家而治血證秉清芬之氣直搗中堅力能泄滿決壅故治心腹結滯等病入膀胱利小便者生長水中故能利水止血消瘀者即後人生用破血炒黑止血之義石頑謂經言主心腹膀胱寒熱者以血結其處營衛不和蓋芳香開展固足以散血結行氣滯者也廣義甄權治痢血鼻衄吐血尿血瀉血利水道通經止女子崩中蓋蒲黃生用則行炒黑則止所以能通經而亦止崩漏大明謂治婦人月候不勻血氣心腹痛血運血證兒枕急痛瀕湖謂涼血活血止心腹諸痛發明蒲黃專入血分以清香之氣兼行氣分故能導瘀結而治氣血凝滯之痛東璧李氏雖言其涼血活血亦以其水産之品因以為涼壽頤則謂蒲本清香亦有辛味以本經昌蒲辛溫例之必不可以為寒涼蒲黃又為精華所聚既能逐瘀則辛散之力可知況心腹結滯之痛新産瘀露之凝失笑散一方捷於影響雖曰靈脂導濁是其專職然使蒲黃果是寒涼必非新産有瘀可用若舌瘡口瘡皮膚濕癢諸病敷以生蒲黃細粉可愈則以細膩黏凝自有生肌之力非僅取其清涼也菊花本經鞠華味苦平主風頭眩腫痛目欲脫淚出皮膚死肌惡風濕痹別録療腰痛去來陶陶除胸中煩熱安腸胃利五脈調四肢正義菊花秋深而始著花不畏霜露秉秋令肅降之氣故凡花皆主宣揚疏泄獨菊則攝納下降能平肝火息內風抑木氣之橫逆本經主風頭眩者以陰虛陽浮氣火升騰肝風上擾之眩暈言之非外來風邪能令人眩也腫痛連上風頭眩三字讀肝火直上頂巔而為眩為腫為痛陽炎直升其勢最暴凡是頭風作痛無非內火內風震撼不息而菊花能治之非肅降靜鎮迥異尋常者殆難有此力量昔人但謂其秉秋金之氣乃能平木其説太嫌膚淺而昧者且誤以為疏散外感之風則失之毫釐謬以千里矣目如欲脫乃肝陽內風之尤甚者世固有頭風痛甚至於喪明其甚者且至目珠突出形如雀卵淚出亦陰虛於下肝火上揚真陰無攝納之權而風陽以疏泄為用則迎風而淚下此皆肝腎陰虧而浮陽上亢為虐惟菊之清苦泄降能收攝虛陽而歸納於下故為目科要藥而淺者治此甚有專持芎芷羌防等疏散為主者其害復何可勝言又治皮膚死肌惡風濕痹者則皆血熱而絡脈不潔漸以積穢成腐菊之苦辛宣絡能理血中熱毒則汙濁去而痹著之死肌可愈石頑謂清利血脈而痹著濕邪得以開泄持論甚正惟此是沖和純粹之品以清經隧積瘀之濁血斷非旦夕可以速效弗以王道無近功而遽疑經言之不可信也別録謂治腰痛去來陶陶蓋言其悠久不已之狀楚辭冬夜兮陶陶注長兒禮記祭文陶陶遂遂注相隨行之兒注長兒之兒兩兒字疑為耳之誤瀕湖綱目注縱緩貌則是杜撰訓詁不足為徵是亦腎陽不足而濕邪痹著為病故其痛續續不息菊花滋腎陰而清濕熱是以主之又治胸中煩熱而安腸胃固無一非清肅泄熱之功用也廣義甄權治頭目風熱風旋倒地腦骨疼痛則肝陰之頭風痛固有直上頂巔幾如劈破者若風旋倒地則血沖腦經而失其知覺運動矣又治身上一切遊風令消散利血脈則是血熱生風之病苦泄清理而風自息何昧者猶以羌防芎芷為必需品耶大明謂作枕明目葉亦明目潔古謂養目血去翳膜海藏謂主肝氣不足蓋亦養肝陰滋肝血之意雖其氣味清芬然終非肝家氣藥繆仲淳謂生搗最治疔瘡血線疔尤為要藥壽頤按疔是火毒非急服大劑清解不能消此燎原之勢外敷諸藥如忍冬藤馬齒莧蒲公英草河車芙蓉葉等不過外治輔佐之品非可認作主任要藥亦有以此類諸物作煎劑者皆是俗手斷不足恃繆所稱血線疔蓋即紅絲疔有一痕紅暈自瘡口上竄直過肘膝者紅絲疔惟手指手腕最多而足指足跗間有之故言上過肘膝治皆以內服大劑清解為主但知外治斷不可恃仲淳治瘍非其所習似此泛辭不足徵也發明菊在古時止有黃華一種而近則園林之蒔藝千紅萬紫色相最多可謂百卉中絶無僅有之奇品蓋自經騷人韻士矜嘗孤芳而扦接之法最多遂覺變化雛奇不可方物其實則花色雖殊而氣味性情亦尚無甚大別吾嘉藝菊自明季以來頗有研究流風遺韻至今猶存其以極大花朵養之極老經老不剪聽其自干明年即以此枯花播種亦發新芽是為子種二三年後方能著花則形色必與老花不同以此知菊之花色最多殆古人即以此法造成也惟正名定分仍當屬之黃華而近今藥物恆用之品則以杭産黃色小華為正而杭産白色之小花其氣味醇靜味最甘緩清香幽韻尤為過之若白色大花之産於古亳者氣味殊覺辛烈則功力亦未免不純是在用之者量能器使必不可作一例觀此外更有野菊一種隨處多有花葉皆細蕊小如豆色亦正黃氣則悍烈其味尤苦葉瘦而老亦可作瘍科敷藥自檜以下殊不足道雖亦是晚節之附庸然婢學夫人不脫小家伎倆矣白滁菊發明此菊為滁邑特産色白而氣味不烈清芬微甘能和肝陰潤肝燥近世醫家甚重之但性較柔馴肝火熾盛者非其所能勝任耳菊米發明此浙江遂昌縣石練山中之特産雖亦是野菊之類而顆粒尤小其大僅等於緑豆之細小者土人採之視如珍品芬香清冽最耐久藏味不甚苦瀹茗頗佳蘭校同學吳子鶴亭持贈一器嘗之可口覃覃長味亟為志之艾別録艾苦微溫無毒主灸百病可作煎止吐血下痢下部𧈟瘡婦人下血利陰氣生肌肉闢風寒使人有子正義艾性純陽可以取太陽真火可以回垂絶元陽入藥以蘄州産者為上古人灸法本無一病不可治艾之大用惟此最多故別録以灸字冠主治之首其作煎以下則湯液之治療也止吐血者宜生用取其辛開以疏經絡之壅然溫升之性必與上溢之證不合古人有四生丸之制以柏葉荷葉生地之清肅下降者為主而反佐以艾葉之辛溫欲其同氣相求易於桴應非艾之物可以止上升之吐衄也其治下利則以裡寒泄瀉而言辛溫升舉固其所宜下部𧈟瘡濕熱生蟲之恙苦溫燥濕艾能殺蟲是其專職婦人下血則中氣虛寒下焦無攝納之權以致血行失道無故妄下金匱膠艾湯溫經升舉固陰和陽是其正治非治血熱妄行之下血也生肌肉者虛弱之人血少消癯得此溫養之則血氣旺而肌自豐亦有潰瘍氣血兩虛陽不運則新肌不長艾能溫煦以利脈絡而肌肉易長若熱多液耗者非其治也闢風寒者固溫和燠煦之所長使人有子則即芎歸膠艾湯之專功蓋古者最多虛寒之體觀千金求嗣門中多主溫養其義可知然在今日則又血虛內熱癯瘠消瘦者比比而是若誤讀本經生肌有子之説而不分涇渭謬附古書其害亦不可勝數矣廣義弘景謂搗汁服止傷血蓋即四生丸之主治又稱殺蛔蟲亦本經治𧈟瘡之義也蘇恭謂主衄下血膿血痢亦惟氣虛多寒血失故道者可用而一切血熱血滯衄血下血之痢寧非鴆毒甄權謂苦酒作煎治癬甚良是外治殺蟲燥濕之法又謂搗汁飲治心腹一切冷氣則純陽勝寒之明證矣海藏治帶脈為病腰溶溶如坐水中是腎氣虛寒濁陰泛溢之病艾葉溫腎且逐水氣也石頑謂走肝脾腎三經而逐一切寒濕轉肅殺之氣為融和凡素有虛寒痼冷及婦人濕鬱帶漏之病宜以艾葉和歸附諸藥治之艾附丸調經而溫子宮兼主心腹諸痛膠艾湯治虛痢又妊娠産後下血雷火針同丁香麝臍尉寒痹攣痛老人臍腹畏冷及寒濕腳氣以熟艾入布兜之惟陰虛火旺血燥生熱及宿有失血病者為禁有人患風瘙癮疹不時焮發以絹裹擦之即消亦取其溫散開發之力細辛本經味辛溫主咳逆頭痛堖動百節拘攣風濕痹痛死肌久服明目利九竅別録溫中下氣破痰利水道開胸中滯結除喉痹齆鼻不聞香臭風癇癲疾下乳結汗不出血不行安五臟益肝膽通精氣考異本經主咳逆之下瀕湖綱目有上氣兩字孫星衍問經堂輯本無之堖説文頭髓也今本皆作腦後出字正義細辛味辛氣溫稟陽升之性闢除風寒濕邪而芳香最烈其氣直升故善開結氣宣泄鬱滯而能上達巔頂通利耳目又根荄盈百極細且長則旁達百骸無微不至內之宣絡脈而疏通百節外之行孔竅而直透肌膚本經主咳逆者以寒飲作咳而言非痰熱氣衝之咳可以並治頭痛腦動則真寒犯腦之痛所謂真頭痛者手足清冷至節朝發夕死是寒水暴溢汩沒微陽非得此大辛大溫之品無以御陰霾而回陽氣正與肝膽陽邪上攻擾腦之頭痛冰炭殊途遙遙對峙百節拘攣即風寒痹著之症死肌者亦為寒濕所痹而頑麻不仁此皆辛溫宣絡之正治固不可與血虛熱痹作一例觀所謂明目利九竅者以能振動清陽之氣而過甚言之須知溫升開竅之品通陽有餘傷陰亦捷斷無久服之理本經中似此弊竇殊是不少蓋皆方術之士附會為之必非上古醫學正軌別録溫中下氣破痰即本經主寒飲咳逆之正治利水道者陽氣無權而腎與膀胱不司宣泄溫腎通陽則水道自利非濕熱蘊結及津液枯涸之癃閉可知開胸中滯結者中陽不宣則胸脘痹窒凡當心結痛脅肋支撑心痛徹背背痛徹心等證屬於飲邪凝聚大氣不司旋運者非溫和燠煦不為功細辛稟陽和之氣助其乾運譬如旭日當天而群陰退舍滯結安有不開之理除注原為陰顯誤改喉痹者亦是寒痰凝塞之痹非陰虛火炎之喉痹所可妄試鼻齆亦以肺受外寒言之正與風熱痰火上壅而燥金失其清肅者相反若風癇癲疾則古人無不共認為風寒外受法當溫散豈知肝陽痰熱氣升火升最多此病誤與溫散適藉寇兵此古人之疏似亦不必強為諱飾而其餘下乳發汗行血等諸般功用無非溫通二字足以盡之矣廣義甄權謂治嗽去風濕痹亦仍本經之舊又治風眼淚下則清陽不升之迎風流淚也弘景謂含之去口臭則芬香固可以闢穢然口臭多由胃火不揣其本而齊其末揚湯止沸何如釜底抽薪之為愈乎海藏謂潤肝燥治督脈為病脊強反折壽頤按督脈為病純由精血大衰絡脈失養以致脊強反折謂為肝燥未可厚非然先天腎陰幾於耗竭大補肝腎真陰恐亦難臻速效細辛之溫稍稍引經以通陽氣雖無不可然竟以辛之一字謂潤肝腎而視為此證主藥其弊何如學者當自知之石頑謂辛溫能散凡風寒風濕頭痛口瘡喉痹𧈟齒諸病用之取其能散浮熱亦火鬱發之之義壽頤按所謂火鬱者有火鬱結於內而外寒束之不能透泄則升陽所以散火其鬱得泄而表邪自解若本自氣火上浮而亦誤投溫散則教猱升木為禍尤烈正訛自陳承本草別説謂細辛單用末不可過一錢多則氣悶塞不通者死後人無不宗之竊謂細辛芳烈之品本以氣勝自無重用之理然開泄之性走竄有餘若謂耗散正氣誰曰不然而反謂氣悶不通豈不令人捧腹仲淳謂氣味過烈不可過用石頑謂辛之極者不可過用庶幾近之禁忌仲淳謂內熱火炎上盛下虛血虛頭痛陰虛咳嗽者禁用石頑謂火鬱頭痛發熱咳嗽者戒之以辛烈耗散正氣也壽頤按大辛大升豈獨耗氣甚且動血凡是陰虛直同鴆毒當歸本經味甘溫主咳逆上氣溫瘧寒熱洗洗在皮膚中婦女漏下絶子諸惡創瘍金瘡煮飲之別録辛大溫溫中止痛除客血內塞中風痙汗不出濕痹中惡客氣虛冷補五臟生肌肉正義當歸味辛而甘其氣溫故能勝寒氣味俱厚故專入血分而亦為血家氣藥本經主咳逆上氣溫散寒飲之法也主溫瘧寒熱則溫潤以疏外感之邪也洗洗讀為灑灑即灑淅惡寒之意大觀本洗音癬亦擬其音孫氏問經堂本洗字不重而以大觀音癬分注之恐是脫一洗字婦人漏下絶子則為血虛不足者言當歸溫經益血固其專職金匱芎歸膠艾湯本是婦科血虛氣寒之主藥局方四物湯之所自出也瘡瘍金瘡皆傷耗血液之病溫養補血潰瘍虛證是其所宜而腫瘍初起氣滯血凝溫通活血亦能散腫惟血熱實邪所宜斟酌弗重任以助溫升可耳別録溫中止痛以中氣虛寒絡脈結滯者言之辛溫補虛宣通血氣固其所宜除客血者則血行失道瘀滯未通者耳歸尾辛溫善行輔以行瘀之品即為疏逐惡血主將內塞二字雖似為瘀滯而言然文字似嫌不典或塞為寒字之誤則當歸建中一法固是正宗中風痓者即角弓反張之風痙痓是古字痓即痙之隸變玉篇雖有痓字訓惡然漢隸至巠不別數見不鮮實即一字鑿鑿可據古人不知有氣血沖腦之病源凡治此證多主溫升以驅外風勢必利少害多助桀為虐當歸治痙雖能活絡必與血沖腦經之理背道而馳不可不更弦改張庶幾為二千年醫學補此缺陷補五臟者臟本屬陰以血為體當歸補血於理最純生肌肉者氣血和煦自然豐肌澤肉耳廣義甄權止嘔逆是胃寒食入反出之嘔吐辛溫以振動清陽溫養胃氣斯嘔可止若胃火上衝食不得入者非其治也又主虛勞寒熱則養血和血固是虛人主宰然陰虛生熱勞瘵骨蒸者辛溫升動不可重任又主下痢腹痛則滯下膿血者病入營分歸能和血兼行氣滯未始非引導良藥初起實證以助導滯諸藥宜用歸尾為效最捷即滯下無血者用以行氣亦有專長但濕熱盛時須知斟酌不可過劑而久痢元虛清氣下陷可用歸身以調和氣血溫升清陽亦是要藥又治女人瀝血腰痛則補血宣絡之功又治崩中亦舉陷升清之主但暴崩火旺之時宜用歸頭炒黑升而止之生用辛溫助其鼓蕩反為大害大明主癥瘕腸胃冷固溫中兼補兼通之妙用又謂一切風一切氣補一切勞則太嫌泛濫失之膚淺矣海藏主痿癖癖當作躄以除虛痿廢而言補陰和陽誠不可少又治足下熱而痛則腎陰虧損龍火遊溢宜大劑滋填為佳辛溫非其主也又謂主帶脈為病腹痛腰溶溶如坐水中則虛寒之人腎水陰寒泛濫為病溫養是其所宜又謂主衝脈為病逆氣裡急則雖奇經是動無非虛象然氣逆上衝非一味溫辛所能獨任者也瀕湖謂治頭痛心腹諸痛若以虛寒諸痛而言養血溫升並和氣滯當歸本是專長而風陽升騰之頭痛凡屬升提皆其所禁是又不可不知變通者矣石頑謂血受病及諸病夜甚必須用之蓋病在陰分用以入陰血而升舉之以還歸於陽歸之溫升確是主藥又謂産後惡血上衝則歸尾下達固逐瘀必需之品又謂血壅而不流則痛當歸甘溫能和營血辛溫能散內寒使氣血各有所歸壽頤謂和血而行血中氣滯止痛固宜惟溫煦是其專長中虛中寒尤其獨勝惟木火橫逆肝氣搘撑之為脹為痛適與背道而馳又謂仲景治陽邪陷陰手足厥寒脈細欲絶用當歸四逆湯於桂枝湯中加當歸細辛通草以通血脈壽頤按此是陽氣陷入陰中外真寒而內蘊熱非四逆湯之專於回陽所宜惟宣通其陽氣還之於表而安內即以攘外當歸四逆是舉內陷之陽而提出之與四逆湯之溫藥徹內徹外者截然不同發明當歸是血家氣藥以辛升運行為用以溫和燠煦為功氣血虛寒者得之則血隨氣行而歸其所歸此當歸命名之取義也昔人每謂身能補血頭能止血尾能行血全能和血徹上徹下可補可攻頭尾之情性不同斯攻守之取效自別吾國藥物學之精細所以異乎西人之專論物質而無投不利者其精髓在是壽頤謂歸身主守補固有功歸尾主通逐瘀自驗而歸頭秉上行之性便血溺血崩中淋帶等之陰隨陽陷者升之固宜若吐血衄血之氣火升浮者助之溫生豈不為虎傅翼是止血二字之所當因證而施固不可拘守其止之一字而無投不利矣且凡失血之證氣火沖激擾動血絡而循行不守故道者實居多數歸之氣味俱厚行則有餘守則不足此不可過信歸所當歸一語而有循名失實之咎即如局方四物一湯舉國醫家孰不知是血家聖藥且自海藏種種加味而六合諸方可謂五花八門無美不備極盡醫林能事究竟即以四物言之已是走者太走守者太守各有專主未必水乳交融更何論信手拈來者之合宜與否此則泥於迹象太嫌呆板去神化二字瞪乎遠矣川芎本經芎藭味辛溫主中風入腦頭痛寒痹筋攣緩急金創婦人血閉無子別録除腦中冷動面上遊風去來目風淚出多涕唾忽忽如醉諸寒冷氣心腹堅痛中惡卒急腫痛脅風痛溫中內寒正義芎藭味辛氣溫氣頗芬烈而味不甚厚以氣用事升發之力殊猛能上達頭目直透頂巔又質不堅凝甚多空竅故旁行肢節貫通脈絡透達腠理開泄肌膚本經主中風入腦頭痛則風寒癘氣傷於諸陽之會也主寒痹筋攣緩急則陰寒肅殺襲入筋肉血絡也治婦人血閉無子則虛寒之體陽和不司運用也主金瘡則破傷失血之後衛陽亦復不足是皆以溫和敷布助其宣化而諸恙可療僅是以思凡風熱肝陽上攻之頭痛等證均非溫升辛散所可妄試東垣有頭痛必用川芎一説其義固專為風寒著想然語意太不分明而俗本藥性賦竟以頭痛用川芎一句概治百般頭痛其弊當復何如別録除腦中冷動繆氏經疏謂動當則痛其説甚是蓋傳寫之誤即本經風入腦之頭痛也面上遊風目風淚出皆以寒風外侵者言之溫升辛散而外風自泄多涕唾者即風寒襲肺鼻塞流涕之傷風證辛以散之溫以通之固其所宜忽忽如醉蓋即承鼻塞涕多而言肺為寒束其氣不宣則胸中鬱抑神情昏昏之意若氣火升浮神昏如醉則非所宜諸寒冷氣心腹堅痛八字作一句讀則諸般心胃腹痛之由於寒冷氣滯者芎之溫和行氣本有特長而肝膽火炎之痛非所宜矣中惡卒急腫痛蓋亦以猝受寒氣而言若脅痛則屬於少陽部位木注原作水於義未允改郁不舒最多是證芎疏氣滯雖是專司惟升泄有餘恐有助長之慮是不可與心腹痛之多由中陽無權者作一例觀也廣義甄權治腰腳軟弱半身不遂是營陰虛而經絡失其榮養者芎秉溫和之氣以助滋養諸藥起痿起廢其效固可操券又主胞衣不下則芎歸入血行氣運動之力尤其特長且能活血通滯故亦為催生及下胎衣死胎之要藥加味芎歸湯已是信而有徵千金方治子死腹中用芎藭末調酒方寸匕須臾二三服謂能立出保産無憂散亦為催生良方中有川芎程鍾齡醫學心悟謂活動流利是為撑法其力量及功用可知彼夫安胎劑中亦有重此類以擾動其氣血者則不可不深長思也海藏謂搜肝氣則氣滯不利者用此以宣通疏達之洵無不宜若肝橫而暴戾不馴亦復助其升動則謬矣又謂補肝血潤肝燥補風虛則凡諸火證宜柔潤滋填為主而輔之少許川芎溫煦行滯助其機緘方是化雨春風養育萬物要非溫升之性獨往獨來之所可專任也瀕湖謂燥濕止瀉痢則風行地上本是燥劑脾為濕困以升舉清陽者助其乾運斯脾家大氣轉旋而濕邪氣自化以止泄瀉利下固亦升清之正治惟赤白滯下濕濁蘊熱阻結下焦非宣通導滯不能蕩滌滓穢最忌升舉激動惡濁上犯必有蒸胃禁口嘔吐不食之變芎雖氣藥而性喜上升非枳朴木香青皮烏藥之順降者所可同日語也大明謂破癥結宿血則以行氣之用為消堅散結之佐固無不可然已非獨當方面之才又謂治溺血則氣陷之時藉以升清亦止可備佐使之選而濕熱蘊結者斷為大禁又謂治吐血鼻血則氣逆上湧降之抑之猶虞不違注疑為逮之誤而反以辛升助其激越其謬妄不待言矣又謂主腦癰發背則病在太陽寒水之經以能焮發高聳成膿為順而平塌下陷板滯不痛為逆芎能溫經升發確是腦背疽漫腫無膿時之萬金聖藥助其氣血聚而不散必無不起內陷之變此近世腦背疽寒凝經絡者一定治法非唐代金石發之宜於清涼解毒者可比而俗醫不知誤認紅腫等於熱毒輒授清化無不應手敗壞日華此説最堪細味以此推之則凡氣滯血凝呆板蔓腫之虛寒流痰流注等證亦非助其溫煦不能消散此瘍科家一味神效宣通要藥也惟日華又謂主瘰癧痔瘻則癧瘍皆少陽之鬱熱誤與升發成潰易而收斂難痔瘡又多陽明之濕火宜於清泄胡可溫升而大明竟與腦背二疽視同一例斯又不辨菽麥之尤甚者日華本草語多復雜瑕瑜互見讀者不可不知審擇發明川芎有紋如雀腦雖似堅結其實空松氣雄味薄功用專在氣分善於疏通上升頭頂旁達肌膚一往直前走而不守譬猶勇敢之士衝鋒陷陳鋭不可當須賴為之將者慎選良材相與並進方能擒集掃穴直搗虜廷若聽其一意孤行後援莫繼則雖勇敢之氣亦可以撥戟自成一隊而偏鋒制勝終非專閫長材考仲景方中用芎藭唯金匱婦人篇獨多其當歸芍藥散則曰治懷妊腹中㽱痛㽱義同絞其當歸散則曰妊娠宜常服其白朮散則曰妊娠養胎皆不論寒熱虛實注原作熱顯誤改而渾渾然一方可以統治仲景當不若是之顢頇此或是傳寫有所脫佚惟膠艾湯溫經湯二方歸芎並重則以阿膠厚膩有餘恐其遲滯因以血中行氣者為之疏通庶幾守者走者互相調劑膠艾湯有阿膠又有地芍溫經湯有阿膠又有麥冬芍藥膩滯已多非歸芎則呆笨不靈矣古方之於川芎其用意自可想見後人四物湯雖本於膠艾而僅取芎歸芍地四者謂為婦科調血主劑終嫌籠統不切古人必無此渾沌治法近賢論四物已謂守者太守走者太走其説甚是而晚近俗手且更有僅取歸芎兩物認為婦女必需之品者則猶亂有餘每況愈下矣戴九靈丹溪傳已謂血虛發熱非芎歸辛溫所宜吳鞠通論産後即以申明丹溪之旨張氏石頑本經逢原則引用日華子川芎治一切風氣之説而申之以上行頭目下行血海且謂四物湯用之者所以搜肝經之風雲云抑知肝陽不擾風從何來肝家之風唯氣火旺盛者乃習習生風涵斂以求其潛息猶慮不及豈可更用升騰助其飈舉果以芎之辛升搜剔肝陽自動之風那不僭越飛揚天旋地轉此誤以泄散外風之藥作為疏通內風之用其害何可勝言膠艾湯中之芎歸其意何若不可不統觀全方而深長思之也石頑又謂芎治少陽厥陰頭痛及血虛頭痛之聖藥又謂助清陽之氣去濕氣在頭頭痛必用之藥須知少陽厥陰肝膽木火上凌頭痛之證固多此是升騰太過火盛生風非鎮攝滋潛其焰不息即血虛之頭痛亦是除注當為陰字之誤虛於下而陽越於上此豈可與風寒外束清陽不升者混作一例論治而謂芎能升清陽之氣者即可治肝膽氣升之病是抱薪救火而更煽風以揚之豈不烈焰熊熊燎原不救此誤認東垣頭痛用川芎之旨盲人無識信手亂投為禍已烈不謂石頑高明更昌言其為厥少頭痛血虛頭痛之聖藥是惟恐患者之肝火不旺而速其焦頭爛額矣石頑又謂血痢已通而痛不止乃陰虧氣鬱藥中加芎藭則氣行血調其痛立止壽頤按熱痢乍起大忌升舉惟積滯已化而痛猶不止則氣結於下固有脾陽不振清氣下陷之一候木香芎藭少許為佐藉以升清行氣洵是良法又引靈苑方驗胎法生芎藭末艾湯服一錢匕腹中微動者為胎壽頤按歸芎試胎以驗其動與不動古書雖有此法然無故而擾動之體質柔弱者且因之而不安矣為害不小不可妄試請觀下胎衣及子死腹中二者皆用芎藭皆有捷驗其力可知壽頤嘗見安胎者每持芎歸為養血良藥頻服之則胎已墮而莫明其妙總受讀書不明之纍瘍科腦疽發背平塌不高漫腫無垠根圍不束毒勢欲陷者必須溫經活血再加川芎錢許以升清氣一二服後即腳跟收束頂高膿成其應甚捷尋常瘍患多以退腫消毒為主冀其消散無形事半功倍惟腦背之疽必以膿成高聳根腳分明斯不毒陷生命可保若平塌散漫膿不能流最為危險此證頗有特殊之作用與其他癰腫截然不同俗醫誤認陽證妄投清涼消毒之藥害人最多此壽頤業師閬仙朱先生對證發明之精義而世間瘍醫家所未知者救苦救難一片婆心不可不志又凡虛體流注頑硬木腫不痛不發亦不易消散者須於活血行氣或補養隊中佐以川芎能使頑腫木強漸以柔軟消化免於潰膿較之俗醫亂投穿山甲皂角刺速其成膿者功罪不可以道里計禁忌仲淳謂凡病上盛下虛虛火炎上咳嗽嘔吐自汗盜汗咽乾燥渴煩熱者忌之虞花溪謂骨蒸多汗及氣弱之人不可久服令陰氣走泄而陰愈虛壽頤按凡是陰虛火動諸病川芎走竄升散直是鴆毒一毫不可誤與花溪但知不可久服豈能勘透徵結撫芎發明芎藭古書皆謂川産者良然近今則贛産甚多石頑逢原特立撫芎一條謂辛溫無毒産江左撫州中心有孔者是其功用則謂升散專於開鬱寬胸通行經絡郁在中焦則胸膈痞滿作痛須撫芎開提其氣以升之氣升則鬱自降故撫芎總解諸郁直達三焦為通陰陽氣血之使然久服耗氣令人暴亡云云壽頤按今時贛産芎藭出品頗夥大約江浙間藥肆所備大都取於贛其大者形色與古書之所謂川産無所區別其小者則質較空松而發泄升散力且過於川産蓋其氣不厚自當流動更迅蓋今之藥物多由人力播種培植與古之天然野生者不同移種別栽只須土宜相似本非遷地而不能為良聞贛人種此亦非一年即採則多年宿根得氣者厚自然形巨而質堅若其小者歷時未久則物質空松亦固其所則石頑所謂撫芎形小中虛者固即指此然正惟其質未堅宜乎升騰開泄之力尤為迅速是亦物理自然之情性定痛寬痞無非解結化滯宣通鬱塞之旨仍與古之所謂川産者同此一理但石頑所稱氣升郁降四字則理不可通大有語病若謂久服耗氣令人暴亡雖言之未免太甚然與過服細辛令人猝斃之説同一理論即其味辛氣升耗泄真元之害凡溫升辛散動而不靜之藥本無可以久服之理故丹溪治陰虛發熱不用辛溫而虞花溪繆仲淳諸家於川芎條中皆有禁約也藁本本經味辛溫主婦人疝瘕陰中寒腫痛腹中急除風頭痛長肌膚説顏色別録闢霧露潤澤療風邪嚲曳金瘡可作沐藥面脂考異稿今本皆作藁説今本作悅茲從孫本正義藁本味辛氣溫上行升散專主太陽太陰之寒風寒濕而能疏達厥陰鬱滯功用與細辛川芎羌活近似本經主婦人疝瘕陰中寒腫痛腹中急皆清陽不振厥陰之氣鬱窒不伸為病溫以和之升以舉之解結除寒斯急痛可已疝瘕可除而陰虛內熱肝絡結滯之疝瘕急痛非其治也除風頭痛者升陽以散太陽之寒正與細辛芎藭之專主頭痛同例而肝膽陽邪化風上升之頭痛正是背道而馳長肌膚者亦寒濕除而陽和敷布氣血乃調若血虛多火而肌肉消瘦者寧非鴆毒説顏色者作為外治敷藥亦所以搜肌表之寒濕別録所謂沐藥面脂即是長肌膚之意若多火而面色皯黧者又豈所宜別録謂闢霧露潤澤者溫升助陽能勝寒濕此即仲景所謂清邪中上之病亦即經言陽中霧露之氣也又謂療風邪嚲曳則風寒襲絡而經掣不仁步履無力之證庶幾近之亦有陰虛無力痿躄不用而肢體嚲曳者則更非風藥所可妄試此皆讀古書之不可死於字句間者若不分虛實不辨病因而昧然從事亦何往而不為古人所誤耶廣義甄權謂治風鬼疰即辛溫驅外風外邪之意治腰痛冷則溫養腎氣以壯元陽也又謂能化小便則腎氣式微陽和不布膀胱氣化不行而溲為之澀溫養通陽小水自利正與濕熱之溲癃相為對待非能治熱結癃閉可知大明謂治皮膚疵皯即本經之説顏色然非可以治肌膚鬱熱之汗斑焦黑而又以為可治酒齇粉刺則素問雖有寒薄為齇之明文然即繼之曰郁乃痤可見痤痱皆為鬱熱況所謂酒齇赤鼻者又純乎肺熱之外露而乃可以辛溫為治日華子之顢頇真是不辨菽麥潔古謂治太陽頭痛巔頂痛大寒犯腦痛連齒頰皆以真寒言之而陰虛有火者弗用海藏謂治督脈為病脊強而厥亦陰盛無陽之真寒厥逆也邵氏聞見録謂夏英公病泄太醫以虛治不效霍翁曰風客於胃也飲以藁本湯而止蓋藁本能去風濕故耳壽頤謂此必寒濕傷中陽氣下陷故宜溫升藁本蒼朮氣味俱雄升陽最捷藁本湯止此二物治法極是乃謂風客於胃則所見尚是膈膜文人談醫不諳病理原不足怪然既出於醫家之口亦多有似是卻非者宋金元明諸書似此隔靴搔癢議論所在而是亦緣其時國醫程度膚淺之故非得明眼人細心糾正必不能昭醫理之真禁忌仲淳謂陽證頭痛火炎頭痛皆不可用劉云密本草述謂治風頭痛者乃陽虛而風邪乘之非陰虛者所可投其治風濕亦本陽虛白芷本經白茝味辛溫主婦人漏下赤白血閉陰腫寒熱風頭侵目淚出長肌膚潤澤顏色可作面脂別録療風邪久渴嘔吐兩脅滿風痛頭眩目癢考證茝今作芷古今字風頭侵目當作頭風或頭下脫痛字李氏綱目石頑逢原皆改作頭風侵目於義固長然嫌有擅改古書之弊茲姑仍舊潤澤下舊無顏色二字惟瀕湖綱目有之故仲淳經疏及孫氏問經堂輯本經皆無但語氣頗未充足姑從李氏正義白芷辛溫芳香燥烈疏風散寒上行頭目清竅亦能燥濕升陽外達肌膚內提清陽之氣功用正與川芎藁本近似本經治女人漏下赤白血閉陰腫皆其清陽下陷寒濕傷於中下之證故宜溫升燥濕頭風目淚亦惟陽氣素虛而風寒風熱乘之者庶能合轍如陽盛而襲風熱已難概用亦有陰虛而肝木上乘疏泄太過迎風淚流者更非所宜長肌膚作面脂義皆與藁本同別録療風邪即以風寒外侵言之久渴仲淳謂當作久瀉甚是燥濕升清振動陽明之氣固治久瀉之良劑必非渴證所宜且古今各家皆未聞以此療渴也其治嘔吐者胃陽不振食入反出者宜之而胃火熾盛沖激逆上者不可誤用脅滿乃木鬱土中遏抑少陽之氣不得條達者宜之而肝膽火炎搘撑橫逆者又在所禁治風痛頭眩亦惟陽和之氣不司布濩而外風襲之者始為合轍百一選方謂都梁丸因王定國病風頭痛至都梁求治楊介以白芷一味為末蜜丸彈子大每嚼一丸以茶清或荊芥湯化下三服而病如失遂以都梁名丸是為陽虛風眩之實驗若陰虛氣火上浮而為風眩則又不可同日語矣正訛白芷氣味辛溫芳香特甚最能燥濕本經所謂長肌膚而潤澤顏色者以溫養為義初非謂通治外瘍可以生肌長肉乃大明本草竟以治乳癰發背瘰癧痔瘻瘡痍疥癬謂為破宿血生新血排膿止痛云云潔古亦謂治頭面皮膚風痹燥癢瀕湖且謂色白味辛性溫氣厚陽明主藥癰疽為陽明濕熱濕熱者溫以除之故排膿生肌止痛壽頤謂辛溫上升之品可治寒濕必不可治濕熱而潰瘍為病濕熱者十之九而有餘寒濕者十之一而不及胡可以統治癰瘍抱薪救火日華子排膿止痛一句實是無中生有大乖醫藥原理且潔古所謂皮膚燥癢者明是火燥血熱又安得投此辛燥之藥瀕湖所謂濕熱者溫以除之一句如何講得過去總之諸公於瘍科理法未能體會人云亦云皆是耳食之學寇宗奭衍義謂治帶下腸有敗膿淋露不已腥穢殊甚臍腹冷痛皆由敗膿血所致須此排膿白芷一兩單葉紅蜀葵根二兩白芍藥白枯礬各半兩為末以蠟為丸梧子大每空心米飲下十丸或十五丸俟膿盡乃補之云云壽頤按此證是帶下之一寒濕瘀垢互結不通臍腹冷痛四字是其寒結確據故宜溫升而兼泄瘀固澀為治雖曰敗膿決非潰瘍排泄之膿可以等視何得妄為比附竟認作排膿要藥則實熱諸瘍必益張其焰而害不可言壽頤治瘍三十年煎劑中惟濕盛無火之證間或用之余則不敢妄試若消腫敷藥之如意金黃散中有此則取其辛以散結耳大明又謂去面皯疵瘢固即本經面脂之義然又以為治目赤胬肉則風火升騰之熾甚者而亦以溫辛升散之日華子之顢頇最是亙古無匹瀕湖謂治鼻淵蓋鼻淵一證本有風寒風熱及肺熱鬱蒸三者之別風寒鬱其肺氣而鼻塞多涕則白芷升陽可也若風熱之鼻淵濁涕及肺熱而黃膿腥臭之鼻淵胡可一概而論又謂治鼻衄齒痛眉稜骨痛則皆陽明熱熾上攻為病古方偶用白芷本以加於清泄劑中作引經之義而乃列為專條等於主要之君藥豈非大誤木香本經味辛主邪氣闢毒疫溫鬼強志主淋露久服不夢寤魘寐別録消毒殺鬼精物溫瘧蠱毒氣劣氣不足肌中偏寒行藥之精考異行藥李氏綱目作引藥茲從繆氏經疏本正義木香芳香氣清而味厚廣産清芬芳洌別有川産淡而無用本經止言味辛別録則謂之溫以氣用事徹上徹下能升能降非溫和燠烋何以致此雖潔古謂氣味俱厚當主沉降然其氣濃郁藥中有此一味則煎之香聞滿屋必不可概以為降王海藏謂辛苦熱味厚於氣陰中之陽立説頗允本經主邪氣闢毒疫溫鬼芳香得以闢除穢惡疫癘為害無非陰霾惡臭足以病人木香芳烈自可消除穢濁之氣強志者芳香正氣足以振刷精神也淋露有因於清陽下陷者木香溫升故可治之若熱結於下者必非所宜能除夢魘亦以心神既振而魂夢常酣耳別録消毒除蠱殺鬼精物與本經同意治溫瘧者亦即燥濕辟惡之義治氣劣氣不足則升動清陽而助正氣也行藥者氣為血帥自能為百藥導引耳瀕湖本作引藥其旨正同廣義甄權治九種心痛積年冷氣痃癖癥塊脹痛壅氣寇宗奭謂專泄決胸腹間滯塞冷氣大明謂主心腹一切氣膀胱冷痛霍亂泄瀉痢疾健脾消食發明木香雖以木名實為草類以氣用事故專治氣滯諸痛於寒冷結痛尤其所宜然雖曰辛苦氣溫究與大辛大熱不同則氣火鬱結者亦得用之以散郁開結但不可太多且味苦者必燥陰虛不足之人最宜斟酌過用則耗液傷陰其氣將愈以紛亂而痛不可解矣近人更用之於滋補藥中則恐滋膩重滯窒而不靈加此以疏通其氣庶其運氣捷而消化健是亦善於佐使之良法疝瘕積聚滯下腸澼此為必須之藥正訛氣烈之藥多升少降惟木香大苦則亦能降而質本空松氣尤雄烈究以升陽為主日華本草謂治嘔逆反胃在胃寒無火食入反出者頗為相宜若胃火盛者必不可用海藏謂治衝脈為病逆氣裡急則腎氣不攝沖激逆上為患必非所宜丹溪謂調氣用木香其味辛氣能上升氣鬱不達者宜之若陰火衝上者則反助火邪當用黃檗知母而少以木香佐之持論平允勝於王氏多矣香附子別録莎草味甘微寒無毒除胸中熱充皮毛久服令人益氣長鬚眉正義香附子別録止稱莎草瀕湖謂其不言用苗用根後世皆用其根名香附子以其根相附連續而生可以合香故名壽頤按此物外有紫皮茸茸生毛帶皮含之辛而且苦味亦帶澀如刮盡皺皮其肉色褐則淡而微甘無復苦辛二味中又有心圓徑全體之少半其色較黑則又辛而苦澀矣是別録雖不言用根而甘即其根之味既云味甘則非苗矣然雖微甘而究以辛苦為多故寇宗奭謂之苦蘇頌引天寶單方謂之性澀瀕湖則曰辛甘宗奭又謂雖生於莎草根然根上或有或無有薄皸皮紫黑色若便以根為之誤矣壽頤謂惟其附生於莎草之根而非即草根故有附子之名是物産處頗多以浙之金華府屬為最夥巨者如指即吾吳亦間有之但形小味薄不堪入藥前者承山東諸城王肖舫君郵贈一器據云彼地特産形色氣味皆與蘭溪所産無別則可見出處之廣考陶隱居嘗謂莎草人無識者方藥不復用瀕湖謂此乃近時日用要藥而陶氏不識乃知古方藥物興廢不同壽頤按此物味辛甚烈功用以行為主何以別録謂之微寒此古説之不可泥者所謂療胸中熱氣即中脘氣滯不宣之病辛香能開初非寒以勝熱即有寒氣痰飲阻塞痹著者香附亦何必不能通之則所謂寒以治熱云者寒熱二字皆當活看充皮毛長鬚眉者此物質堅而皮有茸毛亦頗堅韌故能外達肌膚長養毛髮況乎辛香走竄充膚澤肉固有專長者耶久服益氣者氣藥治氣自然之功用耳廣義蘇頌謂治心腹中客熱亦以氣滯不通而言非必專治熱氣又謂膀胱間連脅下氣妨亦是肝氣鬱塞之疴膀胱間乃小腹部位實即諸疝病耳又謂治常日憂愁不樂則是氣結不舒為病辛能散結苦以泄之香附功效盡於此矣東垣謂治一切氣霍亂吐瀉腹痛無一非行氣宣通之力又謂主腎氣膀胱冷氣則辛散皆能勝寒可悟別録微寒二字必不允協瀕湖且謂散時氣寒疫則其味甚辛固當有溫通散寒之功又謂利三焦解六郁消飲食積聚痰飲痞滿亦行氣二字足以盡之又謂治癰疽瘡瘍則外瘍諸證雖寒熱虛實各各不同而終不離乎氣滯血凝四字香附行血中之氣辛開而不失於溫燥故寒熱二家無往不宜確是散腫軟堅必需之品又謂治婦女崩漏帶下月候不調胎前産後百病亦以經帶胎産百病總不離乎血氣不調此藥行氣而不致耗氣和血話血自能統以調之世俗遂謂此是女科要藥雖立言失之籠統要亦未可厚非發明香附辛味甚烈香氣頗濃皆以氣用事故專治氣結為病而其色帶紫中心較黑質又堅實重墜則雖以氣勝而與輕舉升騰之辛溫諸藥不同故能直入血分下達腎肝王海藏所謂陽中之陰血中氣藥深得物理自然之妙又凡辛溫氣藥飈舉有餘最易耗散元氣引動肝腎之陽且多燥烈則又傷陰惟此物雖含溫和流動作用而物質既堅則雖善走而亦能守不燥不散皆其特殊之性故可頻用而無流弊未嘗不外達皮毛而與風藥之解表絶異未嘗不疏泄解結又非上行之辛散可比好古謂本草不言治崩漏是益氣而止血也壽頤謂雖不可直認為益氣而確有舉陷之力丹溪謂須用童便浸過蓋嫌其辛味太濃以下行為監製之義壽頤謂調肝腎者此法甚是或有以醋炒以青鹽炒者其理蓋亦如此時珍謂其氣平而不寒香而能竄其味多辛能散微苦能降微甘能和為足厥陰肝手少陽三焦氣分主藥而兼通十二經氣分壽頤謂氣結諸病固肝膽橫逆肆虐為多此藥最能調氣故瀕湖謂之專入足厥陰其實胸脅痹結腹笥䐜脹少腹結痛以及諸疝無非肝絡不疏所謂三焦氣分分者合上中下而一以貫之固無論其何經何絡也李又謂生用則上行胸膈外達皮膚熟則下走肝腎外徹腰足蓋生者輕清其氣上行熟則重濁其力下降然此物在土茸毛豐厚且黏連草根堅韌不解故採藥者必以火燎之而後粒粒可擇蓋皆已煨而熟之矣且藥肆中又皆制之色黑尚何得有生者可用然胸膈氣滯亦皆投之輒應可知本性使然固不在乎製藥之嚴為區別者也韓氏醫通或稱黃鶴丹青囊丸二方之妙黃鶴丹用香附一斤川連半斤二味蓋治肝火熾盛之氣結不通者青囊丸用香附一斤烏藥五兩二味則皆行氣之不失於溫燥者自可以泛應一切氣痛而有餘石頑謂氣病之總司女科之主帥惟經水先期而淡及失氣無聲無臭者弗用蓋血氣本虛更與利氣則血愈傷而氣愈耗矣蘭草本經味辛平主利水道殺蠱毒闢不祥久服益氣輕身不老通神明別録除胸中痰癖考證此非今蘭蕙建蘭之蘭瀕湖綱目辨之極詳説文謂之香草陸璣草木疏謂蘭為王者之香其莖葉皆似澤蘭廣而長節節中赤高四五尺藏之書中闢蠹據此則蘭草澤蘭相似而非一物故本經上品既有蘭草而中品又有澤蘭然別録謂蘭草生太吳池澤本經亦曰一名水香水經零陵郡都梁縣西小山上有渟水其中悉生蘭草則本是水産實與澤蘭大同小異故漢書司馬相如傳衡蘭芷若顏注謂即今之澤蘭江賦䙬以蘭紅顏注亦以為澤蘭蓋二物之相混久矣瀕湖亦謂一物二種正義蘭草芳香故能解毒闢穢而生於水中則能利水功用亦於澤蘭無甚大別廣義東垣謂其氣清香生津止渴治消渴脾疸蓋消渴皆脾胃熱窒氣愈鬱則熱愈熾清芳可以導濁則熱氣疏通內經謂肥美所發令人口甘治之以蘭除陳氣也石頑逢原亦謂厄嘔脾疸口中時時溢出甜水者非此不除芳香辛溫調肝和脾功倍藿香善散積久陳郁之氣附識本經蘭草及漢魏注疏考證家備詳形色決非宋以後草蘭蕙蘭及建蘭確有可信但本經列為上品而後世藥籠乃無此物最易啓後學之疑民國十二三年間蘭溪醫校曾延富陽徐安甫先生名倬襄贊教務其時壽頤編纂本草正義此册安甫書有讀本草綱目蘭草澤蘭感言一篇頗有寓意附録於此近來談蘭草者僉以省頭草當之今之所謂蘭草已非神農氏之所謂蘭草矣按李氏本草綱目依據漢吳普五代注五代顯誤李當之及陶弘景諸家之書蘭草條下系以水香都梁香孩兒菊等別名澤蘭條下亦綴以水香都梁香孩兒菊等別名可見今之蘭草已與澤蘭混而為一而蘭草條下又注明一名大澤蘭冠一大字似乎蘭草與澤蘭為同類不過比較澤蘭為大耳乃查閲各處藥肆中之蘭草其長大反不如澤蘭遠甚則大澤蘭之謂何又李氏謂蘭草澤蘭一類二種俱生下隰以莖圓節長葉光有歧者為蘭草莖微方節短葉有毛者為澤蘭澤蘭走血分蘭草走氣分由是觀之即不辨其走氣分不走氣分當辨其葉之歧與不歧乃起視藥肆中澤蘭之葉片橢圓而端微尖並不有歧李氏本草圖葉分三叉如楓葉形惟氣味微覺辛香似可收為氣分藥品然而莖葉之形狀已與時珍之綱目不符將謂對時珍之説是乎則今之所謂蘭草又失其本來面目矣遑論古之蘭草哉古之蘭草經李氏妄矜賅博裒集古文人及經生家諸芳草考據及論疏強作蘭草講解力闢從前以山蘭為蘭草之非謂藥中所用之蘭草並非與蕙並稱之蘭草而古之蘭草乃益屈抑而不得伸所謂今之蘭草也者既君子道消自然小人道長矣然錢塘趙恕軒著本草拾遺獨具卓識謂李氏於蘭草釋名下概以省頭草孩兒菊為澤蘭而附方中則又認省頭草為蘭草皆誤也云云竟將東璧之説完全推翻而八十一叟王秉衡氏重慶堂隨筆收採趙説而推崇之夫豈好為趙氏之應聲蟲乎可知恕軒意中之蘭草雖未必即是神農氏所收之蘭草其不為近人一名省頭草之蘭草也審矣如果神農氏所收之蘭草即近今稱為省頭草之蘭草則高明如宋之寇宗奭元之朱丹溪明之李仕材何以不一齒及而必以孔子稱為王者香生於空谷不以無人而不芳之山蘭當之耶近來省頭草一味醫界中之能讀本經而辨識藥草者群以為即是本經中之蘭草矣然而一舉筆一啓口之間絶不有蘭草之名稱不稱為省頭草即稱為佩蘭隱然借楚辭紉秋蘭以為佩之佩字作根據至問其來歷則云不知始是何人是又數典而忘其祖矣總之省頭草一物其種類與澤蘭為一家其功用與藿香相倣佛其辛香之氣味亦未嘗不可以解穢濁而快脾胃若即以此草而直認為我孔子所讚賞之蘭則吾未之敢信也何也蓋孔子所稱之蘭即孔子琴操中幽蘭之蘭幽蘭生於山谷是山草佩蘭生於水中或澤邊是水草亦是隰草幽蘭貴品也佩蘭賤草也而謂區區一省頭草格卑而品下足以噹噹孔子王者香之稱乎而謂多識於鳥獸草木之孔子竟不知省頭草生於池澤而謂其生於山谷乎嗚呼空谷幽蘭見棄於習岐黃者久矣雖經負大名如寇宗奭朱丹溪李仕材諸賢達之識別以及趙恕軒王安化老人之論辨寇朱李三先生皆謂本經蘭草即今蘭蕙之蘭趙謂東璧以省頭草孩兒菊等氣香而不清者當蘭草是直認陽貨為孔子矣王謂孔子稱蘭為王者之香則蘭之於草亦猶麒麟之於走獸鳳凰之於飛鳥後之修本草者苟折衷於聖人自當以蘭為冠蓋蘭草能舒思慮之鬱結蠲蘊伏之濁邪稀痘催生清神養液稟天地至清之氣以生故昔人有吹氣如蘭之喻奈何竟以省頭草當之云云蘭仍埋沒于山谷屈伏於泥塗或徒供嘗玩於明窗淨几終不獲採入藥籠俾得一伸其去菀陳莝之懷抱豈非蘭之不幸歟雖然內經有云飲食肥甘傳為消渴治之以蘭除陳氣也蘭之功用已發明於四千年以前蘭亦何不幸之有竊以為世風不古醫道晦盲置四千年以前發明之蘭草而不困非蘭草之不幸直病者之不幸耳噫我欲無言壽頤又按古蘭今蘭之辨本册後有草蘭蕙蘭一條言之頗詳茲不多贅澤蘭本經味苦微溫主乳婦內衄中風余疾大腹水腫身面四肢浮腫骨節中水金瘡癰腫創膿別録甘産後金瘡內塞考異內衄御覽作衄血瀕湖綱目引本經止有金創癰腫瘡膿六字蓋有脫佚李氏所引本經例無刪節如此之甚者正義澤蘭産下隰大澤之旁本與蘭草相似故主治亦頗相近本經大腹水腫身面四肢浮腫骨節中水皆苦溫勝濕之功效亦即蘭草利水道之意其治金瘡癰腫瘡膿者專入血分而行瘀排膿消腫也惟本經所謂乳婦內衄頗不可解蓋即後世新産通瘀之意別録內塞當亦以瘀露不通言之廣義甄權謂治産後腹痛固苦溫行瘀之功又謂治頻産血氣衰冷成勞瘦羸婦人瀝血腰痛則以溫和能利血脈言之然通利之品能走未必能守此當以意逆之而可知其非虛證久服之藥矣瀕湖謂澤蘭氣香而溫味辛而散陰中之陽脾喜芳香肝宣辛散脾氣舒則三焦通利肝鬱散則營衛流行蘭草走氣道故能利水道除痰癖殺蟲辟惡而為消渴良藥澤蘭走血分故能治水腫塗癰毒破瘀血消癥瘕而為婦人要藥雖是一類而功用稍殊石頑謂入肝脾二經血分專治産後血敗流於腰股拘攣疼痛破宿血消癥瘕皆散血之功為産科要藥藿香別録辛微溫主治風水毒腫去惡風止霍亂心腹痛正義藿香清芬微溫善理中州濕濁痰涎為醒脾快胃振動清陽妙品別録治風水腫毒者祛除濕濁自能清理水道也去惡氣者濕漫中宮之濁氣也霍亂心腹痛者濕濁阻滯傷及脾土清陽之氣則猝然撩亂而吐瀉絞痛芳香能助中州清氣勝濕闢穢故為暑濕時令要藥然性極和平力量亦緩止可以治霍亂輕證而猝然大痛吐瀉並作肢冷脈絶者非大劑四逆湯不為功斷非此淡泊和平所能獨當大任廣義蘇頌謂脾胃吐逆要藥即別録止霍亂之意胃寒嘔酸口有冷涎者最宜潔古謂助胃氣開胃口進飲食海藏謂溫中快氣石頑謂治山嵐瘴瘧皆振動脾陽闢除穢濁之功效也發明藿香芳香而不嫌其猛烈溫煦而不偏於燥熱能祛除陰霾濕邪而助脾胃正氣為濕困脾陽怠倦無力飲食不甘舌苔濁垢者最捷之藥亦闢穢惡解時行疫氣蓋癘疫以氣染人無非濕濁穢腐之薰蒸感之者由口鼻吸入胃先受之芳香得清氣之正而藿香氣味和平不嫌辛燥故助脾胃而無流弊但必以廣産為佳入藥用梗不用葉簡稱廣藿梗雖以氣勝而沖和可愛今則江浙間遍地皆有土産味苦澀而氣亦惡劣石頑謂伐胃消食且能耗氣而世俗以為能解暑氣瀹茶多飲未盡善也禁忌仲淳謂陰虛火旺胃弱欲嘔及胃逆作嘔者弗用壽頤按藿香雖不燥烈然究是以氣用事惟舌有濁垢而漾漾欲泛者最佳若舌燥光滑津液不布者咸非所宜凡芳香行氣醒脾勝濕諸芳草皆有同情不僅藿香木香一類為然也高良薑別録辛大溫主暴冷胃中冷逆霍亂腹痛正義良薑大辛大溫潔古謂辛熱純陽故專主中宮真寒重證別録獨以治胃冷氣逆霍亂腹痛者正以霍亂多中氣大寒忽然暴作俄頃之間胸腹絞痛上吐下瀉即四肢冰冷面唇舌色淡白如紙脈伏不見冷汗如油大肉陡削良由盛暑之時乘涼飲冷汩沒真陽致中氣暴絶見證如是之劇甚者一二時即已告斃此非大劑溫燥萬不能挽回垂絶之元陽三十年來時疫頻行無年不有所見無不如是薑附吳萸良薑蓽茇之屬均為此病必須要藥惟近賢王孟英陸九芝兩家所論霍亂皆主濕熱而言且謂肢冷脈伏即是熱深厥深之候萬萬不可誤用四逆法者此則當時見證之不同蓋亦天時人事之變遷固自有不可一概論者此當以舌苔之淡白與黃膩辨之而所瀉所吐之物一則清徹如水一則穢氣惡臭亦必確乎有憑固不患臨證時之無所適從者也廣義陳藏器謂止痢是必以虛寒滑利言之非濕熱積滯之腸闢可知甄權謂治腹內久冷氣痛大明謂治轉筋瀉痢則即真寒之霍亂轉筋也又謂治反胃則胃中無火食入反出之朝食暮吐完穀清徹者也蘇頌謂含塊注原本作愧咽津治忽然噁心嘔清水亦胃寒之證瀕湖謂健脾胃寬噎膈破冷癖除瘴瘧皆以陰霾填塞者言而胃燥津枯之噎膈濕熱穢濁之瘴瘧非可一概論矣石頑謂脾胃為客寒所犯則逆冷霍亂辛溫暖脾胃而逐寒邪故能治之甄權大明之主治皆暖胃溫中散寒之功如寒疝小腹痛須同茴香治之産後下焦虛寒瘀血不行小腹結痛者亦用之若胃火作嘔傷暑霍亂禁用壽頤按此所謂傷暑以暑熱言即孟英九芝之所謂熱霍亂若暑月貪涼飲冷而發為真寒霍亂則雖在盛夏亦非暑熱之病不可誤會紅豆蔻發明紅豆蔻始見於甄權之藥性本草瀕湖謂是高良薑之子氣味辛溫藏器謂主腸虛水瀉心腹絞痛霍亂嘔吐酸水甄權謂治冷氣腹痛消瘴霧毒氣去宿食溫腸胃瀕湖謂治噎膈反胃虛瘧寒脹燥濕散寒石頑謂大補命門相火故正元丹中用之壽頤按諸家主治皆與良薑同一條理是以今人方中此藥不甚著名蓋應用各證俱以良薑之類當之足矣草果亦即草豆蔻注原注別名今為二種當稔之別録豆寇辛溫溫中心腹痛嘔吐去口臭氣考證草果今之通稱開寶本草有草豆蔻別録止稱豆蔻瀕湖綱目從之亦以豆蔻標目而以草豆蔻草果並列於下以為譯名與今之所謂白豆蔻或稱蔻仁者不同寇宗奭謂豆蔻草豆蔻也此是對肉豆蔻而言惟石頑逢原則以草豆蔻與草果分為兩條壽頤謂此數者氣味功用大略相似故同豆蔻之名茲徑稱草果從俗從宜欲人之一望而皆知也正義草果辛溫燥烈善除寒濕而溫燥中宮故為脾胃寒濕之主藥別録溫中二字足以盡之心腹痛嘔吐皆以寒濕而言去口臭者芳香之氣足以闢除惡臭然口氣皆胃中濕熱汙濁蘊積不行薰蒸為臭此等辛溫藥物雖能勝濕而除陳氣究與蘊熱者不能符合蓋止取芳香以治其標多用之必且助熱滋甚決非厭心切理之藥仲淳經疏明知脾有積滯瘀而為熱則非導滯去瘀何以清其熱竟謂用此以醒脾導滯口氣不臭得毋言過其實耶廣義開寶本草謂其下氣蓋以寒濕鬱窒氣滯不行而言則溫燥以破寒氣泄濕鬱而芳香助其宣通斯中州之鬱氣舒矣又謂治霍亂冷氣則即別録溫中之義也又謂其消酒毒則酒秉濕濁之性脾胃素寒者得之則助其陰霾而清陽之氣更憊治宜溫燥以除濕寒古人解酲多用葛花砂蔻之類皆胃寒者之主藥故日華本草亦謂高良薑能解酒毒然酒為曲糵所釀走而不守升而助陽陰虛火旺者得之則又偏燥傷陰治此者須當清泄以解其熱而溫燥之物皆在所禁此嗜酒者所以有面赤面白生熱生寒之異即沉醉者亦必有喜動喜靜或歌或哭之殊此東垣葛花解酲一方苟為寒濕瀰漫果是萬全良劑而燥渴多火者得之亦何往而非毒藥耶東垣謂調中補胃健脾消食皆為中氣虛寒清陽不振者而言又謂去客寒心胃痛宗奭謂虛弱不能食者宜此與木瓜烏梅縮砂益智曲糵甘草生薑同用亦以脾胃陽虛而食不甘味故宜溫燥苦胃陰虛而不嗜食者又當柔潤養陰而剛燥皆在禁例矣丹溪謂能散滯氣消膈上濕痰若熱鬱者不可用瀕湖謂南地卑下山嵐煙瘴飲啖酸鹹脾胃常多寒濕故食料必用與之相宜治瘴瘧寒熱與知母同用取其一陰一陽無偏勝之害草果治太陰獨勝之寒知母治陽明獨勝之熱壽頤按嵐瘴多霧露陰濕之邪最傷清陽之氣故闢瘴多用溫燥芳香以勝陰霾濕濁之瀦穢草果之治瘴瘧意亦猶是然凡是瘧疾又多濕痰矇蔽為患故寒熱往來糾纏不已治宜開泄為先草果善滌濕痰而振脾陽更以知母輔之酌其分量隨時損益治瘧頗妙義固不獨專為嵐瘴立法惟石頑所謂實邪不盛者當在所禁耳肉豆蔻即肉果發明肉豆蔻始見於唐本草氣味辛溫開寶本草謂消食止泄治積冷心腹脹痛霍亂嘔沫冷氣皆溫煦脾土專治寒中之意而其味又澀則能止虛寒之泄瀉蓋其除寒燥濕解結行氣專理脾胃頗與草果相近則辛溫之功效本同惟澀味較甚並能固及大腸之滑脫四神丸中有之溫脾即以溫腎是為中下注原作上顯誤改二焦之藥與草果之專主中焦者微別開寶又謂治中惡鬼氣冷疰則亦闢除陰霾之意不可拘泥到鬼物上去大明謂溫中下氣開胃解酒毒甄權謂治宿食痰飲止小兒吐逆不下乳腹痛李珣謂主心腹蟲痛皆專就寒濕一邊著想者若濕熱鬱滯而為此諸證則必不可一例論治故李珣又謂主脾胃虛冷虛泄瀕湖謂暖脾胃固大腸要言不煩最為確切惟珣又謂治赤白痢則濕熱者多虛寒者少不當泛泛言之耳石頑謂溫中補脾寬膨脹固大腸為小兒傷乳吐逆泄瀉之要藥又謂脾土性善芳香故肉果與脾胃最為相宜能下氣者脾得補則健運而易於消穀下氣非若厚朴枳實之峻削惟熱鬱暴注禁用以其辛溫滯澀之故壽頤謂脾喜溫而惡寒喜燥而惡濕溫和則敷布有權剛燥則清陽乾運若中陽既衰濕邪困之即萎靡倦怠而索索無生氣矣惟香砂蔻仁之類溫煦芳香足以振動陽氣故醒脾助運最有近功則所謂消食下氣已脹泄滿者皆其助消化之力固不可與克削破氣作一例觀白豆蔻發明白豆蔻開寶本草謂辛而溫治冷積氣止吐逆反胃消食下氣蓋溫胃醒脾固亦與草豆蔻肉豆蔻異曲同工其同得豆蔻之名固亦以此惟白豆蔻其氣清芬辛烈視彼為尤而無澀口之味則芳香之氣尤善上行開泄上焦氣滯已與草果肉果之專治中下者不同東垣謂散肺中滯氣海藏謂補肺氣皆以其氣獨勝辛升作用功效必在上部所以寬胸利膈尤其獨擅勝場而蘇恭竟謂氣味俱薄專入肺經得毋誤會況乎此物氣味皆極濃厚必不可妄謂其薄而咀嚼久之又有一種清徹冷冽之氣隱隱然沁入心脾則先升後降所以又能下氣亦與其他辛升者絶不相同瀕湖綱目謂之大溫頗嫌未允此固蔻仁砂仁二者之特異性情升降陰陽各臻其妙所以通治肺脾肝腎諸氣而為吹噓鼓動之無上妙品寒熱虛實無往不宜楊仁齋謂治脾虛瘧疾嘔吐寒熱仍不外燥濕開痰溫煦以助脾家健運之義縮砂蔤俗稱砂仁發明縮砂蔤始見甄權藥性開寶稱其溫澀治虛勞冷瀉宿食不消腹中虛滿下氣蓋氣味功力皆與豆蔻相類故大明謂治一切氣霍亂轉筋楊仁齋謂和中行氣止痛潔古謂治脾胃氣結滯不散瀕湖謂醒脾養胃理元氣通滯氣散寒飲脹痞噎膈嘔吐亦皆與白豆蔻同一主治惟此物雖為草實而開花結穗成實皆在根下是其特異之情性故雖辛溫能升未嘗不治中下注原作上顯誤改二焦之氣而本乎地者親下尤以專治肝腎為特長甄權謂溫暖肝腎藏器謂治上氣奔豚蓋皆有見於此又如腸闢滯下一證腹痛皆由氣滯必以調氣為要務然須疏通開泄宜降而不宜升故芳香辛溫升陽之藥皆在禁例惟砂仁能治虛寒之泄瀉似乎亦在辛溫升清之一邊而開寶竟以主治赤白痢疾則此證惟濕熱積滯為獨多溫升之品寧非大忌不知砂仁氣辛雖似溫升而開泄下降是其本色且能破滯解結則雖濕熱實積亦不妨藉為引導直入下焦而通瘀滯不患其升舉穢濁上逆為虐故甄權又以為止休息氣痢瀕湖引藥性論謂治冷滑下痢不禁則溫澀之中尚有行氣消積之作用在固不可與肉蔻益智之一味溫澀者同日而語石頑謂今人治血痢亦多用之若積欲盡時良非所宜豈不以消滯導瘀是其所長故適宜於積滯之證又謂新産忌之恐其氣驟行而辛燥動血於以知砂仁泄降下氣力量頗專與其他辛溫芳香之藥以氣用事能升而不能降者顯然有別考芙蕖之本其名曰蔤蒲本亦曰蔤皆有深藏於密之義此藥得名其義蓋亦如是所以主治肝腎諸氣尤其特長蓋有涵藏收攝之意尚不可與其他溫散藥物專於破氣消耗者作一例觀瀕湖引陶隱居方謂縮砂和皮炒黑研末米飲下二錢治子癇昏冒安胎止痛皆效此是胎氣上逼氣升神昏之證與子懸同一病理而此能治之尤可見其沉降功用其溫升芳香開通氣鬱之例退藏於密於此更得一確證顧其名而思其義亦治藥物學家所當三致意者益智子發明益智始見於陳藏器本草拾遺謂之辛溫不言其澀但諸家所述主治無一非溫澀功用藏器主遺精虛漏小便餘瀝夜多小便者以二十四枚碎之入鹽同煎服有奇效東垣謂治客寒犯胃和中益氣及人多唾石頑謂胃虛多唾蓋胃氣虛寒而廉泉不攝涎唾自流此藥溫胃而澀最有捷效海藏謂益脾胃理元氣補腎虛滑瀝皆溫補脾腎而尤以固澀為主瀕湖謂其大辛行陽退陰三焦命門氣弱者宜之此氣弱以元陽之氣而言李氏集驗方縮泉丸益智仁鹽炒烏藥等分酒煎山藥粉為丸治脬氣不足小便瀕數及老年陽虛遺溺者皆效楊仁齋直指方云心者脾之母進食不止於和脾火能生土當使心藥入脾胃藥中庶幾相得古人進食藥中多用益智土中益火也壽頤按此為脾陽虛餒而不思食者立法脾土喜溫而惡寒喜燥而惡濕寒濕困之則健運力乏而不思納穀且食亦無味此惟溫煦以助陽和而斡旋大氣則能進食益智醒脾益胃固亦與砂仁豆蔻等一以貫之仁齋説到益火生土上去附會心經之藥尚是捨近求遠故意深言之亦殊不必瀕湖又謂治心氣不足夢泄赤濁則以腎陽無權滑泄不禁者立論故可用此溫澀一法然遺濁之果屬虛寒者絶少石頑謂因於熱者色黃乾結不可誤用極是瀕湖又謂治熱傷心系吐血血崩諸證則既是熱傷而反用此辛熱之藥何其背謬一至於此要知洪氏夷堅志所載吐血不止驚顫狂躁一條用益智等藥而愈者本是小説家言何可徵信按之病理寧不矛盾東璧失檢採入綱目且因之而創為專治熱傷之吐血亦可謂好奇太過矣補骨脂發明補骨脂始見於甄權藥性論名婆固脂瀕湖謂是胡語蓋本是波斯國産開寶本草遂稱破故紙李氏綱目則曰補骨脂亦因舊音近似而言其功用耳味辛氣溫而燥腎家陽藥甄權謂治男子腰疼膝冷逐諸冷痹頑止小便腹中冷皆以勝寒溫腎而言又謂治囊濕則腎膀之濕外溢此物溫燥故能治之然亦惟偏寒者宜之而濕火外溢者又當別論開寶謂治風虛冷骨髓傷冷腎冷精流皆是溫澀之用又謂治五勞七傷則過甚言之且古之所謂虛勞固專以虛寒言也又謂治婦人血氣墮胎則太嫌渾漠幾不可解蓋言血氣虛寒之不能固護耳大明謂興陽事瀕湖謂治腎泄通命門暖丹田其旨皆同若大明又謂明耳目瀕湖又謂斂精神則因其固澀而充分以言之矣蘇頌曰今人多以破故紙與胡桃合服其法出於唐鄭相國其自敘曰豫為南海節度年七十五越地卑濕衆疾俱作陽氣衰絶服乳石補藥不應元和七年訶陵國泊主李摩訶傳此方並藥服之經七八日而覺應驗自爾常服其功神效十年二月罷郡歸京録方傳之破故紙十兩淨擇去皮洗曝搗細胡桃瓤二十兩湯浸去皮細研如泥好蜜和如飴日以暖酒二合調藥一匙服之李瀕湖引韓飛霞曰破故紙收斂神明能使心包之火與命門之火相通故元陽堅固骨髓充實澀以治脫也胡桃潤燥養血血惡燥故油以潤之壽頤按二者一潤一燥俱固澀元陽而能滋長筋骨洵是佳方但據鄭氏本受陰濕為病則此方以治虛寒濕阻者為宜亦非老人燥火之體可以通用許叔微本事方謂有人全不進食服補脾藥不效豫授以二神丸頓然能食方即補骨四兩肉蔻二兩為末以生薑四兩煎肥大棗四十九枚取棗肉和丸此病不可全作脾虛蓋腎氣怯弱元陽衰劣不能薰蒸脾胃譬如釜中米穀而釜底無火則終日不熟何能消化石頑謂二神丸治脾腎虛寒泄瀉用補骨補腎肉蔻補脾加吳茱萸以平其肝加木香以順其氣使之斡旋若精傷溺澀赤痛者去木香易五味子腰膝痠疼腎冷精流者用之屢效此即四神丸惟陰虛有火夢泄溺血大便閉結者弗用蓽茇發明蓽茇亦作蓽撥原出波斯蓋亦彼中方言故無正字氣味辛溫固亦脾腎虛寒之主藥藏器謂溫中下氣補腰腳消食除胃冷陰疝癖則功用可知藏器別有蓽勃沒一條亦言辛溫治冷氣嘔逆心腹脹滿食不消化陰汗寒疝核腫婦人內冷無子除腰腎冷云云藥名主治皆同蓋本是復出之未及刪除者而瀕湖亦引之附入蓽茇之後當即一物李珣謂治水瀉虛痢嘔逆醋心臟腑虛冷腸鳴大明謂治霍亂冷氣心痛其旨皆同惟瀕湖謂是頭痛鼻淵牙痛要藥取其溫熱能入陽明而散浮熱壽頤按頭痛固有真寒一證宜用大辛大溫者但鼻淵牙痛類多火證古人偶用溫散之藥蓋亦反佐之義用作嚮導瀕湖竟以為散浮熱得毋誤會石頑和之非也薑黃發明薑黃始見唐本草稱其辛苦大寒藏器已辨其非謂辛少苦多性熱不冷則唐本寒字蓋亦傳寫之誤石頑謂有二種川蜀生者色黃質嫩有須折之中空有眼切之分為兩片者為片子薑黃江廣生者質粗形扁如乾薑僅可染色不入湯藥藥肆混市誤人徒有耗氣之患而無治療之功壽頤按今市肆薑黃有二種名片薑黃者是已切為厚片而後曬乾形如乾薑色不黃質亦不堅治風寒濕者即此又一種則堅實光亮其色深黃乃如鬱金是為染色之用不入藥劑者唐本謂治心腹結積疰忤下氣破血蓋辛能散溫能通故可破結辟惡消瘀下氣是物功用即在此數者之中然又謂除風熱消癰腫功力烈於鬱金則正以入血泄散故癰瘍之堅腫可消瘍科普通敷藥之如意金黃散用之即是此意固非疏風清熱之作用而乃竟以為除風熱宜乎有辛苦大寒之誤矣大明謂治癥瘕血塊撲損瘀血通月經止暴風痛冷氣下食蘇頌謂治氣脹産後敗血攻心戴原禮謂片子薑黃入手臂治痛石頑謂血虛臂痛者服之必增劇蓋辛溫本以祛寒濕而血虛者更得此迅利流動以耗其氣則非徒無益而害之矣鬱金發明鬱金始見於唐本草稱其辛苦而寒石頑逢原已改作辛平謂安有辛香而寒之理又謂蜀産者體圓尾鋭如蟬腹狀發苗處有小孔皮黃而帶黑通身粗皺如梧桐子紋每枚約重半錢折開質堅色黃中帶紫黑嗅之微香不烈者真如大小不等折之中空質柔內外皆黃其氣烈者即片子薑黃也壽頤按今市肆鬱金有兩種川産廣産形頗相近但川産者形扁切片亦深黃褐色中心則紫廣産形圓切片則作淡黃色中心略深亦黃而不紫時尚多用廣産實則質堅而光潔其性沉重其色更微嗅之亦無甚香味兩者皆然若色深香烈而形較大則薑黃也惟其質堅性平注原為質義不可解改色黃赤如血故專入血分能行血中之氣下氣行血開結止痛是其專長古稱解鬱義亦如是唐本草謂治血積下氣破惡血血淋尿血甄權謂治宿血氣心痛冷氣結瀕湖謂治血氣心腹痛産後敗血衝心欲死丹溪謂治吐血衄血唾血及經事逆行並以鬱金末加韭汁薑汁童尿同服其血自清痰中帶血者加竹瀝固無一非開泄沉降之功用惟壽頤則謂血逆上行薑韭之辛必非所宜正訛丹溪謂鬱金之性輕揚上行古人以治郁遏不能升者命名因此壽頤按此藥是根質堅沉重潔古謂其氣味俱厚故純以下行為用惟入血行氣亦能破堅散結所謂開鬱者本以宣通解散為義郁不能升一層大是誤會況丹溪亦自謂其治吐血衄血及逆經諸證則專以下行為順當亦可於言外得之反謂上行寧不自矛自盾範石湖且謂一味為末治蠱毒服之即瀉出惡物尤為明白瞭解丹溪是説殆出依託而石頑和之亦謂先升後降不思之甚矣甘松發明甘松李氏綱目作甘松香始見於陳氏本草拾遺稱其甘溫治黑皮皯黯蓋亦芳香溫升能助陽和之氣通血脈而潤澤顏色猶白芷藁本之長肌膚悅顏色可作面脂之意此是外治之藥又謂治風疳齒蝕則辛香醒胃入陽明而行滯氣聖濟以合膩粉蘆薈專治風疳蟲牙明以甘松引經而膩粉蘆薈殺蟲清熱非一味辛溫能治齒蝕可知開寶本草謂治惡氣卒心腹痛下氣則芳香者固入氣分善舒鬱滯而以此草之根最為繁密長於下行故海藏亦謂其理元氣去氣鬱瀕湖謂能開脾郁加入脾胃藥中甚醒脾氣又謂腳氣膝浮煎湯淋洗亦取其下行除濕之意近東瀛醫家謂此藥善通經絡專治轉筋為霍亂轉筋必需之藥壽頤自定霍亂藥酒方用伊打和酒精浸取濃汁合薑附萸連諸味治真寒霍亂轉筋入腹危急重症極有捷效知此物溫運活絡通經無出其右此固向來治藥物學者之所未知者也山奈發明山奈始見李氏綱目稱其辛溫謂暖中闢瘴癘惡氣治心腹冷氣痛寒濕霍亂蓋味辛溫而氣芳香闢寒行氣固亦與砂仁蔻仁諸物相近故治療約略似之又謂治風蟲牙痛則亦專行陽明可作引經藥用與甘松同必非辛溫之物可以獨治陽明風火者也蓬莪荗發明注項名原缺今補今作蓬朮亦作蓬莪朮荗字從草從戍而讀如術義不可曉字書唯一見於字彙補亦不詳其義此物生於根下質極堅硬味苦辛溫故為下氣除寒消食逐飲破積攻堅通瘀行血亦除癥瘕之藥開寶本草謂治小腹痛霍亂冷氣吐酸水解毒食飲不消婦人血氣結積丈夫奔豚甄權謂破痃癖冷氣海藏謂通肝經聚血大明謂治一切氣開胃消食通月經消瘀血止撲損痛下血及內損惡血無一非溫通攻克作用惟實病為宜故石頑謂虛人得之積不去而真已竭殊為可慮須得參術健運補中寓瀉乃為得力荊三稜發明三稜亦下氣行血破積消癖猛將故恆與蓬朮並轡而行但産於濕地溫性較減則與蓬朮互為調濟可見古方兼用二物自有至理開寶謂治老癖癥瘕積聚結塊産後惡血通月水墮胎止痛利氣潔古謂治心膈痛飲食不消大明謂治氣脹破積氣消撲損瘀血心腹痛産後腹痛血運海藏謂通肝經積血治瘡腫堅硬石頑謂東垣破積諸方皆與人參贊助如專用克削脾胃愈虛不能運行其積則亢逆更甚矣紫蘇本經水蘇味辛微溫主下氣闢口臭去毒辟惡別録主吐血衄血血崩別録蘇味辛溫主下氣除寒中其子尤良考證爾雅釋草蘇桂荏郭注蘇荏類許氏説文即用爾雅訓詁小徐説文繁傳則曰荏白蘇桂荏紫蘇考方言云蘇亦荏也關之東西或謂之蘇或謂之荏本經則曰水蘇一名芥蒩生九真池澤張氏廣雅亦曰芥蒩水蘇名醫別録亦云水蘇一名雞蘇一名勞蒩一名芥苴唐本草注云此蘇生下濕水側苗似旋覆二葉相當大香馥青齊河間人名為水蘇江左名為薺薴吳會之間謂之雞蘇陳氏本草拾遺云水蘇葉有雁齒香而氣辛蜀本草云花生葉間紫白色陶注本草云蘇葉下紫而氣甚香其無紫色不香似荏者名野蘇生池中者為水蘇一名雞蘇皆荏類也壽頤按蘇之與荏古為一物二名至後世則以葉紫者為蘇葉青者為荏其本經之水蘇則以生於澤旁因有此名實非産於水中而名醫別録則以水蘇與蘇別為二物然主治皆同歧而二之徒亂人意瀕湖仍別録之舊分為二條觀其釋名各有不同頗似離而為二然其言水蘇之形色則云三月生苗方莖中虛似蘇而微長密齒面皺色青對節生氣甚辛烈六七月開花成穗如蘇水紅色穗中有細子狀如荊芥子可種易生宿根亦自生沃地者苗高四五尺其言蘇之形狀則云紫蘇白蘇皆以二三月下種或宿子在地自生其莖方其葉圓而有尖四圍有鋸齒肥地者面背皆紫瘠地者面青背紫其面背皆白者即白蘇乃荏也八月開細紫花成穗作房如荊芥穗九月收子子細如芥子則二者之莖葉子形狀皆同但以葉色之一青一紫為異蓋草木之屬一類數種者最多或其種自有微別而氣味性情皆同或土宜不一則各地所産形色遂異至古今別名更多不可枚舉水蘇紫蘇實是一物必不能因本經有一水字而生異義蓋此物遍地多有平原下隰無往不宜獨不生於水中本草經生於池澤一句恐不可泥蓋亦方言不同因有此名今以本經別録兩者之主治既同併為一條而徑以紫蘇標名從俗從宜欲人易曉其莖葉子色即有不紫者而氣味皆同亦即一類不必歧出瀕湖綱目於芳草目中更有荏之一條而十四卷中則無荏蓋亦知其不能分治而刪之者然本卷更別出薺薴一條似尚可刪茲亦不録又按荊芥蓋亦蘇荏一類故氣味形狀皆相似而主治亦復甚近但葉較細香較淡耳所以古謂荊芥為假蘇瀕湖引本經下氣之下多殺穀除飲食五字壽頤按殺穀言其消食可説也而除飲食三字不成句未知何本考諸書引本草經皆無此五字又去毒辟惡綱目作去邪毒辟惡氣孫星衍輯刻本經無邪字氣字茲從孫本正義蘇葉芳香辛溫善散不問色紫色青其氣皆烈故為下氣除寒主藥而氣尤芳烈則能辟惡去穢本經別録主治皆同斷為一物二名殊無疑義惟瀕湖於水蘇條中引別録有主吐血衄血血崩七字按之物理辛溫疏散能降亦復能升則非血證通治之藥雖古方中數數見之然多稱雞蘇或徑稱龍腦薄荷恐非即此瀕湖綱目所載可證仲淳經疏兼收本經別録獨無水蘇無可參證姑志所疑以俟再考廣義蘇頌謂主氣疾及腳腫壽頤按腳氣宜用老蘇梗合之花檳榔極效孟詵謂除寒熱治一切冷氣日華謂治心腹脹滿止霍亂轉筋開胃下食通大小腸瀕湖謂解肌發表散風寒行氣寬中消痰利肺和血溫中止痛定喘解魚蟹毒壽頤按寒飲喘咳宜蘇子甄權謂殺一切魚肉毒其子則甄權謂治上咳逆冷氣腰腳中濕氣發明紫蘇芳香氣烈莖幹中空故能徹上徹下外開皮毛泄肺氣而通腠理上則通鼻塞清頭目為風寒外感靈藥中則開胸膈醒脾胃宣化痰飲解鬱結而利氣滯方言云舒蘇也楚通語也是蘇字有舒散之義氣疏以達蘇之得名以此恆以莖葉子三者分主各證蓋此物産地不同形狀亦別多葉者其莖頗細而莖幹大者則葉又少故分析辨治尤為精切葉本輕揚則風寒外感用之疏散肺閉宣通肌表泄風化邪最為敏捷莖則質堅雖亦中空而近根處偉大豐厚巨者徑寸則開泄裡氣用之解結止痛降逆定喘開胃醒脾尤為腳氣要藥固與開泄外感之旨不同而子則滑利直下降氣消痰止嗽潤肺又是別有意味此今人選藥之密已與宋金元明不同不可謂非藥物學之進步者惟其子多油能泄真氣石頑謂氣虛久嗽陰虛喘逆脾虛滑者皆不可用最是確論薄荷發明薄荷方莖而色紫帶赤可以子種宿根亦能自生氣味芳烈頗與紫蘇相類但葉不赤而無鋸齒氣味雖濃而入口清洌為異故孫星衍輯刻本草經徑謂薄荷蘇類確乎可信唐本草謂為辛溫亦以蘇類例之然冷冽之氣能散風熱決非溫藥故潔古直謂之辛涼其主治則唐本謂賊風傷寒噁心心腹脹滿霍亂宿食不消下氣又皆與紫蘇大略相近惟辛而涼降微與溫散者不同耳蘇頌謂主傷風頭腦風東垣謂清頭目除風熱瀕湖謂利喉嗌口齒諸病石頑謂辛能發散專於消散風熱涼能清利故治咳嗽失音性浮上升能開鬱散氣然所用不過二三分以其辛香伐氣非久服多服之品壽頤按外治風熱生瘍煮汁和入消腫末藥敷之涼入肌膚立能止痛今西藥制精成錠外擦頭痛能泄外風能抑肝陽皆有捷驗青蒿本經草蒿味苦寒主疥搔痂癢惡創殺蟲留熱在骨節間明目正義青蒿苦寒故本經列於下品止以為治疥瘡外瘍殺蟲之用然清香之氣溢人眉宇故能明目亦散風熱不僅以苦寒清降為功且苗生最早得春令升發之氣故入肝膽兩經而清血中之熱能治骨節留熱者深入血分而疏達鬱火也今以為長夏時解暑之用則苦寒清熱而又含芬芳清冽之氣故能醒脾胃而理濕熱石頑謂能利水道與棉茵陳不甚相遠其説甚是子則專治骨蒸蓋凡子皆重故主裡證且清芬又能疏解血中之滯則與大苦大寒剗除生生之氣者亦尚有間茴香發明蘹香始見於唐本草據蘇頌謂結實如麥而小青色此今之所未見者蘇又謂入藥多用番舶者則今市肆所謂八角茴香也但八角者大辛大溫其性最烈瀕湖綱目稱其氣味辛平必非舶來品八角茴香可知故李亦謂結子大如麥粒輕而有細稜俗呼為大茴香以寧夏出者為第一其他處小者謂之小茴香自番舶來者實大如柏實裂為八瓣一瓣一核大如豆黃褐色有仁味更甜俗呼舶茴香又曰八角茴香據此則綱目中所引古書一切主治皆子如麥粒之茴香唐本草謂治霍亂馬志謂治膀胱腎間冷氣調中止痛嘔吐大明謂治腳氣㿗疝陰疼開胃下氣東垣謂補命門不足吳綬謂暖丹田當皆指寧夏産品而言惟李引諸方有明言八角茴香舶茴香者即舶來品耳壽頤按今市肆中之所謂大茴香即舶來之八角者以煮雞鴨豕肉及野禽野獸可闢腥臊氣入藥本不常用嘗記余幼時鄉人有患疝痛者得口傳方謂一味八角茴香研末熱酒調服可治而不言其分量此人竟至市中購二十大錢作一次吞下即晚七竅流血而斃此雖服之太多所致然即此可見其非常猛烈凡用古方者皆宜慎之孟詵食療本草謂茴香莖葉治膀胱疝氣及腎氣衝脅如刀刺痛喘息不得者生搗熱酒絞服此非舶上茴香可知石頑逢原引之謂辛香不竄善降濁氣壽頤則謂辛香不竄四字大不可解王孟英隨息居飲食譜稱其調中開胃止痛散寒治霍亂㿗疝殺蟲闢穢肴饌所宜制魚肉腥臊冷滯諸毒又謂小便頻數而色清不渴者茴香淘淨鹽炒研末炙糯米蘸食雖不詳是何種茴香然當以下條之蒔蘿為是八角者斷不可輕用蒔蘿發明此今之所謂小茴香也蘇頌謂三月四月生苗花實大類蛇床瀕湖謂其子簇生狀如蛇床子而短壽頤按其苗叢生葉細如線蒙茸極多高三四尺色淡緑氣亦辛香甚為濃郁結子生青熟淡白大如穀子而極瘦形色一如稻穀之乾癟無米者故吾鄉稱為癟谷茴香氣味甚厚不作惡臭不知瀕湖何以謂其色微黑氣辛臭而不及茴香蓋明時蘄黃間之土産已與今大不同矣氣味辛溫瀕湖謂其苗下氣注氣原缺據綱目增利膈其子則藏器謂治霍亂嘔逆腹冷不下食兩脅痞滿日華謂健脾開胃殺魚肉毒治腎氣皆辛溫行氣散寒之功治諸疝最佳然性頗燥烈耗氣傷津止可藉以引經不可獨任重任草蘭蕙蘭考證蘭草蕙草皆古之香草蘭字最古已見經傳蕙則始見離騷説文有蘭無蕙而有薰字訓曰香草則即蕙也廣雅釋草薰草蕙草本經有蘭草別録有燻草一名蕙草考諸家所述形狀二者皆有枝有葉有莖有節離騷注蘭緑葉紫莖素枝陸璣詩疏謂蘭為王者香其莖葉皆似澤蘭廣而長節節中赤高四五尺藏之書中闢蠹故古有蘭省藝閣漢諸池苑及許昌宮中皆種之西山經浮山有草焉名曰薰草麻葉而方莖赤華而黑實臭如靡蕪佩之可以已癘陶弘景注名醫別録薰草引藥録云葉如麻兩兩相對稽含草木狀亦云蕙草一名薰草葉如麻兩兩相對氣如靡蕪可以止癘此皆釋蘭蕙兩草之最古者故唐人所説無不宗之陸璣三國時吳人著毛詩草木鳥獸蟲魚疏二卷璣字從玉與晉人機云之機別是一人惟後人引詩疏者多訛璣為機李氏本草綱目蘭草正誤條中引陸説亦誤為機此皆莖葉俱香之蘭蕙固非今時書齋清供有葉無枝有花無節之蘭蕙宋政和間寇宗奭撰本草衍義始曰蘭草多生陰地幽谷葉如麥門冬而闊且韌長一二尺四時常青花黃緑色中間瓣上有細紫點春芳者為春蘭色深秋芳者為秋蘭色淡開時滿室盡香云云此則今之所謂蘭花黃山谷所謂一干一花者為蘭一干數花者為蕙也蓋蘭蕙本皆香草故以其花皆香而亦得蘭蕙之名朱氏丹溪有本草衍義補遺之作本從寇氏舊本增輯故於蘭草一條亦仍寇氏之舊而申言之曰蘭草稟金水之氣人皆知其花香之貴而不知其葉能散久積陳郁之氣甚有力即今之栽置座右者云此二家皆以本經上品之蘭草為即今之蘭花而丹溪更以內經治之以蘭除陳氣一説為之證實遂使蘭之形狀枝葉竟與魏晉間舊説絶然不同此其各為一種固無疑義而孰是孰非益滋聚訟瀕湖綱目長於考古極以寇朱注原作李據綱目改二説為不然正誤條中引朱子離騷辨證陳氏遁齋間注原作間據綱目改覽及陳止齋楊升庵吳草廬諸家皆極翔實各有所見惟草廬竟謂今之蘭不可以利水殺蠱而除痰癖則正未必盡是蓋今蘭葉清芬雖不甚香而細細咀嚼之齒頰間自有一種爽塏可口之味沁入心脾未嘗不可以闢濁穢而行氣滯且葉間脈絡絲絲直達力能宣通自可想見與本經利水殺蠱除害之旨亦大略相近且今之市肆已無蘭草之名只有佩蘭一物一名省頭草者是否足為本經蘭草之用姑不具論而按其形狀比之澤蘭莖細短小已與瀕湖所謂蘭即大澤蘭者正得其反則本經上品蘭草已付闕如毋寧即以山蘭當之縱使形色不同而性情功用猶為近似所以趙氏綱目拾遺謂瀕湖不録幽蘭不無缺略之憾王秉衡重慶堂隨筆亦宗趙意且謂四種香草香而惡濁王指澤蘭省頭草羅勒孩兒菊四者略無芬芳之氣非聖人所謂王者之香指以為蘭是認陽貨為孔子反唇相譏而兩派之主張竟趨極端何能融洽壽頤則謂古之蘭草皆生澤畔本草經一名水香生池澤已有明文且鄭之溱洧楚之沅湘其非山谷之蘭明甚而今之蘭花則絶不見於自唐以前諸家舊説必謂幽蘭之操即是此花本難徵實羅願爾雅翼亦有一干一花而香有餘者蘭一干數花而香不足者蕙之説則願乃羅汝楫之子已南宋時矣離騷及甘泉賦皆以蘭蕙並稱均非此物魏晉舊説胡可一概抹倒瀕湖以注疏家言為證考訂之學自當遵古不然朱子閩人蘭産於閩寧不知之而反極力辨駁但蘭茝之屬只是尋常芳草騷人辭藻士女秉蕑原不在珍貴之列何以左氏亦有國香之稱鄭穆且有蘭死吾死之説又似絶無而僅有之物此中疑竇殊不可知特今之草蘭蕙蘭未必無入藥之用補入本草固亦治藥物學者之本職若必質直言之謂本經上品定是此物則古人不作其胡可信近商務印書館新出中國醫學辭典竟謂草蘭芳草本經上品又以本經別録蘭草主治之利水道殺蠱除胸中痰癖久服益氣輕身通神明數語一併列入草蘭葉之功用中則殊不妥須知古之蘭草不名草蘭淹沒古書真相何以師心自用一至於此以一手掩盡天下耳目而欲惟吾之言是從適以厚誣古人而疑誤後學此土豪劣紳武斷鄉曲之故智著作家言那得有此蠻話葉辛而散微有清芬今醫學辭典謂其辛能散滯香能去穢去消痰散郁之品理固宜然然草蕙二蘭之葉皆瘦而堅硬嚼之枯澀清氣極薄不如建蘭葉闊柔韌多液嚼之清香可口為佳趙氏綱目拾遺謂草蘭葉短而狹小蓋不及建蘭葉之闊大也蕙蘭葉長亦狹而瘦注此段之端原設氣味標題顯錯閲其內容仍屬考證範圍故刪正訛趙氏綱目拾遺謂蘭花萼中無紅斑點色純者名草素尤香入藥以一干一花者良而不言其主治何若今醫學辭典則謂蘭花宣氣利水道治痢疾滯下又謂此物氣類木香苦甚黃連善能宣氣四達故治滯痢功效甚捷而不言其所本壽頤按此花鮮時固香而干之則無氣故不能和入茶葉如玫瑰代代花之用則入藥有功恐不足恃不如建蘭葉確能宣通氣滯也又趙氏綱目拾遺引行篋檢祕治瘋狗咬取草蘭根四兩水淨洗入黃酒二碗煎一碗服完其毒即從大小便化血而出今醫學辭典亦載此法蓋即本於趙氏然趙氏於建蘭根下引五雜俎又謂蘭根食之能殺人忌內服醫學辭典於建蘭根條中亦收之豈不彼此矛盾凡單方未經試驗者多有流弊不可輕用建蘭發明葉丹溪謂建蘭葉稟金水之氣時醫用以通經舒絡宣泄風邪亦佳壽頤按蘭葉有筋直達頂尖極韌而建蘭葉闊多脂液剛中有柔經年不變謂為通經舒絡行氣散結頗有至理趙氏綱目拾遺引本草匯蘭葉清芬辛平甘寒生津止渴不獨開胃清肺消痰散積久陳鬱結氣與藿香枇杷葉石斛竹茹橘紅為開胃之神品入沉香鬱金白蔻蘇子萊蔔汁下氣開鬱治噎膈之將成者産閩中者力勝江浙諸種力薄本經主利水道除胸中痰癖殺蠱毒闢不祥者蓋肺氣鬱結則上竅閉而下竅不通開肺行氣水道自利胃氣凝滯則水穀不化而為痰癖芳香醒胃即以化痰且辛能散結滯香能除穢惡故可殺蠱而闢不祥壽頤按此節竟以本經別録之蘭草主治一概作為蘭葉功用開醫學辭典之先聲誠不免附會之蔽但此葉清芬爽口確能清利濕熱快脾醒胃宣通肺氣而調水道説來尚屬有理較之辭典言其然而不能言其所以然者自有上下床之別花趙氏拾遺謂素心建蘭花干之可催生除宿氣解鬱蜜漬青蘭花點茶飲調氣血寬中醒酒又引閩小記謂建寧人家以蜜漬蘭花冬月點茶芳香如初摘又謂色黑者名墨蘭干之可治瞽目能生瞳神治青盲最效則絶無之物故言其神效未免欺人太甚注發明項名原缺補佩蘭發明本經蘭草列於上品而今之市肆無之以古今熟在人口之蘭字而藥肆中莫能舉其名可謂此即古書之蘭草證以騷人紉蘭為佩頗為近似然瀕湖引雷斆説大澤蘭莖葉皆圓根青黃能生血調氣與榮與小澤蘭迥別與綱目本作合不甚可解今改作與葉上斑根頭尖能破血通久積瀕湖且謂雷説之大澤蘭即蘭草小澤蘭即澤蘭是蘭之枝葉莖株必視澤蘭為大而今市肆中則澤蘭一株長至三尺余莖方巨者徑二三分佩蘭長僅尺許葉鋭而長莖細如線其非瀕湖意中之蘭草又甚明惟氣味稍覺清芬瀹湯微苦微辛能散結滯以治濕熱互阻胃氣不醒胸脘痞塞等證尚能有效今見醫學辭典於佩蘭條中稱其功用宣中闢穢祛濕利氣開胃化濁和脾行水夏月暑熱內蘊口中甜膩臭氣胸膈痞悶噎噯吐酸反胃水穀不化嘔惡不食脾疸腹脹心腹痛又謂其稟天地清芬之氣辛能散滯香能闢穢入肺胃二經專走氣分凡胃有陳腐之物及濕熱蘊結於胸膈皆能蕩滌而使之宣散故口中時時溢出甜水者非此不除當夏季暑濕鬱蒸之時洵屬開胃和中之良品與藿香同為夏令治理中焦之要藥又謂佩蘭葉蒸露氣味芳香夏令代飲妙品云云此以今時通用之藥言治病應有之經驗實事求是明備精確不愧藥物學之正宗然又謂素問以蘭草治陳氣即指此物則是臆説必不可信甚且指佩蘭為別録中品之藥須知別録中品止有薰草一名蕙草亦是古之香草何嘗有佩蘭之名而可以意逆之竟將素問之蘭本經之蘭草別録之薰草並作一氣直認其均是今日之佩蘭是以三者合而為一指鹿為馬心粗氣浮誕妄已極所以言其形狀則曰方莖葉對生是蘇頌之所謂零陵香以為古之薰草者也今佩蘭莖圓惟澤蘭則方莖又曰香如蘼蕪結黑實則山海經之所謂浮山薰草也此皆非今日通用之佩蘭辭典又以別録薰草之根莖中涕一條亦列於佩蘭條中則以古書中不可知之物而強以今日習用藥當之無知妄作荒謬萬狀此書一出必陷後學於黑暗獄中醫學程度當隨之墮落萬丈編輯者縱不為自己名譽計蓋亦思古人之書豈可聽吾呼牛呼馬隨意指點無不如志膽大妄為罪通於天矣備考今藥肆中佩蘭其葉長而中闊兩頭鋭大者闊至一寸許長可二寸余邊有鋸齒甚疏而芳香之氣極薄若謂此即古之蘭草殊未敢信惟吾鄉別有一種名曰佩蘭葉者蒔之盆中可作書齋清供則芳香之氣甚烈二月以子下種苗青莖微紫圓而不方葉兩兩相對面青背有紫紋雖亦中闊兩頭鋭而大僅如青果邊無鋸齒莖葉皆香嗅之觸鼻室中置一盆則滿室皆聞初茁一枝繼則葉叉中又復生枝肥大者遂簇簇成叢高不過尺余莖之最肥者徑亦不過分許頗與肆中之干佩蘭近似而葉小無齒為異又辛香濃烈實遠過之夏秋之間擷鮮葉一二片和茗瀹之清芬醒胃通氣快脾功用與市肆之佩蘭等而效力尤捷但藥中皆不用此真不可解至七八月間開花成穗長二三寸與紫蘇之花相似苞萼青而帶紫小花簇簇香氣尤濃九月成實滿穗子老擷之細小如莧菜子黑色光亮橢圓微尖而扁則嗅之不香宿根不復生此古今本草所未收者而氣味清香並不燥烈功用可紀大有入藥價值自當補入本草以備要需惟石頑本經逢原謂有三種一曰蘭香植之庭砌二十步內即聞香俗名香草以子能去目翳故又名翳子草繹其二十步內聞香一語頗與吾鄉所蒔之佩蘭相近且石頑謂子治目翳及塵物入目以三五顆內目中少頃其子濕脹與物俱出又主暴得赤眼後生翳膜用蘭香子一粒入眥內閉目少頃連膜俱出蓋此子得濕即脹故能染惹眵淚浮膜爾然目中不可入塵而此可納三五顆亦不妨礙云云壽頤謂目中可納三五顆而不妨礙確與佩蘭之子極小而光者近似當即此物惜石頑不詳言其枝葉花子形色果是何如耳石頑逢原又謂蘭香子大如棗而褐色不光七月收之種時防蟻濕則有脂浮脹須以枯炭末掩之然上文既云目中可納三五顆即其子必無大如棗之理如棗二字必有訛誤合併記之以俟實驗又石頑意中竟以蘭香一物當本經之蘭草故逢原直以本經利水道殺蠱毒闢不祥久服益氣輕身不老通神明二十二字繫於蘭香條下亦未免獨斷之偏但所述蘭香主治頗有可以移之於佩蘭葉者爰並録之以備參考石頑曰蘭氣芳香能闢疫毒惡氣調中消食治厄嘔脾疸口中時時溢出甜水者非此不除多走氣道故能利水調肝和脾其功倍於藿香善調嘔逆散積久陳郁之氣素問曰五味入口藏於胃以行其津液津液在脾令人口甘此肥美所發也其氣上溢轉為消渴治之以蘭除陳氣也東垣治消渴生津飲用蘭葉蓋本於此又治牙疼口臭有神功丸亦用蘭香如無以藿香代之壽頤按觀東垣是方雖用蘭香葉而曰無則以藿香代之竊意東垣尚不識蘭香為何物徒取空名以自附於古方之義耳如其確知有此則尋常小草當亦無地無之又何必另覓替代耶石頑又引時珍曰蘭香須三月棗葉生時種之乃生否則不生常以魚腥水泥溝水冷泥水澆之則香而茂不宜糞水著糞則萎壽頤按時珍此説今遍查綱目芳草一卷未見有此不知石頑所本或傳寫有誤耶石頑所説蘭香子治目翳及塵物入目一則今醫學辭典又收入草蘭子條中按草蘭固有子然石頑固言蘭香其非草蘭之子固明甚且石頑明言世有誤認幽蘭為蘭香者大可噴飯何以編醫學辭典之人又能指鹿為馬如此移花接木自欺欺人獨不慮石頑噴飯耶此尤其可笑者已珠蘭發明珠蘭本不入藥惟芳香馥郁多以瀹茗醒脾爽胃宣通氣滯人皆嗜之據趙氏綱目拾遺引花經謂其性有毒止可取其香氣則今有摘其花蕊和入茗中者恐有流弊蓋産自南方多含毒質其性喜溫必非可以常嗜之品趙又謂其根可闢狐媚頗是小説家言殊難深信但聞人傳説竟有用此法而實驗者物理相制容或有之法載綱目拾遺可覆按也玫瑰花發明玫瑰花香氣最濃清而不濁和而不猛柔肝醒胃疏氣活血宣通窒滯而絶無辛溫剛燥之弊斷推氣分藥中最有捷效而最為馴良者芳香諸品殆無甚注當為其之誤匹趙氏綱目拾遺謂紫者入血分白者入氣分但用花瓣不宜見火故收藏者多摘取花瓣置烈日中薄薄攤之一日曬乾則色不變而香不減若逢陰雨即用急火烘之亦不變色趙謂氣香性溫味甘微苦入肝脾二經和血行血理氣又引藥性考行血破積損傷疼痛又引救生苦海治吐血玫瑰膏以花瓣一味河水熬濃白糖收膏不時服茉莉發明茉莉始見於稽含南方草木狀作末利蓋南蠻土語本無正字瀕湖綱目謂原出波斯移植南海其性畏寒其花辛熱壽頤按此物極喜烈日炎天酷暑終日暴之開花最繁其花之性熱可知今人多以和入茶茗取其芳香功用殆與玫瑰花代代花相似然辛熱之品不可恆用野薔薇發明此物吾鄉極多溪邊籬落叢莽之中隨處皆有枝柔葉小遍生細刺荊棘類中之最惡劣者三月開花單瓣而小叢叢如粉團花然香氣甚濃最與玫瑰花相似浸酒瀹茗亦與玫瑰同功趙氏綱目拾遺引花鏡謂花有純紅粉紅二色蒸作露或拌茶皆佳患瘧者烹飲即愈
