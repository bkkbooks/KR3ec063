body:
  text: 卷之七草部黴草類附子本經味辛溫主風寒咳逆邪氣溫中金創破癥堅積聚血瘕寒濕踒躄拘攣膝痛不能行步別録甘大熱主腰脊風寒心腹冷痛霍亂轉筋下痢赤白堅肌骨強陰腳疼冷弱又墮胎為百藥長御覽吳普曰神農辛岐伯雷公甘有毒李氏苦有毒大溫瀕湖綱目李氏作李當之考異溫中綱目作別録之文茲從孫淵如問經堂本金創今皆作金瘡創瘡古今字踒綱目同御覽引作痿膝今本作膝皆古今字腳疼冷弱四字繆氏經疏在本經不能行步四字之上而孫氏問經堂本經無之綱目則引別録有腳氣冷冷弱一句然冷冷弱三字不成句讀不如仲淳所引為長茲從繆氏而以系之於別録用孫淵如輯本之意非本經語也正義附子味辛氣溫走而不守為百藥長故為溫經逐寒徹內徹外宣通氣血之第一利器本經主風寒咳逆邪氣者以六字作一句讀專為寒邪作咳言之蓋咳固有因於受寒之一證非謂可以通治一切之咳逆蓋本經中邪氣二字最多凡風寒暑濕燥火六淫之一皆得以邪氣名之六淫皆屬外感本非吾身所有之正氣故皆得謂之邪其實各有所指初非泛而不切之語惟在讀者善悟則可得古人立言之旨況本草經文字最簡必須以意逆之辨別其辭旨之何屬尤為讀此經之最要一著設有誤會則貽害大矣其治金瘡者仲淳謂此為風寒所郁血瘀不活之證非血流不止之金瘡所見甚是總之本經所稱某藥主治某證皆自有對藥之一候原不是泛泛然舉一病名竟謂凡屬某病不問寒熱虛實不問初中末傳而欲教人一概以某藥為主療者也癥堅積聚血瘕數者固自有陽和不布陰霾凝滯之一候則惟附子辛溫通行百脈是其正治寒濕踒躄拘攣膝痛不能行步當以十二字作一氣讀乃指痿躄拘攣膝痛不能行之屬於寒濕者惟此能溫而通之若分作兩句讀之於寒濕二字主治是矣然痿躄也拘攣也膝痛不能行也甚多血虛血熱之證又將何以解之別録謂腰脊風寒心腹冷痛顯而易知姑不必論若霍亂轉筋則明有屬熱屬寒之別薑附所主決非通治而下痢赤白一句則未免可疑此病是濕熱積滯為多古人謂之腸闢明謂腸中有所闢積若曰下痢已覺不妥蓋痢即利字之孳生本以滑利通利為義內經所言自利利下皆即後人之所謂泄瀉水泄內經中明明與腸澼一候各有命名各有取義未嘗混作一氣自後人加疒作痢而滑泄亦謂之利積滯亦謂之痢此在六朝以後不識字義之源有此含渾本不足責竊謂漢魏以上不當顢頇至此且腸闢之候欲下而不能暢下後人謂之下積尚屬名正言順與泄利之滑泄自利者病狀皎然不同亦何可渾以痢字命名況乎虛寒腸闢可用溫藥者百不得一而名醫別録乃以為附子主之殊屬可駭此恐六朝以後淺人羼之別録乃陶氏弘景所集不當有此又謂堅肌骨強陰則謂寒邪去而肌骨可堅陰液可強本是充分言之非欲以此作普通補益之品此則讀古人書之不可死於句下者不謂繆氏經疏竟說出偕諸氣藥則溫中補血藥則強陰堅肌骨二句一似補氣補血藥中不可無此附子一物流毒伊于胡底此豈明季景嶽立齊之輩溫補二字深映腦海之誤耶究竟所見太陋豈可為訓若主治腳疼冷弱則即本經治痿躄拘攣之意墮胎為百藥長固此物善走之力耳廣義潔古謂溫暖脾胃除脾濕腎寒補下焦之陽虛壽頤按附子專助下焦之陽而兼溫脾胃潔古所稱此藥主治只此三句可謂包掃一切要言不煩但脾濕一層則專為寒濕浸淫脾陽不能展布者而言洵為要藥若蘊濕化熱即為大禁東垣謂治濕淫腹痛亦以寒濕言之若濕而不寒必不需此李又謂除臟腑沉寒三陰厥逆則以太少厥三者寒厥而言四逆回陽本是正治然近今石印鉛字本三陰皆作三陽則不可解矣坊本誤人實堪痛恨瀕湖謂治陰毒寒疝中寒小兒慢驚暴瀉脫陽久漏冷瘡腎厥頭痛皆就陰寒一面著想是也而又謂主治中風痰厥氣厥柔痓癲癇風濕麻痹腫滿腳氣久痢脾泄嘔噦反胃噎膈云云則凡此諸病屬熱者居多數而偏能籠統言之不分界限殊乖立言之體矣景嶽謂能除表裡沉寒溫中暖五臟回陽氣皆此藥之正治又謂治格陽喉痹則陰盛於下格陽於上是喉痹中之特殊一種雖不多見確是有之但喉中痛不紅不腫或喉色淡白微有數縷紅絲舌亦淡白無華肌膚亦必慘注原作滲改淡無神甚且足寒至膝宜以附桂熱藥冷服一劑即應亦不可多服繼必漸以滋填固護其本方為善治其始之不得不暫投溫燥者虞花溪所謂稟雄壯之氣能斬關奪門者開其陰霾之閉塞耳虞又謂能行十二經追復散失之元陽引發散藥開腠理以祛在表之真寒引溫暖藥達下焦以除在裡之寒濕發明附子本是辛溫大熱其性善走故為通行十二經純陽之要藥外則達皮毛而除表寒里則達下元而溫痼冷徹內徹外凡三焦經絡諸臟諸腑果有真寒無不可治但生者尤烈如其群陰用事汩沒真陽地加於天倉猝暴病之肢冷膚清脈微欲絶或上吐下瀉澄徹清冷者非生用不為功而其他寒病之尚可緩緩圖功者則皆宜用炮製較為馴良惟此物善腐市肆中皆是鹽漬已久而又浸之水中去淨鹹味實則辛溫氣味既受制於鹽之咸復受制於水之浸真性幾於盡失故用明附片者必以乾薑吳萸等相助為理方有功用獨用錢許其力甚緩壽頤嘗於臨證之餘實地體驗附片二錢尚不如桂枝三五分之易於桴應蓋真性久已淘汰所存者寡矣是以苟遇大證非用至二三錢不能有效甚者必四五錢非敢孟浪從事實緣物理之真自有非此不可之勢若用生附或兼用烏頭草烏終嫌毒氣太烈非敢操必勝之券矣糾謬王海藏謂附子治督脈為病脊強反折壽頤按脊強反折即今之所謂角弓反張仲景之所謂痙病在古人以背屬太陽遂謂之太陽表證傷寒論金匱所詳證治同出一轍即甲乙經七卷且有太陽中風感於寒濕發痓之專條甲乙之痓字即痙字隸文實即一字此皆古以痙為寒病之明文海藏竟敢直言附子專治此病其意固本諸此然證以近今發明之病理則凡猝暴發痙腰背反張手足瘛瘲者類多氣火上衝震動腦神經而失其知覺運動所致內熱生風木火上恣治宜清熱抑降潛鎮重墜收效甚速始知古人認作寒邪竟是根本大誤雖虛寒體質陽和不布亦有腦神經失其常度而為痙厥瘛瘲者兒科慢脾風病時常有之然終不如熱病發痙之最為多數即如溫熱病裡熱已盛而腦神經受其激刺者亦為痙厥僵硬或為抽掣者本是熱盛之常事且甲乙熱病篇謂熱而痓者死又謂熱而痓者腰反折瘛瘲齒噤齘則古人亦未嘗不知熱病之有脊強反折一證而海藏乃欲以附子最剛之藥作為痙病必需之物又何往而不動手便錯也耶景嶽謂附子大能引火歸元制伏虛熱其意本以真寒假熱陰盛格陽而言未嘗不是但虛熱二字最易令人誤會俗子每見陰虛發熱輒欲假託引火歸原之說徑以桂附姑妄試之無不助陽爍陰陡兆焚如之禍皆景嶽此二句誤之作俑之孽通一子不得辭其咎也通一子乃景嶽之自號不佞每謂景嶽議論往往知其一而不知其二以通一為號此公真有自知之明景嶽又謂無論表證里證但脈細無神所當急用且引吳綬謂附子乃陰證要藥凡傷寒傳變三陰及中寒夾陰雖身大熱而脈沉者必用之或厥冷脈沉細者尤急須用之云云誤人更甚蓋寒熱有真假脈沉脈細亦有真假沉細中固大有實熱在裡閉塞不通之候豈可但執一端不參他證且傷寒傳入三陰更多熱病豈可以三陰經之陰字竟誤認作陰寒之陰此與葉氏臨證指南中以三陰瘧疾皆作陰證妄投熱藥者同一笑話始知吳綬已開其例初不料醫學之陋乃並此陰字而不能解吳氏之學本極卑陋殊不足責獨以景嶽素負盛名而所見乃亦止此洄溪徐氏諡以庸醫之尤非苛論矣石頑逢原以此傳變三陰一句改作直中三陰庶幾彼善於此夾陰二字不通之至陸九芝世補齊文已有專論茲姑不贅禁忌石頑謂傷寒發熱頭痛皆除熱傳三陰而見厥脈沉此厥深熱深之候證必先有發熱多日而後發厥此為陽厥大便必不瀉而閉及溫疫熱伏厥逆與陰虛內熱火鬱於裡而惡寒者誤用附子不旋踵而變壽頤按直中有真寒證其病一起即四體厥冷脈沉微欲絶而唇舌必淡白無華是為寒厥非四逆薑附不為功若傷寒傳裡先發熱而後厥者皆熱閉於裡外反無陽其人必不言不動而將沉沉默默長與終古矣是即熱盛而腦神經失其知覺運動之病若能大清裡熱雖是壞病亦可十救三五誤投四逆頃刻變生而不知者尚以為病之當死也石頑所謂熱深厥深者即此陸九芝謂先發熱而後變為寒厥者千百病中無一人自古迄今無一人也諒哉川烏頭考證本經別有烏頭自李瀕湖以為彼是草烏頭與川産之烏頭不同而後之言藥物學者皆宗之則凡漢唐間古方所用之烏頭皆是川烏頭非本草經之烏頭矣壽頤按古謂烏頭是附子之母蓋如芋頭之例其根中之最大者名以烏頭而其旁生者則曰附子亦曰側子命名之義一望可知惟烏頭既為根中之最巨宜乎藥力最厚辛烈尤甚而說者乃皆謂功力且視附子為緩其理頗似費解壽頤竊謂此是下種之本根已上茁莖苗花實而根下又多旁生蓋既經發泄之餘母氣耗散所以力量反薄自不如附根初生者稟賦之厚得氣之全此中實有至理乃知古人有此區別本非讆言而石頑逢原乃謂春生新附即採其母故烏頭得春生之氣云云不佞以為不然既採其母則子復何來是即古所謂皮之不存而毛將安附者蘇頌明謂冬至前布種至次年八月後方為成熟又豈有春時可採其母之理發明烏頭為附子之母既已旁生新附是為子食母氣其力已輕故烏頭主治溫經散寒雖與附子大略近似而溫中之力較為不如且專為祛除外風外寒之嚮導者亦以已經茁長莖苗花實發泄之餘體質空松則能散外邪是其本性潔古謂治諸風風痹血痹半身不遂東垣謂除寒濕行經散風邪固皆以泄散為其專職而潔古又謂除寒冷溫養臟腑去心下痞堅感寒腹痛東垣又謂破諸積冷毒則仍與附子同功耳瀕湖謂助陽退陰功同附子而稍緩石頑謂治風為嚮導主中風惡風風寒濕痹肩髀痛不可俯仰又謂治陰疽久不潰者及潰久瘡寒惡肉不斂者並宜少加以通血脈壽頤按瘍患固間有寒濕交凝頑腫不退亦不成潰及潰久氣血虛寒悠久不斂之證溫經活血助其陽和則腫久潰久之候方能相應用烏頭者取其發泄之餘氣善入經絡力能疏通痼陰沍寒確是妙藥但非真是寒濕者不可妄用耳石頑又謂小兒慢驚搐搦涎壅厥逆生川烏全蠍加生薑煎服效則慢驚固是虛寒而此能溫經以逐寒涎耳天雄本經味辛溫主大風寒濕痹歷節痛拘攣緩急破積聚邪氣金創強筋骨輕身健行別録療頭面風去來疼痛心腹結聚關節重不能行步除骨間痛長陰氣強志正義天雄即烏頭之獨生者弘景謂天雄似附子細而長乃至三四寸許陳承謂不生附子側子經年獨長大者是天雄別録注亦謂長三寸以上者為天雄是同為烏附而得氣最全故辛溫逐寒徹內徹外命名之義蓋謂得天之氣獨全最為雄壯耳本經主治悉與附子大略相同所謂主大風寒濕痹歷節痛拘攣緩急十三字當作一氣讀蓋必諸證之屬於大風寒濕痹著者乃可治之耳積聚邪氣亦以寒濕言即別録所主之去來疼痛心腹結聚關節重不能行步除骨間痛者固無一非寒濕之痹著者也本經又謂強筋骨輕身健行別録又謂長陰氣強志則以寒濕盡去而筋骨自壯陰液自長行步自健志氣自強皆充其功用所及而過甚言之耳廣義瀕湖謂烏附天雄皆補下焦命門陽虛之藥且烏附天雄之尖皆是向下其氣下行其臍乃向上生苗之處寇宗奭言其不肯就下張元素言其補上焦陽虛皆誤認尖為上爾惟朱震亨以為下部之佐者得之但未發明此向下之義石頑謂天雄稟純陽之性壯陽精強腎氣過於附子正以其一顆單生得氣獨完耳糾謬烏附天雄古人皆謂能破癥堅積聚以積聚癥瘕為病固有因於寒濕壅結之一證非此大辛大溫不能破除此痼陰沍寒非謂凡是癥結癰腫皆可通治而日華子竟謂天雄破痃瘕癰結排膿止痛則幾誤認作瘍科通用之要藥抑何可鄙可嗤竟至於此雖曰瘍患久延膿水不徹間亦有氣血虛寒宜用溫煦一法然終是千百中之一又豈可作如是之籠統話大明本草所載諸藥主治最多浮泛而甚且有北轍南轅大相刺謬者瀕湖無不一例録入絶不稍為芟剃何耶草烏頭本經烏頭味辛溫主中風惡風洗洗出汗除寒濕痹咳逆上氣破積聚寒熱發明本經有此烏頭一名自李瀕湖以為此非川産之烏頭而野生於他處者則今之所謂草烏者是也壽頤按本經烏頭主治亦與附子天雄大略相近所謂主中風惡風洗洗出汗者乃以外受之寒風而言皮毛受風故見風必惡洗洗讀為灑灑即經所謂灑淅惡寒言皮毛凜凜有如冷水之遍灑出汗即自汗從皮毛受寒衛氣開泄不能自固亦即傷寒論太陽中風汗出惡風之例此辛溫之藥固以逐寒祛風為天職者石頑逢原乃謂本經治惡風洗洗汗出但能去惡風而不能回陽散寒竟以惡字如字讀有意過求其深殊非正旨本是辛溫何得云不能回陽散寒惟此是剛燥激烈大毒之物自非病情針對不可妄投逢原又謂人病風癬服草烏木鱉子藥過多甫入腹而麻痹不救可見藥重病輕誤人實甚此木鱉子亦附子之別名見炮炙論李氏綱目於烏附諸藥附録古方搜採太多龐雜最甚何可為訓石頑又謂烏附五種主治攸分附子大壯元陽雖偏下焦而周身內外無所不至天雄峻溫不減於附川烏專搜風濕痛痹側子善行四末草烏悍烈云云分別同異尚是了了但又謂天雄無頃刻回陽之功川烏少溫經之力側子不入臟腑則有意立異而非藥物之真性情矣側子即附子之最小者古本亦有作草下則字昔人本草多有此一條壽頤以其同是附子但力量稍有厚薄之異且市肆中亦別無此物故且從略白附子發明瀕湖謂白附子實非附子同類以與附子相似故得此名別録謂主心痛血痹蓋亦辛溫大熱專治真寒之藥然非可常用故今亦無有入煎劑者但以治面上黑瘢作外塗用耳別録亦謂治面上百病日華本草謂主面皯瘢疵李珣海藥本草亦謂入面脂用天南星本經虎掌味苦溫主心痛寒熱結氣積聚伏梁傷筋痿拘緩利水道別録除陰下濕風眩正義南星本經稱為虎掌瀕湖謂以其葉之形似得名苦溫辛烈故專逐停痰積濕而亦能行氣導滯本經主心痛寒熱結氣者即指痰濕凝滯氣結不通而言凡古人之所謂心痛大率皆今之所謂胃氣痛多屬氣滯寒凝或為濕痰阻塞之候故辛溫氣烈力能開泄窒塞之藥皆其專主固為實證而設非肝胃陰虛者所可誤投且既能宣通則亦可攻積破瘀故又治積聚伏梁伏梁蓋合五臟積聚統涵其中非內難兩經之伏梁專為一臟之病痿與拘攣皆濕盛傷筋之證此為逐濕專將自是傷筋主藥原與跌僕之傷不同利水道者濕無所容水道自無不利之理此乃泄導積濕之猛劑與茯苓澤瀉等淡滲不同別録謂除陰下濕則前陰濕汗皆濕熱蘊蓄使然此乃蕩滌濕淫專主之藥雖性本溫燥似非濕熱所宜惟燥能勝濕亦正非此不可況後世製藥之法久已遠勝於古則雖是濕熱亦無慮其偏於辛溫矣惟別録又主風眩蓋指濕痰蘊熱生風上凌之眩暈以此開痰燥濕則風自息而眩自已非虛風之眩暈可知千金方以一味南星醋製末服治婦人頭風攻目作痛局方玉壺丸以南星半夏治風痰頭運目眩吐逆開寶本草亦謂天南星主中風麻痹皆即此理豈謂血虛風眩而亦可以此療之王氏海藏竟謂此藥補肝風虛則大謬矣廣義開寶謂除痰下氣利胸膈攻堅積又謂消癰腫則凡瘍科堅腫痰濕最多半夏南星之屬固散腫消堅實證諸瘍之要藥陳藏器謂搗敷金瘡折傷瘀血則辛散且麻故能止血定痛亦得散瘀消腫發明南星産於陰濕叢密之處不為日照則愈易長大巨者莖高七八尺大如人臂其根可重數斤然生長於濕濁之中而偏善開泄濕邪物理相反最不可測蓋辛溫善走是其天職功用與半夏相似而燥烈過之故非制透不可用其生者僅可為止血定痛消腫外敷藥料中之輔佐品後世盛行牛膽製法今已久為通用之品則取用其開宣化痰之長而去其峻烈傷陰之弊古稱南星大毒然如此用之已可謂之無毒法至善也但市肆中之所謂陳膽星者形色頗不一價值甚有低昂惟以黑色而潤頗有澤者為佳其枯硬幹燥者亦不堪用半夏本經味辛平主傷寒寒熱心下堅下氣喉咽腫痛頭眩胸張咳逆腸鳴止汗別録消心腹胸膈痰熱滿結咳嗽上氣心下結痛堅痞時氣嘔逆消癰腫療痿黃悅澤面目墮胎考異張今本本草作脹壽頤按脹滿之脹本即開張一義之引申故古止作張左成公十年傳張如廁注腹滿也字亦作張則玉篇引左氏傳作脹乃是訛字廣雅釋詁乃有脹字云病也急就章乃有脹字正義半夏味辛辛能泄散而多涎甚滑則又速降本經以主傷寒寒熱是取其辛散之義又治心下堅滿而下氣者亦辛以開泄其堅滿而滑能降達逆氣也咽喉腫痛頭眩咳逆皆氣逆上衝多升少降使然滑而善降是以主之胸脹即心下之堅滿腸鳴乃腹裡之窒塞固無一非泄降開通之效用止汗者汗出多屬氣火上逆為病此能抑而平之所以可止固非肌腠空疏衛氣不固之虛汗可知後人止知半夏為消痰主將而本經乃無一字及於痰飲然後知此物之長全在於開宣滑降四字初非以治痰專長其所以能蕩滌痰濁者蓋即其開泄滑下之功用本經主治皆就其力量之所以然者而詮次之固非如後世藥物學之多說呆話可比至別録主治大率皆與本經同意惟多癰腫痿黃兩者蓋癰腫仍是脈絡之結滯痿黃又多濕熱之不通此能主之亦猶是開泄之力悅澤面目則外敷之面脂藥也廣義甄權謂開胃健脾蓋胃以下行為順此能滑潤下氣即所以助脾胃消化之力又謂生者摩癰腫除留癭氣則外敷之劑辛能消散故潔古亦謂其消腫散結潔古又謂治寒痰及形寒飲冷傷肺而咳消胸中痞膈上痰和胃氣燥脾濕則專以痰飲結塞言之矣瀕湖謂治白濁夢遺帶下蓋為痰濕阻其氣機者言之是濁帶遺泄中之一端非謂凡是遺濁皆可以此治之也又謂主痰飲及腹脹以其體滑而味辛性溫之故涎滑能潤辛溫能散故行濕而通大便利竅而泄小便發明半夏最多涎沫其體極滑而味甚辛生者以舌舐之螫人口吻故善能開泄結滯降氣定逆本經所主諸病皆是開宣抑降之力本非專治痰飲而所以能消痰止咳者亦即此能開能降之功用又非以燥勝濕專治濕痰而燥脾濕之意石頑謂古方治咽痛喉痹吐血多用南星半夏並非禁劑世俗皆以二物為性燥誤矣壽頤按俗本醫書皆謂半夏專治濕痰貝母專治燥痰此其說實自汪訒庵開之究之古用半夏治痰惟取其涎多而滑降且兼取其味辛而開泄本未有燥濕之意惟其涎蘞甚激刺之力甚猛故為有毒之品多服者必有喉痛之患而生薑則專解此毒古無製藥之法凡方有半夏者必合生姜用之正取其剋制之義而六朝以降始講製藥且製法日以益密而於此物之製造則尤百出而不窮於是浸之又浸搗之又搗藥物本真久已消滅甚至重用白礬罨之悠久而辛開滑降之實竟無絲毫留存乃一變而為大燥之渣滓則古人所稱種種功用皆不可恃此所謂矯枉而過其正最是魔道或者又疑古書之不可信不亦冤耶靈樞謂陽氣滿則陽蹻盛不得入於陰陰虛則目不瞑飲以半夏湯通其陰陽其臥立至昔人解此說者輒曰半夏生於夏之半故能通陰陽壽頤嘗求其義而不可得終無解於當夏之半何以能通陰陽其實所謂陽蹻盛者止是陽升太過陰不涵陽故不得眠惟此善降則陽入於陰矣此治不得眠之真旨也然加以久浸久制之半夏用之吾知其亦必無濟近人已有謂半夏止當以生薑汁少許拌之已能解毒不當多制是說也余極佩之正誤古書每謂半夏善治風痰說者輒以辛能散風作解遂謂治大人中風小兒驚癇皆其祛風搜風之功其實半夏泄降惟積痰生熱積熱氣升而內風自動者此能降氣開痰則風陽自息決非可以發散外感之風局方辰砂化痰丸用半夏南星辰砂枯礬而曰搜風化痰誤矣且此之治內風正是痰熱生風之實證而王海藏竟謂南星半夏可補肝風之虛尤其大謬惟汪石山謂涎者脾之液膏粱炙煿能生脾胃濕熱涎化為痰久則痰火上攻令人昏憒口噤偏廢僵仆謇澀不語生死旦夕非半夏南星不治庶幾近之大戟本經味苦寒主蠱毒十二水腫滿急痛積聚中風皮膚疼痛吐逆別録主頭腋癰腫頭痛發汗利大小便考異腫滿瀕湖綱目引作腹滿石頑逢原仍之茲從孫淵如問經堂輯本正義大戟乃逐水峻劑上古已以戟名其猛可知瀕湖謂其味辛苦戟人喉咽似尚未允神經謂主蠱毒以蠱乃南方大熱大毒之蟲類非苦寒峻下不能解之十二水腫滿急痛積聚蓋謂十二經之水濕積聚以致外腫內滿而為急痛耳然苟非體充邪實者亦不可概投中風皮膚疼痛六字當作一句讀蓋指風濕熱之襲於肌腠者則辛能疏散而苦寒又專泄降是以治之非泛言外受之風寒石頑謂指風水膚脹亦頗有理吐逆是指水飲停於上焦而不能下泄以致上逆者此以辛苦泄破通達下降是以主之別録主頭腋癰腫皆痰飲凝絡之證治頭痛亦指飲邪凝聚水氣上凌者而言發汗則驅除水濕之溢於膚腠者耳利大小便固通泄攻破之專職矣廣義甄權謂下惡血癖塊通月水墮胎孕固皆以攻破為主治又謂主腹內雷鳴則水走腸間停而不去者耳蘇頌謂主癮疹風蓋亦風濕之留於肌表者故皮膚間發為癮疹瘰粒癢瘙此能泄導肌膚風水即別録所謂發汗之旨也李瀕湖謂痰涎為病隨氣升降無處不到入於心則迷竅而成癲癇妄見妄言壽頤按此神經為病古人謂之痰迷心竅誠屬理想之謬然痰涎結聚生熱上凌而致氣血沖腦謂為痰病亦自確鑿入於肺則塞竅而成咳唾稠黏喘急背冷壽頤按此肺中津液自凝成飲非經絡之痰果能入肺入於肝則留伏蓄聚而成脅痛乾嘔寒熱往來壽頤按此痰涎之凝聚於肝膽經隧中者亦不可謂痰入於肝入於經絡則麻痹疼痛入於筋骨則頭項胸背腰脅手足牽引隱痛陳無擇三因方並以控涎丹主之殊有奇效此乃治痰之本痰之本水也濕也得氣與火則凝滯而為痰為飲為涎為涕為癖積大戟能泄臟腑之水濕甘遂能泄經隧之水濕白芥子能散皮裡膜外之痰惟善用者能收奇功錢仲陽謂腎為真水有補無瀉惟痘瘡變黑歸腎一證用百祥膏下之以瀉腎謂非瀉腎瀉其腑則臟自不實李東璧謂百祥丸惟大戟一味善能行水故曰瀉其腑以通膀胱要之百祥瀉腎非獨瀉腑正是實則瀉子之義腎邪實而瀉肝耳大戟浸水其色清緑肝膽之藥故百祥膏又治嗽而吐青緑水者仲景亦云心下痞滿引脅下痛乾嘔短氣者十棗湯主之乾嘔脅痛非肝膽病乎則百祥膏之瀉肝膽明矣潔古老人治變黑歸腎用宣風散代百祥膏亦是瀉子之意蓋毒火熾則水益涸風挾火勢則土受虧故津血內竭不能化膿而成青黑干陷瀉其風火之毒正所以救腎扶脾或謂脾虛腎旺故瀉腎扶脾者非也蓋腎之真水不可瀉此乃瀉其陷入之邪毒爾甘遂本經味苦寒主大腹疝瘕腹滿面目浮腫留飲宿食破癥堅積聚利水穀道別録下五水散膀胱留熱皮中痞熱氣腫滿正義甘遂苦寒攻水破血力量頗與大戟相類故本經別録主治腹滿浮腫下水留飲破癥堅積聚亦與大戟主治大同小異但兼能消食通利穀道稍與大戟不同則攻堅之力殆尤為過之所主疝瘕蓋以濕熱壅結者言之而寒氣凝滯者非其所宜別録又申之以熱氣腫滿一句則此之能泄水腫皆以濕熱實證言而脾腎虛寒以致水道不利誤用此藥實為鴆毒從可知矣五水者蓋言五臟經脈中之停留水氣耳廣義甄權謂瀉十二種水去痰潔古謂苦性泄寒勝熱能直達水氣所結之處水結胸下非此不除仲景大陷胸湯用之瀕湖謂水凝則為痰飲溢則為腫脹甘遂泄濕治痰之本也仲景治心下留飲與甘草同用取其相反而立功河間保命集云凡水腫服藥未全消者以甘遂末塗腹繞臍令滿內服甘草其腫便去又王璆百一選方云腳氣上攻結成腫核用甘遂末水調敷腫處即濃煎甘草汁服其腫即散二物相反而其效如此韓詠病腳氣用此一服病去七八再服而愈注以上所述與綱目原文略有差異壽頤按藥有君臣佐使以及相畏相惡相反相殺之說見於本經序例宋人刊本作為白字是本於陶弘景之朱書出於古之所謂神農本經者其源甚古又誰敢以為不可信陶氏集神農本草經又輯各家之說謂之名醫別録以朱字寫之以墨字寫之唐人之所謂朱墨書者是也自宋人刊板乃以朱書者刊作白字今所存大觀本草及政和本草皆如是陽湖孫淵如據以輯成本草經三卷刊入問經堂叢書中亦載序例於卷末是皆以為陶貞白之朱書神農本經原文也惟諸藥制使一說今通行各種本草多稱某藥某某為使及畏何物惡何物反何物云云則本于徐之才所撰雷公藥對李瀕湖謂陶貞白前已有此書吳氏即吳普本草所引雷公是也蓋之才增飾之云云唐慎微謂神農本經相使止各一種兼以藥對參之乃有兩三是各藥之畏惡相反明非六朝以前所固有故大觀本白字經文亦未嘗有相使畏惡及相反之說則今所傳藥品十八反云云始於六朝之時無疑所以古方中反藥同用數見不鮮則瀕湖所引腫病外敷甘遂末而內服甘草汁者制方之意只取甘草解毒之義正合仲景方甘遂甘草並列之意何必過求其深定謂其取相反立功蓋未免矜奇炫異藉以驚世而駭俗恐非藥物學之蕩平大道也芫花本經芫華味辛溫主咳逆上氣喉鳴喘咽腫短氣蠱毒鬼瘧疝瘕癰腫殺蟲魚別録苦微溫消胸中痰水喜唾水腫五水在五臟皮膚及腰痛下寒毒肉毒根療疥瘡可用毒魚考異華今作花古今字蠱毒李瀕湖綱目誤作蟲毒張氏本經逢原不誤正義芫花氣味本經雖稱辛溫然所主諸病皆濕熱痰水為虐功用專在破泄積水而非可以治脾腎虛寒之水腫則辛雖能散必非溫燥之藥故別録改作微溫據吳普謂神農黃帝有毒扁鵲岐伯苦李氏大寒云云似以李氏當之之說為允本經主咳逆上氣喉鳴及喘而短氣皆水飲停積上焦氣壅逆行閉塞不降咽腫亦熱毒實痰窒滯清竅此等苦泄攻通猛將均為濕熱實閉斬關奪門衝鋒陷陳一擊必中之利器非為虛人設法可知蠱毒乃南方濕熱毒蟲入人腸胃非滌蕩直泄不治故古人用藥無一非猛烈急下之物鬼瘧蓋指山嵐瘴毒惡癘之氣無端感觸飄忽中人有似於鬼祟故有是名此乃古人神道設教之時假託鬼物而言究竟非真有物憑之實即古人所謂瘴瘧故治宜泄導熱毒亦非其他諸瘧之所可混投者也疝瘕亦指濕熱蘊結之一證不可以概一切之疝氣瘕聚癰腫則固專指陽發實熱之瘍患矣別録謂消痰水水腫及五種水氣之在五臟者固皆以實證立論仍是本經之義喜唾乃飲積胸中水氣上溢而口多涎沫耳皮膚腰痛亦指水氣泛濫之一證惟寒毒二字必有訛誤此乃寒泄之藥非其所主豈淺者以本經氣味有溫之一說而姑妄言之耶總之名醫別録雖集成於貞白居士之手然六朝以降傳寫屢經亦何必無妄人羼雜之處是當衡之以理而必不可一味盲從者肉毒是肉食之毒食物得毒固必泄之而毒始解根療疥瘡即本經之治癰腫矣廣義甄權謂治心腹脹滿去水氣涕唾如膠固皆以濕痰濁垢言之故又曰通利血脈治惡瘡風痹濕又謂治一切毒風四肢攣急不能行步則亦水濕之邪痹其絡脈關節者謂為毒氣殊嫌含渾惟權又謂治寒痰則沿別録寒毒之誤矣日華謂療瘴瘧乃專以瘴癘濕熱之毒而言壽頤竊謂深合本經主治鬼瘧之正旨蓋此藥治瘧惟有嵐瘴濕熱毒癘之氣吸入口鼻浸淫絡脈因而往來寒熱以此泄導穢濁使從二便而去最為合宜其外虛實諸瘧固皆非其治也大明本草最是膚庸浮泛絶少精警之句何以於此卻能獨具灼見蓋亦有所受之恐尚非日華子之果能洞燭此中精意也瀕湖謂仲景太陽證表不解心下有水氣乾嘔發熱而咳或喘者小青龍湯主之若表已解有時頭痛汗出惡寒心下有水氣乾嘔痛引兩脅或喘或咳者十棗湯主之蓋小青龍治未發散表邪使水氣自毛竅而出乃經所謂開鬼門法也十棗湯驅逐里邪使水氣自大小便而泄乃經所謂潔淨府去菀陳莝法也夫飲有五皆由內啜水漿外受濕氣郁蓄而為留飲流於肺則為支飲令人喘咳寒熱吐沫背寒流於肝則為懸飲令人咳唾痛引缺盆兩脅流於心下則為伏飲令人胸滿嘔吐寒熱眩運流於腸胃則為痰飲令人腹鳴吐水胸脅支滿或作泄瀉忽肥忽瘦流於經絡則為溢飲令人沉重注痛或作水氣胕腫芫花大戟甘遂之性逐水泄濕能直達水飲窠囊隱僻之處但可徐徐用之收效甚速不可過劑泄人真元陳氏三因方以十棗湯藥為末用棗肉和丸治水氣喘急浮腫之證蓋善於變通者壽頤按仲師小龍十棗兩方皆為水停心下之專劑但一則兼有表證是寒束其外肺氣不通以致水濕亦閉塞其宣泄之路故必先開其表使腠理疏達肺不郁窒而水停可行蓋順降之氣復其常飲邪自有去路亦非僅發其汗而使水氣盡從汗之一路以泄也若其外無表證則病專在裡非從下奪又奚有第二法門十棗用法所以異於小龍者其旨如是瀕湖謂發汗即經之所謂開鬼門向來為鬼門作解者皆如是說但皮膚毛孔何以有鬼門之稱古人命名似不應怪僻至是余甚惑焉逮讀莊子天道篇以糟粕作糟魄始悟難經七衝門之魄門即以排泄糟粕取義非魂魄之魄則內經所謂開鬼門者實即魄字斷爛之形豈可漫認作鬼物之門戶然則開魄門潔淨府只是一義前人注解無一不誤此雖壽頤之創解竊謂聖人復起亦當不易斯言商陸本經味辛平主水張疝瘕痹尉除癰腫殺鬼精物別録療胸中邪氣水腫痿痹腹滿疏五臟散水氣考異張瀕湖綱目作腫蓋誤壽頤按脹滿之脹古止作張張字本以張大取義脹脹皆後出字豈瀕湖不知張脹同字而妄改之耶茲從孫氏問經堂本別録腹滿之下本有洪直二字義不可通刪之正義商陸氣味本經雖言辛平然主治亦皆水濕實證且療癰瘍則必寒降之物實亦大戟甘遂芫花之類故本經主治亦大略相同水脹及疝瘕諸痹蓋皆以水邪實病而言又曰尉除癰腫則作外敷藥用耳能殺鬼精物亦即芫花治蠱毒鬼瘧之理也廣義甄權謂喉痹不通薄切醋炒塗喉外良蓋即以本經尉除癰腫之旨而申言之瀕湖謂商陸為苦寒沉降之陰藥其性下行專於行長與大戟甘遂同功胃氣虛弱者不可用方家治腫滿小便不利者以赤根搗爛入麝香三分貼於臍心以帛束之得小便利即腫消續隨子發明續隨子始見開寶本草一名千金子雖言其氣味辛溫然瀕湖謂與大戟澤漆注漆原作瀉顯誤據綱目改甘遂莖葉相似主治亦相似皆長於利水蓋破泄直降是其專長仍是苦寒蕩滌之作用開寶稱其治婦人血結月閉瘀血癥瘕痃癖除蠱毒鬼疰心腹痛冷氣脹滿利大小腸下惡滯物蜀本草謂治積聚痰飲不下食嘔逆及腹內諸疾研碎酒服不過三顆當下惡物大明謂宣一切宿滯治肺氣水氣日服十粒道藏方紫金錠又名玉樞丹能宣通氣滯治停痰瘀血痛結不通諸證以大戟千金霜之通與五倍子之澀相輔成功制方之意甚妙宜其效用之大著也水草類澤瀉本經味甘寒主風寒濕痹乳難消水養五臟益氣力肥健別録補虛損五臟痞滿起陰氣止泄精消渴淋瀝逐膀胱三焦停水正義澤瀉産於水中氣味淡泊而體質又輕故最善滲泄水道專能通行小便本經氣味雖曰甘寒蓋以其生長水澤因謂之寒其實輕淡無味甘於何有此藥功用惟在淡則能通本經稱其治風寒濕痹亦以輕能入絡淡能導濕耳云治風寒殊非其任其能治乳難者當以娩後無乳者言此能通絡滲泄則可下乳汁非産乳百病之通用品故別録亦言葉主乳汁不出若曰養五臟益氣力肥健則以濕邪不容而脾運自健斯有養臟益氣之效蓋已屬充分太過之辭壽頤按本經此藥主治太嫌浮泛殊無精當之義恐已屬漢魏間膚淺之說頗與本經辭旨不類故原文更有久服耳目聰明不飢延年輕身面生光能行水上云云豈獨非藥理之真抑亦怪誕太甚雖本經諸藥固時有輕身延年等溢分之語然從無如能行水上之荒唐者其為方士羼雜不問可知瀕湖謂經言面生光能行水上典術又云久服身輕日行五百里走水上諸說陶貞白蘇參注參當為頌之誤信之愚竊疑之蓋澤瀉行水瀉腎久服且不可安得有此神功云云壽頤謂瀕湖綱目於古書最多篤信時且失之穿鑿而獨於此條能見其真知荒誕不經之說固不可為天下後世法也別録謂治五臟痞滿蓋只以濕阻之痞滿而言止泄精者亦惟濕熱蘊於下焦而相火妄行其疏泄之令者乃宜此滲去濕熱而龍相自妄注妄當為安之誤非可以概虛人之滑泄而又謂補虛損起陰氣則大與滲泄傷陰之義矛盾也廣義大明謂主頭旋筋骨攣縮蓋指濕熱瀰漫上凌頭目則為眩運旁流支節而為攣痛者此能泄利濕滯故可治之時珍謂滲濕熱行痰飲止嘔吐固皆滑利下行之功用又謂治瀉痢則分清小水即所以止大便之泄利痢即利之後出字本以泄利為主義非如近今世俗之見謬認積滯不通之腸闢為痢疾也石頑謂素問治酒風身熱汗出用此以其能利膀胱濕熱也金匱治支飲冒眩用此以逐心下痰氣也壽頤按上古所謂飲邪本指水停不化而言仲景所謂心下有水氣者皆是此證故治痰飲必用滑利泄降之藥如半夏貝母杏仁等物皆以滑利見長澤瀉能治痰飲理亦如是素多濕熱之人久服則耳目聰明然亦不可過用水道過利腎氣必虛故古人有多服病人眼之說今人治泄精多不敢用蓋為腎與膀胱氣虛而失閉藏之令者得滑利以降之則精愈滑若相火妄動而遺泄者得此清之則精自藏矣何禁之有發明澤瀉味淡體輕故性善滑泄生長水中故善利水逐濕此藥性情功用即此兩言而已足更無餘義可言其兼能滑痰化飲者痰飲亦積水停濕為病惟其滑利故可消痰總之滲泄滑瀉之藥必無補養之理本經養五臟益氣力云云已屬溢美太過而甄權竟謂可治腎虛精自出大明且謂補女人血海令人有子潔古亦謂入腎經去舊水養新水皆非藥理之真徒眩初學耳目殊堪詫異若仲景八味丸用之者原為小水不利而設金匱中屢有明文後人妄謂六味專於補腎則宋人之誤會非古人制方真意也浮萍本經水萍味辛寒主暴熱身癢下水氣勝酒長鬚發消渴別録下氣以沐浴生毛髮考異癢今本作癢藝文類聚初學記引本草經亦從疒壽頤按癢癢古今字須今本作鬚藝文類聚引作烏鬚消渴上今本有止字茲從孫氏問經堂輯本正義浮萍生長水中故能清火體輕而浮故開肌腠本經主暴熱身癢即清涼解肌之功效下水氣解酒酲者凡開毛竅而宣肺氣之物固皆有利水逐濕之用蓋溺道上流本從回血管入肺以通汗腺而後歸腎以達於輸尿之管直下膀胱者也又長鬚發則毛竅通利而血脈榮養止消渴者清熱利水而胃火自平矣廣義大明謂治熱毒風熱風狂固即本經主暴熱之意然加一毒字狂字已屬言之過甚又謂治風疹則亦開發肌腠之功用又謂治腫毒湯火傷則外治罨敷之用耳瀕湖謂治風濕麻痹腳氣則惟濕熱兼盛者宜之無熱者必不可用又謂治目赤翳膜口舌生瘡吐血衄血則皆清熱利導之專長也發明浮萍味辛氣寒而輕浮最甚故上宣肺氣外達皮毛發汗泄熱下通水道皆其天然之情性作用本經別録大明諸家主治無不在此範圍之內然面色緑而背色紅紫則又不僅專入氣分而亦必兼清血熱故聖濟以治吐血不止聖惠方又治鼻衄瀕湖以治目赤口瘡既善清火而又導熱下行其效良捷近人止以為發汗之藥而不知清熱正其專長殊覺未盡其用且其質最輕氣味皆薄雖曰發汗性非溫熱必無過汗之慮而俗子畏之多不敢用則綱目所引去風丹一方有鐵鏷頭上也出汗一句之故張石頑因之亦謂去風丹治大風癩風等皆驗且有發汗勝於麻黃之句皆未嘗於物理上體驗之耳壽頤按瀕湖所引去風丹一詩不知何本據其所稱東京石碑梵書大篆人不能曉真人林某逐字辨譯云云要知既是梵字斷無逐字譯之即成七言詩句之理且大篆之與梵字風馬牛不相及何以梵字而有大篆之稱其為妄人僞造不攻自破據其所治有左癱右瘓三十六種風等說淺俗已極明是無知方士向壁虛構且更有胎孕有傷服過百粒即為全人云云不成文理可鄙孰甚李氏不知抉擇貪多務得取盈篇幅徒亂人意殊可哂矣蘋發明蘋亦水萍之類但其葉視浮萍為大根連水底其莖甚細其葉合四葉為一如田字形故又謂之田字草生長水中其性寒滑本與浮萍相近惟萍浮無根則輕揚有餘而善發汗蘋蓴之類皆有根一葉一莖直系水底水深處可長之尋丈則滑降過之而不發汗此亦物理自然之功用山海經謂蘋食之已勞蓋指勞熱而言吳普本草謂主治暴熱下水氣利小便陳藏器謂搗塗熱瘡搗汁飲治蛇傷毒皆其寒滑之力善於清熱利水而能解毒耳莕發明莕即古之荇菜李瀕湖謂與蓴相類皆葉浮水面莖連水底但葉圓微缺如馬蹄者為蓴菜葉似蓴而微尖長者即莕菜也俱生水中莖長盈丈故甘寒滑利之性無不相同唐本草謂治消渴去熱淋利小便瀕湖謂搗敷諸腫毒火丹遊腫其功用皆彼此大略相似也蓴發明蓴見名醫別録氣味甘寒無毒主治消渴熱痹孟詵謂作羹下氣止嘔大明謂治熱疸逐水解百藥毒蠱毒千金方治熱瀉嘔逆用之能清胃熱上逆可知蓋寒滑通利之性水草大率皆然然滑降之用功力亦猛苟非實熱不可多食海藻本經味苦寒主癭瘤氣頸下核破散結氣癰腫癥瘕堅氣腹中上下鳴下十二水腫別録療皮間積聚暴㿉瘤氣結熱利小便考異今本作主癭瘤結氣散頸下硬核痛癰腫癥瘕堅氣鳴字上有雷字茲從孫氏問經堂輯本正義海藻生長海中鹹苦而寒故能軟堅散腫癭瘤結核皆肝膽火炎灼痰凝絡所致寒能清熱固其專長而陰寒凝聚之結核非其治矣癰腫癥瘕多由血熱瘀滯而生腹鳴水腫更多濕熱停頓之候凡此諸證之屬於陽實有餘者固可治之而正氣不及清陽不運諸證不可概施別録特提結熱二字最當注意非謂陽虛血瘀之癥瘕癰腫及寒水泛濫等病皆可以統同論治也十二水腫蓋以十二經而言諸經積水固皆有濕熱不利之一候此類寒滑泄水之藥固可用之廣義甄權謂治心下滿疝氣下墜疼痛卵腫李珣海藥本草以治奔豚氣腳氣水氣浮腫皆當以熱壅有餘一面而言正經腎水泛濫之奔豚及寒水寒疝結痛諸證兩得其反此皆讀古人書者不可不辨之門徑非謂凡此諸病不問虛實寒熱皆以此物一例通用也昆布發明昆布鹹寒滑利性情物質本與海藻不殊故諸家所治諸證亦多近似別録謂主十二種水腫癭瘤結氣孫真人謂可破積聚藏器謂治陰㿉腫㿉音頽即㿗疝也甄權謂利水道去面腫要之皆就實熱壅滯一面而言苟有陽虛諸證萬不可用石頑嘗謂能破陽邪水腫海藻昆布同功然下氣損人海中菜皆然不可久服惟海島人常食之水土不同耳海帶發明嘉祐本草海帶鹹寒療風下水掌禹錫謂出東海水中石上醫家用以下水勝於海藻昆布壽頤按今海帶有二種干時其色皆黑以水沃之則青翠柔嫩一種大者潤注當為闊之誤過五六寸長至丈餘名為海帶一種細者闊止一二分許而叢叢分歧則曰青帶絲固皆海中蘊藻之屬解一切毒清熱利水人盡知之北人煮食恆用煤火則常食萊蔔海帶之類謂煤火有毒非此不解但皆以為蔬食不入藥劑即南人亦恆食之考爾雅釋草綸似綸組似組東海有之郭注但謂青絲綸組綬海中草生彩理有象之者因以名云而不詳為何物說文綸青絲綬也則雅之所謂綸組固即今青帶絲之類耳又太平御覽引吳普本草綸布一名昆布陸氏釋文綸古頑反其音為鰥則綸昆一聲之轉李瀕湖於昆布條下謂爾雅之綸即是昆布其說甚是蓋海帶既闊且長形式如布而色青緑因有綸布之名逮聲音展轉則為昆布而其義乃在不知之數矣若其柔細之青帶絲則即爾雅之組耳又陳氏本草拾遺有海蘊藏器謂味鹹寒主治癭瘤結氣下水按廣雅紛縕亂也故瀕湖謂縕字為亂絲之名蓋水草之以蘊名者本取其細如亂絲之義則亦今所謂海帶絲之屬也其形雖有巨細之不同要之同生水中實為一類數種是以氣味性情均無差別石草類石斛本經味甘平主傷中除痹下氣補五臟虛勞羸瘦強陰久服厚腸胃別録補內絶不足平胃氣長肌肉逐皮膚邪熱痱氣腳膝疼冷痹弱定志除驚考異今本強陰下有益精二字正義石斛氣味貌似平淡然苟久煮則色澤甚濃而味且大苦本經雖謂甘平其實則為清熱沉降之藥生長山石罅中無土之處而堅韌異於常卉故本經謂主傷中氣火太盛則閉塞而逆上清能解熱苦能降氣故除痹而下氣虛勞羸瘦是陰虛生熱銷鑠肌肉此清內熱是以主之五臟皆陰苦堅者能益陰氣故補五臟凡本經統稱五臟者皆主藏陰而言是其常例既補五臟之陰故曰強陰此陰字所賅者廣非僅指一部分而言乃瀕湖綱目所載本經於強陰之下誤衍益精二字一似強陰益精四字為句而此藥專補腎陰者貌似神非大失古人真旨要之石斛乃胃家主藥非補腎益精之品淺人妄增謬戾已甚本經又結之以久服厚腸胃一句者蓋胃土最忌燥熱胃火太盛則消穀善肌而不生津液惟此為清胃主宰邪熱去而正氣充斯可以厚腸胃耳別録謂補內絶不足絶當作傷即本經主傷中之意平胃氣者清胃之熱而氣逆自平亦與本經下氣同義長肌肉則更與本經補羸瘦同符矣肺主皮毛肺有積熱則皮膚蘊熱而生痤痱石斛亦清肺良將是以主之腳膝疼冷痹弱多由真陰不能榮養石斛益陰自能起腰膝之弱痹定志除驚皆清火之實驗也發明石斛清熱降氣專泄肺胃虛火而味亦不薄故為益胃強陰之品古人惟以色黃如金莖壯如叉者為貴又曰川産最良然今市肆中之所售注原作通義不可解改通川斛則細小乾枯最為賤品金叉斛則軀幹較偉色澤鮮明能清虛熱而養育肺胃陰液者以此為佳但市廛中欲其美觀每斷為寸許而以砂土同炒則空松而尤為壯觀要之一經炒透便成枯槁非特無以養陰且恐不能清熱形猶是而質已非市儈伎倆殊為可惡所以吾吳醫家每用其原枝不炒者劈開先煎庶得真味且此物最耐久煮一味濃煎始有效力若雜入他藥中僅煮沸三四十分鐘其味尚未出也若肺胃火熾津液已耗舌質深赤乾燥或焦黑嗜飲者必須鮮斛清熱生津力量尤偉必以皮色深緑質地堅實生嚼之脂膏黏舌味厚微甘者為上品名鐵皮鮮斛價亦較貴其賤者皮作淡黃色嚼之無脂味亦淡薄已不適用且更有東瀛出品氣味更淡則完全無效矣若老人虛人胃液不足而不宜大寒者則霍山石斛為佳名醫別録及範子計然皆言石斛出六安可知古時亦甚重之其形甚細而色作金黃望之潤澤嚼之味厚者斯為上品若晦暗枯槁亦不足貴而近時更有所謂緑毛乾風斛者色作淡緑質柔而軟望之隱隱有緑色茸毛亦産霍山則僅擷其極嫩之尖故干之而不槁嚼之且無渣滓味濃厚而又富脂膏養胃益液卻無清涼礙脾之慮確為無上妙品但最佳者市肆中亦不可多得且價貴兼金非貧富之所可與共又有鮮金石斛支幹較偉即金叉斛之新採于山崖者浙省金注金當為各之誤處諸山多有之亦清胃之上品石韋本經味苦平主勞熱邪氣五癃閉不通利小便水道別録止煩下氣通膀胱滿補五勞安五臟去惡風益精氣正義石韋産於深山陰崖險罅得純陰之氣而味苦其為寒涼之品決無疑義本經雖曰苦平未可拘泥不化稟性陰寒故主勞熱邪氣五癃即後世之所謂五淋癃之與淋一聲之轉說見莫枚士研經言釋淋引毛詩皇矣與爾臨沖韓詩作與爾隆沖為證其說甚確內經所謂若沃以湯者類皆熱痹為多惟純陰之性泄導下行洵為專品別録所謂止煩下氣通膀胱滿固即本經之旨補五勞者亦以勞熱而言頗與今人陰虛生熱之病相合而非古人虛寒之虛勞安五臟者邪熱去則正自安五臟屬陰此以五臟之真液而言固以不受邪熱灼爍為得所惡風為病本是血熱壅而成毒陰寒能清血熱去風可知精氣即陰氣實即真陰邪熱胥蠲而真陰自受其益亦非泛語骨碎補發明骨碎補寄生石樹之間有根有葉黏著不落亦猶桑上寄生之屬性溫而通故入血和血通調脈落注落當為絡之誤開寶本草謂氣味苦溫主破血止血補傷折又入藥用根溫和達下則入肝腎故甄權謂主骨中毒氣風血疼痛上熱下冷蓋溫養下元能引升浮之熱藏於下焦窟宅是以可治上熱下冷李瀕湖謂研末同豬腎煨食可治耳鳴及腎虛久泄牙痛皆是此意非可通治胃家實火之齒痛壽頤先業師閬仙朱先生嘗用以治寒痰凝滯牙關不利頰車隱痛之骨槽風重證甚有捷驗又凡陰虛於下而肝膽浮陽挾痰上凝之齒痛牙槽不利及陰寒逼陽上浮之喉痛喉癬諸證用此亦頗有效皆即瀕湖用治牙痛之意而陽邪實盛者類皆不可妄試昔人每謂此藥入腎治骨並能治骨傷碎因得此名者皆當識得此意非陰虛有熱之骨痛骨痿果皆可以一概主治也戴元禮證治要訣謂痢後下虛不善調養或遠行或房勞致兩足痿軟或痛或痹遂成痢風宜用獨活寄生湯加虎骨四斤丸仍以骨碎補三分之一同研酒服則以腎之虛寒而言此藥溫腎能起骨痿宜矣惟痢後風之腳軟膝腫亦有陰虛生內熱者則宜魏玉璜之一貫煎戴氏此法非可概投所謂萬病有正面皆有反面審證論治最當明辨設或渾侖吞棗希圖弋獲未有不敗者矣此藥之根有似於姜且生茸茸之毛故又有毛薑之名一名猴姜或謂即以有毛而其形似猴得名壽頤則謂寄生木石之上等於猱之升木字之以猴其義易知非象形也又名申姜則以申年之為猴兒年耳鼠兒年牛兒年之說宋人筆記已有之而元人書中尤多蓋遼金元間之土語今世俗之所謂十二生肖由來固已久矣苔類苔考證苔之種類不一古書別名又極繁無注無當為蕪之誤爾雅已有藫石衣一條郭注水苔也一名石發江東食之陸德明釋文音徒南反蓋即苔之古字形雖不同音義無別棲霞郝蘭皋懿行爾雅義疏高郵王伯申引之廣雅疏證皆謂藫苔一聲之轉是也許氏說文則作菭雲水衣周禮又作箈醢之云如籩之實有箈菹鄭衆注水中魚衣也王伯申謂箈之與箈亦皆苔字張稚讓廣雅則曰石發石衣蓋苔之為物生於至陰類皆陽光不到之處或在牆陰或在瓦角或生深崖或生下隰或出石上亦産水中故有石衣石發水衣魚衣諸名名醫別録中品有陟釐注本文以下凡述本品均用涉字現一律改為陟云生江南池澤唐本草注云此乃水中苔王氏廣雅疏證引周禮釋文謂箈北人音丈之反又爾雅釋文亦云箈或音丈之反是箈菭古亦與治同音故疾言之則為菭徐言之則為陟釐陟釐正切菭字別録中品又有垣衣云一名昔邪一名烏韭生古垣牆陰或屋上廣雅亦曰昔邪烏韭也在屋曰昔邪在牆曰垣衣西山經郭璞注亦同別録下品又有屋遊云生崖上陰處陶注此瓦屋上青苔衣也本經下品亦有烏韭云生山谷石上蓋此物皆産生於陰濕之處形本不一有柔細而茸茸如毛髮者故得烏韭屋遊石發諸稱亦有薄滑黏膩干之而如紙一片者則有魚衣水衣石衣垣衣之號今藥肆中止有石衣一種色黑質薄南貨鋪中亦有出售其性涼降可治熱病通利小水此外則不入藥用舉一可概其餘古今本草不一其名即李氏綱目一書已採録十餘種名號各別而性情主治大略近似殊有疊床架屋之嫌爰止以苔字撮其大綱而總列諸物合為一條不復分析以省繁復云爾發明苔之所生恆在至陰之處牆隅屋角以迄水側山崖大率皆在陰翳叢萃之中甚者或在井中水底以及大海而日光能到之處則無之其為純陰用事情性可知故本經烏韭則曰氣味甘寒而別録井中苔則曰甘大寒屋遊亦曰甘寒垣衣則酸冷其義一也其主治諸病則本經烏韭謂治皮膚往來寒熱此以時行熱病之在表者而言質本輕清性則寒降故主皮膚之熱又曰利小腸旁光氣旁光今本作旁胱則亦以濕熱阻結水道不利而言陰寒之質能理濕熱而滑利淡滲能通小便固其宜也別録謂療黃疸亦惟濕與熱結之陽黃實證為宜可以想象得之矣陟釐則日華本草謂搗汁服治天行病心悶即巢源千金外臺諸書之所謂時行熱病也瀕湖謂搗塗丹毒赤遊則小兒之遊丹色赤四竄病屬血熱凡治此病無不以寒涼為宜壽頤每以芭蕉根心搗敷無不立應而苔亦能治之其性可知別録又謂井中苔治漆瘡熱瘡弘景則謂療湯火傷灼瘡垣衣則別録謂治黃疸心煩咳逆血氣暴熱瀕湖謂搗汁服止衄血屋遊則別録謂治浮熱在皮膚往來寒熱利小腸膀胱邪氣徐之才謂止消渴瀕湖則謂煎水入鹽漱口治熱毒牙齦宣露研末新汲水下止鼻衄又孟詵食療本草船底苔甘冷治鼻洪吐血淋疾壽頤按鼻洪洪字費解豈以大鼻衄言之耶瀕湖謂解天行熱病可知種類雖有大同小異之殊而藥性治療固無不一以貫之也正訛苔類屬陰性情主病具如上述此物理之自然而亦治療之實驗也唯名醫別録陟釐一條既云生江南池澤而唐本草直以水中苔為之注則陟釐即苔已無疑義乃曰味甘大溫主治心腹大寒溫中消穀強胃氣止泄痢云云辭頗不類此必傳寫錯訛不知以何物之氣味主治誤繫於陟釐條下致與本經之烏韭別録注録原作類顯誤改之垣衣屋遊諸物同為一類而性情或寒或溫兩得其反似此錯簡一望而可知為必有訛注訛下原又續排訛訛與訛即一字顯衍刪者惟開寶本草為之附會妄謂水苔性冷浮水中陟釐性溫生水中石上強為分別尤其背謬豈有同生水中同此形質而可有寒溫之大異其情性者李瀕湖不加辨正一例編入綱目疑誤後學殊非細故鈔胥伎倆抑何可笑竟至於此且即於別録主治之後系之以日華本草搗汁服治天行病心悶一條豈非指天行之熱病而言又系之以自己所說搗塗丹毒赤遊豈非可治丹毒血熱之病然則此物之為寒為熱雖問之三尺童子而當亦能辨奈何猶謂之氣味大溫真堪駭詫之至瀕湖綱目一書辨正古人之誤蓋亦不鮮何以此條獨否真不可解馬勃發明馬勃生於陰濕之處色紫成團輕鬆多粉干而撲之粉輕四散有如煙霧雖非苔類而稟陰濕之氣以生蓋亦與苔相似故李氏綱目附於苔類之末唯輕虛能散與苔類之專於滑降者不同其氣味則名醫別録以為辛平其主治則別録雖止有治惡瘡馬疥一說蓋既能散毒又能燥濕以療濕瘡固得其宜故弘景亦謂傅諸瘡甚良今人用以為金瘡止血亦效寇宗奭謂以蜜拌揉以水調呷治喉痹咽疼蓋既散鬱熱亦清肺胃確是喉病良藥東垣普濟消毒飲用之亦是此意瀕湖謂清肺散血熱解毒內服外敷均有捷驗誠不可以微賤之品而忽之
