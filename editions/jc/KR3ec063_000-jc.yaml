body:
  text: 緒言本草編次之例自陶貞白集成神農本經名醫別錄兩種各分上中下三品三品之中各以玉石為首而唐宋以後諸家本草則皆以玉石草木鳥獸蟲魚等各自為類蓋本經別錄所收藥物各止三百六十味分類自可從簡而後人採集漸多不得不分別部居不相雜廁欲其易於檢索也惟各家編次猶多以玉石為冠則循本經舊例是遵守古訓不忘其本之意壽頤竊考本草命名之義古人已謂藥有玉石草木禽獸等類而云本草者以諸藥中惟草為最多之故是以近人著述亦間有以草類居首者義即本此壽頤謂今世所用藥物草木最為多數而玉石之應用者寥寥無幾茲為適用計爰以草部為各藥之冠而木果蔬谷次之金石又次之鳥獸蟲魚又次之終之以人類為殿仍用唐宋以來之舊例云是稿也肇始於甲寅之秋襄助吾師同邑朱閬仙先生創立黃牆中醫學校於家塾編纂以作講堂課本越六載而遊浙之蘭溪忝任醫校講席重訂舊稿印刷講授今又一星終矣再為潤飾付之手民蓋距屬稿之初歷十八寒暑回想當年恍如夢景吾師已久赴道山而壽頤亦齒豁頭童年周甲子矣成之之難如此能不感喟系之時在壬申仲秋嘉定張壽頤山雷甫三訂舊稿於蘭江寓次
