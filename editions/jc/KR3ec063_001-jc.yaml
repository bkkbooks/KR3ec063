body:
  text: 卷之一草部山草類上甘草本經味甘平主五臟六腑寒熱邪氣堅筋骨長肌肉倍力金創腫解毒創今作瘡別錄溫中下氣煩滿短氣傷臟咳嗽止渴解百藥毒正義甘草色黃而味大甘乃脾家主藥其味最厚故專為補益之品本經主五臟六腑寒熱邪氣蓋脾土為中州後天之本脾得其益則五臟六腑皆以受氣而寒熱邪氣自然消除乃補正而邪自卻非甘草能通治五臟六腑寒熱邪氣百病也堅筋骨長肌肉倍力無一非脾土受補百骸滋長之意主金創腫者亦以脾主肌肉補脾則肌肉豐滿可愈金創而消腫矣解毒者甘為土之正味凡毒得土則化故大甘之味可以解毒別錄謂九土之精解百藥毒者是也本經原文更有久服輕身延年一句則極言其補養之功效雖自有至理嫌其近於方士丹灶家習氣刪之且本經上品諸藥不飢不老輕身延年等說數見不解注解當為鮮之誤而於太乙餘糧則曰久服飛行十里澤瀉則曰久服能行水上皆方士附會之謬說抑且於醫學本無關係壽頤編纂是集於本經正文例不更改一字而獨節去此等字句者非荒經也去其可疑正欲以堅其可信請與博雅通才共商之或不以為師心自用乎別錄主溫中下氣煩滿短氣者甘能補中中氣旺則自然燠烋溫和非甘草之果為溫藥也中氣健運而虛煩虛滿自愈故曰主煩滿下氣非能治痰飲濕熱積滯等病之煩滿上氣也中氣虛怯則氣短甘草能補中氣故主之傷臟咳嗽則脾虛而肺氣亦餒故曰傷臟甘草補脾自能止咳凡咳之因於氣虛而無風寒外邪者非補中不為功如保元四君六君等方皆是主劑則甘草洵虛咳之要藥止渴者甘以養胃自能生津也廣義千金方中烏頭巴豆毒甘草入腹即定東垣甘草生用氣平補脾胃不足瀉心火炙之則氣溫補元氣而散表寒除邪熱潤肺壽頤按甘草之能瀉心火亦甘以緩之之意非寒以勝之也仲師三瀉心湯皆有甘草皆和中甘緩之法至謂炙之則氣溫能補元氣而散寒除熱是指內傷之畏寒發熱即建中湯之證治非外感表邪之寒熱可比故曰補元氣然竟謂之散表寒除邪熱則立言已自不妥而薛立齋之本草發揮竟以為去寒邪吳遵程之本草從新竟以為入汗劑則解肌是以補中之品誤作發散之藥即東垣有以教之可謂失之毫釐差以千里矣潔古謂甘草梢治胸中積熱去莖中痛壽頤按梢是最細之尾其性下達故也發明甘草大甘其功止有補土本經所敘皆是也又甘能緩急故麻黃之開泄必得甘草以制之附子之燥烈必得甘草以監之附子之燥烈走竄者得之而少斂其鋒攻下者得之而不傷於峻皆緩之作用也然若病勢已亟利在猛進直追如承氣急下之劑則又不可加入甘草以縛賁育之手足而驅之戰陣庶乎奏功迅捷覆杯得效正訛中滿者忌甘嘔家忌甘酒家亦忌甘此諸證之不宜甘草夫人而知之矣然外感未清以及濕熱痰飲諸證皆不能進甘膩誤得甘草便為滿悶甚且入咽即嘔惟其濁膩太甚故耳或謂仲景之麻桂諸方以及後人之沖和湯等無一不用甘草即無一非外感之主方則有何說且素問明言辛甘發散為陽是甘能散邪尤為經訓而近人之輯本草者又有甘草能散表寒之說抑知甘草之散表寒乃屬氣虛之畏寒故得補中而凜寒自解非治外感之寒邪凡草木諸藥以氣勝者迅而善行以味勝者滯而善守國老味厚無氣以堅守中州之質而謂其有透泄肌表之能用非所長適得其反似此論藥最是誤人須知經言辛甘發散是指辛中之甘而言如桂枝之類決不用此甜膩濁滯之味認作輕揚表散之劑若古人解表方中每用甘草則以古者體者堅強外感六淫已非輕恙故必得此補中之品先扶中氣而後可以托邪外達亦非徑以此為解表之主將仲景桂枝麻黃葛根大青龍等方多用甘棗小柴胡且用參棗皆為體質堅實強盛者設法後人之參蘇飲敗毒散等方參甘並用亦是此意壽頤聞今湘省人無論何病苟寫藥方無不用黨參甘草各三錢開首然後再以應用對症之藥繼之本即此例而吾儕江浙人體多孱弱實非所宜凡在學者不可誤讀古書輕率援用以貽中滿而引人嘔惡也又按甘草治瘡瘍王海藏始有此說蓋是甘能解毒之意李氏綱目亦曰甘草頭主癰腫至張路玉等諸家乃言甘草節治癰疽腫毒然癰瘍之發多由於淫熱內熾即陰寒之證亦必寒濕凝滯為患甘草甘膩實在所忌若泥古而投之多致中滿不食則又未見其利先見其害至謂甘草之節專主外瘍則此物之節何在頗不可解嘗以詢之藥肆中有老者告曰此草用根本無枝節惟未出土時有為蟲蝕處斑剝不平者乃謂之節蓋像人體之瘡瘍故能治之仍是想當然之臆說耳人參考正壽頤按古稱人參今有遼參高麗參黨參之別形色性情功效各有不同而古今醫藥諸書則皆以人參兩字統言之不獨古之本草未聞辨析也考遼東高麗在上古雖未通中國而秦漢之際皆已交通許叔重說文則云人蓡藥草出上黨蓡即古之參字似東漢時猶止有黨參也本草經則云生上黨及遼東此句雖未必為周秦古本所固有然縱出於後人增益亦是陶貞白所手定千金翼方亦有此句則又似彼時黨參遼參同為一種再考其氣味主治則本經稱其寒而補五臟安精神云云皆似指遼參而言別錄則曰微溫而療腸胃中冷心腹鼓痛云云皆似指高麗參而言若云皆即今之黨參則實不能具此力量又證以太平御覽引吳普本草則曰神農甘小寒又曰根有頭足手面目如人則今之人參固有具頭項手足略似人形之一種範子計然亦云人參出上黨狀類人者善劉敬升異苑亦云人參生上黨者佳人形皆具此皆非今之黨參所能近似更詳稽唐宋以後本草及方藥則皆曰人參而孰為遼參孰為高麗參在有識者或可以心領神悟而分別之然究竟是一是二始難確定或謂古書之人參皆即今之黨參則僅讀說文而未讀本草經者但本經氣味功用則明是今之遼參而別錄之氣味功用又明是今之高麗參不獨微寒微溫顯有區別即所載主治亦是顯分畛域只因微寒微溫四字自李氏本草綱目併為一氣而本經之與別錄昔人又每合而讀之遂致或寒或溫紛如聚訟補氣補血更僕難終此則古今本草以遼東高麗參所產混為一詞不加區別之過也但上黨之所產豈古時本與遼參無別而今之所謂潞黨參者別有一種乎抑古今地氣攸殊古則同於遼參而今則遂成潞黨乎考瀕湖綱目引陶弘景說已有上黨來者形長而黃狀如防風則頗似今之黨參張路玉本經逢原別出上黨人參一條但曰甘平清肺又不似今之黨參惟吳遵程本草從新別出防風黨參一條則今所通用之黨參也蓋遼參高麗參其力皆厚唯一則甘而能清一則甘而兼溫功用自別若黨參則為補脾和緩之藥而力量較為薄弱三者之性情功用迥乎不侔萬不能一陶同冶而無區別爰為各立一條以前賢之成說近今之功效分著於篇庶乎門徑既清而後來者亦得有所依據壽頤為此創論明知於古無徵獨闢蹊徑篤信好古之士必有譏其師心自用妄作聰明者要知醫藥以切合實用為主不在泥古為高似乎逐條分析則臨證定方各得其所抑且證之古籍無不可通驗之民病久收捷效尚非穿鑿附會強作解人爰貢愚忱就商明達遼參本經人參味甘微寒主補五臟安精神定魂魄止驚悸除邪氣明目開心益智正義遼參產於遼瀋即奉天吉林等處地屬北方陰寒之域且其秉性背陽而向陰氣味皆清色淡黃或白故稟陰凝之氣而微寒功能養陰而清虛火今用之於陰虛有火及吐衄失血後之宜於清養或汗家失精家陰液耗損虛陽偏熾者甚有經驗證以本草經之所謂人參味甘微寒者氣味甚合故以本經之人參主治全文系之於此主補五臟者五臟屬陰遼參稟性屬陰得地氣最厚而氣味中和無所偏倚故能兼補五臟之陰而不專主一臟安精神定魂魄止驚悸者皆臟陰充牣之功也除邪氣者則真陰既足而邪氣自除明目開心益智又皆陰液充盈精神貫注之明證尋繹本經主治皆滋養陰液生津補血之功陳修園所謂無一字言及溫補回陽所以仲景恆用於汗吐下後陰傷之證以救津液而於回陽方中不用此陰柔之品以緩姜附之功者洵讀書之得間者也此則本經之人參固明謂其止能養陰而非補氣回陽之藥是皆遼參之功用而非高麗參之兼有溫性者可比是當明為分析而不可混熔於一爐之中者也廣義甄權主五勞七傷虛損治肺痿壽頤按此皆真陰不充之證如其虛火尚炎陽氣未匱遼參主之若陰液既耗而脾腎之陽亦弱則又宜用高麗參矣潔古止渴生津液壽頤按此是胃陰不充之候所當柔潤滋養固宜於遼參而不宜於高麗參之含有陽剛氣象也徐靈胎曰凡補氣之藥皆屬陽惟人參能補氣而體質屬陰故無剛燥之弊而能入於陰分所以可貴壽頤按人參能補氣而不剛燥惟遼參可以當之而高麗參已不能免矣陳修園仲景傷寒論用人參者十七方皆因汗吐下之後亡其陰液取以救陰惟理中湯吳茱萸湯則以剛燥劑中陽藥已多故以人參養陰濟陽以臻於中和耳壽頤按陳氏謂仲景於汗吐下之後用參以救陰液洵足勘透仲景制方之玄奧而發明人參之功能若理中湯吳茱萸湯二方本主脾腎陰寒之證愚謂當以今之高麗參配之正合溫中之用修園尚未免偏執己見也發明遼參稟性向陰味甘而微苦確含清涼性質多見風日則易生蛀喜陰惡陽尤其明證故富有養液而為補陰之最脫血脫汗失精家宜之固也而肺燥乾咳胃枯燥渴或乾嘔呃逆者皆賴以滋液生津而無寒降戕伐黏膩濁滯之弊功在沙參玉竹二冬二地之上奚啻倍蓰此其稟中和之氣不升不降不倚不偏所以可貴或有以為陽藥而補陽者固非即以為補氣而能挽回元氣者亦妄也正訛人參氣味微寒微溫四字原是二家之言一出本經一出別錄自當分別觀之方不致淆惑視聽乃自唐以後之輯本草者或有將四字並作一句而紛紜擾攘互相攻訐之議起矣遂令後人遍讀各家之言更覺糾結繚繞莫知所從乃有李月池者創為生用氣涼熟用氣溫味甘補陽微苦補陰之說意欲以調和其間而解其紛亂不知騎牆之見已屬可嗤抑且盲瞽之談反成笑話陳修園以藥入煎劑生者亦熟駁之最是爽快何如以本經別錄兩書各還其舊之為得乎人形之說古書詫為奇遇讖緯家且有搖光星散而為人參之說似乎參之能成人形者必神妙不可思議矣然壽頤見吾友朱君照衢朱君乃吾邑聞人朱右曾之孫右曾嘗著逸周書注行世自奉省攜歸一種大類人狀有頭有頸軀幹獨大亦有四肢部位清晰惟無面目肢節及手指耳據云彼他注當是地之誤之參皆以人力培植頗如圃中之蔬隨在多有而人形者亦其種類之一在當地出售不過千餘大錢一斤惟一入京華價已百倍何況南省則關稅本巨而加以市儈之居奇耳若野生者則數年不得一支即此數言人參之真相已可得其涯略且古人命名之意亦已太注當是大之誤白而人形之說又何足為寶耶人參能滋陰液而無卻病之功靈胎之說最確其言曰人參長於補虛短於攻疾乃醫者於病久體弱或富貴之人不論病之已去未去皆必用參一則昭其謹慎一則藉以塞責而病家亦以用參為盡慈孝之道不知病未去而用之病根亦固且力大而峻為害亦甚徐氏此言曲盡庸醫醜態彼夫無故妄用以浪費病家之資財及藉此藏拙以迎合富貴之心理者其亦可以廢然返乎仲景小柴胡湯於咳者去人參加乾薑五味蓋為寒飲之咳嗽言之陳修園謂形寒飲冷之傷非人參陰寒之品所宜則凡屬外邪未清者固不可輕用此滋補之品可與靈胎之論互相發明者也高麗參別錄人參味甘微溫療腸胃中冷心腹鼓痛胸膈逆滿霍亂吐逆調中止消渴通血脈破堅積令人不忘備考療即治病之義唐人諱治唐世醫書皆以療字代治字用外臺秘要皆用療字無一治字是其例也別錄一書輯於陶弘景之手今諸書所引皆作療字疑亦唐人所改今仍唐本之舊耳正義高麗參產於朝鮮古之高麗百濟新羅皆是也地當東海之濱稟東方發生之氣故具氣味濃厚色亦重濁具有溫養生髮之性今用之於脾胃虛寒真陰衰弱及中氣不振陰寒用事諸證功效甚捷較之遼參偏於養陰含有清涼氣味者性質迥異證以名醫別錄之人參味甘微溫氣味甚合故以別錄之人參主治全文系之於此腸胃中冷心腹鼓痛者皆中氣虛寒真陽不宣之候也胸脅逆滿亦陽衰陰盛之病故皆以人參溫養其中氣此非痰濕凝滯之逆滿所以宜於溫補若霍亂吐逆則陰霾凝結之病故亦以溫中為宜惟霍亂為患迅疾暴戾雖有寒有熱即注一本作而疑為卻誤以陰盛滅陽為最多宜大劑薑附而以人參之大力者馭之方足以回垂絕之真陽非一味所能治也調中者則中氣虛弱而和調之止消渴者則滋養津液之效也參本養液而又有溫和之氣以流利之故能通行血脈參本補脾而又有燠煦之氣以健運之故能消磨堅積令人不忘者心為牡臟參能益血更能溫養而振刷之則心陽舒展而記憶之力自富此皆惟高麗參之微溫稟春生髮育之性者方能臻此剛健婀娜之候而非遼參之僅能滋陰者所可同日語矣廣義甄權主冷氣逆上壽頤按此指中氣虛寒而腎水上凌之證自宜用高麗參則溫脾而兼攝腎非遼參之所能治者其甚者且宜輔以大溫之品而攝納之潔古主肺胃陽氣不足肺氣虛促短氣少氣壽頤按此脾土虛寒中氣不振故脾陽不宣氣促少氣惟高麗參之溫補中州而益元氣者宜之東垣曰人參甘溫能補肺中元氣肺元旺則諸臟皆旺肺主諸氣故也仲景於汗後身熱亡血脈沉遲者下利身涼脈微血虛者並加人參所謂血脫益氣陽生而陰自長也壽頤按人參氣薄味厚力能滋陰養血仲景用之於汗後吐後本是取其補陰而東垣乃以補肺氣韓飛霞亦謂病後氣虛及肺虛作嗽者並宜之是皆以為氣藥蓋緣參能滋養五臟之陰陰既充而氣亦自旺究非補氣之效至東垣所引仲景二條則脈微脈沉遲愚謂所用人參當以高麗產之含有溫養性質者為佳斯則具有春升之氣謂為益氣或猶近是徐靈胎謂其升提元氣蓋亦指此而昧者甚至謂為能回元氣於無何有之鄉而救陽亡於垂絕之頃者殆欲以戰國策之所謂不死之藥視人參則過於推崇而不自知其立言之不可為訓矣李月池曰凡人之面白麵青或黃或黧悴者皆肺脾腎氣之不足皆可用人參而面赤氣壯神強者不可用矣脈之浮而芤濡虛大遲緩無力沉而遲澀細弱結代無力者皆虛而不足可用人參而弦長緊實滑數有力者則火鬱內實不可用矣潔古謂喘嗽弗用者痰飲氣壅之喘也若腎虛氣短喘促者必用矣仲景之咳嗽弗用者寒邪壅鬱之咳也若自汗虛寒而咳者必用矣東垣謂肺有鬱熱弗用者宜發不宜補也若肺虛無火氣短自汗者必用矣丹溪謂諸痛不可驟用者邪氣凝結宜散不宜補也若虛寒氣弱痛而喜熱喜按者必用矣節齋謂陰虛火旺弗用者火邪積盛不可補也若虛火無根自汗氣短肢寒脈細者必用矣壽頤按李氏此言辨別脈症甚是明晰惟所條舉者盡屬虛寒證治則李氏固專指高麗參之溫補言之繆仲淳曰凡虛羸尪怯勞役飢飽所傷清陽之氣陷入陰分發熱倦怠四肢無力或中暑傷氣無氣以動或嘔吐泄瀉霍亂轉筋胃弱不食脾虛不磨或真陽式微腎氣匱乏陽事痿絕完穀不化下利清水及小兒慢驚痘後氣虛潰瘍虛弱等症苟投入參靡不立效壽頤按繆氏所謂亦是高麗參之功用而張石頑崇之且伸之曰痘疹不宜輕用人參者乾紫黑陷血熱毒盛也若氣虛頂陷色白皮薄泄瀉漿清則必用矣亦以麗參之甘溫言之是以張氏之本經逢原明言人參甘苦微溫產高麗者良發明高麗參之功用本與遼參無甚差池皆以養津滋液見長補正固有奇功去病亦尟實效洄溪長於補虛短於攻疾八字可為定論但遼參稟性醇和絕無剛烈氣象是以滋養陰津尤其獨步而高麗參則已有剛健恣態溫升之性時時流露所以兼能振作陽氣戰勝陰霾二者所主之病雖同為陰枯血耗之候惟陰虛之體相火易升則宜於遼參而不宜於麗參若陰液既耗而真陽亦衰則宜用麗參而不宜用遼參一則養陰而兼理虛熱一則補陰而即以挾陽各有專主不容或紊若治虛熱而誤用麗參無異抱薪救火則欲蘇涸轍之鮒而灼其重竭之脂膏若治虛寒而誤投遼參幾於落井下石則欲回黍谷之春而適以陷絕於冰窖同是虛也在當用之時而一字之爭已如水火冰炭之各異彼夫風寒濕邪痰飲食積氣血鬱結之不得妄投是味者更無庸言矣正訛王好古海藏氏曰人參甘溫補肺之陽泄肺之陰肺受寒邪宜此補之肺受火邪則反傷肺王綸節齋氏曰人參入手太陰能補火肺受火邪者忌之故凡酒色過度損傷肺腎真陰陰虛火動勞嗽吐血咳血等證勿用壽頤按好古節齋謂人參能補肺火創為肺熱傷肺之說幾以此物為肺家禁藥大受後人攻擊實則二家之說均為高麗參言之本含溫熱之性故肺熱忌之不獨實火應在禁例即虛火亦有爍金之慮兩氏固未可厚非也讀者不察誤認其所指之人參即是遼參則遼參甘寒肺虛有火陰虛火動者正是要藥何至竟為大禁恐海藏節齋不至若是之謬況海藏明謂人參甘溫其旨可見但其所稱補肺之陽泄肺之陰等句亦大有語病不可不辨試為改之曰人參產於高麗氣味甘溫能補肺陽能傷肺陰肺氣虛寒宜此補之肺有鬱熱則反傷肺更易數字而其意瞭然蓋其所謂寒者意在虛寒故宜於甘溫之高麗參必非謂外感之寒邪而其所謂火者則雖是虛火固亦非高麗參之甘溫所宜繆仲淳經疏亦謂不利於肺家有熱咳嗽吐血衄血內熱骨蒸勞瘵陰虛火動之候即海藏節齋之同調也喻嘉言謂傷寒有宜用人參者發汗時元氣大旺則外邪乘勢而出若元氣素弱之人藥雖外行氣從中餒輕者半出不出留連致困重者隨元氣縮入發熱無休所以虛弱者必用人參入表藥中使其得力一湧而出非補養之意古今諸方表汗有參蘇飲敗毒散和解有小柴胡湯解熱有白虎加人參湯竹葉石膏湯攻下有黃龍湯皆以人參領藥力深入驅邪即熱退神清云云辨而且博誰敢謂其不是但壽頤謂此皆為身軀強壯者言之病邪本深體力又偉非得人參之大力者駕馭其間則藥力不及病所即能勝病而亦不能驅邪使出古人治病方多用參草原欲藉其大力負之而趨則收一鼓盪平之效而三吳之人體質本薄外邪所感亦不待深入而病已作昔人每謂江南無真傷寒病亦是此旨所以吾吳醫藥悉趨輕清一路本非僅為人之柔脆者立法亦以邪之中人未嘗深入故也是則嘉言之論誠有未可以輕試於吾吳者而吾邦之外感方中初無待於人參甘草以為扶正托邪計者亦未始非持之有故矣參鬚發明參鬚之名古所未聞而張氏逢原吳氏從新皆載之即遼參高麗參之細枝蓋參價漸貴遂今細微之物亦供世用從新又有太子參之名則即參中之細小者具體而微亦與參鬚同類論其質地本與人參無所同異但遼產高麗產一清一溫亦當分別主治方不貽誤其為參之餘體力量薄弱初不待言其較巨者形如北沙參如懷牛膝猶有功用可言若其末尾則如絲如發幾於氣味俱無何能呈效惟生津止渴微有養液之用耳吳氏謂參條能橫行手臂指臂無力者服之有效則本是旁枝宜其力能旁達張氏謂參鬚治胃虛嘔逆咳嗽失血等症亦效惟久利滑泄崩中下血等症每至增劇則以須是末尾性專下達故上逆之病得其下行而順若下泄之病則中氣下陷而增困矣今人每以參值綦巨常用細枝及須代之務須識得此意方不貽實實虛虛之消若陰虛火升肝膽之陽上熾用此潛陽降火尤為相宜參蘆發明蘆是參之蒂部位在上力能上行古人以為虛人湧吐膈上痰飲之用張石頑亦謂其性升而於補中寓瀉屢有效驗又謂能治瀉利膿血崩帶精滑等症惟氣虛火炎喘嘔嗽血者忌之則上逆之病惡其升騰耳壽頤按凡泄瀉日久陽氣下陷用參蘆加入應用藥中頗有功效若滯下膿血而濕熱未清則不可升也參葉發明參葉本不入藥惟吳氏從新收之乃謂大苦大寒損氣敗血其性與參相反太不近理而趙恕軒本草綱目拾遺則謂其清香微甘清肺生津止渴力能行於皮毛性帶表散養胃陰祛暑氣降虛火以代茶用為醉後解酲第一以理推之趙氏之說為是潞黨參發明黨參之名初不見於古書僅於張氏之逢原吳氏之從新及趙氏之拾遺見之今則南北通行凡醫藥中應用人參者幾於無不用此則以價值尚廉而功用堪信耳惟市肆中亦有數種以西黨參為最佳枝不必其巨但以近蘆處橫紋縝密者為真皮肉不必其白但取其柔潤不枯生嚼之甘味極濃而多脂膏無渣滓者為上其他稱潞黨者尚有數種皆遠不逮也力能補脾養胃潤肺生津健運中氣本與人參不甚相遠其尤可貴者則健脾運而不燥滋胃陰而不滯潤肺而不犯寒涼養血而不偏滋膩鼓舞清陽振動中氣而無剛燥之弊是稟坤土中正之氣柔順之德而無偏無害者且較諸遼參之力量厚重而少偏於陰柔高麗參之氣味雄壯而微嫌於剛烈者尤為得中和之正宜乎五臟交受其養而無往不宜也特力量較為薄弱不能持久凡病後元虛每服二三錢止足振動其一日之神氣則信乎和平中正之規模亦有不耐悠久者然補助中州而潤澤四隅與坤土合德亦可謂至德也已故凡古今成方之所用人參無不可以潞黨參當之即凡百證治之應用人參者亦無不可以潞黨參投之不僅取其惠而不費可以節用而隱為斯民造福即論其功德及人亦較彼遼參之價值連城者又何嘗多讓不謂張氏逢原吳氏從新既取之而所用不足以盡其所長殆猶未免皮相之見耶西洋參發明西洋參產於美洲本非中土所有是以古書無此惟吳氏從新趙氏拾遺收之均稱其有補肺之功然其味甚昔其性必寒聞彼中並不視為藥品惟吾國人震於參之美名競相爭購價值日貴而贗鼎亦日多然其真者亦不過苦寒泄火之品惟肺胃有火口燥咽乾者頗有捷效雖似有生津止渴之功其實仍以泄熱見長而清養肺胃尚是因其降火而加之美名是以胃弱津枯而不因於實熱者已嫌其伐生生之氣所謂補肺亦可想見吾國所產清熱潤燥之藥甚多又何必侈談域外之奇然耳食者猶必以服食貴价自誇甚至畏其苦寒則用龍眼肉拌蒸以為制勝之術斯又矯揉造作自詡神奇亦殊覺其多此一舉也東洋參發明東洋參之名趙氏拾遺有之然所言形色與今不類今之所謂東洋參者其形與高麗參甚似惟色較淡質較松味亦較薄蓋東瀛之人因吾國人頗嗜遼參因取其種子移植彼土故價值較廉然土宜既殊性質遂異已含有東方溫升氣象是以形質鬆浮而苦味亦淡說者謂其寒性變為溫和故遇有肺胃虛寒而津液枯槁者以此代遼參之用然氣味薄弱更不如潞黨參之有力也沙參本經味苦微寒主血積驚氣除寒熱補中益肺氣別錄療胸痹心腹痛結熱邪氣頭痛皮間邪熱安五臟正義沙參稟秋收之氣色白而堅實味苦而性寒本經主血積者蓋指肺胃鬱熱而血瘀之積沙參清其熱則血自調非能宣通積滯之血也主驚氣者則心陽偏熾而神不安宅苦能清心寒能勝熱之效也除寒熱者指肺胃鬱熱而營衛不和之寒熱言之非外感之寒熱胸中有熱則中氣不和能清其熱則曰補中瀉其邪即所以培其本益肺氣者肺喜清肅最畏熱邪苦寒除熱即是益肺之氣況沙參色白而堅氣味輕清本是肺家正將耶別錄療胸痹心腹痛是指熱氣鬱結之痹痛正與痰飲寒氣之胸痹心腹痛相反故申言之曰結熱邪氣頭痛則氣火上升之痛皮間邪熱則清肺即是清皮膚之熱安五臟者邪熱清而五臟自安蓋沙參之功純以清熱見長惟氣清而輕雖曰苦寒尚無泄降傷中之弊斯其所以可貴而本經列之於上品也廣義景岳主清肺涼肝滋養血脈散風熱癢瘙頭面腫痛時珍主肺火久咳肺痿石頑謂泄肺氣之熱喘嗽氣壅小便赤澀不利壽頤按石頑此條須作一氣讀蓋喘壅而溲赤澀為肺熱鬱窒之候沙參清其肺則上竅開而下竅亦利非泛指痰飲之喘嗽氣壅千里毫釐最宜明辨衛生方治肺熱咳嗽沙參一味煎服肘後方治卒然疝氣腹痛如絞自汗欲死沙參為末酒服立瘥證治要訣治婦人白帶沙參為末米飲服之石頑謂肺氣清則木邪散故疝可解而帶可止徐洄溪謂沙參為肺家氣分中理血之藥疏通而不燥潤澤而不滯血阻於肺者非此不能清云云則凡肺氣燥結乾咳失血者宜之凡盛夏時陰虛之體及小兒陰液未充外受炎暑熱傷元氣之證俗謂之疰夏惟沙參清而不膩滋養肺胃生津潤燥最為無弊正訛沙參之味本經謂之苦王海藏以為微苦至景岳則改作微甘石頑則作甘淡其實雖不甚苦而寒性獨著體質輕清氣味俱薄具有輕揚上浮之性故專主上焦而色白屬肺則專走肺家本經稱其益肺氣者去其邪熱即所以益其正氣本非補益之正義而後人竟誤認為補肺專藥以潔古海藏之賢明而猶注猶下疑脫有字代人參補五臟之陰之說則吳遵程之所謂專補肺陰洵非倡議不知肺有餘熱清之固宜而肺氣不足清之已謬乃晚近庸夫每遇虛人咳嗽不問有邪無邪有痰無痰率以沙參麥冬玉竹知母等寒涼膩滯之品龐雜亂投自謂可以補肺以致膠結濁垢泄化無門遂以製造癆瘵之根蒂而不可救藥葉氏之醫案費氏之醫醇鼎鼎大名猶犯此禁無惑乎庸耳俗目日操殺人之筆而毫不覺悟雖曰沙參輕清尚不至如蕤麥知母之膩滯然寒性頗盛肺無熱邪亦足以暗戕生機而釀寒變繆仲淳僅禁用於肺寒咳嗽猶嫌其疏而未密耳李瀕湖綱目以沙參主肺痿亦取其補肺也若申言之則肺癰肺痿證情近似而一實一虛大相反背癰者壅塞本是實熱急須清泄不嫌寒涼痿者萎敗已是虛怯所宜扶持豈容寒苦惟肺痿之候固多咳嗆濃痰虛火猶熾則沙參清熱而不膩猶為相宜繆氏經疏沙參天冬麥冬百部五味子桑白皮治肺痿肺熱又沙參貝母枇杷葉瓜蔞甘草桑白皮百部天冬款冬花治久嗽壽頤按肺痿一方補肺清熱於虛熱之肺痿甚宜然若咳吐痰多則二冬五味皆在禁例非可浪用若久嗽一方則惟虛熱肺燥者可用而痰濁未淆注淆疑為清誤植者已為大戒設或更挾外邪則陰柔滋膩降氣戀邪又釀造癆瘵之不二法門矣南沙參發明沙參古無南北之別石頑逢原始言沙參有南北二種北省質堅性寒南者質松力薄趙氏綱目拾遺引藥性考謂南沙參形粗似黨參而硬味苦性涼清胃瀉火解毒止嗽寧肺壽頤按今市肆中北沙參堅實而瘦甫沙參空松而肥皆微甘微苦氣味輕清而富脂液故專主上焦清肺胃之熱養肺胃之陰性情功用無甚區別必謂北產性寒南產不寒似亦拘執成見趙氏所引止嗽寧肺亦主肺熱作嗽而言非泛治痰飲之寒嗽吳氏從新謂南沙參形稍瘦小則非今日市廛中物矣薺尼別錄味甘寒無毒解百藥毒正義本經以薺尼為桔梗之別名李瀕湖以為一類二種桔梗苦而薺尼甘故綱目於薺尼條中竟謂之甜桔梗古人以為解毒神品肘後方謂薺尼汁濃飲一升一藥而兼解眾毒千金以治強中消渴大明稱其殺蠱毒治蛇蟲咬熱狂溫病瀕湖又謂尼寒而利肺甘而解毒良品也而世不知用惜哉桔梗本經味辛微溫主胸脅痛如刀刺腹滿腸鳴幽幽驚恐悖氣別錄利五臟腸胃補血氣除寒熱風痹溫中消穀療咽喉痛下蠱毒正義桔梗氣味本經止作味辛微溫別錄乃加苦字而曰有小毒各本多作味辛苦微溫有小毒者本經別錄久已合而不分也味辛而氣溫故所主皆宣泄散寒之用胸脅痛如刀刺者即氣滯寒凝或飲邪阻塞之胸痹證桔梗辛溫宣通陽氣故能通痹止痛腹滿腸鳴皆寒滯中下脾陽不振驚恐悖氣則寒凌於上心陽不宣而桔梗皆能治之則固振動陽氣疏通郁窒合上中下三焦而統治之要藥也別錄利五臟腸胃即是宣通之功補血氣者辛溫之性能活血行氣通行百脈即補血補氣之義除寒熱者鼓舞陽氣而邪自消除也風痹皆氣血凝滯之候通而行之痹痛亦已則桔梗溫通之功又不獨內行於五臟六腑而並能外達於孔竅肌膚試合本經別錄而研究其功用可知辛溫通利之效甚大也溫中消穀又宣通陽氣之餘義療咽痛者蓋即仲景治少陰咽痛之意辛溫能通少陰之結氣非泛指溫熱上擾之咽痛下蠱毒者則取其宣泄之力耳廣義仲景三物白散治寒實結胸壽頤按此不獨以巴豆溫中祛寒而破堅積亦以桔梗助其辛溫開泄也又甘草桔梗湯治肺癰吐膿壽頤按此亦以桔梗之辛溫開泄排膿也又甘草桔梗湯治少陰證二三日咽痛壽頤按此方本以桔梗之辛溫開少陰之結氣乃後人竟以通治咽喉口舌諸病則止知仲景之治咽痛而略過少陰二字殆非仲景本意至宋時又以甘桔加荊芥防風連翹而易名為如聖湯治風熱咽痛則荊防疏其風連翹泄其熱而以桔梗開其結意亦猶是但火邪若盛則辛散之品究非所宜甄權治下痢破血積消痰涎去肺熱氣促咳逆除腹中冷痛日華主心腹脹痛破癥瘕肺癰潔古除胸膈間滯氣通鼻塞成無己謂其辛散而苦泄用以下氣東垣謂其利胸膈咽喉氣壅及痛破氣滯積塊治寒嘔張石頑謂其能開發腠理與羌獨柴胡芎蘇等同為解表藥丹溪謂痢疾腹痛乃肺金之氣鬱在大腸宜以苦桔梗開提之使血氣疏通然後乃用痢藥壽頤按桔梗宣通以主痢疾腹痛其效頗捷但所謂肺氣鬱於大腸立論迂遠是乃為潔古上升之說所愚何不曰肝脾之氣窒塞不通先宜宣利其氣機之為直捷爽快乎正訛桔梗功用諸家所述皆溫通宣泄無論上焦下焦結滯之病一例通治獨張潔古謂其為諸藥之舟楫載以上行至胸中最高之分諸藥中有此一物則不能下沉云云繆仲淳和之謂其性陽而上升凡病氣逆上升者弗用及下焦藥中弗入此味張景岳之本草正又大暢其旨謂專用降劑此物不宜同用壽頤按此說不知易老從何處悟入本經別錄皆無此意殆誤認仲景千金甘桔諸方或治咽痛喉痹或治肺癰喘咳皆主上焦之病而云然然試觀本草經主腹滿腸鳴別錄下蠱毒豈無下行之用張隱菴辨之謂桔梗氣分之藥上中下皆可治斥潔古為杜撰然潔古景岳之說今尚盛行於時遂令通達三焦宣陽行氣之功不復信用於世易老誤人正是不淺丹溪之言曰乾咳嗽乃痰火之邪郁在肺中宜苦桔梗以開提之壽頤按桔梗辛溫以治火鬱未能熨貼但輕用之以為嚮導尚無大弊石頑謂痘疹尚下部不能起發大忌桔梗陰虛久嗽不宜用皆以其疏泄陽氣也仲景甘桔湯本治少陰咽痛而後人乃以此方統治一切風熱實火咽痛多未見其效者則抹卻少陰一層之過也且自易老獨創桔梗上升之議仲淳景岳石頑諸子靡然宗之而猶認定其為咽痛專藥就使桔梗果屬升提則凡風熱實火諸喉咽病正是火勢上壅之候更與溫升寧不抱薪救火而益張其焰奈何庸俗之流猶昧然盲從而執定甘桔為咽痛之普通藥劑耶白朮本經術味苦溫主風寒濕痹死肌痙疸止汗除熱消食作煎餌別錄味苦甘主大風風眩頭痛目淚出消痰水逐皮間風水結腫除心下結滿及霍亂吐下不止利腰臍間血益津液暖胃消穀嗜食考證本草經及別錄皆稱術而無蒼白之分陶氏弘景及宋之蘇頌皆言術以茅山為勝似今之所謂茅山蒼朮亦即古之所謂術也然弘景又別有赤朮之名謂其苦而多膏又似梁時已有蒼朮一種今按本經主治詳其功用頗似今之茅朮惟白朮健脾化濕其力亦同至名醫別錄又言味苦甘增一甘字則明是白朮李瀕湖以本經別錄之文兩繫於白朮蒼朮二條而隱菴因之真駢拇矣正義白朮氣味芳香苦甘而溫稟坤土中和之性故專主脾胃以補土勝濕見長溫能勝寒燥能驅濕而芳香之氣能通脈絡走肌肉故專風寒濕痹而治死肌風濕著於關節則痙而強直脾家濕熱鬱蒸則發為黃疸術能勝濕而芳香宣絡故主痙疸自汗亦脾家之濕熱術燥其濕則汗自止除熱者除脾虛之發熱也消食者濕除而脾運自健也特提出作煎餌一層則以其豐於脂膏故宜於煎劑陳修園謂後人土拌炒燥大夫經旨者也別錄主大風蓋亦指風濕言之芳香善走而主肌肉故大風可除風眩頭痛目淚有濕盛而濁氣上蒙者亦有中虛而清陽不布者術能除痰勝濕補中升清斯眩痛可止目淚可除非肝火上浮之目眩頭痛流淚也消痰逐水退痛除滿皆勝濕健脾之效霍亂吐利亦指脾有寒濕之證乃宜於術利腰臍間血亦芳香之氣可以流利氣血之運行即本經主死肌之意益津液者術本富於脂膏也暖胃消穀嗜食無一非芳香醒脾溫養健運之功耳廣義甄權主心腹脹滿腹中冷痛日華治冷氣痃癖婦人冷癥瘕海藏治脘痛皆溫養脾胃芳香行氣之功此理中湯所以為不祧之祖也甄權止嘔逆日華主反胃皆胃氣虛寒為病正與濕熱痰飲之嘔吐相反術溫而燥醒脾安胃故能定嘔潔古主四肢困倦嗜臥不思食消足脛濕腫王海藏主身體重皆燥濕健脾宜用蒼朮石頑謂生用則除濕益燥消痰利水治濕痹死肌制熟則和中補氣止渴生津止汗除熱進食得參苓大補中氣得枳橘健運飲食張隱菴謂脾喜燥而惡濕喜溫而惡寒然土必有濕氣始能灌溉四旁過燥則不能運化為脾約之病白朮多脂性雖燥而能潤溫而能和靈胎謂白朮氣香而性溫味苦而甘皆屬於上故宜補脾土而其氣甚烈芳香四達故又能達於經脈肌膚不專於補中發明術之功用自唐宋以前止言其燥濕逐水所謂暖胃消食亦燥能健脾醒胃也蓋其氣甚烈故能振動脾陽而又疏通經絡然又最富脂膏故雖苦溫能燥而亦滋津液且以氣勝者流行迅利本能致津液通氣也唐宋以後皆以為補益脾胃其旨即從此出壽頤謂白朮蒼朮在古不分而今已各別則凡古人所稱燥濕逐水之用今必以茅山蒼朮當之其補益脾胃則宜用白朮蓋今之所謂冬白朮者質潤而氣香健運脾陽滋養胃陰之力不小且其氣既盛不致呆守滿中允為健脾益胃之專劑矣禁忌仲景理中丸臍上築築腎氣動也欲作奔豚去白朮而加桂四兩壽頤按此以腎氣上奔而術以氣勝恐增其升也又吐多去朮亦即此意正訛東垣謂白朮主安胎蓋謂妊娠養胎依賴脾土術能健胃故耳乃後人竟一例盲從不論何種醫書皆止言白朮安胎而不詳其理頗似安胎一事但用白朮一味可竟全功而於體質之虛實病情之寒熱不妨一概不問有是理乎丹溪謂白朮無汗能發有汗能止壽頤按白朮補中雖以氣勝不可謂之發汗惟蒼朮則辛烈開腠能發濕家之汗耳繆仲淳引劉涓子癰疽論謂潰瘍忌白朮以其燥腎閉氣故能生膿作痛張石頑亦採其說不知術能補益潰瘍毒盛誠非所宜若潰後元虛非補脾胃何以收效參地朮耆皆補虛要藥豈可不問虛實而一概抹煞之耶繆氏又謂術以氣勝除邪之功巨補陰之效虧凡陰虛血少燥渴及精不足便閉滯下者忌之繆氏之意蓋謂其氣味燥烈故有耗陰爍精等弊愚謂術本多脂萬無傷陰之慮仲淳臆說妄不可聽於潛術發明術之種類不一古今以於潛產者為上品然真是野生者不可多得今市肆之所謂於朮皆江西萍鄉產也人力培植較之尋常白朮氣稍和平質稍柔潤以補脾胃頗合沖和之性徽歙術發明今安徽有野術一種非市肆所有乃土人四出尋覓而得者氣味芳香異常而不燥烈中有硃砂點甚多雖藏之極燥而剖之則朱點皆是硃色之油最是上品以入煎劑清芬之氣繚繞一室令人鐃注當是饞之誤涎欲滴補脾醒胃大有奇功非尋常之冬白朮萍鄉術所能望見項背者也蒼朮廣義陶弘景除惡氣弭災沴日華主痃癖氣塊冷氣癥瘕山嵐瘴氣東垣除濕發汗健脾安胃為治痿要藥丹溪總解諸郁瀕湖主濕痰留飲或為窠囊及脾濕下流濁淋帶下發明蒼朮氣味雄厚較白朮愈猛為徹上徹下燥濕而宣化痰飲芳香闢穢勝四時不正之氣故時疫之病多用之最能驅除穢濁惡氣陰霾之域久曠之屋宜焚此物而後居人亦此意也凡濕困脾陽倦怠嗜臥肢體痠軟胸膈滿悶甚至䐜脹而舌濁厚膩者非茅朮芳香猛烈不能開泄而痰飲瀰漫亦非此不化夏秋之交暑濕交蒸濕溫病寒熱頭脹如裹或胸痞嘔惡皆須茅朮藿香佩蘭葉等香燥醒脾其應如響而脾家郁濕或為䐜脹或為腫滿或為瀉泄瘧利或下流而足重胕腫或積滯而二便不利及濕熱鬱蒸發為瘡瘍流注或寒濕互結發為陰疽痠痛但有舌苔白垢濁膩見證茅朮一味最為必需之品是合內外各病皆有大用者而庸俗每畏其燥烈而不敢用亦只見其識證不清耳蒼朮本以產茅山者為佳故有茅朮之名氣味濃厚其力尤弘今所通用皆茅朮也黃耆注附黃耆莖葉黃耆皮本經味甘微溫主癰疽久敗創創今作瘡排膿止痛大風癩疾五痔鼠瘻補虛小兒百病別錄婦人子臟風邪氣逐五臟間惡血補丈夫虛損五勞羸瘦止渴腹痛泄利益氣利陰氣其莖葉療渴及筋攣癰腫疽瘡正義黃耆甘溫補氣稟升發之性專走表分而固皮毛本草經所主多皮膚肌肉之病癰疽久敗則表虛而肌肉敗壞耆能固表則補其久敗之虛而排膿止痛大風癩疾亦皮膚肌肉久敗之病培養其在表之氣血則正氣旺而邪自可除五痔者中氣之下陷也耆有升發之力則舉其陷而有餘然濕火盛者弗誤與也鼠瘻即瘰癧亦綿延久敗之瘡瘍虛則補之耆之用也若暴病痰火凝結則亦非其治矣陳修園謂瘰癧乃少陽膽經三焦經之鬱結耆稟少陽之氣化能使少陽生氣條達故能解散其鬱修園又謂本經補虛二字乃總結上文諸證之久而致虛者耆能補之非泛言其為補益之品然壽頤則謂耆固補虛之品即以為泛指諸虛亦無不可其主小兒百病者溫和滋長之性固最宜於兒童之發育生長也別錄主婦人子臟風邪氣者乃中氣之不振補益中氣則邪氣自除且氣行則血行溫養而運行之斯五臟間之惡血自去補虛損五勞羸瘦皆益氣溫養之功且甘能益法液溫和則潤澤而耆稟升舉之性助其脾胃津液斯口渴自止腹痛泄利皆中氣不舉清陽下陷之候甘溫益氣則痛利自已利陰氣者陽氣運而陰血自充也莖葉療渴亦升清滋液之功治筋攣者亦惟稟溫和之性者斯能有宣通脈絡之力也其治癰腫疽瘡則莖葉自有外行旁達之性乃能疏通氣血而消腫化壅與根之偏於補益者固自有別耳廣義日華主腸風下血帶下崩中皆中氣下陷之候故宜升而舉之又主赤白痢則必久痢之氣虛者方可用之而濕熱未清不可妄試也潔古治虛勞自汗盜汗則溫養元氣固護膚表之功又稱其補肺氣亦肺虛補母之義實脾土而且能升清氣也又謂其退肌熱則脾虛之發熱甘以補脾而助元氣斯肌熱可除所謂甘溫退大熱者是矣景岳謂黃耆氣味俱輕專於氣分而達表徐洄溪謂耆之皮最厚故補益皮肉為外科生肌長肉之聖藥壽頤謂此惟潰久元虛者宜之毒未清腫未消者弗用陳修園謂當歸六黃湯寒以除熱熱除則汗止耆附湯溫以回陽陽回則汗止玉屏風散散以驅風風散則汗止諸方皆藉黃注黃字後當脫耆字走表之力領諸藥達於表分而止汗非黃耆之自能止汗也諸家有生用發汗炒用止汗之說皆誤發明黃耆具春令升發之性味甘氣溫色黃皆得中和之正故能補益中土溫養脾胃凡中氣不振脾土虛弱清氣下陷者最宜其皮味濃質厚力量皆在皮中故能直達人之膚表肌肉固護衛陽充實表分是其專長所以表虛諸病最為神劑但升舉有餘偏於陽分氣虛陽虛者宜升宜提而陰虛火擾者宜禁若肝腎不足不可誤與升陽伐其根本故凡飢飽勞役脾陽下陷氣怯神疲者及瘧久脾虛清氣不升寒熱不止者授以東垣之補中益氣湯無不捷效正以黃耆為參朮之佐而又得升柴以升舉之則脾陽復辟而中州之大氣斡旋矣正訛黃耆為固表主藥甘溫之性專走肌肉皮膚本草經主癰疽久敗瘡排膿止痛明謂其專治癰疽之久敗者則排膿止痛蓋久敗之潰瘍肌肉久壞膿水頻仍表氣大虛黃耆益氣固表以療其虛斯能排膿止痛耳張隱菴亦謂癰疽日久正氣衰微故為久敗乃後人習焉不察誤認為通治癰疽置久敗二字於不問張潔古則稱其內托陰疽為瘡家聖藥繆仲淳則稱其治小兒胎毒瘡癤張景岳則稱其生者可治癰疽張石頑則稱其托已潰瘡瘍餘子碌碌無不節取本經排膿止痛四字泛指為瘡家必用之藥所以庸俗之書治瘡各方類皆不問虛實插入黃耆一味自謂能讀本草經而富貴家亦喜其堂皇冠冕信之不疑不知毒勢方張而用實表之藥為虎傅翼適以愈張其焰則腫瘍難消潰瘍毒熾排膿適以生膿止痛乃以增痛皆誤讀本經之咎矣潔古所謂內托陰疽注重陰證猶可說也然堅腫而實其表亦以助邪終屬非法且瘡家聖藥四字即為後人沿訛襲謬之根而繆氏經疏竟謂其治小兒胎毒瘡癤則皆熱毒濕火之病而投甘溫固表直是抱薪救火誤讀古書抑何至於此極景岳石頑皆高明之士所論藥物皆有經驗而猶仍斯訛謬又何怪庸耳俗目之人云亦云胡蘆依樣耶壽頤於瘍科一門具有師承凡在腫瘍及潰瘍之毒勢未清者概不浪投補劑以取悅富貴之家惟潰久元虛或虛寒之體始以四君六君保元歸脾等方隨宜擇用非矯異於庸俗也亦證情之不容不爾者耳敢揭而出之為世之治瘍者告俾知本草經固未嘗不可信特不可為誤讀古書者所惑庶幾令病人少受痛楚亦治醫者之陰德也白朮條中昔人曾有潰瘍忌用之說以其能生膿作痛耳張石頑亦信之試問同是補益肌肉之品何以一忌一宜大相刺謬如此豈有術之補脾必生膿作痛而耆之固表反有消膿止痛之理則後先虛實不知辨別而混為一例之過也須知藥之治病全在用之得當同此一病而前後之虛實不同斯攻補即當異治若但執一病名而不問虛實不問寒熱泛泛然號於眾曰某藥為宜某藥為忌豈理也哉甄權主虛喘腎衰蓋誤認其補氣之過也要之升舉之品正與喘證之氣逆上壅相反且腎衰作喘本是氣虛不攝陰火上衝攝納歸元猶恐不及乃復舉而升之則根本既搖而速之蹶矣此東垣之補中益氣湯所以最不宜於肝腎之虛也張潔古謂其瀉肺火蓋指氣虛發熱言之虛陽不藏面赤發熱有似肺家之火則耆之補脾益氣能退大熱若火熱刑金而妄投補益則謬矣東垣謂防風能制黃耆而耆得防風其功愈大云云壽頤謂既以制之而反能張大其功自盾自矛最為可笑蓋既惑於昔人相制之謬說而又無解於許胤宗之以黃耆防風湯薰愈柳太后中風口噤之病乃欲申一說以解其紛而不悟適以造成怪誕支離之弊蓋防風黃耆均是行表之藥道合志同何云相制胤宗之法自有巧思不意東垣倡此奇談殊為可駭要知徒逞臆見毫不足徵後學萬弗泥此庶不汩沒性靈窒塞智慧且中風而口噤不語最多氣升痰升內因之病防風表藥直是鴆毒古人多作外風治療皆是誤認所以古之治案多難盡信許氏此案見舊唐書本傳治法新穎獨闢蹊徑如謂果能取效恐亦未必蓋史乘中所載醫家治驗大都意想之辭試為細核醫藥理法多難符合良由秉筆者傳聞得之而文人又皆不知醫理則人云亦云但知其新奇可喜又安能辨得病理之確當與否子長之扁鵲倉公傳尚多不可索解更何論范曄陳壽以下如華佗傳等皆是況乎中風一證卒僕昏迷本非外受之風素問謂是血菀於上名以薄厥又謂氣血交併於上名以大厥今西醫謂之血沖腦經皆不可妄用風藥壽頤編有中風斠詮三卷專論此病以實驗為主一洗古書辛散溫藥之弊胤宗此案果是外風則不服而薰已覺有意矜奇效否亦殊難必若是內因則為害必甚雖入正史壽頤終不敢深信而東垣黃耆之說更是匪夷所思出乎情理之外潔古有黃耆無汗發之有汗止之一說而後人之編本草者多循例照錄無汗能發有汗能止兩句幾以此物為發汗止汗專藥亦知二者之功甩一散一收正如冰炭之相反而不相合天下安有一物而具有水火兩性之理黃耆之效力如此寧非絕大怪異抑知耆能達表而補益衛陽明系固表之藥何以能發汗奏績惟其衛分充溢而陽氣流通固亦有時而微汗津津者潔古意中固自有說然約而舉之則非立言之體矣玉竹本經女萎味甘平主中風暴熱不能動搖跌筋結肉諸不足別錄萎蕤主心腹結氣虛熱濕毒腰痛莖中寒及目痛眥爛淚出一名玉竹考證玉竹古者作葳蕤爾雅作委萎惟本草經則作女萎太平御覽引吳普本草女萎一名威蕤一名玉竹李瀕湖謂女萎即爾雅委萎之訛正義玉竹味甘多脂為清熱滋潤之品本經主中風暴熱不能動搖是甘寒清熱柔潤息風之功效千金葳蕤湯主風溫自汗即本斯旨跌筋結肉蓋灼熱傷陰而筋肉拘攣之證寒勝熱潤除燥所以主之然跌筋二字甚不可解則古人傳寫容有訛誤讀古書者以意逆之自能得其會通正不必拘泥字面反多窒礙諸不足三字張隱菴謂申明以上諸證皆屬津液不足最是確論蓋玉竹陰柔膩滯必非能治諸虛不足之藥而淺者泥之過矣別錄主心腹結氣亦指燥熱之證非痰濕凝結所宜主虛熱則陰柔養液之功主目痛眥爛淚出則息風退熱之力其治腰痛者蓋指腎經燥熱陰液不充之病非虛寒腰痛可比惟濕毒及莖中寒兩條顯與玉竹之柔潤不合疑有誤字不敢強作解人自欺欺世瀕湖綱目引別錄委蛇一條附入萎蕤之下云味甘平主消渴少氣瀕湖謂亦似萎蕤頤按委蛇萎蕤古音本近而主消渴少氣則潤以益津正是葳蕤之功姑附於此廣義甄權主時疾寒熱日華主天行熱狂瀕湖主風溫灼熱即本經主中風暴熱之意但火熾盛者宜之而表寒未已或挾痰涎及胸膈窒塞者均在禁例日華除煩悶止消渴潤心肺皆甘寒滋液之用也煩悶者煩熱之悶與痰壅氣窒之悶證情近似而治法天淵學者須於此等同病異源之處詳細辨明方不貽人殃禍弘景謂服諸石人不調和者煮汁飲之聖惠方治乳石發熱則古人喜服燥熱石藥以為補品故古書多有解石藥毒之方而玉竹能解此毒其寒可知發明玉竹味甘多脂柔潤之品本草雖不言其寒然所治皆燥熱之病其寒何如古人以治風熱蓋柔潤能息風耳陰寒之質非能治外來之風邪凡熱邪燔灼火盛生風之病最宜今惟以治肺胃燥熱津液枯涸口渴咽乾等證而胃火熾盛燥渴消穀多食易飢者尤有捷效千金及朱肱以為治風溫主藥正以風溫之病內熱蒸騰由熱生風本非外感而熱勢最盛津液易傷故以玉竹為之主藥甄權謂頭不安者加用此物亦指肝火猖狂風陽上擾之頭痛甘寒柔潤正為息風清火之妙用豈謂其能通治一切頭痛耶正訛本經諸不足三字是總結上文暴熱諸句隱菴之言甚是乃昔人誤以為泛指諸虛不足而言故甄權則曰內補不足蕭炳則曰補中益氣日華則曰補五勞七傷虛損瀕湖則曰補脾胃虛乏男子小便頻頻失精一切虛損且謂治虛勞寒熱及一切不足之證用代參耆不寒不燥大有奇功凡以此為勞瘵起死回生之神劑亦知柔潤之性純陰用事已足以戕生生之機況虛勞之病陰陽並虧縱使虛火鴟張亦無寒涼直折之法又豈有陰寒膩滯之質而能補中益氣之理諸家之說皆誤讀本草經諸不足三字之咎而李瀕湖創作邪說尤其荒謬邇來以麥冬玉竹知母花粉等品製造勢注當是勞字之誤瘵之良工遍地多有其近因固誤於臨證指南醫醇剩義二種其遠因實發源於瀕湖之綱目張隱菴本草注已謂玉竹陰柔之質豈堪重任古人於風熱以外絕不採用自李氏有不寒不燥之論而時醫信為補劑虛證得此百無一生陳氏修園亦詳辨之乃近人猶不覺悟竟於虛熱咳嗽等病恣用陰柔膩滯之品戀邪助痰暗戕脾土明明將輕微之病一力送入鬼門關者比比而是大率皆誤於此可勝長嘆張石頑謂玉竹雖潤而不傷脾泄瀉壽頤則謂陰寒之品無不礙中石頑此說必不可信又仲淳經疏極贊此物則瀕湖之流亞也且謂其滋長陽氣更屬無徵天麻本經赤箭味辛溫殺鬼精物蠱毒惡氣別錄消癰腫下支滿寒疝下血存疑古書止有赤箭之名宋人乃用天麻諸家考證以赤箭為苗天麻為根議論甚詳似無疑義但本經別錄所稱赤箭之主治與後人天麻之功用大是不類經言殺鬼物蠱毒惡氣而味辛溫是祛邪辟惡之品且赤箭之名以象形取義而屬之於苗然今之辟惡亦無復用赤箭者姑略之而不復深考亦闕其所不知之義也別錄所稱主治亦與今之天麻不符不可強解茲錄自宋以來諸家所說於廣義條下並考證其功用如下廣義開寶本草始有天麻之名主諸風濕痹四肢拘攣利腰膝強筋力甄權治冷氣𤸷痹癱瘓不隨日華謂其通血脈東垣主諸風麻痹不仁此皆以為祛風勝濕疏通脈絡之品也又開寶治小兒風癇驚氣甄權主語多恍惚善驚失志潔古治風虛眩暈頭痛東垣主風熱語言不遂羅天益謂眼黑頭旋風虛內作非天麻不治則又息風平肝寧神鎮靜之功矣二者之病一屬邪實一屬正虛實者宜攻虛者宜補大是相反其以天麻為治風濕拘攣者固以為散風驅邪之用乃或以為治風虛眩暈則又明著其潛陽養正之功一散一收一走一守處於北轍南轅之地萬不能合而為一讀者將信其一面之言乎抑將如隨風楊柳到處逢迎乎此理之所必不可通者也然試研究前賢之成說而以臨證時之效力相合而參之平情而審之當知此中自有區別斷不容存騎牆之見模稜而認為兩可因書所見於發明條中願與明達之士共正之然後知古書固不可輕信而談醫者尤不可不於臨證之時細心體察以求其實在之治驗也發明天麻氣味古皆稱其辛溫蓋即因於本草經之赤箭而開寶甄權諸家稱其主諸風濕痹冷氣癱瘓等證皆因辛溫二字而來故視為驅風勝濕溫通行痹之品然潔古諸家又謂其主虛風眩暈頭痛則平肝息風適與祛風行痹宣散之法相背使其果屬辛溫宣散則用以治虛風之眩暈頭痛寧不助其升騰而益張其焰何以羅天益且謂眼黑頭旋風虛內作非天麻不能治以此知果是風寒濕邪之痹著癱瘓等證非天麻之所能奏效也蓋天麻之質厚重堅實而明淨光潤富於脂液故能平靜鎮定養液以息內風古有定風草之名能治虛風豈同誑語今恆以治血虛眩暈及兒童熱痰風驚皆有捷效故甄權以治語多恍惚善驚失志東垣以治風熱語言不遂皆取其養陰滋液而息內風蓋氣味辛溫之說本沿赤箭之舊實則辛於何有而溫亦虛言是以張景岳改作辛平張石頑亦作辛平微溫誠恐以辛溫之味而治虛風或以啟人之疑竇耳且石頑之逢原不採濕痹拘攣一節尤有卓見其意亦知平肝息風之品斷無驅濕通痹之理然則俗醫猶信其宣通絡脈疏散外風亦未免為開寶所愚矣或謂既多脂液而能養血平肝又何必不可以補益經絡而治風痹然柔潤之物終無驅濕而治冷氣𤸷痹之理蓋通經宣絡泄散外感之風必不能與潛降攝納鎮定內動之風併為一氣要知痹痛拘攣不仁不遂癱瘓麻木諸證本多肝陽上升擾動腦經之病必以潛陽鎮攝為治乃有捷效天麻重墜定風正是專藥古人固知此物之能治此病開寶所謂利腰膝強筋力者亦是此旨然古人之治麻痹癱瘓諸證又無不誤內風為外風者既知天麻能愈是病遂並誤認為疏風逐濕之品斯其所以一誤再誤而糾結繚繞今人不可索解者也正訛石頑又謂天麻雖曰不燥終屬風藥若血虛無風火炎頭痛不可妄用是猶誤認其升散而故為叮嚀其亦知陰虛頭痛雖曰虛火上炎實皆內風煽動固未有火盛而不生風者而天麻之治風則柔潤以息風湯注當為揚字之誤殊非升散疏泄之比景岳且有性懦力緩必須倍用之說則善用之者尤須重其任而後乃能專其效石頑固未達此一間者也肉蓯蓉本經味甘微溫主五勞七傷補中除莖中寒熱痛養五臟強陰益精氣婦人癥瘕別錄味甘酸咸微溫除膀胱邪氣腰痛止利正義肉蓯蓉甘溫濃厚之味為補陰益精之品本經主治皆以臟陰言之主勞傷補中養五臟強陰皆補陰之功也莖中寒熱痛則腎臟虛空之病蓯蓉厚重下降直入腎家溫而能潤無燥烈之害能溫養精血而通陽氣故曰益精氣主癥瘕者咸能軟堅而入血分且補益陰精溫養陽氣斯氣血流利而否塞通矣別錄除膀胱邪氣亦溫養而水府之寒邪自除腰者腎之府腎虛則腰痛蓯蓉益腎是以治之利今本皆作痢是積滯不快之滯下非泄瀉之自利蓯蓉滑腸痢為積滯宜疏達而不宜固澀滑以去其著又能養五臟而不專於攻逐則為久痢之中氣已虛而積滯未盡者言之非通治暑濕熱結滯之痢疾也廣義日華主男子絕陽不興婦人絕陰不產暖腰膝主泄精遺瀝及帶下陰痛景岳謂性滑而味重能動大便凡閉結不通而虛不可攻洗淡用三四錢一服即效石頑謂老人燥結宜煮粥食之發明蓯蓉為極潤之品市肆皆以鹽漬乃能久藏古書皆稱其微溫而今則為鹽味久漬溫性已化除淨絕縱使漂洗極淡而本性亦將消滅無餘故古人所稱補陰興陽種種功效俱極薄弱蓋已習與俱化不復可以本來之質一例論矣但鹽能下降滑能通暢以主大便不爽頗得捷效且性本溫潤益陰通陽故通腑而不傷津液尤其獨步耳禁忌繆氏經疏謂泄瀉禁用及腎中有熱強陽易興而精不固者忌之石頑謂胃氣虛者服之令人嘔吐正訛自宋以來皆以蓯蓉主遺泄帶下甚且以主血崩溺血蓋以其補陰助陽謂為有收攝固陰之效補要注兩字疑有誤植滑利之品通導有餘奚能固澀本經除莖中寒熱痛正以補陰通陽通則不痛耳乃後人引申其義誤認大補反欲以通利治滑脫謬矣鎖陽發明鎖陽載於朱丹溪本草補遺稱其甘溫大補陰氣益精血利大便虛人燥結宜之陶宗儀輟耕錄亦謂野馬遺精所生則形色功用本與蓯蓉同類古方虎潛丸用之即蓯蓉補腎起痿之義也巴戟天本經味辛微溫主大風邪氣陰痿不起強筋骨安五臟補中增志益氣別錄味辛甘微溫療頭面遊風小腹及陰中相引痛下氣補五勞益精利男子正義巴戟隆冬不調味辛氣溫專入腎家為鼓舞陽氣之用本經主大風邪氣別錄療頭面遊風蓋以外來之寒風言之溫養元陽則邪氣自除起陰痿強筋骨益精治小腹陰中相引痛皆溫腎勝寒之效安五臟補五勞補中增志益氣皆元陽布護之功也別錄又謂其下氣蓋腎陽不攝寒水上凌致有氣逆喘滿之證巴戟溫腎以攝納其下而上逆之氣自平非熱痰上湧之氣逆也廣義甄權以治風癩瀕湖謂去風疾蓋即本經主大風之意然辛溫之品惟寒鬱在表者宜之而風燥血熱胡可妄試景岳治腰膝疼痛亦腎家之虛證然亦惟陽虛者為宜陰虛有火不可泛投發明巴戟味辛其溫性雖不甚烈而實為腎臟益陽之品雖曰溫和之氣足以助五臟之長育古人每以主虛損不足之病然溫腎助陽惟陽虛氣衰者為宜而陰虛血弱者弗用不獨畏其扶陽耗陰亦以擾動相火更令魂夢不安易致強陽失精之禍凡巴戟仙茅仙靈脾等物溫腎助陽古人恆以為補藥腎主藥注前藥字當是衍文而亦最易為戕生之利器今人體質柔脆嗜欲少節陰虛火旺者多不可以古書稱其補益而信手拈來誤人生命也正訛本經謂巴戟主大風後人以治風病其意正同蓋古人之所謂風者皆以西北寒風言之故祛風多用溫藥而今之風病則多血耗生風血熱血燥之病恰與古之寒風絕端相反豈可更用溫辛助其剛燥此巴戟之必不可以治今之風病者也仲淳經疏謂巴戟助元陽而兼散邪已是曲為之解陳修園乃為大風邪氣四字添出和風疾風等許多空議論直夢話耳甄權藥性本草謂其主夜夢鬼交精泄景岳並謂治濁則因巴戟之強陰益精而欲以補助其虛弱也不知淫夢失精皆至陰不攝相火肆擾為害滋陰攝陽最為正治而反用辛溫興陽之品則火愈熾而魂愈不安抱薪救火反以助其囂張為禍更烈胡可為訓近人頗有以溫腎之品治腎陰不充者豈不曰此皆補腎之主藥然擾動龍雷而長其欲焰未有不速其斃者冤鬼夜嗥醫者不悟大可痛也遠志本經味苦溫主咳逆傷中補不足除邪氣利九竅益智慧耳目聰明不忘強志倍力別錄定心氣止驚悸益精去心下膈氣皮膚中熱面目黃正義遠志性溫味苦而辛補益心氣而通調營血故為心家主藥咳逆者寒飲上凌之證辛苦而溫能散寒滌飲則咳逆自平非火升痰升之咳嗽氣逆也主傷中而補不足則溫和之性能使氣血通調耳除邪氣者溫養元氣則邪氣自卻利九竅而耳目聰明益智慧而不忘強志皆以其通調心氣充牣心血之力而推闡以極言之耳別錄定心氣止驚悸益精皆補心之義去心下膈氣亦即治咳逆除邪氣之旨其除皮腎注當是膚字之誤中熱療面目之黃者無非溫養宣通氣血和調之功用總之辛溫芳香專入血分補養心血斯百骸從令而邪氣不幹耳廣義甄權治健忘安魂魄即補心養血之功日華長肌肉助筋骨又其補血之力也海藏以治腎積奔豚則心陽既振斯腎邪不留耳與別錄去心下膈氣之義相似陳無擇三因方以治一切癰疽則辛溫行血而癰疽可消用意固甚巧也發明遠志味苦入心氣溫行血而芳香清冽又能通行氣分其專主心經者心本血之總彙辛溫以通利之宜其振作心陽而益人智慧矣古今主治無一非補助心陽之功效而李瀕湖獨謂其專入腎家未免故為矯異張石頑和之非篤論也本經主咳逆則苦泄溫通辛散斯寒飲之咳逆自平此遠志又有消痰飲止咳嗽之功別錄去心下膈氣亦即此意今東瀛醫者專用以化痰止嗽頗有奇功而中醫多來之知可謂數典忘祖能不令人齒冷惟外臺載古今錄驗胸痹心痛一方中有遠志頗合此旨而張石頑反疑本經咳逆為誤字蓋亦未達其苦能泄化溫能滌飲之旨三因方治一切癰疽最合溫通行血之義而今之瘍科亦皆不知辜負好方大是可惜壽頤恆用於寒凝氣滯痰濕入絡發為癰腫等證其效最捷惟血熱濕熱之毒亦不必一例亂投無分彼此耳正訛遠志辛溫能利血之運行而以為心家補益之品者振動而流利之斯心陽敷布而不窒滯此補心之真旨也然溫升之品必不宜於實熱如誤用於熱痰矇蔽之證得毋益張其焰又所謂安魂魄定驚悸者亦謂補助心陽則心氣充而魂夢自寧驚悸自定非養液寧神以安宅之者可比如因熱生驚及相火擾攘而亦與以溫升其弊亦與熱痰相等又古有遠志能交通心腎之說則心陽不振清氣下陷及腎氣虛寒不能上升者以遠志之溫升舉其下陷而引起腎陽本是正治然俗人不察每遇腎陽不藏淫夢失精等證亦曰此屬坎離之不交須以遠志引之使其水火交接則相火愈浮腎氣不攝利九竅者適以滑精竅益精者將反以失精矣此不辨寒溫虛實而徒讀古書之咎也豈古人之欺吾哉丹參本經味苦微寒主心腹邪氣腸鳴幽幽如走水寒熱積聚破癥除瘕止煩滿益氣別錄養血去心腹痼疾結氣腰脊強腳痹除風邪留熱正義丹參色赤專主血分味苦而微辛本經謂之微寒陶弘景已疑其誤繆仲淳亦疑之至張石頑乃改作微溫詳審本經別錄所載主治石頑是也心腹邪氣腸鳴幽幽及心腹痼疾結氣皆清陽不宣虛寒氣滯之病丹參通調血滯溫養氣機所以主之寒熱積聚癥瘕又皆氣凝血瘀之證非溫通氣血何能消散止煩滿者氣運血隨自可除煩泄滿況味之苦者本以泄降為專職者乎別錄主腰脊強腳痹亦以溫通氣血故能宣絡蠲痹除風邪留熱者則風乘於表鬱而為熱故以溫和之氣散之且古人治風多用溫藥非如今時東南之地風熱之病宜於辛涼者可比也廣義弘景丹參漬酒飲療風痹足軟蕭炳丹參治風軟腳可逐奔馬故一名奔馬草日華通利關節主骨節疼痛四肢不遂皆即別錄主腰脊腳痹之義甄權主腹痛氣作聲音鳴吼聖惠方治寒疝小腹陰中相引痛自汗欲死即本經治心腹邪氣別錄去心腹痼疾之意也日華又謂調婦人經事則亦通調血氣之義耳發明丹參專入血分其功在於活血行血內之達臟腑而化瘀滯故積聚消而癥瘕破外之利關節而通脈絡則腰膝健而痹著行詳核古人主治與注當為無字之誤一非宣通運行之效而其所以能運行者則必有溫和之氣方能鼓盪之振動之所說主心腹邪氣腸鳴痼疾其義已隱隱可見然走竄有餘必非補養之品即本經所謂益氣別錄所謂養血皆言其積滯既去而正氣自伸之意亦以通為補耳惟苦味泄降故所主各病皆有下行為順之意此則於行氣行血之中又必含有下達性質而世俗以為補血之用及以之止崩中帶下皆非古人之真旨矣正訛丹參氣味本經別錄皆謂微寒而所主心腹邪氣腸鳴幽幽痼疾結氣無一非寒邪為病當無用寒藥主治之理而積聚癥瘕又非溫運不通可疑已極昔陶隱居已謂其久服眼赤其性應熱今按色赤行血斷非微寒之物則石頑逢原改作微溫固非武斷既徵之別錄之主腰脊強腳痹弘景之治風痹足軟聖惠方之主寒疝驗之臨證功用無不灼然可信則寒字之誤無可疑者而張隱菴葉天士等猶專主本經曲曲附會雖曰尊經之旨宜爾然反使主治全文皆迷重霧則拘迂太過非真能闡發奧旨者也日華本草丹參主治所錄最詳而亦最雜惟骨節疼痛四肢不遂八字合於別錄脊強腳痹證治甚至謂其主頭痛赤眼正與陶弘景久服眼赤之語背道而馳又有治冷熱勞熱溫狂悶破宿血生新血安生胎落死胎止血崩帶下調婦人經脈不勻惡瘡疥癬癭贅丹毒排膿止痛生肌長肉等語雜亂無章全是憑空虛構雖此等無稽之言本不足辨止以近日俗書多采此種囈語貽誤學者實屬不少而景岳士材石頑諸家猶一例採錄不加辨正又何怪乎汪訒庵吳儀洛輩之附和盲從耶考日華是書全由採集而成本非有真知灼見可以闡揚醫理蓋亦汪氏集解吳氏從新之類原不足道獨惜李瀕湖最稱淵博當非抄書胥可比乃本草綱目亦貪多務得不知節取反以貽誤後生同入暗室而明季以後之本草又多祖述李氏隨意節錄幾句便成一家則真一盲引眾盲相將入火坑矣瀕湖又引明理論有一味丹參散功同四物湯之說云治婦人經脈不調或前或後或多或少產前不安產後惡血不下兼治冷熱勞云云則直是日華子之應聲要之四物一方通治婦女已屬盲人捫燭之談乃更出一物之方寧非絕大笑話世又安有不問寒熱虛實而用一藥一方可以統治萬病之理其書不知出於何人手筆而乃賜以嘉名稱之明理真是名實相反自李氏採之而後人皆抄襲之庸夫俗子更喜其簡便易行而牢記之亂用之此醫之所以不可復問而作俑之咎吾不能不責瀕湖之不知刪汰也今人恆以丹參治咳血咯血之病蓋取其降氣又專主血分誰敢謂其不是究之百無一效者以苦降必傷中氣溫通又非止血每至愈咳愈甚而苦泄礙中且有敗脾之變是又在滋膩戀邪之外製造瘵病之別一法門矣聖惠方治寒疝小腹陰中相引痛自汗出欲死一味為末熱酒下二錢葉天士本草注亦載之而改之曰治濕熱疝氣則誤信本經丹參之寒也然與聖惠本旨大相背謬矣婦人明理論丹參散即是此方而欲以通治婦人寒熱虛實百病可謂荒謬已極則醫界之蟊賊也黃精別錄味甘平無毒主補中益氣除風濕安五臟日華補五勞七傷助筋骨益脾胃潤心肺石頑補中州之品使五臟調和肌肉充盛皆補陰之功但陽衰者易致泄瀉痞滿發明黃精不載於本經今產於徽州徽人常以為饋贈之品蒸之極熟隨時可食味甘而厚膩頗類熟地黃古今醫方極少用此蓋平居服食之品非去病之藥物也按其功力亦大類熟地補血補陰而養脾胃是其專長但膩滯之物有濕痰者弗服而胃納不旺者亦必避之淫羊藿本經味辛寒主陰痿絕傷莖中痛利小便益氣力強志別錄堅筋骨消瘰癧赤癰下部有瘡洗出蟲正義淫羊藿稟性辛溫專壯腎陽故主陽痿曰絕傷者即陽事之絕傷也莖中痛亦腎臟之虛寒利小便者指老人及虛寒人之陽事不振小便滴瀝者言之得其補助腎陽而小便自利非濕熱蘊結水道赤澀者可比讀者慎弗誤會益氣力強志堅筋骨皆元陽振作之功然虛寒者固其所宜而陰精不充真陽不固者萬不可為揠苗之助長也消瘰癧赤癰蓋亦因其溫通氣血故能消化凝結然癧瘍之病由於陰血不充肝陽燔灼而煎熬津液凝結痰濁者為多幸勿誤讀古書反以助其烈焰陷人於炮烙之酷刑洗下部之瘡則辛燥能除濕熱亦猶蛇床子之洗瘡殺蟲耳廣義日華主丈夫絕陽女人絕陰一切冷風勞氣筋骨攣結四肢不仁補腰膝則辛溫之品固不獨益腎壯陽並能通行經絡祛除風寒濕痹但日華又謂治老人昏耄中年健忘則未免譽之太過而景岳且謂男子陽衰女子陰衰之艱於子嗣者皆宜服之則偏信溫補其弊滋多更非中正之道矣石頑謂一味仙靈脾酒為偏風不遂要藥壽頤按不遂之病有二因一為氣血俱虛不能榮養經絡或風寒濕熱痹著之病古之所謂痹證是也其來也緩一為氣血上衝擾亂腦神經而忽失其運動之病今之所謂類中風西醫之所謂血沖腦是也其病也暴仙靈脾酒止可以治風寒濕痹之不遂並不能治氣血兩虛之不遂而血沖腦經之不遂更萬萬不可誤用發明淫羊藿之得名陶弘景謂西川北部有羊喜食此藿一日百合故服之使人好為陰陽其擾動腎陽已可概見後人惡其名之不雅因易名為仙靈脾惟腎氣虛寒者或可暫用以求陰平陽秘而好談溫補者稱之不去口則偏於助陽反以傷陰吾無取焉正訛淫羊藿助陽溫腎本經乃作辛寒必無是理韓保昇改作辛溫是也強陽之過未免戕賊真陰其甚者反以多欲誨淫奪人壽算皆溫補二字誤之昔人僅禁用於陽虛注疑為亢之誤易舉陰虛不固及強陽不痿等證猶非正本清源之道也仙茅發明仙茅見於宋之開寶本草云辛溫有毒主心腹冷氣腰腳風冷攣痹不能行老人失溺益陽道李珣海藥本草謂其治一切風氣補暖腰腳日華直稱其益房事不倦明是補陽溫腎之專藥故亦兼能祛除寒痹與巴戟天仙靈脾相類而猛烈又過之惟稟性陰寒者可以為回陽之用而必不可以補益之品開寶又稱其主丈大虛勞則古人之所謂虛勞本屬虛寒之病金匱用建中等方而千金外臺皆用溫藥其旨可見正與今人陰虛火擾之虛勞病相反而又謂其助筋骨長精神云云李珣又稱其明耳目填骨髓皆因其助陽而故甚言之不可為訓也正訛仙茅乃興陽助火之烈藥比之烏頭附子殆又甚焉而李瀕湖張景岳輩乃引許真君書侈言其功用則方士亂道之言斷不可信惟瀕湖又謂仙茅性熱陽弱精寒稟賦素怯者宜之而體壯相火熾盛者服之反能動火尚屬持平之語觀沈存中夢溪筆談稱夏文莊睡則身冷如逝故服仙茅鍾乳硫黃張季明醫說稱中仙茅毒者舌脹出口以刀剺之百數始得見血煮大黃朴硝服之而後消縮其熱毒何如宜乎張弼詠仙茅詩有使君昨日才持去今日人來乞墓銘之句矣世有妄談溫補盛稱仙靈脾仙茅等物之功效者皆惑於方士之謬說如唐人喜服乳石礜石自戕生命之類宜援左道惑眾之例誅之無赦可也知母本經味苦寒主消渴熱中除邪氣肢體浮腫下水補不足益氣別錄療傷寒久瘧煩熱脅下邪氣膈中惡氣及風汗內疸多服令人泄正義知母苦寒皆主實火有餘之病本經主消渴熱中性寒而質潤也除邪氣者即指燥熱之邪氣本草經文邪氣二字頗多而所賅者甚廣凡寒熱風濕諸邪內干臟腑外侵肢體者皆是蓋六淫之病本非正氣之所固有則統而稱之曰邪氣原無不可然讀者必須看得活潑分得寒熱方能辨別虛實而無差忒其主肢體浮腫者以肺熱鬱窒氣不下降而水道不通溢於肌表者言之知母清熱而苦寒泄降則水道通而腫自消非脾陽不振腎水泛溢之腫病故急以下水二字申明之宜聯作一氣讀然浮腫之病實熱證殊不多見慎弗誤讀古書不知區別以鑄大錯補不足益氣者則邪熱既除即是補益之意張石頑謂相火有餘灼爍精氣以此清之邪熱去而正氣自復說得最是清澈而張隱菴竟謂補腎水之不足益肺氣之內虛葉天士且謂苦寒益五臟陰氣是直以陰寒為補養之上品試問恃霜雪為雨露松柏或可忍而蒲柳將奈何別錄療傷寒則時病中之熱病也主久瘧者瘧病久纏陰津必耗且瘧之寒熱汗出必多故必以知母滋潤苦寒驅其燔灼津液之邪而熱少寒多無汗不渴者非其治也其主煩熱者苦以清心寒能勝火斯熱邪退而煩自除脅下乃肝膽循行之絡木火不疏是為邪氣膈中乃心肺安宅之鄉邪熱鬱蒸是為惡氣知母靜肅清肺泄肝而除膈熱固其長也風汗者風熱襲於肌表而自汗灼熱本是白虎湯主治內疸蓋即胃熱之黃疸繆仲淳以內字作接內解謂即女癆之色疸未免故作奇異究竟相火熾盛者或可暫投若其人陰陽兩傷豈非鴆毒要之實熱成疸則知母苦寒勝熱是其專職故結之以多服令人泄五字可知寒涼滑潤無不戕賊脾胃而伐生機世有治丹溪之學者宜書此五字以作座右之銘廣義甄權主心煩躁悶日華潤心肺安心止驚悸潔古涼心去熱主陽明大熱瀉膀胱腎經火熱熱厥頭痛海藏瀉肺火治相火有餘景岳謂在上則清肺止渴吐血衄血去喉中腥臭在中則退胃火止消在下則利小便潤大便解熱淋崩濁壽頤按此皆苦寒伐有餘之火也發明知母寒潤止治實火瀉肺以泄壅熱肺癰燥咳宜之而虛熱咳嗽大忌清胃以救津液消中癉熱宜之而脾氣不旺亦忌通膀胱水道療淋濁初起之結熱伐相火之邪主強陽不痿之標劑熱病之在陽明煩渴大汗脈洪裡熱佐石膏以掃炎熇瘧證之在太陰濕濁薰蒸汗多熱甚佐草果以泄脾熱統詳主治不外實熱有餘四字之範圍而正氣不充或脾上不振視之當如鴆毒正訛知母苦寒氣味俱厚沉重下降而又多脂最易損及脾陽令人溏泄惟利於實火有餘之證而虛損病皆在所忌然甄權則曰主骨熱勞產後蓐癆腎氣癆等證日華則曰主熱勞傳屍疰痛景岳則曰治癆瘵內熱一似竟為勞損之專藥不知勞損之火皆是虛火補中攝納以冀潛藏猶恐不逮寧有陰寒直折速其絕滅之理而更有以滋陰降火為說者謂知母能滋腎水則虛火自潛不知以陰寒為滋養已非春生夏長之理況苦寒戕伐生機腎水未滋而脾陽先敗潔古東垣丹溪諸家利用知柏本治實火之有餘非可補真水之不足景岳已謂沉寒之性本無生氣清火則可補陰則謬石頑亦謂脾胃虛熱誤服則作瀉減食為虛損之大忌近世誤以為滋陰上劑癆瘵神丹而夭枉者多矣日華又有消痰止嗽潤心肺之說在火熾鑠金者或猶可用然痰濁瀰漫已非柔潤滋膩所宜而世俗又用之於勞怯咳嗽彼亦曰肺為火灼而燥吾以知母清以潤之且可化痰其意豈不甚善然陰柔黏膩肺未受其潤澤而痰更得所憑依嗽愈甚而痰愈多甚者且傷脾而作瀉矣近世癆病最多皆滋陰降火消痰止嗽等說有以誤之而其源皆本於古書則讀書而不能明理亦誰不為古人所愚耶東垣謂知母瀉無根之腎火其說大謬火既無根又安可瀉當作瀉有餘之相火或尚可說景岳謂治膀胱肝腎濕熱腰腳腫痛蓋指腎熱痿躄之病而言然濕熱而主苦寒宜黃柏不宜知母以其潤澤非治濕之品且腫痛之軟腳病寒濕之證亦頗不少不可以本經主肢體浮腫而一例混用也繆氏經疏有一方用知母貝母天冬麥冬沙參甘草桑白皮枇杷葉五味百部而曰治陰虛咳嗽則必陰虛火浮之病而聚集許多寒涼滋潤黏膩之物更加以桑皮杷葉之降氣五味之斂邪將痰濁陰火一併收入肺家永無發泄真是製造癆瘵之第一法門一用一死百用百死而失音泄瀉等弊猶其細故壽頤頻年閱歷所見甚多初不知今世何以有此專造癆瘵之捷訣乃讀此而始恍然於淵源之有所自則仲淳乃其始作之湧而葉氏指南費氏醫醇不過奉行此催命靈符而充作勾魂使者耳嘻孽海茫茫於今為烈能不太息痛恨於禍魁罪首耶玄參本經味苦微寒主腹中寒熱積聚女子產乳余疾補腎氣令人目明別錄味苦咸主暴中風傷寒身熱支滿狂邪忽忽不知人溫瘧洒洒血瘕除胸中氣下水止煩渴散頸下核癰腫心腹痛堅癥定五臟補虛明目強陰益精支讀為搘正義玄參稟寒水性質所主皆邪熱之病本經主腹中寒熱積聚蓋言其寒熱不和因而氣血積聚然終以治熱病為是非能治寒也主產乳余疾者則新產血耗虛陽易熾玄參清熱涼潤是其所宜觀於此可知產後浪用溫藥非古人正旨補腎氣能令目明則色黑入腎之效也別錄主暴中風傷寒身熱狂不知人溫瘧煩渴皆邪熱為患也主支滿除胸中氣亦氣升火升之證也血瘕堅癥則血熱瘀結之病氣寒清熱色黑入血而味苦又能泄降故可治癥瘕而除心腹痛若虛寒凝滯之癥瘕腹痛則非其治下水者亦清熱泄降之效也頸下結核皆肝膽之火灼痰凝絡玄參能清木火之郁故為治瘰癧結核之主藥癰腫者皆熱邪之壅於肌肉也定五臟而補虛明目強陰益精則極言其驅除邪熱奠定真陰之功效耳別錄本有下寒血三字則義不可通必有訛誤刪之廣義甄權散瘤瘰癧日華治心經煩躁朱肱治傷寒陽毒心下懊憹煩不得眠瀕湖解斑毒利咽喉通小便血滯發明玄參稟至陰之性專主熱病味苦則泄降下行故能治臟腑熱結等證色黑入血味又腥而微咸故直走血分而通血瘀亦能外行於經隧而消散熱結之癰腫又色黑入腎味苦歸心故上之則療胸膈心肺之熱邪下之則清膀胱肝腎之熱結能制君相浮溢之火療風熱之咽痛泄肝陽之目赤止自汗盜汗治吐血衄血寒而不峻潤而不膩性情與知柏生地近似而較為和緩流弊差輕正訛玄參賦稟陰寒能退邪熱而究非滋益之品別錄所稱補虛益精等辭已覺言之過甚乃日華竟稱為補勞損而景岳直謂其甘能滋陰瀕湖且謂與地黃同功俗醫遂用之於陰虛勞怯則無根之火豈宜迎頭直折速其息滅且當時並不顯見其害甚且浮游之火受其遏抑而咳嗆等證亦或少少見瘥昧者方且歸功於滋陰降火而不知一線生陽已漸消滅從此不可救療矣此陰柔之害殺人於無形之中其罪亦與肆用知柏者相等則滋陰二字誤之也仲淳石頑僅禁用之於脾虛泄瀉猶其顯而易見抑亦未矣地榆本經味苦微寒主婦人乳痓痛七傷帶下病止痛除惡肉止汗療金瘡別錄甘酸止膿血諸瘻惡瘡熱瘡消酒除消渴補絕傷可作金瘡膏正義地榆苦寒為涼血之專劑婦人乳痛帶下多由於肝經鬱火不疏苦寒以清泄之則肝氣疏達斯痛可已而帶可止然氣滯痰凝之乳痛及氣虛不攝之帶下非其治也止痛除惡肉皆以外瘍言之血熱火盛則痛而多惡肉地榆清熱涼血故止瘍患作痛而能除惡肉本經又療金瘡別錄謂止膿血惡瘡熱瘡可作金瘡膏皆即此清火涼血之功用且所謂主七傷補絕傷亦皆指外瘍言之非謂地榆苦寒能治虛損之勞傷也止汗而除消渴皆寒以勝熱之效消渴者即苦寒以勝濕退熱也本經乳痓痛之痓字殊不經見玉篇博雅痓皆訓惡當即此義帶下病三字別本作帶下五漏一作帶下十二病今從孫淵如問經堂本又別錄有產後內塞一句甚不可解刪之廣義開寶止冷熱痢疳痢日華主吐血鼻衄腸風月經不止血崩瀕湖除下焦熱主大小便血證止血取上截炒用其梢則能行血楊士瀛謂諸瘡痛者用之景岳治帶濁痔漏亦斂盜汗發明地榆涼血故專主血熱而治瘡瘍能止汗又苦寒之性沉墜直降故多主下焦血證如溲血便血血淋腸風血痔血痢崩中帶下等皆是然亦惟血熱者宜之而虛寒之體不能攝血者切不可妄用正訛地榆苦寒能勝濕熱古人以治痢下膿血涼血以疏導其濕熱也而日華子乃曰並治水瀉則水瀉二之證雖亦間有濕熱而脾陽不振者居多何亦可以苦寒統治之謬矣蓋日華於水泄滯下二病尚未盡辨別清楚此大明本草之所以多囈語也地榆主下血血痢等證止以苦寒清其血熱非能和調血分也而日華更以為治產前後諸血疾則又不問虛實寒熱而但以一句包括之抑何顢頇至於此極禁忌仲淳謂虛寒之泄及痢久胃弱者皆不可用石頑謂氣虛下陷之崩帶及久痢膿血而瘀晦不鮮者皆為切禁又謂苦寒傷胃誤用之者多致噤口不食紫參本經味苦辛寒主心腹積聚寒熱邪氣通九竅利大小便別錄療腸胃大熱吐血衄血腸中聚血癰腫諸瘡止渴益精正義紫參味苦性寒色紫故清熱而入血分主心腹積聚寒熱邪氣者蓋血熱而瘀結之積聚與玄參之主腹中寒熱積聚同意非能治氣滯寒凝之積聚也別錄主腸中聚血亦即此意通九竅利二便者清熱涼血則九竅自通二便自利別錄療腸胃大熱吐血衄血癰腫諸瘡皆苦寒能清血熱之功用止渴者熱清而渴自止益精者則因其清火而甚言之邪熱既去而真陰斯充究竟陰寒之質非補益之品也廣義甄權治心腹堅脹散瘀血即本經主積聚之意又治婦人血閉不通亦血熱瘀結之症海藏主狂瘧溫瘧皆熱病也又治汗出鼽衄血痢蘇恭治金瘡生肌肉止痛無一而非清熱涼血之功耳發明紫參苦寒故專主血熱而味則微辛故能散瘀又能破逐血積凡血中鬱熱而成瘀結如痞塊癥瘕之屬皆可治之惟氣滯寒凝之瘀血必非其治禁忌仲淳謂血枯經閉者禁用及勞傷吐血陽氣虛脾胃弱者忌之紫草本經味苦寒主心腹邪氣五疸補中益氣利九竅通水道別錄療腹腫脹滿痛以合膏療小兒瘡正義紫草亦苦寒涼血之品本經主治與紫參大同小異主五疸者疸病多由脾胃積熱而來寒以清熱也但亦有清陽不振脾虛不運而濕阻發黃者必須分別療治不可誤與清利之品補中益氣則言其邪熱消而正氣自充耳別錄療腹腫脹滿痛亦以濕熱之腫脹滿痛而言非通治虛寒之脹滿合膏療小兒瘡則專指痘瘡古人稱痘止謂之瘡非泛言一切之瘡瘍痘本先天之熱毒故宜用涼血之品以作敷藥然惟體壯毒盛者宜之而瘦弱柔脆之兒漿薄不充者非可概投也廣義蘇頌治傷寒時疾發瘡疹不出者韋雷治豌豆瘡皆時行之痘瘡也楊仁齋直指謂紫草治痘能導大便使出發亦輕曾世榮活幼新書謂古方惟用其茸專主發生之義李瀕湖謂治斑疹痘毒活血涼血利大腸瀕湖又謂痘疹之紫黑而血熱毒盛者涼其血則能發出俗以紫草為宣發之品者非也發明紫草氣味苦寒而色紫入血故清理血分之熱古以治臟腑之熱結後人則專治痘瘡而兼療斑疹皆涼血清熱之正旨楊仁齋以治癰瘍之便閉則凡外瘍家血分實熱者皆可用之且一切血熱妄行之實火病及血痢血痔溲血淋血之氣壯邪實者皆在應用之列而今人僅以為痘家專藥其治血熱者及治瘍者皆不知有此疏矣禁忌仲淳謂紫草苦寒而通利九竅凡痘瘡之氣虛脾弱小便清利者禁用
