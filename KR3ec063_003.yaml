body:
  text: 卷之三草部隰草類上牛膝本經味苦酸太平御覽引作辛主寒濕痿痹四肢拘攣膝痛不可屈伸逐血氣傷熱火爛墮胎別録平無毒療傷中少氣男子陰消老人失溺補中續絶填骨髓除腦中痛及腰脊痛婦人月水不通血結益精利陰氣考證本經主寒濕太平御覽引作主傷寒壽頤按牛膝味苦而性滑利本非治寒之品御覽謂主傷寒者蓋古之所謂傷寒本合熱病言之熱結於內者牛膝能疏導而泄降其熱邪也似當以御覽本為正正義牛膝疏利泄降所主皆氣血壅滯之病本經謂主寒濕當以御覽所引作傷寒其治濕流關節之痿痹四肢拘攣膝痛不可屈伸固疏通壅滯之專職要非氣血枯竭之拘急不遂可以並論然凡屬痿痹本有濕阻血衰兩層濕阻者惟在驅邪而使之流通血衰者亦必滋養而助其營運則牛膝曲而能達無微不至逐邪者固倚以為君養正者亦賴以輔佐所以痿弱痹著骨痛筋攣諸證皆不可一日無此也逐血氣者即所以通其壅滯治傷熱火爛亦所以助其流通且即此可知牛膝之性偏於寒涼故能主熱傷火傷則寒濕為病必非其任上文之誤更顯然矣能墮胎者滑利下行之力也別録療傷中少氣亦以濕熱壅窒中氣不宣者言之非正氣不充清陽下陷者所宜其主男子陰消亦主熱盛傷陰而言非能補肝腎之真陰也老人失溺蓋地道不通而為癃閉之病必非下元不固遺尿溺床之候其所謂補中續絶填骨髓益精利陰氣諸説皆壅滯既疏正氣自旺萬不可誤認牛膝為填補之品腦中痛者多陽邪之上升牛膝下行為順則氣火自潛腰脊痛亦經隧之壅滯牛膝宣通脈絡則關節自利又主月水不通血結等證則固破瘀導滯之真諦此皆當就疏通一層著想則牛膝之真實功用昭昭矣別録又謂其止發白然通利之品非養血益陰者可比必無是理刪之廣義甄權治陰瘻日華治腰膝軟弱皆其導濕清熱之功後人每謂牛膝能起腰膝痿弱堅強筋骨皆當以此意參之不可拘泥外臺以生牛膝一味濃煎治勞瘧積久不止肘後以二斤漬酒治卒暴癥疾腹中如石刺痛其破積消瘀之效明矣甄權又謂其逐惡血日華又謂其排膿止痛主産後血暈心腹痛瀕湖稱其治五淋尿血莖中痛癰腫惡瘡石頑稱其治金瘡折傷婦女經閉不通又皆破瘀通利之餘義瀕湖又謂其主治喉痹口瘡齒痛則又導熱下泄之功效也發明牛膝之根一莖直達入土最深長者至二三尺性又柔潤多脂故滑利下行是其專職又味苦性降清熱降火以外已無餘義古今主治利腰膝通經絡破瘀活血消積導滯滑利二便皆在範圍之內張景嶽謂其走十二經絡亦即通經活絡之意近又用以治咽喉口舌諸瘡及胃火齒痛皆有捷效則皆實熱壅塞氣火上升取其開泄宣通導之下達耳但其性直下雖能通經絡而利機關亦惟股膝足脛諸證最為捷應而手臂肩背之病亦非懷慶牛膝所能呈功則以根莖下達固不能橫行而上升也正訛牛膝乃流利疏通之品古人稱其治痹痛起痿弱蓋指濕熱壅積者言之疏通而宣導之則濕熱去而痿廢起且下降滑泄之質氣味必偏於寒涼苟非濕火鬱滯豈宜妄用本經主寒濕據太平御覽所引本是誤字別録補中續絶填骨髓等句未免言過其實乃後人因此而變本加厲甄權謂之補腎海藏稱其強筋補肝寇宗奭亦謂同蓯蓉浸酒服益腎是皆以疏泄通利之物誤認其有滋填補益之功寧有是理乃景嶽和之更稱其助一身元氣補髓精益陰活血治腰膝痠疼滋鬚髮枯白種種功用更是可駭其誤皆本於別録之補中續絶等説雖曰以通為補濕熱除則真陰長其意亦無甚背謬究竟祛邪之品與養正之功必不可渾而為一試即以景嶽書證之於補髓填精數句之下即繼之曰其性下走如奔故能通經閉破血癥忽而大補忽而大攻自盾自矛豈不令人捧腹抑何信手拈來而不顧其理至於此極耶景嶽又謂臟寒便滑下元不固者禁用石頑亦謂性滑利竅凡氣虛下陷大便易泄夢遺精滑妊娠崩漏俱當禁用又謂此物專司疏泄世俗妄謂益腎而於培養下元藥中用之則與延盜入室何異吳儀洛本草從新亦謂氣虛下陷因而足跗浮腫者大忌牛膝壽頤按李瀕湖修治法謂欲其下行則生用滋補則酒拌蒸過用蓋即畏其滑泄而借酒之上行以監製之然此物本非補益之品亦何必多此一番矯揉造作考李氏綱目又謂牛膝得酒則補肝腎且謂其治腰膝骨痛足痿陰消失溺久瘧傷中少氣諸病皆補肝腎之功是瀕湖亦誤以為補劑此手頭極熟之藥最易誤用不可不正外臺以牛膝治瘧本文明謂治勞瘧積久不止蓋瘧病既久必有痰濕互結如瘧母之類非得消堅破積之品不可而一味牛膝能治之則其消導之力甚猛正與破癥墮胎通血結諸條同其功用何瀕湖反謂其補肝腎亦不思之甚矣川牛膝發明川牛膝之名不見於古書惟張石頑本經逢原謂懷産者長而無旁須水道澀滯者宜之川産者細而微黑精氣不固者宜之又謂川産氣味形質與續斷倣佛用之無精滑之虞是牛膝之川産者不專以滑泄見功而宣通關節之力則一頗為有利無弊肝腎陰虛而機關不利者宜之但今時肆中之所謂川膝則其形甚大而性質空松又與石頑之説不類然用之於肩背手臂疏通脈絡流利骨節其效頗著蓋其質空疏則其力能旁行上達以視懷膝之堅實直下者功用自有區別而世俗恆以川牛膝懷牛膝視如一類二種隨筆寫來含渾用之不知分辨誤矣天名精本經味甘寒主瘀血血瘕欲死下血止血利小便別録除小蟲去痹除胸中結熱止煩渴逐水大吐下正義天名精稟寒涼直降之性而能通結破血利水故所主皆血瘀熱結水停之證本經又稱其止血則氣火上炎之失血吐衄等證得此寒降血可自止別録稱其去痹則熱邪壅於經絡而為關節不利之熱痹非並能療寒濕之痹著也小蟲者皆濕熱之所生利水以去濕寒涼以勝熱則蟲自可除大吐下者於以見其性之猛烈也廣義唐本草破血生肌止鼻衄殺三蟲除諸毒腫丁瘡瘻痔金瘡身癢癮疹不止者揩之立已開寶謂地鬆解蛇蟲螫毒挼之傅之朱端章集驗方謂皺面地菘草治牙痛以草一捻湯泡少時蘸挹痛處即定孫天仁集效方凡乳蛾喉嚨腫痛以鶴蝨草一名皺面草一名杜牛膝取根洗淨搗爛入好酒絞汁灌之張石頑謂土牛膝解毒利竅專治血臌一味濃煎恣意服之又鎖喉風以土牛膝搗絞灌之以雞羽探吐稠痰不過二三次神驗又謂天名精功專散血有破宿生新之能力又能湧吐風痰凡咽喉腫塞痰涎壅滯搗汁飲之繼以鵝翎掃入攪去稠痰立效瀕湖渭天名精並根苗而言之地菘言其苗葉鶴蝨言其子其功只在吐痰止血殺蟲解毒擂汁服之能止痰瘧喉痹漱之止牙疼挼之傅毒螫發明天名精之草吾鄉野生極多莖細叢生其葉甚細有臭味故俗稱為臭花娘子草莖節曲折每節間突出如踝俗名雞踝子草結子大如谷老則有刺螫人衣即鶴蝨也其性寒涼能滑利下行據古籍則破血利水之力極大本經別録所載主治是也後人則惟用以解毒降火唐本草以下諸書所載主治是也今則以治喉風腫塞甚至腐爛危險之候取莖葉搗汁灌之其效甚捷冬令草枯無從取汁則於夏秋之間預收莖葉搗汁澄定俟其將干凝結之時作為丸子陰乾密貯臨用以清水化開灌之亦效甚者屢進之探吐稠痰大可轉危為安微賤藥中之極有靈驗者蓋消痰解毒清熱降火開結利竅合數者之功用兼而有之宜其投之輒效其餘諸證之應用此物者大旨亦不外此十二字之作用矣備考天名精子名鶴蝨根名土牛膝今所恆有以治喉腫其應如響與自明以來諸書所稱治療亦合但其葉甚細而本經則有蝦蟆藍之名別録亦一名蟾蜍藍綱目則一名皺面草又有蔓精地菘等別名則必其葉甚大故有蔓菁菘菜之稱且其葉必皺因有蝦蟆蟾蜍皺面等號試推測其形色及證以李氏綱目所載之狀則與今之所用大是不類且今亦未有用以治血瘀血結者惟熱結腫毒等證則義亦可通借用亦驗實則今所用者必非古來相承之一物矣但本經又別有豕首之名別録亦謂之彘顱説者謂其氣如豕故得此名而今所用之土牛膝則亦有臭味獨陶宏景則謂天名精即今之豨蘞然今所常用之豨蘞草固別自一物人人皆知亦非今所常用之鶴蝨草竊謂豨蘞之葉大而皺亦有臭味似古人所謂蝦蟆藍皺面草等名目皆即豨蘞草之別名然豨蘞清涼解毒其性雖亦相近而不能治喉風痰塞則又是疑竇不能武斷繆氏經疏又謂天蔓精南人呼為地菘非鶴蝨亦非豨蘞乃荔枝草也為消痔之聖藥則繆氏之意亦非今日所用之土牛膝矣此中疑是疑非勢不能融合古今諸説貫而通之茲姑以今日所習用者為主而附志所疑以留待異日之再為考訂焉鶴蝨發明即今之土牛膝所結之實形小而長有刺螫人衣有似於蝨故得此名唐本草稱其氣味苦辛有小毒治蛔蟲為散以肥肉汁服方寸匕亦入丸散用開寶本草稱其治蟲心痛以淡醋和半匕服立瘥蘇頌圖經稱其為殺蟲方中要藥古今録驗療蛔厥心痛一味搗丸蜜湯空腹服豨蘞發明豨蘞之草微有臭味故得豨名豨者豕也言此草之氣其臭如豕古人有豬膏母之別名其義一也唐本草始載之言其氣味苦寒治熱𧈟煩滿不能食生搗汁飲三合多則令人吐又謂豬膏母氣辛苦平主金瘡止痛除諸惡瘡消浮腫搗封之散敷並良藏器謂久瘧痰瘧搗汁服取吐又搗敷虎傷狗咬蜘蛛咬蠶咬蠼螋溺瘡蘇頌謂蜀人單服豨蘞以五月五日六月六日九月九日採葉淨洗入甑中層層灑酒與蜜蒸之又曝凡九次氣味極香搗末蜜丸服之云甚益元氣治肝腎風氣四肢痹骨間冷腰膝無力者亦能行大腸氣安五藏生毛髮兼主風濕瘡肌肉頑痹婦人久冷尤宜又江陵節度成訥及知益州張詠皆有進豨蘞丸表極言其治中風大效壽頤按此物生時氣臭味澀多服引吐蓋性本寒涼而氣猛烈長於走竄開泄故能治熱煩癰毒而吐痰瘧及其九次蜜酒蒸曬和蜜為丸則氣味已馴而通利機關和調血脈尤為純粹凡風寒濕熱諸痹多服均獲其效洵是微賤藥中之良品也續斷本經味苦微溫主傷寒補不足金瘡癰瘍折跌續筋骨婦人乳難別録味苦辛主崩中漏血止痛生肌肉及踠傷惡血腰痛關節緩急踠曲也踠傷猶言折傷也正義續斷通行百脈能續絶傷而調氣血本經謂其主傷寒補不足極言其通調經脈之功惟傷寒之寒字殊不可解疑當作中然舊本皆作傷寒惟石頑逢原則竟作傷中蓋亦石頑改之未必其所見舊本之果作傷中也其治金瘡癰瘍止痛生肌肉及折跌踠傷惡血續筋骨主腰痛關節緩急等證無一非活血通絡之功效婦人乳難則以乳子之時言之即産後諸病續斷行血而能和血故通治産後及崩漏也廣義甄權稱其宣通血脈日華子稱其治婦人胎前産後一切病縮小便止泄精尿血景嶽稱其入血分調血脈消腫毒又謂味澀能止吐血衄血崩淋胎漏便血調血痢止帶濁宜佐之以甘如甘草地黃之類尤佳石頑謂續斷入肝經主續筋骨為婦科胎産崩漏之主藥又主帶脈為病療腰痛利關節暖子宮治金瘡折傷散癰腫瘀血發明續斷蔓延甚遠味苦辛而微甘其氣溫和氣味俱厚故兼入氣血能宣行百脈通利關節凡經絡筋骨血脈諸病無不主之而通痹起痿尤有特長又其味苦而澀能行能止則療崩漏帶下血痢淋濁而女科胎産經帶奇經八脈諸病及傷科閃跌諸證外瘍癰腫潰腐支節痠痛屈伸不利等病類皆賴以成功其效甚宏其用頗廣加以呈功頗捷而性又柔和無燥烈剛暴之弊是真名將風流雍容揄揚以奏膚功而殲大敵洵非猛將之偏鋒陷陳者所可同日而語矣藍本經藍實味苦寒主解諸毒殺蠱蚑注鬼螫毒別録藍葉汁殺百藥毒解狼毒射罔毒音義蚑音岐蟲行蠕動之貌蠱蚑者言蠱毒之中人如蟲之蚑蚑而善動也瀕湖石頑皆讀為鬾似嫌不徵於人而徵於鬼注鬼蓋即古所謂鬼注之病古人神道設教故有鬼注之病名今本字多作疰考古本則皆作注考證藍為草名詩稱菜藍月令稱刈藍其名最古可以為染故古今蒔藝之者甚多今吳下俗諺稱為青秧者是也自唐宋以降即以藍草所染之色名之曰藍幾令俗人知有藍之色而不知有藍之草惟此草種類不一大小巨細各有不同其名稱亦因此而異李氏本草綱目所載蓼藍菘藍馬藍吳藍水藍五種莖葉花實頗為詳盡又有所謂冬藍板藍者瀕湖以為即馬藍之別名然此數種本是同類形色雖異而氣味性質皆同入藥亦不必強為區別特本草經止有藍實則古人入藥僅用其實至名醫別録乃有葉汁之名似即藍澱今謂之靛但藍澱必和以石灰性質微異古方既用葉汁當以鮮葉搗取自然汁尤為純淨今之藍澱已為陳腐之物不如鮮葉也別録又有大青肘後千金皆用之據李瀕湖説亦別以為一種然其氣味性情以及治療之功用亦與諸藍無異蓋亦同是一類特所産之地不同而形狀遂有小異耳蘇頌圖經本草又有小青蓋亦其類浸之成汁和以石灰則為藍澱復干之成末則為青黛其功用亦大同小異茲各從本條分系於後正義藍草苦寒專解百毒根葉及實性質皆同蠱本毒蟲之類狼毒射罔皆毒草也廣義陶弘景謂藍汁塗五心止煩悶療蜜蜂螫毒日華謂吳藍主傷寒頭痛赤眼天行熱狂疔瘡遊風熱毒風疹除煩止渴解毒藥毒箭金石藥毒療鼻衄吐血小兒熱疳丹毒蘇頌謂藍汁治蟲豸傷景嶽謂解諸熱毒蟲毒及時行溫熱疫毒小兒諸熱驚癇皆宜搗汁用之石頑謂專於清解溫邪為陽毒發斑咽痛必用之藥發明藍草味苦氣寒清熱解毒之上品專主溫邪熱病實熱蘊結及癰瘍腫毒諸證可以服食可以外敷其用甚廣又能殺蟲療諸蟲螫者蓋百蟲之毒皆由濕熱凝結而生故凡清熱之品即為解毒殺蟲之品並能殺蠱者蠱亦南方濕熱之毒本為毒蟲之類又凡苦寒之物其性多燥苟有熱盛津枯之病苦寒在所顧忌而藍之鮮者大寒勝熱而不燥尤為清火隊中馴良品也藍澱發明藍澱以藍葉浸水和石灰攪澄而去其清水故謂之澱澱者滓垽之下沉者也今字則作靛苦寒之性解毒清熱亦同藍草但加之石灰則止血消腫殺蟲之力尤勝陳藏器謂其解諸毒敷熱瘡禿瘡熱腫瀕湖謂能治噎膈即石灰重墜故能破堅積消瘀血且能殺蟲也噎膈有濕熱生蟲一證凡外瘍熱毒疔瘡癰腫及濕瘡奇癢者用作敷藥皆佳青黛發明青黛古時産于波斯後人以藍澱之浮沫為之故李瀕湖謂之靛花其功用亦與藍澱同但靛之浮沫干之則所存無多今市肆之物乃以靛之凝結下澄者為之純是石灰本質與靛花之質清濁絶異考古方多用青黛為內服之藥必非今時重濁之物若今之青黛則止宜外敷以為燥濕殺蟲及金瘡止血之用李瀕湖已謂貨者多以干澱充之中有石灰服餌宜慎而今之俗醫尚不知辨別猶復以為內服之藥是呆讀古書不辨藥理之咎矣廣義開寶味鹹寒解諸藥毒小兒諸熱驚癇發熱天行頭痛寒熱傅熱瘡惡腫金瘡蛇犬等毒甄權解小兒疳熱殺蟲藏器治小兒疳熱丹溪謂其瀉肝火散五藏鬱火解熱消食積瀕湖謂去熱煩主吐血斑瘡陰瘡殺惡蟲正義古人所謂青黛必非今市肆中重濁之青石灰凡內服者寧用大青葉板藍根萬勿沿用此惡濁之青黛又咽喉口舌諸方古今方藥多用此物惟今則物質已非壽頤修合咽喉口瘡諸末藥已屏絶不復用矣甘藍發明甘藍載於陳藏器本草拾遺謂産於西土葉闊可食治黃毒蓋亦清利熱結之品故治發黃亦藍之別一種瀕湖綱目亦稱其葉長大而厚煮食甘美大青小青發明大青小青之氣味性質皆與藍草近似故功用亦相等張石頑竟以大青小青並於藍實一條未為無見特古書皆不謂大青小青可以為染則亦自有區別廣義別録謂大青味苦大寒主時氣頭痛大熱口瘡陶弘景謂除時行熱毒甄權治溫疫寒熱日華主熱毒煩渴風疹金石藥毒腫毒瀕湖謂大青主熱毒痢黃疸喉痹丹毒小青治血痢腹痛研汁服解蛇毒蘇頌圖經謂小青搗敷癰腫瘡癤張石頑謂宋朱肱治發斑咽痛有犀角大青湯大青四物湯皆以治溫熱毒盛之病非正傷寒病大青能瀉肝膽之實火正以祛心胃之邪熱所以小兒疳熱丹毒皆為要藥小青殺百藥毒解狼毒射罔斑蝥砒石等毒注廣義項名原本漏今補馬蘭發明馬蘭為卑濕地恆有之草今吳人恆嗜之俗呼為馬蘭頭吾嘉又名為紅梗菜考馬蘭之名始見於日華本草前人皆列於芳草類中與蘭草澤蘭並列李瀕湖謂似蘭而大故有馬蘭之名考爾雅釋草凡草之大者固多以牛馬命名然以今之馬蘭比較肆中澤蘭則枝葉皆小且無香氣乃古本列之芳草一類則因其蘭字之一字而以類及之也考其氣辛性涼甘而微苦治療血熱諸毒甚效蓋其形色氣味性質功用皆與藍靛相近或亦藍草類中之一種因而亦名為藍後人不察遂以蘭藍音近而誤列於香草隊中也茲移於隰草中以存其真馬蘭甘寒最解熱毒能專入血分止血涼血尤其特長蓋其莖深赤干而煮之其汁深紫故能從其類而清利血熱凡溫熱之邪深入營血及癰瘍血熱腐潰等證尤為專藥內服外敷其用甚廣亦清熱解毒要品也廣義日華主鼻衄吐血治金瘡血痢解酒疸諸菌毒搗塗蛇咬石頑謂其入陽明血分與澤蘭功用相近能破宿生新治淋濁痔漏搗汁治喉痹腫痛細嚼咽汁治絞腸痧腹痛皆取其散血解毒也壽頤按寒涼之品清熱則有餘又其汁色赤則入血分而祛血熱若謂其破宿血而能生新血則未免言之過甚王孟英隨息居飲食譜謂馬蘭甘辛涼清血熱解酲化毒療痔殺蟲嫩者可茹蔬中佳品諸病可餐麥門冬本經味甘平主心腹結氣傷中傷飽胃絡脈絶羸瘦短氣別録味微寒療身重目黃心下支滿虛勞客熱口乾燥渴止嘔吐愈痿蹶強陰益精消穀調中保神定肺氣安五臟令人肥健美顏色正義麥冬富有脂液清潤甘涼得土之正味故為養胃生津之專品本經主心腹結氣乃燥熱津枯而氣結不利之病麥冬甘潤滋燥清熱是其專職若痰濕鬱窒之結氣非其治矣傷中傷飽胃絡脈絶羸瘦短氣皆指胃液不充食少中虛之證故宜於滋養陰液非食積之傷飽痰壅之短氣亦可以麥冬作消食化痰用也石頑已謂非開豁痰氣消克食積其説甚是別録療心下支滿蓋亦屬於燥熱津枯而心胸不舒之證方合麥冬之寒潤然本文則謂身重目黃明是濕熱蘊積為病而即繼之以心下支滿又是痰濕互相結合麥冬黏膩大非所宜雖曰古書奚堪盡信其治虛勞客熱口乾燥渴則滋虛退熱解渴生津固是正治止嘔吐者以清胃熱而降氣火然非舌質乾紅之燥火為病即宜審慎或挾痰濁則柔潤之品夫豈所宜愈痿蹶者足痿多由陽明燥熱灼爍津液以致筋枯骨萎所以古人有治痿獨取陽明之説則麥冬柔潤以解燥熱而滋脈絡正其專長魏玉璜氏一貫煎為治燥熱痿弱主方正合此意倘是寒濕即為大禁若所謂強陰益精消穀調中保神定肺安五藏諸功效則無非養胃生津育陰滋液之餘義而已壽頤謂消穀二字當指中消之善食易飢而言凡消穀能食無非胃火極旺必以甘寒大劑清胃解渴麥冬固在必需之列者也廣義藏器去心熱止煩熱日華治五勞七傷安魂定魄皆滋陰清熱之意也日華又謂主時疾熱狂甄權治熱毒則惟燥熱熾盛耗爍胃津者宜之若挾濕挾痰縱有熱證亦必先以開泄凡滋膩之品皆非所宜潔古治肺中伏火補心氣不足皆以燥熱傷血言之又主血之妄行則邪火上炎甘寒涼降之力也又主經水枯亂不下亦燥熱爍陰之證治寇宗奭謂治心肺虛熱及虛勞與地黃阿膠麻仁五味子枸杞子同為潤經益血復脈通心之劑景嶽謂補上焦之津液清胸膈之渴煩定火炎之嘔吐退血燥之虛熱益精滋陰澤肌潤結發明麥冬産於西北土脈深厚之地入土深遠其味大甘得坤土之正而膏脂濃郁故專補胃陰滋津液本是甘藥補益之上品凡胃火偏盛陰液漸枯及熱病傷陰病後虛羸津液未復或炎暑爍津短氣倦怠秋燥逼人肺胃液耗等證麥冬寒潤補陰解渴皆為必要之藥但稟西北嚴肅之氣偏於陰寒則惟熱熾液枯者最為恰當而脾胃虛寒清陽不振者亦非陰柔之品所能助其發育生長況復膏澤厚膩如其脾運不旺反以礙轉輸而有餘而濕阻痰凝寒飲停滯者固無論矣本經別録主治多就養胃一層立論必當識得此旨方能洞徹此中利弊不然者拘執傷飽支滿身重目黃等説一概亂投自謂此亦古人精義所在豈不益增其困別録又以麥冬主痿蹶者正是內經治痿獨取陽明之意胃主肌肉而陽明之經又自足而上陽明經熱則經脈弛緩而不收胃液乾枯則絡脈失潤而不利補胃之津而養陽明之液是為治痿起廢之本但亦有濕流關節而足廢不用者則宜先理其濕又與滋潤一法遙遙相對不知辨別其誤尤大別録又謂其定肺氣而後人遂以麥冬為補肺主藥蓋以肺家有火燥爍津液洵是正鵠參麥散一方固為養胃保肺無上炒品然肺為貯痰之器乾燥者少濕濁者多倘使痰垢未清而即投黏膩其害已不可勝言而麥冬又滋膩隊中之上將或更以玉竹二母等柔潤甘寒之物輔之則盤踞不行闢為窟宅而清肅之肺金遂為痰飲之淵藪矣正訛麥冬本為補益胃津之專品乃今人多以為補肺之藥雖曰滋液和陰無甚悖謬究其所以專主者固在胃而不在肺寇宗奭謂治肺熱亦就肺家有火者言之柔潤滋液以療肺熱葉焦本無不可日華謂主肺痿固亦以肺火熾盛者言之也然又繼之曰吐膿則系肺癰矣究之肺痿肺癰一虛一實虛者干痿實者痰火麥冬潤而且膩可以治火爍之痿不可治痰塞之癰景嶽和之遂以肺癰肺痿並作一氣則虛實之不分豈非大謬且肺癰為痰濁與氣火交結咯吐臭穢或多膿血宜清宜降萬無投以滋膩之理即使如法清理火息痰清咳吐大減肺氣已呈虛弱之象猶必以清潤為治誤與膩補痰咳即盛余焰復張又臨證以來之歷歷可據者而肺痿為肺熱葉焦之病但言理法自必以補肺為先務然氣虛必咳咳必迫火上升而胃中水穀之液即因而亦化為痰濁故肺雖萎矣亦必痰咳頻仍咯吐不已惟所吐者多涎沫而非穢濁之濃痰是亦止宜清養肺氣漸理其爍金之火使但知為虛而即與黏膩滋補則虛者未必得其補益而痰火既得所憑依反致愈咳愈盛必至碎金不鳴不復可救此玉竹二冬知母等味固不獨膿痰肺癰所大忌即稀痰之肺痿亦必有不可誤與者皆俗醫之所不知者也又麥冬本非治咳嗽之藥本經別録鑿鑿可據自日華有止嗽一説而景嶽亦謂其治肺乾咳嗽推其用意亦謂乾咳無痰則為氣火刑金麥冬滋潤退熱夫豈不可特咳嗽一證雖有虛實寒熱之分而挾痰濕者十恆八九乾咳無痰者十不一二即使本是無痰而誤投滋膩則氣火交結痰濁遂滋適以助其黏膩而邪無從泄凡屬咳病必肺氣鬱塞不能宣通因而作聲以求開泄止宜順其機以導之用輕揚疏達之品如白蒺藜兜鈴木蝴蝶之類助其開展則咳聲暢遂痰吐滑利其勢即解誤與滋膩則痰涎為其閉塞昔賢比之如油入面不可復出最是確論張石頑亦謂陰虛羸瘦喘嗽上氣失音失血及風寒暴嗽大非所宜正是此旨蓋痰濁得其滋填則無論為風為寒為外來之邪為內蘊之熱皆膠黏固結牢不可破永永閉錮於肺絡後注疑衍雖欲開泄而不可得遂致釀成蟠結之根時時震撼試問肺葉嬌嫩而能堪此日常之激動乎勞瘵之由強半在此石頑又謂麻疹咳嗽亦不可用此以其性寒助陰適以固斂陽邪不能發越尤為剴切且咳病苟服麥冬多致音啞是其陰寒斂邪入肺之明證所以凡有咳證麥冬等味真是鴆毒徐靈胎嘗大聲疾呼而人多不覺近世名賢如葉天士費伯雄皆犯此禁未始不誤於日華止嗽之一説而陳藏器且以此物為下痰飲景嶽亦有消痰一説尤為殺人之利刃今之俗醫又誤於葉氏指南費氏醫醇等書恆以製造勞瘵為事所見治咳之方踵此弊者比比而是醫學之不昌雖曰自昔已然未免於今為烈曷禁感慨系之日華又謂麥冬治五勞七傷蓋亦本經主傷中之意養胃滋陰生津益血夫孰非調和五臟之正治然以為服食之品調養於未病之先則可若曰勞傷已成而以陰柔之藥治之又非陽生陰長之旨且勞損之病雖曰內熱然亦是陰虛而陽無所附補脾之氣助其健運尚能擊其中堅而首尾皆應徒事滋潤養陰則陰寒用事而脾陽必敗不食泄瀉等證必可操券以俟越人所謂過中不治之病又皆陰柔之藥有以釀成之矣再按近人之用麥冬皆去其心蓋此物以滋膩為用其心乃乾燥之筋既無脂液留之無益且剖之則入煎劑而易得全味又其説最古始於陶弘景甚謂不去其心令人心煩幾有必不可用之意然此物入土甚長一莖數枚連綿不絶一線貫通屈曲而達本經謂主心腹結氣治胃絡脈絶即取此義所以能貫通脈絡開達結氣凡通達脈絡之藥如竹茹絲瓜絡等皆是此意而麥冬去心則僅存黏膩之質更何有通結宣絡之力此物理之不可不知者注本項名原作正義顯誤現據內容改充蔚今名益母本經充蔚子味辛微溫主明目益精除水氣莖主癮疹癢可作浴湯別録味辛甘微寒療血逆大熱頭痛心煩正義充蔚古人止用其子本經之明目益精則溫和養血而又沉重直達下焦故為補益腎陰之用除水氣者辛溫下降故能通絡而逐水其莖可浴疹癢則活血疏風之功也別録加以微寒二字則亦溫亦寒大是不妥蓋當時以治熱證因而羼入此説療血逆者溫和行血又子能重墜下降故能平逆惟主大熱頭痛心煩則與溫養之性不符疑有傳訛存而不論可也廣義蘇恭謂莖葉主産後血悶及子死腹中搗汁服主浮腫下水消惡腫疔毒乳癰丹毒並以傅之又敷蛇虺百蟲毒螫滴汁入耳主聤耳李瀕湖謂子治風解熱順氣活血養肝益心安神調經崩中帶下産後胎前諸病莖葉活血破血調經解毒治胎漏産難胞衣不下血運血風注據綱目風下有血字痛崩中漏下尿血瀉血血注據綱目血原為疳痢痔疾打撲內損瘀血大便小便不通又謂治血分風熱明目調經宜用子治腫毒瘡瘍消水行血胎産諸病宜用莖葉以莖葉善於行而子則行中有補也景嶽謂其性滑利善調胎産故以益母為名去死胎下生胎活血行血石頑謂專行血分活血行滯古以為補陰者是散其瘀而新生之血自清非充蔚能補養之也治痧脹腹痛嘔逆一味濃煎恣飲有效是其能散惡血之證其子性溫能明目益精水虧而瞳神縮小者宜之火盛而瞳神散大者弗用以辛散能助火邪也發明充蔚古用其子今用莖葉氣烈味濃功專活血行血今三吳之俗以為産後惟一之要藥無人不服又主經行不利腹痛及脹皆有捷驗其稟溫和之性亦可概見而又能治癰腫瘡瘍內飲其汁外敷其滓頗似涼血解毒不知生搗取汁其性已與煎服微有不同而辛溫之氣宣通血絡自然散毒消腫其子其莖皆具溫通之性但子則沉重下降守而不走故能補腎益精明目莖葉則扶疏旁達走而不守故能活血流氣通調經絡凡草木之枝葉花實性質各有不同皆即此義若白花紅花之異則一類二種形式臭味皆無二致其用亦同或謂紅者主血分白者主氣分則皮相之見也正訛充蔚性溫觀其治産後行瘀調經前痛閉其義昭昭無可疑者別録加以寒字蓋必當時有以治熱病者故有主大熱頭痛一説然於今無徵姑勿深辨本經以浴癮疹後人以敷癰瘍則皆辛以散之非取涼解之義且癮疹為風熱在表固宜溫和疏泄不宜寒涼遏抑也景嶽亦以為寒甚且謂其涼血最易貽誤後學又充蔚枝葉扶疏生長極易故其性迅速為活血捷利之品經前導滯産後通瘀皆其明驗然走而不守有攻無補血滯血瘀者宜之而血虛血脫大忌乃俗醫以為破瘀生新而婦孺又謂女科必服之藥三吳習俗尤為酷嗜凡屬經病産後不問虛實無不恆服醫者信手塗鴉服者志心皈命須知導滯之藥豈是一例可用景嶽已謂血滯及産難者宜之而虛滑者不用石頑亦謂功專於行崩漏及大便不固者咸忌然則凡血虛氣滯經前腹痛及産後血脫已無瘀積者亦何可泥定益母二字為朝饔夕飧之品所見過於宣導遂成虛怯者亦所時有安得家喻戶曉為吾邦一洗其惡俗耶又益母雖非大溫大熱之藥而氣烈味苦究是溫燥隊中之物觀於産後連服二三日必口燥咽乾尤其確據故宜於寒令寒體而不宜於暑令熱體乃吾鄉視為産後必用之物雖酷暑炎天亦必常備加以畏其苦燥恆以砂糖濃調若在三伏時令新産虛體多服此濁膩苦燥之藥耗血戀邪變生不測更有可虞孟英醫案恆謂暑天新産不宜赤砂糖湯而不及益母蓋杭人已不多用此矣車前子本經味甘寒主氣癃止痛利水道小便除濕痹別録甘咸寒主淋瀝不欲食養肺強陰益精明目療赤痛葉及根主金瘡止血衄瘀血血瘕下血小便赤止煩下氣除小蟲正義車前甘寒滑利專通水道利小便而亦入下焦氣分本經主氣癃止痛即利竅而通泄膀胱之氣也除濕痹者水去濕化而痹通矣別録治淋瀝即導濕清熱利竅之效濕阻於中則納穀不旺濕熱清而胃納自增養肺強陰益精亦濕熱下泄而肺金清肅真陰自強耳非滑利之品遂能補益肺腎明目療赤痛亦泄化濕熱之功用也根葉之止血破血者寒降則血熱自止通利則瘀結可去止煩下氣亦即寒涼順降之理殺蟲者濕去熱清斯蟲不能生矣廣義陸璣毛詩疏謂治婦人産難即滑利之效也甄權謂子主眼赤痛障翳腦痛淚出壓丹石毒去心胸煩熱瀕湖謂導小腸熱止暑濕瀉利皆清降之功也甄權又謂葉治尿血利小便通五淋張景嶽謂其催生即陸氏詩疏之旨也發明車前之子光滑流利而氣味寒涼淡而能滲故專清熱而通利水道濕熱鬱滯在上者泄之使下在下者導之使行滑利有餘苟非小便黃赤澀而不利不宜多服古人以之催生下乳則利竅行水之力可知石頑謂陽氣下陷腎氣虛脫者弗用若以其平淡而忽之亦足耗傷津液於無形之中又此物淡而無味似非氣分之藥然濕熱壅塞下焦氣化不通或脹或痛或膀胱蘊濕小腸疝氣用為輔佐其應甚捷本經謂主氣癃蓋濕阻則氣滯濕化則氣通淡滲之味皆能疏泄氣分昔人謂利水而不涉氣分亦止就一面言之耳因陳蒿本經因陳味苦平主風濕寒熱邪氣熱結黃疸別録微寒主通身發黃小便不利考證陳藏器謂因陳經冬不死因舊苗而生故名因陳據此其字皆不當從草蓋從草之字古為茵褥而茵字始見於集韻其為俗字明矣孫氏問經堂刻本經作因陳是也且舊本皆不從草今從之正義因陳為利濕清熱專品乃濕熱發黃之主藥本經主風濕寒熱邪氣熱者亦以濕熱之邪蘊結者言之也廣義陳藏器謂通關節去滯熱日華謂石因陳主天行時疾熱狂瘴瘧張石頑謂葉細如青蒿者為綿因陳專於利水為濕熱黃疸要藥凡濕熱伏於陽明之病皆其專主仲景因陳蒿湯治濕熱發黃梔子柏皮湯治燥熱發黃麻黃連翹赤小豆湯治瘀熱在裡而身黃以三方分治陽黃其治陰黃則有因陳附子湯蓋因陳專走氣分而利濕熱故畜血之發黃非此能治又有一種子如鈴者名山因陳又名角蒿則味苦辛而專殺蟲治千金瘡口齒蝕燒灰塗之而殺蟲方中一味煎湯內服外洗亦逐濕化熱之功也發明因陳味淡利水乃治脾胃二家濕熱之專藥濕疸酒疸身黃溲赤如醬皆胃土蘊濕積熱之證古今皆以此物為主其應甚速蕩滌腸胃外達皮毛非此不可蓋行水最捷故凡下焦濕熱癢搔及足脛跗腫濕瘡流水並皆治之其陰黃一證雖曰虛寒然其始亦內有蘊熱故能發見黃色則以入於溫經隊中而掃蕩之仲景因陳附子之法是也惟女勞疸一證則瘀滯痹著非僅通利所可奏功故必以硝石礬石之峻利者為刮垢磨光之用而無取於因陳也瞿麥本經味苦寒主關格諸癃結小便不通出刺決癰腫明目去翳破胎墮子下閉血別録味苦性寒養腎氣逐膀胱邪熱止霍亂發明瞿麥即今人恆蒔之所謂洛陽花花色紅紫斑爛其性陰寒泄降利水除導濕退熱外無他用本經謂明目去翳別録謂其養腎則邪熱清而真陰復非通利之品果能養陰也出刺決癰墮胎其力猛矣別録又稱其主霍亂則濕熱內阻清濁不分者以為分泄逐濕之用非主陰寒之霍亂也日華謂其主五淋月經不通廣義景嶽謂合涼藥亦消眼目腫痛合血藥則通經破血下胎宣導下焦濕熱石頑謂利小便之君藥日華又謂其葉主痔漏瀉血解丹石藥發搗敷腫毒浸淫瘡無一非清熱利導之用然必實有濕熱壅滯者為宜注廣義項名原漏今補禁忌石頑謂妊娠産後小水不利及脾虛水腫者禁用壽頤按又有老人虛人氣化不利而為癃閉溲少等證亦非濕熱蘊結治宜宣化氣分五苓八正徒耗津液皆為禁藥注禁忌項名原缺補萹蓄本經味辛平主浸淫疥搔疽痔殺三蟲別録療女子陰蝕發明萹蓄味辛為燥濕殺蟲之品今本皆作苦惟孫本作辛搔今本作瘙本經別録皆以祛除濕熱為治浸淫疥瘡疽痔陰蝕三蟲皆濕熱為病也後人以其泄化濕熱故並治溲澀淋濁瀕湖以治黃疸霍亂皆即清熱利濕之功用然亦惟濕阻熱結為宜而氣虛之病皆非其治若濕熱瘡瘍浸淫痛癢紅腫四溢膿水淋漓等證尤其專職海金沙發明此草本自然生成之細沙也市肆中多以黃沙土雜之用時須用水淘過取其浮者干之以指拈之不黏者為真專於利水通淋男子淫濁女子帶下皆必用之品但性寒而力亦不弱虛人弗過用廣義嘉祐本草稱其甘寒通利小膀瀕湖謂治濕熱腫滿熱淋膏淋血淋石淋小溲莖中痛解熱毒氣景嶽謂治鬱熱濕熱注廣義項名原漏今補淡竹葉發明此非竹類也生下濕地細莖緑葉有似於竹故有此名四五月間開花如蛾兩瓣舒展作翅栩栩欲飛深碧可玩古書謂之鴨跖草注按淡竹葉鴨跖草並非一物廣義陳藏器謂味苦大寒治寒熱瘴瘧痰飲丁腫小兒丹毒發熱狂癇大腹痞滿身面氣腫熱痢蛇犬咬癰腫等毒日華謂治濕痹利小便瀕湖以消喉痹亦清熱解毒泄水利水之良品也蓼實水葒花子發明蓼之種類不一有宜於高燥之地有産於下濕之旁高者枝葉扶疏迷離簾隙小者莖條柔細掩映水濱然莖葉雖有巨細之分而形色花穗約略近似雖有馬蓼水蓼葒草水葒花等名要皆一類數種無甚區別其味皆辛生長極易故皆善於走竄為利水消癰之猛藥又莖葉紫赤花穗殷紅則又入血分而破瘀逐血磨積消痞本經止有蓼實別録乃增以葒草至瀕湖綱目則羅列四五種其氣味本經謂之辛溫所以後世有蓼辣草之名別録以葒草為味鹹微寒似不可據本經蓼實稱其下水氣治面浮腫癰瘍廣義甄權謂治癧瘍止霍亂弘景謂蓼葉乾之釀酒主風冷藏器謂蓼葉治霍亂轉筋煮汁日飲治痃癖日華謂赤蓼燒灰淋汁浸足治暴軟唐本草謂水蓼葉搗敷蛇傷絞汁服之解蛇毒入腹心悶又治腳氣腫痛成瘡水煎漬之瀕湖謂水葒花散血消積止痛凡此主治皆是通泄宣導利水破血之用石頑謂婦人月事來時不可食蓼及蒜易為血淋帶下亦以辛泄過度破氣傷血故也又謂蓼實水葒花子破瘀消積力量甚峻最易墮胎妊娠必不可犯亦有血氣素虛而月事偏少非因於瘀滯者亦不可誤與也注廣義項名原脫今補麻黃本經味苦溫主中風傷寒頭痛溫瘧發表出汗去邪熱氣止咳逆上氣除寒熱破癥堅積聚別録微溫主五臟邪氣緩急風脅痛字乳余疾止好睡通腠理疏傷寒頭痛解肌泄邪惡氣消赤黑斑毒不可多服令人虛正義麻黃質輕而清專泄氣分而性微溫故為疏散風寒外感之主藥本經主中風傷寒頭痛發表出汗別録通腠理疏傷寒頭疼解肌仲景傷寒論方麻黃葛根大小青龍等湯皆是也然其性微溫非大溫大熱之比但專以輕疏見長則不獨泄散風寒而亦可泄散風熱本經又主溫熱去邪熱氣除寒熱別録謂主五臟邪氣泄邪惡氣蓋輕清之質專行於肌表凡寒熱之邪尚在表分者麻黃能疏以達之主咳逆上氣者疏通肺氣之功也主風脅痛者疏泄風邪而宣達肝膽經絡之鬱滯也破癥結積聚消赤黑斑毒則宣通其氣機而瘀積亦得漸通血熱亦從而泄化矣不可多服者疏泄太過則正氣耗散於無形耳惟別録謂主字乳余疾則指新産乳子之時然氣血既虛殊不宜於泄散恐有訛誤不敢望文生義強作解人廣義甄權治毒風疹痹皮肉不仁及壯熱溫瘧山嵐瘴氣潔古謂祛營中寒邪泄衛中風熱瀕湖謂散赤目腫痛水腫風腫景嶽謂輕揚之性善達肌表治風寒溫疫嵐瘴表實之證兼溫藥以助陽則逐陰凝之寒結兼涼藥以助陰則解炎熱之溫邪手太陰之風寒咳嗽手少陰之風熱斑疹足少陰之風水腫脹足厥陰之風痛目痛苟宜疏散惟此為最壽頤按風水腫脹法宜輕疏發汗者是肺為風壅而皮毛郁遏不宣故可用麻黃之類若曰足少陰病而為腫脹則腎水上泛豈有麻黃泄表之理介賓此語大有誤會發明麻黃質輕而空疏氣味俱薄雖曰性溫然淡泊殊甚故輕浮上升專泄肌腠凡風寒溫熱之邪自外感而來初在肌腠者無不治之雖古今皆以為發表之藥仲景列之於太陽篇中然表即皮毛之部而皮毛即合於肺總之外來之邪皆自外入傷於皮毛則曰表病觸於口鼻則為氣病而皮毛合於肺口鼻通於肺肺又專主氣之出納故外感之第一步皆氣分先受其病無論風寒溫熱之邪肺家首當其衝表病即氣病氣病即肺病寒邪則鼻塞身重凜寒發熱溫邪則鼻燥氣濁肌膚灼熱且必多兼咳嗽寒邪則咳聲不揚溫邪則咳痰不滑又皆感邪犯肺傷氣之明證是以治外感之病第一要著即在輕泄肺邪疏達氣分無不立解惟麻黃輕清上浮專疏肺郁宣泄氣機是為治感第一要藥雖曰解表實為開肺雖曰散寒實為泄邪風寒固得之而外散即溫熱亦無不賴之以宣通觀於本草經主中風傷寒去邪熱氣除寒熱之説及後人並治風熱斑疹熱痹不仁溫瘧嵐瘴其旨可見而俗人猶以為專主表寒之猛劑者誤矣且仲景麻黃湯之專主太陽病寒傷營者以麻黃與桂枝並行乃為散寒之用若不與桂枝同行即不專主散寒發汗矣抑麻黃之泄肺亦不獨疏散外來之邪也苟為肺氣鬱窒治節無權即當藉其輕揚以開痹著如仲景甘草麻黃湯之治里水黃腫千金麻黃注黃原脫今補醇酒湯之治表熱黃疸後人以麻黃治水腫氣喘小便不利諸法雖曰皆取解表然以開在內之閉塞非以逐在外之感邪也又凡寒邪郁肺而為鼻塞音啞熱邪窒肺而為濁涕鼻淵水飲漬肺而為面浮喘促火氣灼肺而為氣熱息粗以及燥火內燔新涼外束乾咳嗌燥等證無不恃以為疏達肺金保金清肅之要務較之杏貝苦降桑皮杷葉等之遏抑閉塞者功罪大是不侔而庸俗畏之幾如蛇蠍豈真古今人之不相及耶蓋皆耳食之誤而未嘗體驗之耳李瀕湖本草綱目麻黃髮明一條極言其為肺經專藥申明仲景麻黃湯之功用本不專為散寒發汗而設謂傷寒無汗之用麻黃湯雖治太陽實即治肺蓋汗為津液所化汗即血也其在營則為血在衛則為汗寒邪傷營則營血內澀而氣不能外通於衛衛氣閉塞津液不行故無汗發熱而憎寒風邪傷衛則衛氣外泄而不能內護其營營氣虛弱津液不固故有汗發熱而惡風然風寒之邪皆由皮毛而入皮毛者肺之合也肺主衛氣包羅一身是其證雖屬太陽而肺實受其病其證必兼面赤怫鬱咳嗽有痰喘而胸滿非皆肺病之明驗乎蓋皮毛外閉而邪熱內攻則肺氣膹郁故以麻黃甘草同桂枝引出營分之邪達之肌表佐以杏仁泄肺而利其氣汗後無大熱而喘者則加石膏朱肱活人書夏至後加以石膏知母是皆泄肺火之藥則麻黃湯雖曰太陽發汗重劑而實為發散肺金火鬱之藥其説極是於此可見麻黃湯之發汗更重在桂枝而麻黃之治則其主在肺而不在表尤彰彰明矣正訛麻黃性質最輕氣味又淡本草雖曰苦溫亦因其功用而懸擬之不過言其溫和升發之義耳乃流俗畏之幾以為大溫大熱藥則李瀕湖綱目性熱一言誤之也甚且謂其出産之地冬不積雪而繆氏經疏更為過甚之詞竟有味大辛氣大熱之説又謂自春深以至初秋法所同禁今試取麻黃而細嚼之辛味何在考古今各家本草別録謂微溫則輕浮體質必稟春升溫和之氣最為有據惟張潔古稱其性溫味苦甘辛然亦謂其氣味俱薄不知繆氏何忽一變而為大辛且加以大熱二字似此危詞聳聽最足駭人實屬荒謬已極而俗人聞聲卻步大率為此謬説所纍不知麻黃髮汗必熱服溫覆乃始得汗不加溫覆並不作汗此則治驗以來鑿鑿可據者且亦惟寒邪在表乃宜少少取汗以解表邪之寒熱若用以泄肺開喑亦且無取乎得汗而奏效甚捷何況輕揚之性一過無餘亦必不能大汗頻仍留戀藥力釀為巨患景嶽已謂今人畏為毒藥而不敢用又有謂夏月不宜用麻黃者皆可哂也瀕湖又謂凡服麻黃藥須避風一日不則病恐復作亦是臆説皆不足徵但性質甚輕不可重用耳麻黃根發明麻黃髮汗而其根專於止汗昔人每謂為物理之奇異不知麻黃輕揚故走表而發汗其根則深入土中自不能同其升發之性況苗則輕揚根則重墜一升一降理有固然然正惟其同是一本則輕揚走表之性猶存所以能從表分而收其散越斂其輕浮以還歸於里是固根荄收束之本性則不特不能發汗而並能使外發之汗斂而不出此則麻黃根所以有止汗之功力投之輒效者也凡止汗如糯稻根癟桃干小麥棗仁之類皆取其堅凝定靜之意以收散失之氣其旨皆同夫豈麻黃與根同出一本而其性顧乃背道相馳耶防風發汗其根止汗亦是此義紫菀本經味苦溫主咳逆上氣胸中寒熱結氣去蠱毒痿蹶安五臟別録味苦辛溫療咳唾膿血止喘悸五勞體虛補不足小兒涼癇正義紫菀苦溫而潤能通肺氣開泄鬱結故主咳逆上氣而治胸中寒熱結氣去蠱毒者殆亦散結降逆泄化留著之意療痿蹶者肺主一身之治節肺氣窒塞則肺熱葉焦而治節不行經絡弛縱因為痿蹶肺氣利斯大氣足以舉之而積熱泄化關節流利痿蹶起矣安五臟者肺主五臟之氣肺氣順而臟氣安也別録主咳吐膿血止喘悸皆肺氣壅塞之病主五勞體虛補不足即本經安五臟之意小兒驚癇亦氣火挾痰上升之證降氣開結泄化痰濁固驚癇之正治也廣義甄權謂其下氣治勞氣虛熱日華謂其調中消痰止渴潤肌膚好古謂其益肺氣主息賁皆開泄降逆溫潤疏通之功效也石頑謂肺經血分之藥疏利肺家血氣金匱澤漆湯用以治咳而脈沉者咳為肺病而脈沉血分之病也辛而不燥潤而不寒能止咳定喘通調水道溺澀便血者單服即效發明紫菀柔潤有餘雖曰苦辛而溫非燥烈可比專能開泄肺郁定咳降逆宣通窒滯其味微辛則入氣分其色殷紫則入血分故能兼疏肺家氣血凡風寒外束肺氣壅塞咳嗆不爽喘促哮吼及氣火燔灼郁為肺癰咳吐膿血痰臭腥穢諸證無不治之而寒飲蟋踞濁涎膠固喉中如水雞聲者尤相為宜惟其溫而不熱潤而不燥所以寒熱皆宜無所避忌景嶽謂水虧金燥咳嗽失血者非其所宜石頑謂陰虛肺熱乾咳者忌之蓋恐開泄太過重傷肺金又恐辛溫之性或至助火要之虛勞作嗽亦必有濁痰阻塞肺竅故頻頻作咳以求其通不為開之咳亦不止以此溫潤之品泄化垢膩順調氣機而不傷於正不偏於燥又不犯寒涼遏抑滋膩戀邪等弊豈非正治且柔潤之質必不偏熱較之二冬二母名為滋陰而群陰膩滯阻塞隧道者相去猶遠惟實火作咳及肺癰成膿者似紫菀雖能泄降微嫌其近於辛溫不可重任然藉為嚮導以搗穴犁庭亦無不可總之肺金窒塞無論為寒為火皆有非此不開之勢而俗子多不知之但以從事於蘇子之辛溫桑皮之抑降此肺勞之人所以項背相望而不可救藥也繆氏經疏反謂其辛散之功甚烈且謂咳逆喘嗽皆是陰虛肺熱之證欲用紫菀須與二冬桑皮同用則不獨沒煞肺寒喘嗽一層且紫菀之功力惟在開泄乃以二冬膩之且以桑皮之大寒苦降者遏抑之是惟恐其肺家痰涎濁膩或有透泄之路而必欲閉之塞之乃至於絶也如此談醫直以殺人為能事然則今之治嗽而只知有二冬桑皮者皆繆仲淳作俑之孽矣立言不慎貽禍無窮不可不辨又凡小便不利之候多有由於氣化不宣者古人謂之氣癃不調其氣但與滲利亦必不效惟紫菀疏泄肺氣則上竅開而下竅亦泄石頑謂其通調水道其用在是非僅以其溫潤也白菀發明白菀古人皆謂即紫菀之白者本經謂之女菀其味辛溫主風寒洗洗霍亂泄利腸鳴上下無常處驚癇寒熱別録療肺傷咳逆支滿考其功力蓋亦宣泄疏達之品與紫菀似無甚區別且今亦未有用之者但一類二種草木中似此者甚多姑附録之以俟知者亭歷本經味辛寒主癥瘕積聚結氣飲食寒熱破堅別録苦大寒逐邪通利水道下膀胱水伏留熱氣皮間邪水上出面目浮腫身暴中風熱痱癢利小腹久服令人虛考異亭歷舊本皆作葶歷惟御覽引作亭歷不從草説文蕇亭歷也亦不從草孫氏問經堂刻本草經從之今從孫氏發明亭歷子苦降辛散而性寒涼故能破滯開結定逆止喘利水消腫本經主治皆以破泄為義至別録則專通水道矣甄權謂療肺壅上氣咳嗽止喘促除胸中痰飲瀕湖謂通月經景嶽謂泄氣閉善逐水乃氣行而水自行也故肺中水氣膹滿脹急者非此不除石頑謂其專泄肺氣而能通膀胱之氣化蓋惟上竅閉塞下竅不通因而積水泛濫溢為喘滿為腫脹為積聚辛以散之苦以泄之大寒以沉降之則下行逐水既泄肺氣即通膀胱為其體輕而性降也惟寒泄之品能通利邪氣之有餘不能補益正氣之不足苟非實熱鬱窒自當知所顧忌別録久服令人虛本是至理然肺家痰火壅塞及寒飲瀰漫喘急氣促或為腫脹等證亦必賴此披堅執鋭之才以成搗穴犂庭之績自徐氏之才論十劑之泄以去閉偶以大黃亭歷二物並舉而東垣遂謂亭歷氣味俱厚不減大黃景嶽從而和之石頑且謂苦寒不減硝黃丹溪亦有亭歷性急病涉虛者殺人甚捷之説遂令俗人不辨是否畏如蛇蠍即尋常肺氣喘滿痰飲窒塞之證亦幾有不敢輕試之意其亦知實在性質不過開泄二字且體質本輕故能上行入肺而味又甚談何至猛烈乃爾臨證以來所用甚夥開肺之效久已共見而傷肺之弊尚是無聞抑且通調水道固有其功而傷脾作瀉未見其罪乃古書多與大黃並論者則皆因徐氏偶舉其例而聽者不察和而唱之競為應聲之蟲無識盲從可為浩嘆盍亦試以兩物分煮而嘗之當可恍然於其氣味厚薄之何似矣又按吳下醫者每謂有甜苦二種且謂苦者力峻甜者較和然肆中未聞有分為二種者蓋亦徒有此甘苦之名耳緣今之醫者不復自任採藥之職但據紙上空談終鮮實驗又安得好事之人羅致囊中而實地一研究之恆山即常山本經味苦寒主傷寒寒熱熱發溫瘧鬼毒胸中痰結吐逆別録辛微寒療鬼蠱往來水脹灑灑惡寒鼠瘻考證恆山舊本作常山蓋漢人避文帝諱而改之相沿未之正耳御覽引本草經作恆山當是最古之本孫氏問經堂本從之是也蜀漆本經味辛平主瘧及咳逆寒熱腹中癥堅痞結積聚邪氣蠱毒鬼注別録微溫療胸中邪結氣吐出之常山苗也發明恆山蜀漆本是一物氣味皆辛苦而寒泄熱破結降逆下氣開痰逐水其用皆同觀本經別録所載主治其旨可見別録乃謂蜀漆微溫恐不可信雖本經以治癥堅痞結積聚似非苦寒之品所能勝任然此物之能開結破積皆主痰熱而言本非治凝寒積聚之痞故所主傷寒寒熱痰結水脹咳逆鼠瘻邪氣吐逆諸證皆屬於熱痰蘊積一途不能謂其兼療寒證且所謂蠱毒者本屬南方濕熱之毒癘氣所鍾尤其明證惟鬼注一層則終是古人神道設教之旨無稽之言未堪全信其專主溫瘧一證則凡屬瘧邪往來寒熱休作有時皆是凝痰積濕留於經隧古人每謂無痰不成瘧無積不成瘧若不先泄化其痰濕積滯則病根蟠結寒熱終無休止之時恆山之用本為開痰逐水滌濕化積而設是以本經別録均以為治瘧主要之藥後人泥於仲景小柴胡湯一法知柴胡主瘧者多而知恆山主瘧者少豈知柴胡治瘧僅主邪在經絡之一部而於痰濕積滯不能顧及且惟漸發漸晏者為宜而早用遲用皆不切當恆山治瘧能疏通在內之蘊結抉其根株則寒熱之邪無所憑藉而瘧自不作是柴胡尚治其標而恆山乃治其本也仁齋直指謂瘧家多有痰涎黃水或停瀦心下或闢積胸脅之間乃生寒熱常山能破其積而下其水功力不薄或再以行血之藥佐之如桃仁蓬朮穿山甲之類其功尤捷其有純熱發瘧或蘊熱內實之證更佐以大黃泄利數行然後獲愈楊氏此論發明恆山主瘧之真旨最是洞徹底蘊勘透淵微古人又有謂其專主瘴瘧者亦以南方瘴癘之惡毒無非溫熱鬱蒸積於經隧有以釀成此痰濁耳李燾謂嶺注原作癲顯誤改南瘴氣感人其邪多在營衛皮肉之間欲去皮膚毛孔中瘴邪之根本非恆山不可壽頤則謂溫癘之毒多由口鼻吸入集於肺胃與凝痰積濕相合遂生癘階恆山治瘴亦治其在內之濕痰非祛其在外之邪氣李氏之論尚屬似是而非景嶽並謂其治狂癇癲厥亦取其開泄痰結藉以鎮定其火逆之上衝惟恆山在本草經固明言其治吐逆而別録於蜀漆條中乃有吐出之一句後人遂謂其為吐劑中之猛藥幾有談虎色變望而生畏之意雖曰蜀漆為苗恆山為根草木之性每有根荄下行莖苗上行之理二者性質容有不同然本經於蜀漆條中亦自有治咳逆一句既能治咳逆則猶是泄降之品而反謂其吐得毋本經別録背道而馳惟蜀漆固自有腥涎所以古有雞尿草鴨尿草之別名其在肺胃不肅痰飲壅積之人觸此腥涎亦易擾動其濁氣引之作嘔而其實則能降逆開結並不以上湧見長抑且痰在上焦引而越之亦是正法藉以祛除蘊積夫豈不可又安有愛而不去養癰貽患之理然苟洗淨其涎則止以下泄奏功自無慮其上泛潔古謂洗去其腥與苦酸同用能導膽邪即是此旨石頑謂醋炒不吐亦可參也瀕湖謂常山蜀漆有消痰截瘧之功須在既散表邪提出陽分之後用之得宜神效立見持論極為中肯蓋常山之功專於開泄痰濁若邪在表分本非其力之所及且降逆散結又以下行見長若瘧邪已入陰分則苦寒遏之愈增抑鬱之困而更無外出之路矣瀕湖又謂生用多用則上行為吐炒熟少用亦不致吐正以生用則腥涎未去易於引嘔炒之則沉降之力愈專自不上逆又謂得甘草則吐得大黃則利得烏梅鯪鯉甲則入肝經得小麥竹葉則入心經得麻黃則入肺經得龍骨附子則入腎經得草果檳榔則入脾經分途論治自有至理惟破降開泄其力亦峻宜於實證不宜於虛人如久瘧氣虛而無痰積者不可妄試丹溪已謂其性暴悍善於驅逐傷真氣虛怯不可用也款冬花本經味辛溫主咳逆上氣善喘喉痹諸驚癇寒熱邪氣別録味甘主喘息正義款冬花辛溫泄肺降逆性情功用頗與紫菀近似本經主治亦與紫菀大同廣義甄權療肺氣促急咳連連不絶日華潤心肺除煩消痰蘇頌謂溫肺治咳之最石頑謂味辛則入氣分色紫則入血分其性雖溫而不燥血輕揚上達治氣升火炎之病潤肺消痰止咳定喘喉痹音喑並皆主之發明款冬嚴寒著花其性微辛是以性溫而花本輕揚故主肺病能開泄鬱結定逆止喘專主咳嗽性情功用皆與紫菀絶似所以本經主治亦復多同於寒束肺金之飲邪喘嗽最宜然氣味雖溫而生於水中亦潤而不燥則溫熱之邪鬱於肺經而不得疏泄者亦能治之又如紫菀開肺寒熱者皆宜之例特比之紫菀究是溫辛一籌則火邪鬱結如肺癰成膿痰紅臭穢之候自當有所顧忌甄權竟謂其主肺痿肺癰而景嶽石頑從而和之殊是未妥且石頑亦謂陰虛勞嗽忌之以其性溫也何獨於肺癰而不畏其溫是知有二五而不知有一十矣要之其功用大綱多似紫菀上文紫菀條中論之已詳茲亦不贅試參觀之亦可觸類而旁通也正訛繆氏經疏有一方用款冬花貝母桑根白皮紫菀枇杷葉天花粉百部天冬麥冬杏仁謂治喘逆咳嗽則喘逆咳嗽四字之中有寒有熱有實有虛證情病態萬有不齊豈有羅列幾味治肺之藥而謂可以通治寒熱虛實之理且所集諸藥寒者溫者開者膩者疏通者閉塞者渾溶於一爐之中縱有幾味對證亦已多所牽制何由奏效此類成方貌視之頗似親切病情無甚悖謬實則龐雜已極必無偶爾幸中之理且開泄與遏抑並用則紫菀款冬百部之最能疏化肺郁者已為二冬之黏滯束縛不靈況再加以桑皮苦寒抑降閉而塞之更是落井下石手段惟恐其肺家郁窒少得疏通而必膩之塞之以速其斃制方之意是何居心不圖今日醫師竟以此法為正宗即近時鼎鼎大名如某氏者數世家傳一門濟濟聲名物望震耀三吳每見其所定咳嗽之方無一不蹈斯弊而俗醫尤而效之遂成習慣所以吾吳庸醫治咳治喘幾有一病一死百病百死之嘆雖病有重輕死有遲速然一嘗此等方藥無不輕者致重重者速殞縱使體強年壯幸而殘喘苟延卒亦莫起沉疴同歸於盡試為研究其病態之變遷類皆此方中之五六味鑄成大錯以所見所聞言之輾轉哀號而莫能援手者已不可僂指而數謬種相承伊于胡底而其真傳之衣鉢何莫非繆氏此方階之厲而作之俑蓋止此寥寥數物而可以通治寒熱虛實諸證孰不以為簡便易行深印腦經謹守弗替其亦知為禍之烈至於此極乎嗟嗟孽海茫茫方興未艾故備論之以揭破其謬冀為斯道開發一線之光明止欲為令人導引迷津非好與古人尋瘢索垢也又繆氏更有一方以款冬麻黃杏仁桑白皮甘草治風寒鬱實作喘則寒邪外束開肺宜也但桑白皮遏抑肺氣雖曰瀉肺而寒能抑塞惟肺家燥熱為宜斷非外有寒邪者所可妄試若去桑皮而易以紫菀則近於道矣百合本經味甘平主邪氣腹張心痛利大小便補中益氣別録除浮腫腫脹痞滿寒熱通身疼痛乳難喉痹考證腹張今本皆作腹脹茲從孫氏問經堂本按脹字見於玉篇由來已舊非晚出之俗字可比然玉篇引左傳將食脹如廁之文為脹字作注而今之左傳固作張陸氏釋文亦作張也此張為正字脹為孳生字之明證蓋腹脹之脹本以張大為義後人從肉為脹殊屬無謂惟其音則自古皆讀去聲陸德明左傳釋文中亮反廣韻知亮切發明百合乃甘寒兼苦滑潤之品本經雖曰甘平然古今主治皆以清熱泄降為義其性可見本經主邪氣別録主寒熱皆以蘊結之熱邪言之主腹脹心痛利大小便除浮腫臚脹痞滿疼痛乳難喉痹皆滑潤開結通利泄導之功用本經又以為補中益氣日華又有安心益志等説皆謂邪熱去而正氣自旺非徑以甘寒之品為補益也仲景金匱以主傷寒後之百合病外臺祕要中更多此法則百合病者本為傷寒病後餘熱未清之證所以神志恍惚莫名所苦故謂之百脈一宗悉致其病百合能清泄肺胃之熱而通調水道導泄鬱熱是以治之然則凡䐜脹浮腫等證必系熱阻氣鬱百合方為正治而寒濕交滯脾腎陽衰者皆當忌之甄權謂其除心下急滿治腳氣亦必以有熱者為宜甄權又主熱咳潔古謂為止嗽又必以肺熱熾甚氣火爍金之證乃為合法而風寒外束肺氣不宣之咳尤為禁品古方以百合款冬花同熬成膏名曰百花膏治久咳痰血之病亦以陰虛火旺上灼燥金故以百合之清潤降火合之款冬之微溫開泄者宣散氣火滋益肺虛是為正治而世俗或以百合通治外感之嗽者又未免寒降遏抑反令肺氣窒塞外邪無從宣泄矣又按百合之花夜合朝開以治肝火上浮夜不成寐甚有捷效不僅取其夜合之義蓋甘涼泄降固有以靖浮陽而清虛火也孫思邈以百合子酒炒研末湯服治腸風下血亦取其甘苦下降能清血熱且子尤重墜固能直達大腸者也又考李氏綱目必以白花者為真百合其紅花者則為山丹又一種紅花帶黃花有黑斑而其子先結於葉間者則為卷丹此一類三種本是大同小異今則白花者甚少通行之品皆是紅花但其味較苦不及白花之甘美其性則苦者尤清肺無熱象及寒飲咳喘尤必避之石頑謂紅花者活血治婦人崩中壽頤按花紅者其根亦有紅色且莖色亦紫故能入血分而治血熱瀕湖謂山丹花蕊搗敷療腫惡瘡石頑又引中吳紀聞謂古稱百合乃蚯蚓所化此洵有之余親見山土罅中有變化未全者蓋野生之物蟲化者間或有之野百合之能清熱解毒散積消瘀固尚有蚓之本性云云壽頤謂野生百合形小質堅苦味甚烈蓋得地氣尤厚其性尤寒以治肺火更佳而寒邪作咳尤忌以治癰腫瘍毒固以寒涼為治蚓化一説殊不可信縱曰有之亦必不恆有也萱草發明萱草為涼降之品專於清熱利水陳藏器稱其根主沙淋下水氣酒疸遍身黃者搗汁服寇宗奭稱其主大熱衄血研搗和生薑汁細呷之景嶽稱其並治帶濁丹溪謂其善於下走皆導熱利濕之用也其花今為恆食之品亦稟涼降之性日華謂治小便赤澀身體煩熱蘇頌謂利胸膈安五臟瀕湖謂消食利濕熱其旨皆同又今人恆以治氣火上升夜少安寐其效頗著蓋其花亦朝開夜合能順陰陽噓吸之性而又能涼降泄火以療陰火上浮暮不歸舍之證固其宜也正訛萱草古人有作草下諼者同音假借固漢以前之通例借用其音本無別義乃以諼字有忘義因而謂之忘憂草所謂合歡蠲忿萱草忘憂者詞賦家就字面而點綴之是文人之結習非物理之本然與醫學家研究物性未必相符亦猶風土記所謂妊娠佩之宜男者夫豈得引為實驗奈何蘇頌景嶽猶謂令人歡樂和悅無憂耶射干本經味苦平主咳逆上氣喉痹咽痛不得消息散結氣腹中邪逆食飲大熱別録微溫有毒療老血在心脾間咳唾言語氣臭散胸中熱氣存疑不得消息當作不得息言其喘逆氣急不得呼吸之常度也古醫書言喘逆不得息甚多本草經此條作不得消息義不可解恐系衍文雖舊本皆有消字甚覺無謂發明射干苦降而能開泄頑痰瘀血散結定逆其功頗多故別録謂為微溫石頑加以辛字然熱痰寒飲喘逆上氣皆能治之則皆以苦降為主不合辛溫之旨且射干之主治雖似不一實則降逆開痰破結泄熱二語足以概之所以韓保升謂之微寒而瀕湖景嶽又徑以為寒究之下氣通滯亦不繫乎寒涼本經苦平最是至當不易其所列之主治則開泄定逆而已至名醫別録則增益破瘀一層其主咳唾言語氣臭亦肺胃蘊熱之病也甄權稱其消瘀血通婦女月閉日華謂其消痰破癥結痃癖胸膈滿腹脹張潔古謂其去胃中癰瘡丹溪稱其利積痰疝毒消結核瀕湖稱其降實火利大腸治瘧母陶弘景謂苦酒磨塗可消腫毒石頑謂散結降氣為咽喉腫痛要藥能降相火火息則血散腫消而痰結自解質而言之開通泄降四字盡之矣牛蒡子別録惡實味辛平主明目補中除風傷根莖療傷寒寒熱汗出中風面腫消渴熱中逐水發明牛蒡子始見別録本名惡實一名鼠黏子李氏綱目一名大力子其味則別録稱其辛平藏器稱其苦潔古渭之辛溫今按牛蒡之用能疏散風熱起發痘疹而善通大便苟非熱盛或脾氣不堅實者投之輒有泄瀉則辛泄苦降下行之力為多潔古作溫景嶽又謂其降中有升皆非真諦其所以能散風熱透達斑疹起發痘瘡者因其實滿體芒刺如栗加芡而其子又兩端尖鋭故能宣散四達通行經絡此亦物理自然之性質本不繫乎溫而能升也別録稱其明目則風熱散而目自明補中者亦邪熱去而正自安除風傷者以風熱言之也其根莖則瀕湖綱目謂之苦寒別録主治皆除熱通利之意蓋其功力本與子相近而寒涼疏通之性過之固皆以清熱宣導為治凡非實火未可輕投藏器謂子主風毒腫諸瘻根浸酒服去風及惡瘡和葉搗敷杖瘡金瘡永不畏風甄權謂子研末浸酒服除諸風去丹石毒利腰膝又散諸結去筋骨間煩熱毒根莖主面目煩悶四肢不健通十二經脈孟詵謂子炒研煎飲通利小便根消腫脹葉作浴湯去皮間風熱習習如蟲行入鹽花搗敷一切毒腫潔古謂子潤肺散氣利咽膈去皮膚風通十二經瀕湖謂子消斑疹毒景嶽謂散瘡瘍腫毒喉痹凡此功用無一非清熱泄降消導之力然凡肺邪之宜於透達而不宜於抑降者如麻疹初起猶未發透早投清降則恆有遏抑氣機反致內陷之虞惟牛蒡則清泄之中自能透發且溫熱之病大便自通亦可少殺其勢故牛蒡最為麻疹之專藥余如血熱發斑濕熱發瘡皆以此物外透其毒內泄其熱表裡兼顧亦無疑忌非其他之寒涼清降者可比慎不可謂牛蒡清降宜於斑疹而與芩地知膏玄參等物一例視之若此外癰腫水腫等證則苟非熱結慎勿輕用局方已有大便利者弗服之禁石頑亦謂氣虛色白大便利者不宜用此繆仲淳亦謂惟宜於血熱便閉之證俗醫止以為時病發散之通用則此中之疑似辨別皆未之知矣蒼耳子本經枲耳實味甘溫主風頭寒痛風濕周痹四肢拘攣痛惡肉死肌別録枲耳實味苦甘溫葉苦辛微寒主膝痛溪毒正義蒼耳本經謂之枲耳即毛詩之卷耳吾鄉俗稱為野茄樹以其莖葉之有似於茄也為疏風散寒驅濕逐痹疏利關節通調脈絡之良藥古今皆以主治風寒濕痹別録又主溪毒亦除濕解毒之旨廣義甄權治肝熱明目即疏風而目自明之意非以之清理肝熱也日華治一切風氣瘡疥癢瘙瀕湖謂炒香浸酒服去風莖葉孟詵謂治中風傷寒頭痛蘇恭謂治大風頭風濕痹毒在骨髓腰膝以夏月採曝為末酒服久則病出如瘑疥或汁出或斑駁甲錯逮皮落則肌如凝脂除諸毒螫殺疳蟲濕蝕石頑謂子治頭風腦痛腳膝寒痛其葉久服去風濕有效發明蒼耳子溫和疏達流利關節宣通脈絡遍及孔竅肌膏而不偏於燥烈乃主治風寒濕三氣痹著之最有力而馴良者又獨能上達顛頂疏通腦戶之風寒為頭風病之要藥而無辛香走竄升泄過度耗散正氣之慮以視細辛羌活等味功用近似而儒將風流迥與鬚髯翕張戟手怒目者異其態度即例以川芎白芷等物之以氣為勝者猶難同日而語但和緩有餘恐未易剋日奏功耳正訛斗門方謂婦人血風攻腦頭旋猝倒不省人事者用蒼耳草嫩心陰乾為末酒服甚效此味善通頂門達腦能走督脈也壽頤按頭旋猝倒不省人事確是氣血上升激動腦經之病斗門方能知是血風攻腦其善悟誠不可及但此是內動之風正惟風陽陡動所以猝然眩暈便能傾僕治法止有潛陽息風抑之下降則氣火平而風自息腦神經不受震動而其病可愈斷不可雜以一味動風之藥助其升騰為虎傅翼蒼耳治風亦是疏散外風非安靜鎮定之質對於此病亦在禁例況又助之以酒為害復當如何則論病是而用藥非仍是古人續命湯之謬見須知所謂通頂門達腦善走督脈皆升騰以散外來寒風之法真是毫釐千里其誤甚大雖然二千年來治內風病者幾於無一不誤於斗門何尤壽頤極佩其血風攻腦四字頗似識得內風上攻為病乃數百年中國醫家未知之奧義故備論之亦春秋責備賢者之意也鼠耳發明此草葉厚而卷白毛茸茸故有鼠耳之名古亦謂之佛耳草又有葺母之名皆以其有毛也宋徽宗詩葺母初生認禁煙則以古人寒食節採此為食品也別録謂鼠耳味酸主寒熱止咳日華謂其除痰治熱嗽東垣謂佛耳治寒嗽及痰除肺中寒升肺氣丹溪亦謂除寒痰則正與日華相左瀕湖謂寒嗽多是火鬱於內而寒束於外日華謂熱言其本也東垣謂寒言其標也壽頤謂此草味酸究非寒邪作嗽所宜青葙雞冠附本經味苦微寒主邪氣皮膚中熱風搔身癢殺三蟲子名草決明療唇口青搔今主作瘙別録主惡瘡疥蟲痔蝕下部匿瘡發明青葙即雞冠花之同類古書雖分兩條但以花穗扁闊成片者為雞冠花穗分歧如牟者為青葙其莖葉子形色性情功用皆同故古人有以青葙子為即雞冠花子者非誤也且本是莧之同類莖葉花穗及子亦皆近似但花色不一莧實本治目疾其功用又合亦即一類中之數種耳古人用其莖葉以為燥濕清熱殺蟲之用蓋苦寒滑利之品最善理濕清熱而疏泄厥陰是以專清血分本經主邪氣亦即以濕熱之邪言之其子專療目疾本經雖未明言然治唇口青即厥陰肝經鬱熱氣滯之證非肝腎虛寒之唇口變色也苦寒滑利善滌鬱熱故目科風熱肝火諸證統以治之日華謂其鎮肝明目甄權謂其治肝臟熱毒沖眼赤障注原作陳顯誤改青盲翳腫雖寇宗奭謂青葙明目始於藥性論及日華子與經意不合然療治目疾往往有驗未可誣也其雞冠花之莖葉瀕湖稱其治瘡痔及血病雞冠花則稱其主痔漏下血赤白下痢崩中赤白帶下其子則藏器稱其止腸風瀉血赤白痢日華稱其主崩中帶下蓋雞冠花紅其莖葉亦多赤色則專走血分而性寒涼故為止血之用然其義仍與青葙無甚區別也旋覆花本經味鹹溫主結氣脅下滿驚悸除水去五臟間寒熱補中下氣別録甘微溫消胸上痰結唾中膠漆心脅痰水膀胱留飲風氣濕痹皮間死肉目中眵䁾利大腸通血脈益色澤其根主風濕正義旋覆花輕揚之性而本經主治皆降逆破結之功用蓋輕疏者必能泄化專以疏通見長且味鹹性溫咸能潤下軟堅溫能宣通散結也又消痰逐水泄降之力頗佳故能破結氣而除脅下之滿驚悸亦痰飲凌心之證去五臟間寒熱即停痰積飲之寒熱氣結也補眵者謂結氣散而中氣自安非以破泄為補益之用也別録主膀胱留飲利大腸即本經逐水之意其治風氣濕痹皮間死肉通血脈者則輕揚之性必能外通脈絡行於肌表也治目中哆者亦疏散結熱宣化濕濁之用耳廣義甄權主水腫逐大腹止嘔逆宗奭行痰水去頭目風海藏消堅軟痞治噫氣景嶽謂降痰涎通水道消腫滿凡氣壅濕熱者宜之惟性善走散凡大腸不實及氣虛陽衰之人皆忌發明旋覆花體質甚輕飛揚疏散其主治當以泄散風寒疏通脈絡為專主別録治風氣濕痹皮間死肉通血脈宗奭去頭目風皆其輕疏泄散之功也以治風寒喘嗽寒飲漬肺最是正法或謂旋覆花降氣寒邪在肺者不宜早用則止知疏泄之力足以下降而不知其飛揚之性本能上升且本經明謂其溫寇宗奭又以為辛則疏散寒邪正其專職若其開結泄水下氣降逆等治則類皆沉重下達之義頗嫌其與輕揚飛騰之本性不甚符合按本經旋覆花一名金沸草局方有金沸草散一方疑古人本有用其莖葉而未必皆用其花者考草木花葉之功用不同者甚多或升或降各有取義亦其稟賦使然不容混合且莖則質重花則質輕亦物理自然之性況旋覆花之尤為輕而上揚者乎乃今人恆用其花而並不用其莖葉竟以重墜之功責之輕揚之質恐亦非古人辨別物性之真旨也且其花專主溫散疏泄之力亦猛宜於寒飲而不宜於熱痰石頑已謂陰虛勞嗽風熱燥咳誤用之嗽必愈甚是亦以其輕揚升散太過正與降氣之理相反惟其輕靈之性流動不滯自能疏通氣化而宣窒塞固非專以升散見長若但以逐水導濕為治似不如兼用其莖葉較為近理別録稱其根主風濕其意可曉然也穀精草發明穀精草生於稻田中刈稻之後得谷之餘氣故名穀精其質輕清故專行上焦直達巔頂能疏散頭部風熱治目疾頭風並療風氣痹痛者亦以輕清之性善於外達也又生於秋季禾苗秀實之後能開花結實不畏秋涼是以古人謂之性溫味辛能上升外散非其他明目之藥以涼降為功之比則散風火而無寒涼遏抑之虞尤為良劑開寶本草稱其辛溫主喉痹齒風痛諸瘡疥瀕湖謂主頭風痛目盲翳膜皆辛以散之之意今人僅以治風熱目赤尚未足盡其功用也夏枯草本經味苦辛主寒熱瘰癧鼠瘻頭瘡破癥散癭結氣腳腫濕痹輕身發明夏枯草之性本經本言苦辛並無寒字孫氏問經堂本可證而自千金以後皆加一寒字於辛字之下然此草夏至自枯故得此名丹溪謂其稟純陽之氣得陰氣而即死觀其主瘰癧破癥散結腳腫濕痹皆以宣通泄化見長必具有溫和之氣方能消釋堅凝疏通窒滯不當有寒涼之作用石頑逢原改為苦辛溫自有至理苦能泄降辛能疏化溫能流通善於宣散肝膽火之郁窒而順利氣血之運行凡凝痰結氣風寒痹著皆其專職丹溪謂治瘰癧散結氣大有補養厥陰血脈之功樓全善謂治目珠痛夜甚點以苦寒藥尤甚者神效蓋目珠繫於厥陰夜甚而遇寒藥反甚是厥陰陰火鬱窒不疏自不宜直折以寒涼反至遏抑愈劇夏枯草能疏通肝膽之氣木鬱達之亦以稟純陽之氣而散陰中結滯之熱耳石頑謂本經言輕身者能除腳腫濕痹而無重著之患也又能解內熱緩肝火治肝熱目赤皆疏通厥陰氣滯之功用久服亦傷腎以善於宣泄反助厥陰肝木之氣也
