body:
  text: 卷之四草部隰草類下地黃本經乾地黃味甘寒主折跌絕筋傷中逐血痹填骨髓長肌肉作湯除寒熱積聚除痹生者尤良別錄主男子五勞七傷女子傷中胞漏下血利大小腸去胃中宿食補五臟內傷不足通血脈益氣力利耳目生地黃別錄大寒主婦人崩中血不止及產後血上薄心悶絕傷身胎動下血胎不落墮墜踠折瘀血留血鼻衄吐血皆搗飲之音義薄讀為迫逼也踠與踒同類篇足跌也正義地黃味甘色黃最合土德故能補養中土為滋養之上品本經主折跌絕筋者即補血補傷之義也主傷中者即其補陰補血之功氣味和平凡臟腑之不足無不可得其滋養別錄主男子五勞七傷女子傷中胞漏下血補五臟內傷不足皆即此旨逐血痹者則血不足而痹著不行補養充足自然流動洋溢而痹者行矣填骨髓長肌肉則充其補益之意而極言之別錄之所稱通血脈益氣力利耳目又即此義之引申耳作湯除寒熱積聚除痹則言其入煎劑尤為流動活潑所以積聚痹著皆除此以補養為磨積之計乃正氣旺而病自退非謂地黃滋補之藥竟能消積通痹也蓋氣血不充津液不布則似此堅頑固結之病必無可愈之理所以積聚癥瘕痞結等證均宜且補且行斟酌進退緩以圖之自可徐收效果若僅讀張子和書止知攻破為長不顧正氣日事峻削甚至愈攻愈堅糾結不解以速其危者其亦有昧於此而少知自反乎生者尤良則採取鮮新其力尤足耳別錄又謂去胃中宿食亦養其正而消化力充可以運行宿滯必非謂滋潤厚膩之質竟有消克之功此宜看得靈活不可泥煞字面其治溺血利大小腸者甘寒清熱又能養陰固通利二府熱結之正治也惟破惡血一層似乎寒涼黏滯性質必無破瘀導滯之功然凡跌僕敲撲肌肉血瘀發腫青紫者以鮮生地搗爛厚敷自能去瘀消腫活血定痛乃知地黃去瘀自有天然作用不可誤認其膩滯物質而遂疑古人之言惟唐宋以降破血逐瘀諸方已無復採用及此者蓋亦嫌其厚膩有餘終非攻堅陷陣之將此讀古書者所以不可執而不化也別錄又有飽力斷絕四字義不可通疑有訛誤刪之別錄又出生地黃一條云大寒則以新採者而言即今之所謂鮮生地故結以皆搗飲之四字謂搗飲其自然汁也蓋鮮者得土氣至陰之性尤為純粹未漓故其氣大寒較之乾者已經日曝自有不同其治鼻衄吐血者指氣火升騰挾血上逆妄行洶湧而言如大吐大衄之屬於氣火有餘者是宜以大寒直折其逆上之勢而下血溺血之實證火證亦同此例若去血已多火焰己減即非所宜而所失太多氣營兩憊者更無恣用大寒之理又謂主婦人崩中衝血不止則血崩一證多屬衝任無權下元失其固攝之力虛證極多實火絕少必無純事寒涼可以止崩之法蓋諸失血之宜於清火者惟陽熱熾盛邪焰鴟張而正氣未衰脈洪神旺之時可以寒涼灌溉先去其憑依之勢一至所失不少雖餘火未熄形神未餒而脈象已虛即非一味清涼所可奏績若更形消色奪氣怯神疲則虛憊之餘固攝扶元猶懼不逮安可寒涼無忌更戕其正況乎大寒止血更必有血凝積瘀之害雖曰地黃散瘀是其特長或尚不至積寒生瘀然大寒之性必非通治諸般失血無往不宜別錄所言似嫌呆板乃更以主治產後血上薄心悶絕則氣逆上衝法宜降逆逐瘀亦非甘寒所宜縱曰此物果能破瘀產後未必皆宜溫藥然大寒二字終非新產通用之品亦曾存疑未敢輕信又主胎動下血則症與崩中近是亦難泛用又接以胎不落三字則指胎元已環欲墮未墮者言之以為破血下胎之用蓋古人固以鮮地為逐瘀破導品也又主墮墜踒折瘀血留血之說壽頤竊謂傷瘀發腫發熱用以外治清熱定痛散血之功固不可沒若內傷有瘀則必非大寒之性所能破導者矣廣義乾地黃日華謂助心膽氣定魂定魄治驚悸皆益陰養血之功也潔古謂涼血生血補腎水真陰皮膚燥熱海藏主陰虛五心煩熱腎虛痿厥足下熱而痛益腎水涼心血脈洪實者宜之戴原禮謂陰微陽盛相火漸熾者是為虛火宜以此滋陰退熱虞花溪謂生地清血而胃弱者妨食宜用酒炒景岳謂涼心血除煩熱治骨蒸婦女血熱經枯止燥熱口渴熟地黃潔古謂補血氣滋腎水益真陰去臍腹急痛病後脛股痠痛石頑謂臍下痛屬腎臟精傷脛股酸系下元不足壽頤按此臍腹急痛及脛股痠痛皆以肝腎真陰久傷下元欲竭之症而言故宜於滋填注原作慎顯誤改頗有捷效繆仲淳廣筆記之集靈膏魏柳州之一貫煎皆治此等之最有驗者非泛治諸般之腹痛股脛痛不可不知區別寇宗奭謂血虛勞熱產後虛熱老人中虛燥熱若與生地當慮其寒故蒸熟曝之則其功自別海藏謂治腎水不足目䀮䀮無所見瀕湖謂填骨髓長肌肉益精血補五臟內傷不足黑鬚發女子傷中胞漏經候不調虞摶謂熟地補血而痰飲之人恐其泥膈宜用薑汁炒治目昏昏如無所見謂水虧不能鑑物是腎所主之病非熟地不效又謂地黃本心家血藥久經蒸曝得水火既濟之功變黃紫為深黑可直入腎臟填補真陰兼培中州脾土則土厚載物諸臟皆受其蔭發明地黃產於中原土脈最厚之地色黃而味甘稟土之正氣質又厚重味最濃郁而多脂膏故為補中補血良劑古恆用其生而乾者故曰乾地黃即今之所謂原生地也然本經獨於此味用一干字而又曰生者尤良則指鮮者言之可知乾地鮮地六朝以前本已分為兩類但辨別主治猶未甚嚴至名醫別錄則更出生地黃一條顯與乾地黃區別其主治則乾者補血益陰鮮者涼血清火功力治療不復相混然究屬寒涼之品惟虛而有熱者為宜若真陰不充而無熱證則用乾地猶嫌陰柔性質不利於虛弱之脾胃於是唐宋以來有製為熟地黃之法以砂仁和酒拌之蒸曬多次至中心純黑極熟為度則借太陽之真陽以變化其陰柔性質俾中虛者服之不患其凝滯難化所以熟地黃且有微溫之稱乃能補益真陰並不虞其寒涼滑泄是以清心胃之火者一變而為滋養肝脾腎之血性情功效已非昔此而質愈厚重力愈充足故能直達下焦滋津液益精血昔人但謂色黑入腎猶是皮相之見凡津枯血少脫汗失精及大脫血後產後血虛未復等證大劑頻投其功甚偉然黏膩濁滯如大虛之體服之亦礙運化故必胃納尚佳形神未萎者方能任受不然則窒礙中州必致脹悶雖有砂仁拌蒸亦屬無濟則中氣太弱運動無權之弊也近世遂有再用砂仁末拌炒成炭專為此種虛證設法者則真是無可奈何之作為雖曰費盡心機亦屬矯揉造作其亦思其功力之果何如耶正訛地黃之得名以色黃味甘補益中土合於坤土中之和德也本經一名地髓郭注爾雅亦引之則言其豐腴潤澤譬猶地中之精髓耳羅願爾雅翼妄謂浸水驗之以浮者為天黃半沉半浮者為人黃沉者為地黃云云亦知此物質量斷無入水能浮之理無知妄作惑世欺人最是無理取鬧考羅氏之書本多鄙俚可笑而此說則出於日華本草殊不足徵張石頑之本經逢原亦有枯槁質輕為天黃之說皆為大明杜撰之說所誤不可聽也又本經地黃一名芐爾雅亦載之羅願遂謂字從下者有趨下之義張隱菴乃謂地黃性惟下行故字從下要知地黃滋補血液豈僅下行為功何可拘泥古字妄為附會致令藥性醫理牽強不通須知欲談醫學必以實有治驗為主何必學王荊公之字說反生許多窒礙耶熟地之補陰補血功效固不可誣然亦惟病後元虛及真陰稍弱者可以為服食補養之用今人多以入之滋補膏方中正是恰到好處苟其人胃納素薄及虛弱成瘵者得此必中滿妨食甚且作脹其為害亦頗不淺而痰飲瀰漫或兼挾外感者固無論矣考古今之推崇熟地者莫逾於景岳幾欲以人參熟地為朝饔夕飧之品所著全書中觸處皆然大是可厭實則此公出入富貴之家無病之病不得不以此種藥品敷衍塞責本非專為治病而設景岳新方半皆如此所以平庸膚淺多無深意惟其喜於誇張滿口自詡則真以臭腐為神奇大言欺人未免可笑而陳修園專與此公作難極力詆訌嬉笑怒罵無奇不有每借熟地以為集矢之鵠雖未免言之太甚要亦景岳之夸誕有以取之實則修園之痛絕注一本痛前有深惡兩字於熟地一物亦殊不必也存疑鮮生地能止吐血衄血是治氣火升騰血熱上湧之症以甘寒逆折其妄行之邪火則氣降火降而泛溢之勢以平又治便血溺血血淋等症皆惟相火鴟張脈大洪實之時藉其大寒清熱以減炎炎之勢苟其邪焰少衰即當應變隨宜改弦易轍斷不能專恃鮮地一物以為諸見血家始終必用之要藥本經乾地黃主折跌絕傷蓋亦謂其能補益血液則折絕自可漸愈本經又逐血痹別錄又破惡血皆血氣旺而痹著自通惡血自行之意決非謂甘寒黏膩性質竟能宣通痹著而逐去惡血也至別錄又謂生者搗汁飲之治墮墜踠折瘀血留血徐之才且謂鮮地為散血之專藥則竟以破逐瘀血為鮮地之惟一功能考跌僕打撲瘀在肌肉而發腫發熱者鮮地搗敷確有成績是藉其寒涼以散蘊熱則痛自可止而行血一層尚在其次若竟以大寒內服信為亦能逐瘀揆之藥理終屬可疑而別錄且以鮮地搗飲治產後之血上薄心悶絕則三沖症中之最可危者急劑抑降以通惡血惟恐不及而謂甘緩大寒之物能奏奇功終非情理之正且使鮮地一物果能破血逐瘀如是猛烈且能治胎動下血而胎不落者則別錄本文又治婦人崩中血不止試問崩血不止之時尚宜破血逐瘀耶抑欲其止血否也合二者以觀之似乎崩中則以為止血之主將而瘀血又以為攻逐之先鋒自盾自矛萬難一貫意者古人誤認本經治折跌絕傷四字以為有通絡行血之意因而附會為之乃有此蔽若繆仲淳之經疏竟稱其行血而治產後惡露作痛石頑本經逢原於散血消生四字尤為推波助瀾徐靈胎陳修園亦稱其滑利流通無一非踵別錄而推廣言之要知古人鮮地散血一說未必不在外敷一層但言之不詳易滋誤會若竟以外治有功而謂內服此藥功亦相等則未敢信也禁忌仲淳謂脾胃薄弱大便不實及胸膈痰多氣不利者俱禁用大黃本經味苦寒主下瘀血血閉寒熱破癥瘕積聚留飲宿食盪滌腸胃推陳致新通利水穀道調中化食安和五臟別錄大寒無毒平胃下氣除痰實腸間結熱心腹脹滿女子寒血閉脹小腹痛諸老血留結考證通利水穀句今本皆無道字惟太平御覽所引有之於義為長今從御覽補道字大黃別錄明言無毒而近世本草竟以入毒草類中裒然居首此是李氏綱目之誤最啟初學之疑茲為移入隰草以存其真正義大黃氣味俱厚沉降純陰故直入血分而導瘀滯通利胃腸而逐宿垢本經主下瘀血血閉破癥瘕積聚宿食盪滌腸胃通利水穀道是其主治之大綱推陳致新調中化食安和五臟十二字於大黃功用尤其推崇備至蓋腸胃之消化血脈之周流在於以通為補苟有宿垢留滯則穢濁不去即新生之血亦易瘀積而徒為陳陳相因之惡腐譬如川流不捨晝夜自然源流皆潔如其一有停蓄縱使來源常清而流利此間即成惡濁其理最為淺顯惟能推蕩陳腐然後可以致新庶幾中氣和調食不礙化而五臟皆賴以安和大黃滌除宿食疏通血瘀則胃腸與血絡源流俱清裨益夫豈淺鮮此非上古聖賢悟徹玄理不能有此深造之語與其他久服輕身延年神仙不老等說類皆出於方士之附會依託者不同奈何近世本草皆列入毒草門中第一令人望而生畏遂致有大黃救人無功之俗諺何其背謬竟至於此近時西國醫家亦謂此物是補胃妙品其旨正同而吾國俗醫多有畏其攻克當用不用者宜乎吾道之日以退步也歟痰飲二字唐宋以後顯有分別每以有火而濃稠者為痰有寒而清稀者為飲大黃能治實熱之老痰不能治中寒之留飲此在粗知醫理者皆能言之頗似本經留飲二字未免不妥然要知漢魏以上尚未有此分析仲景書中初未見一痰字更何論乎素問直至甲乙經而始有水淡飲也一句其字作淡而不作痰甲乙此文見第四卷病形脈診篇今本靈樞因之然今本甲乙靈樞皆作水泆飲也義不可解乃淺人不知淡即古之痰字而妄改者惟脈經所引尚作淡可證則本經此條留飲二字古人未必竟以為寒飲之病讀古書者不可不知古義惟別錄以大黃治女子寒血閉脹則竟以寒證而用大苦大寒之藥必不可通當有訛誤闕疑可也廣義甄權通女子經候利水腫壽頤按大黃本能逐瘀以治經閉之因於積瘀結熱者固即本經下瘀血血閉之義但孱弱之體非可一概論耳水腫為病本於脾腎縱有實水可導止宜通利小水似無盪滌腸胃之法甄氏大黃利水腫蓋為實證而言決非通用之法每見俗醫治此恆用商陸大戟甘遂之類幸圖一快殺人無算溯其源始殆皆本此以此知後人本草誠不可與本經別錄同年語也元素瀉諸實熱不通除下焦濕熱瀕湖治下痢赤白裡急腹痛小便淋瀝實熱燥結發明大黃其色正黃得天地至陰之氣獨厚故其性大寒氣味重濁故迅速善走直達下焦深入血分無堅不破盪滌積垢有犂庭掃穴攘除奸凶之功因有將軍之稱生用者其力全迅如走丸一過不留除邪而不傷正氣此大將軍救民水火而不擾閭闔者也制過者其力已緩頗難速效正猶縛賁育而使臨大敵亦無以展其所長東垣謂治在上者非酒不至必用酒浸引上至高之分驅熱而下未免矯揉造作用違其長讀仲景瀉心法可悟古人無此制度而俗人見識不真藉口和平兩字以為嘗試之計謬矣但久制者可從小便以導濕熱惟清寧丸能有此功而尋常之酒製大黃非其倫比近人亦有謂生者走後陰熟者走前陰殊是不確金匱瀉心湯治吐血衄血明是陽亢上逆迫血妄行故以大黃芩連直折其炎上之勢而乃云心氣不足必是傳寫有誤致令古今注家為此節作說解者皆囁嚅而不可解不如醫宗金鑑徑改為心氣有餘何等直捷爽快承氣之法得枳實則其行尤速得芒硝則軟堅可化燥矢為溏糞但其味大苦最傷胃氣胃弱者得之無不減食且不知味苟非實熱蘊結誠不可輕用凡老年氣弱瘦人陰虛即有大便燥結欲解不解見症今法恆用玄明粉七八分合枳實四五分檳榔六七分奏功甚捷可無礙胃腹痛之弊且亦一過無餘力亦不亞於生軍較為輕微淡遠不動聲色亦猶幺麼小醜尚非據險負隅則一偏裨之職亦足以蕩平之正不煩名將親征小題大做云爾禁忌繆仲淳謂血閉由於血枯便閉由於血少腸燥胸腹脹滿由於中氣不運女子腹痛由於厥陰血虛等證皆不可妄為推蕩連翹本經味苦平主寒熱鼠瘻瘰癧癰腫惡創癭瘤結熱蠱毒創今本作瘡別錄去白蟲發明連翹味苦苦能清熱形圓而尖中空有房狀似心臟故專清心家之熱此物理自然之情性非勉強附會之言也又凡質輕而空松者必有開泄宣通之作用故亦能散結而泄化絡脈之熱本經治瘰癧癰腫瘡瘍癭瘤結熱蠱毒固以諸痛癢瘡皆屬於熱而疏通之質非特清熱亦以散其結滯也六朝以降皆以古說心與小腸為表裡謂清心之品能通小腸則即可開泄膀胱導小水祛下焦之濕熱是以甄權謂通利五淋小便不通除心家客熱實則附會之說必不可信廣義日華謂其治瘡癤排膿止痛東垣謂其散諸經血結氣聚消腫丹溪謂其瀉心火除脾胃濕熱石頑謂其輕清而浮主治諸瘡為結者散之之義繆仲淳謂主瘰瘍癭瘤皆足少陽膽經氣鬱有熱海藏以主耳聾亦氣火上壅之證耳正訛仲景麻黃連軺赤小豆湯治瘀熱在裡發黃注家謂連軺即連翹之根且謂無根則以實代考爾雅釋草連導翹郭注一名連苕蓋翹之與軺苕即一聲之轉古書極多同音通用之例則連翹連苕連軺明是一物既能清濕熱而通利小水自然可治瘀熱之發黃何必強以根實妄為區別然注傷寒論之為是說者固亦別有所本以本草經別有翹根一條然本經翹根雖稱其主下熱氣而無利水治黃之明證且於連翹則曰生山谷於翹根則曰生平澤別錄謂連翹生太山翹根生嵩高皆大有分別其非一物甚明是以弘景已謂翹根方藥不用人無識者而唐本草列於有名未用類中乃海藏強作解事竟謂即連翹之根而李瀕湖從之非也連翹心發明近人有專用連翹心者即其房中之實也細而質輕故性浮而專清上焦心肺之熱較之其殼在外亦能通行經絡其用固自有別然雖是心而亦不堅實若竟謂能清心家實火亦殊未必決明子即草決明亦名馬蹄決明本經決明子主青盲目淫膚赤白膜眼赤痛淚出別錄味鹹苦甘平微寒療唇口青發明決明子其形如豆其色青綠味鹹故專於入腎古人主治皆以為眼目要藥似乎疏風清熱實則補腎益精所以能治青盲等肝腎陰虛之證然必久久服食方能取效而肝熱風熱等證亦非切要之品日華謂其助肝益精作枕治頭風明目甚於黑豆丹溪謂其益腎甄權謂葉作菜食利五臟明目其義皆同別錄謂其鹹苦甘平似嫌叢雜其能療唇口青蓋肝氣之病繆氏經疏以決明子合沙苑蒺藜甘菊杞子生地女貞槐實穀精草補肝明目益精能療肝家虛熱又方合生地甘菊荊芥黃連甘草玄參連翹木通主暴風熱眼痛眵淚赤腫頤按繆氏治目二方已近於俗醫通套方劑然一治肝腎之本虛一治風熱之標實理法秩然猶有可取正訛決明子明目乃滋益肝腎以鎮潛補陰為義是培本之正治非如溫辛散風寒涼降熱之止為標病立法者可比最為有利無弊乃王旻山居錄竟謂其多食患風必有誤會瀕湖已明辨之而張石頑又謂久服則伐肝搜風太過反致虛風內擾是誤認為祛風瀉肝之用其亦思質堅下墜色青而綠能入肝腎滋養真陰夫豈升散疏泄之品所可等類齊觀者耶地膚子本經味苦寒主旁光熱利小便補中益精氣旁光今本作膀胱別錄去皮膚中熱氣散惡瘡疝瘕強陰發明地膚子苦寒泄熱止有清導濕熱通利小便之用本經又謂其補中益精氣別錄稱其強陰者乃濕熱不擾而陰精自安之意斷不可拘泥字面認為補益之品陳藏器乃謂眾病皆起於虛虛而多熱者加地膚甘草可謂顢頇已極張石頑從而和之大不可解別錄又主疝瘕甄權謂治陰㿗皆惟濕熱內蘊者可用若虛寒氣滯大非所宜王不留行本經味苦平主金創止血逐痛出刺除風痹內寒創今本作瘡別錄味苦甘平止心煩鼻衄癰疽惡瘡瘻乳婦人難產發明王不留行通利迅疾故得此名言雖有王命而不能留其行則流利之性峻矣其味又苦則泄降下行惟熱結者為宜本經主金瘡止血逐痛刺別錄止心煩鼻衄癰疽惡瘡皆清火活血之用除風痹者風熱壅於經絡也而風寒寒濕非其治矣惟本經內寒二字殊不可解李氏綱目引作內塞當即瀕湖所改似非訛字然別本皆作寒是當存疑不必強解又治產難通乳汁甄權謂治風毒通血脈日華謂主遊風風疹婦女月事不勻瀕湖謂利小便景岳謂利陽明衝任血海通經滯不調石頑謂走而不守長於利竅皆以破結宣導為功苟屬虛體慎弗輕投而妊娠尤為大禁漏蘆本經味苦咸寒主皮膚熱惡創疽痔濕痹下乳汁創今作瘡別錄大寒主熱氣瘡癢如麻豆可作浴湯發明漏蘆滑利泄熱與王不留行功用最近而寒苦直泄尤其過之苟非實熱不可輕用不獨耗陰尤損正氣日華謂通小腸治泄精溺血腸風乳癰排膿止痛通經脈皆惟實熱之證可以暫用石頑謂苦寒解毒利竅殺蟲排膿消腫古治癰瘍以漏蘆湯為主藥蓋咸能軟堅苦寒清熱解毒之功然服之必瀉則熱從下出故氣虛者非其所宜而妊婦尤為切禁附漏蘆湯方漏蘆連翹生草大黃生耆治癰疽熱證壽頤按此湯惟實熱壅結宜之其用黃耆蓋欲以監製其迅利然補氣之藥以治癰腫究屬非宜若曰彼此牽制欲其虛實二家無投不利則模稜兩可必無桴應之理此成方之所以不可混用也惟在臨證時審其虛實寒熱而知所損益然後可以恰當病機耳甘蕉蘘荷發明甘蕉蘘荷諸家本草皆分為二考說文襄荷一名葍蒩廣雅襄荷蓴苴也葍蒩蓴苴其音甚近楚辭王注又作蓴菹古今注又作𦾕苴史記司馬相如傳又作猼且漢書則又作巴且文穎注一名巴蕉轉展變遷此後世芭蕉之名所由來也此皆巴蕉襄荷本為一物之明證古今注謂𦾕苴色紫襄荷似𦹫苴而白蘇頌謂紅蕉如火炬是又以花之色為分別廣韻則云蓴苴大襄荷名是又以大小分也今按蕉花雖曰有白有綠有紫而性質皆同無所用其區別最為喜陰而惡陽府之牆隅則茂移植高曠則萎陰寒之性已可概見惟南方閩粵溫暖之地結實最繁大江以南最不易見其一花此為陰寒性質一遇霜霰即已黃落不勝天氣之寒涼也是以其果味雖甘美氣則大寒能清肺胃熱邪通大腸燥結凡燥火之人生津止渴頗佳而非陽氣有餘者不堪數啖孟詵謂生食止渴潤肺吳瑞謂解酒毒止肌熱煩渴瀕湖謂壓丹石毒其義皆同別錄謂甘蕉根大寒主癰腫結熱蘇恭謂搗敷熱腫孟詵謂治黃疸日華謂治天行熱狂煩悶消渴解金石毒發並搗汁服之其蕉油以管插甘注原作莖顯誤改蕉莖取之即自然汁日華謂治頭風止煩渴療湯火傷襄荷根則別錄雖稱其辛溫然謂其治中蠱及瘧搗汁服則仍是清熱解毒之功用必非性溫弘景以主溪毒沙蟲蛇毒中蠱毒皆治濕熱蘊結之患則其性可知然別錄既言其辛溫而孫思邈亦以為微溫者蓋以古人恆以襄荷與姜並言如司馬相如傳有茈薑襄荷之句而襄荷之軀幹又細莖葉有似乎姜因亦誤會其性之辛溫耳實則大寒之品凡非實熱皆不可用即如甘蕉今亦為常嗜之品然非胃火有餘之人下咽必凝滯不適甚者且致腹痛泄瀉尤其確據石頑誤謂襄荷治喉舌口瘡糜爛婦人月閉及傷時氣壯熱頭痛等證皆取其辛散實則皆以大寒解其蘊結之熱邪苟非實熱胡可輕試若腸胃不堅脾陽不健者得此作痛作瀉又可操券而待熱毒癰腫小兒赤遊風疹巴蕉根搗徐捷效見肘後方箬葉發明箬始見於瀕湖綱目即襯笠之箬葉古字亦作篛其莖似竹而細小其葉甚大瀕湖謂氣味甘寒治吐血衄血咯血嘔血下血溲血並燒存性溫湯服一錢匕又通小便利肺氣喉痹消癰腫張德恭謂治痘瘡倒靨以箬葉灰一錢匕入麝香少許酒調服之石頑謂干箬蒂煎湯治胃熱呃逆性較柿蒂為平又取灰以香油調敷湯火傷甚良蓋清芬之品具有清熱利竅之功也燈心草石龍芻發明本經止有石龍芻云一名龍鬚即今織蓆之草也宋開寶本草乃有燈心草其形較之織蓆者為粗其質較松今剖其穰為燈心而以其殼為簑衣二草雖非一種然是同類皆生於下隰之地味淡質輕故專於通利能泄濕熱而清導小水亦降心肺之火本經謂石龍芻味苦微寒主心腹邪氣小便不利淋閉風濕鬼注惡毒其所謂邪氣惡毒者即以濕熱之邪言者也治風濕者亦取其利濕之意別錄謂治痞滿除莖中熱痛仍是泄熱利水之意陳藏器謂敗席治淋及小便卒不通開寶本草謂燈心草主五淋敗席更良潔古謂瀉肺通溺澀癃閉行水治腫丹溪謂治急喉痹燒灰吹之以灰飼小兒止夜啼瀕湖謂降心火注原作血據綱目改止血注血下原有熱字查綱目無當為衍字刪通氣消腫又無一非泄熱利水之用又燈心之質尤為輕虛故開肺泄水尤其專長以開喉痹其義在此但研末燒灰其法甚難以米粉漿之則可研塞緊於竹節中糠火煨之則成炭要之質賤而味淡除利水以外無用韓氏醫通有天一丸以燈心為末合滑石二苓豬苓澤瀉再用人參膏為丸其功用亦不過通利小水而已可謂矯揉造作是亦醫界之魔矣木賊草發明木賊以磨擦木器得名雖有堅木擦之則粉屑錯落而草不損其伐木之性甚強故以治療肝膽木邪橫逆諸病能消目翳破積滯皆消磨有餘之用也質輕中空故丹溪謂其發汗至易瀕湖謂與麻黃同形同性亦能發汗解肌升散火鬱故能治眼目諸血之病然則為目科要藥者固不僅取其剋木能磨擦障翳亦含有疏風行血泄化濕熱升散鬱火諸義其治喉痹血痢瀉血血痔血崩月事淋漓疝氣等證固皆氣滯血瘀肝鬱不疏為病疏泄窒滯升散鬱熱兼以伐肝木之橫而順其條達之性木賊之用盡於此矣嘉祐本草謂主目疾退翳障消積塊療腸風止痢及月事不斷崩中赤白瀕湖謂解肌止目淚止血去風濕疝痛大腸脫肛石頑謂主目病風熱暴翳取其發散肝肺風邪久翳及血虛者非宜且謂多服則令目腫蓋疏散太過反傷正氣矣要知克削之力甚強即治下血血痢血崩血痔諸證皆惟有餘之體為宜苟其氣虛皆當審慎而血痢便血崩中及月事淋瀝諸症則氣虛不能攝血者為多尤不可不知所顧忌也注發明項名原誤作本經今改蛇床子本經味苦平主婦人陰中腫痛男子陰痿濕癢除痹氣利關節癲癇惡創創今作瘡別錄辛甘無毒溫中下氣令婦人子臟熱男子陰強令人有子發明蛇床子溫燥剛烈之品本經雖稱其苦平然主治婦人陰中腫痛男子陰痿濕癢則皆以寒濕言之必也腎陽不振寒水瀰漫始可以為內服之品甄權已謂其有毒瀕湖且謂蛇虺喜臥其下食其子蓋產卑濕汙下之地本系濕熱之氣所鍾其含毒質可知觀雷斅製法以濃藍汁同浸再以生地黃汁拌蒸無非監製其燥烈之性其反能治濕熱病者同氣相求以從其類也故近今醫籍絕少用為內服之藥況市肆中以為賤品皆不泡製而可妄用以入煎劑乎本經又謂除痹氣利關節癲癇則剛烈之性本能通行經絡疏通關節然非寒濕及未經法制者慎勿輕投本經又主惡瘡則外治之藥也別錄又謂辛甘能溫中下氣令婦人子臟熱男子陰強令人有子則專溫腎陽更屬彰明較著甄權謂治虛實濕痹毒風𤸷痛起腰痛去風冷益陽事日華謂治腰胯痠痛四肢頑痹縮小便去陰汗濕癬赤帶下景岳謂逐寒疝起陽痿主陰衰無子皆是強陽主治石頑謂辛香性溫助男子壯火腎火易動強陽不固者弗用甚是正論李瀕湖竟泛泛然謂其補男子有益婦人則以本經列於上品而過於推崇遂有左道旁門專於興陽而戕人生命者皆此類補陽助欲不顧其本之說有以誤之是不可以不慎也惟治外瘍濕熱痛癢浸淫諸瘡可作湯洗可為末敷收效甚捷不得以賤品而忽之葵即錦葵古亦稱荊葵即詩東門之枌及爾雅之荍也其子即冬葵子冬葵子本經味甘寒主五臟六府寒熱羸瘦五癃利小便久服堅骨長肌肉別錄療婦人乳內閉腫痛考證花卉之中以葵為名者最多其實則種種不一古人以葵為常食之品如詩之烹葵禮之夏用葵最是習見之物然今人皆不識為何物考爾雅釋草莃菟葵郭注似葵而小啖之滑是菟葵固可啖而曰似葵則非葵矣爾雅又有芹楚葵即今之水芹毛詩傳又有茆鳧葵說文有虊鳧葵廣雅有虊茆鳧葵即今之蒪菜則皆可食然各為一種雖同以葵名而非即葵也爾雅又有終葵繁露郭注謂大莖小葉近人以為似今之西番蓮則非葵之同類李瀕湖謂即別錄之落葵以落字為即終字之誤其說甚是則今之胭脂菜性亦寒滑與葵相近因得葵名此又別為一種許叔重說文解字則曰葵菜也又有希免葵芹楚葵虊鳧葵似許氏所稱之葵菜即此三者之總稱然古人既以一字為名蘇恭亦謂常食之品則固專有一種必不能如蘇頌圖經之例意以蜀葵錦葵黃葵終葵兔葵等物渾合言之而曰皆有功用也考爾雅荍蚍衃郭注今荊葵也似葵紫色說文荍蚍蝦也詩東門之枌毛傳荍芘芣也正義引舍人注荍一名蚍衃陸機疏芘芣一名荊葵廣雅荊葵葵也羅願爾雅翼荊葵花似五銖錢大色粉紅有紫紋縷之一名錦葵郝懿行爾雅義疏謂荊錦荍俱一聲之轉阮文達謂荍即經典之葵今人不識惟揚州人以為常蔬注原作疏據意改清油淡煮味極甘滑阮氏籍錄儀徵博通今古其說堪信且與古人所謂葵性甘滑者自然符合然則葵之專名自當屬之荊葵非菟葵楚葵鳧葵之別為一物者可比寇宗奭謂綠葉如黃蜀葵其花至小如初開單葉蜀葵有檀心色如壯丹姚黃者即錦葵也雖郭氏爾雅注謂荊葵似葵則荊葵與葵明非一物然細玩郭氏註文既謂菟葵似葵而小又謂荊葵似葵則菟葵荊葵又皆非葵試思其所謂葵者果是何物豈欲以終葵繁露當之乎然郭注又以為承露大莖小葉花紫黃色則又與荊葵菟葵皆不類何得稱其似此郝懿行爾雅義疏所以謂郭氏亦不識葵也今推景純之意未必果不識葵其謂荊葵似葵紫色者蓋謂荊葵之花似蜀葵而色紫耳似今本爾雅註文脫一蜀字是則蜀葵乃葵之大者而荊葵則為古人烹葵葵苴之葵其花紫色洵是確鑿可據再以阮氏芸臺之意合之乃知古人以葵為菜即今之錦葵於古則亦謂之荊葵其菟葵則為葵類之較小者而蜀葵則似葵而大一莖直上高者至八九尺花似木槿而大五色俱備又有單瓣千瓣之不同古人謂其疏莖密葉翠萼豔花金粉檀心頗堪寫照爾雅則謂之戎葵名醫別錄則謂之吳葵爾雅翼則作胡葵郝懿行謂戎蜀吳胡皆謂其大非是戎蜀吳胡得來其說甚是今京人呼為秫稽花登萊間呼為秫齊花吳人又呼為淑其花皆蜀葵之轉音也又別有一種黃蜀葵葉如雞爪花則色黃而大與蜀葵又大異今謂之秋葵花而亦非一莖直上其大如臂其高盈丈頂巔一花大如盤四周單瓣中簇細蕊之向日葵也廣雅又有地葵地膚也則即地膚子廣雅又曰蘬葵也王氏引之廣雅疏證則又以向日之葵與詩之烹葵合而為一其實向日秋葵不堪作蔬而蔬之荊葵花不向日且向日之葵高大迥非為蔬之葵可比亦萬不能合而為一至近世更有所謂紫背天葵者又別是一種凡此數者又同以葵名然皆以二字連綴為名在一類數種之例且皆不可以為蔬其可以為蔬者惟莃之為兔葵芹之為楚葵虊茆之為鳧葵三種而亦皆以二字連綴為名惟荊葵則後人又作錦葵而古人止名為葵是當分析言之各還其本真必不可因其同有葵名而互相援引更增紛擾歷考諸書雖爾雅說文等注已不免有沿誤之處以致諸家本草更多彼此歧出益令後人不易識別孫氏星衍問經堂輯刻本草經猶以冬葵子與爾雅之終葵繁露為一物以冬之與終古書本通用也實則終葵之合音為推乃形容之詞言其上銳下大其形如椎繁露之葉及子皆形圓而銳故有終葵之名其子色紫可染今俗謂之胭脂子雖其葉亦可為蔬而非入藥之冬葵子又粵地所產葵扇之葵更別有一種總之草類中以葵為名者太多惟向日之秋葵不入藥劑其餘者皆有滑潤寒涼之性意者古人命名之義即因於此所以其體各殊而其用相似然正惟其性之相近尤足令談醫者淆亂見聞而莫衷一是實則各有本真不可誣也茲特詳析考之分系各條之下發明葵性甘寒而滑莖苗根實情性俱同功用相等泄熱通淋滑利二便皆濕熱蘊結者為宜而虛寒之人脾陽不振者弗用其莖苗孫氏思邈謂利胃氣滑大腸蘇頌謂宣導積滯妊婦食之滑胎而產甄權謂煮汁服利小腸治時行黃病汪穎謂除客熱治惡瘡女人帶下小兒熱毒下痢丹毒孟詵謂潤燥利竅解丹石熱毒其根則別錄謂主惡瘡療淋利小便解蜀椒毒瀕湖謂利竅滑胎止渴冬葵子本經主五臟六腑寒熱羸瘦者滑利以宣通熱結也別錄療婦人乳內閉腫痛即寒以勝熱滑以導滯之用弘景謂下丹石毒瀕湖謂通大便消水氣滑胎治痢外臺葵菜葉治天行斑瘡遍身戴白漿者聖惠方葵菜葉絞汁服治小兒發斑李瀕湖謂此即痘瘡今之治者惟恐二便頻數泄其元氣則痘不起發葵菜滑利似非所宜蓋古今運氣不同治法有異云云頤謂古人痘瘡皆天行癘氣毒勢甚盛所以宜於涼解後人多系種痘則惟恐其不發證情不同治法自別然元虛者固宜溫宜托毒盛者亦胡可不用清涼自明以來治痘名家或主涼解或主溫補皆有對證之效所謂言豈一端各有所當者也夏子益奇疾方葵菜治肉生長刺如錐痛不可忍明是火鬱結之怪疾故宜涼解姚僧垣集驗方葵根汁治瘰疽熱毒其證肉中忽一黤子大如豆慄或如梅李或青白或赤黑有深根其痛應心能腐筋骨毒入臟腑即殺人此亦怪症總是熱盛之毒故治法如此然更宜以清心涼血大劑清解之藥輔之蓋亦夏氏奇疾方之所謂肉錐類也菟葵發明菟葵見於爾雅說文其名最古郭氏爾雅注謂其頗似葵而小葉狀如藜有毛汋啖之滑則必與錦葵相似但莖葉較小耳當即是一類二種御覽引廣志云菟葵瀹之可食唐本草云菟葵苗如石龍芮而葉光澤花白似梅其莖葉紫黑煮啖極滑所在下澤田間皆有人多識之稱其氣味甘寒下諸石五淋止虎蛇毒諸瘡搗汁飲之塗瘡能解毒止痛則清熱利濕解毒通淋功用亦與錦葵相似其為同類無疑存疑菟葵之名由來最古然其為物似久已不識考郭景純爾雅注及蘇恭唐本草一言其葉有毛一言其葉光澤已大相刺謬寇宗奭謂綠葉如黃蜀葵花形至小如初開單葉蜀葵有檀心色如牡丹姚黃其葉則蜀葵也云云是即錦葵之形狀而蘇氏反以為菟葵尤覺不似至瀕湖綱目則並列三家之說而無所折衷又加以天葵雷丸草之名以為即是紫背天葵趙恕軒綱目拾遺又辨之則紫背天葵確又別有一物然則菟葵果是何物聚古今諸家之說而皆不得其真何如存而不論闕疑為是頤愚以為古人於草之大者多有馬牛之名則菟葵或本作兔葵固指葵之小者言之合於爾雅郭注之說而於唐本草所載主治功用亦不相背讀書但求有用而醫藥尤以切用為主不如併入錦葵條中較為切實若徒多分別無裨實用於故紙堆中推敲搜索未免枉費可寶之光陰寇氏以錦葵釋之或知其本無區別而欲合之為一乎紫背天葵發明紫背天葵近人用以治瘰癧頗有應驗瀕湖綱目引本草圖經及鄭氏通志以為即是兔葵趙恕軒本草綱目抬遺謂鄭氏通志言天葵狀如葵菜葉大如錢而厚面青背紫生於崖石者即是紫背天葵葉分三歧如三葉酸草而大有根根下有子年深者其子大如指俗呼千年老鼠屎以其形黑皮粗如鼠屎狀也外丹本草名曰雷丸草以其根下之子如雷丸耳此則全非葵類不過有葵之名而已又謂紫背天葵之功用全在根出金華諸暨深山石罅間者根大而佳春生夏枯秋冬罕有又引百草鏡云二月發苗葉如三角酸草向陰者紫背為佳其根如鼠屎外黑內白三月開花細白結角亦細四月枯性驚清熱治癰疽腫毒疔瘡癧串跌撲風犬傷七種注原作腫顯誤改疝氣痔瘡勞傷蓋其根堅實年久愈大故能通達經絡消除凝結之痰滯也綱目拾遺引醫宗彙編紫背天葵子同鯽魚搗敷癧串立消又引救生苦海治瘰癧千年老鼠屎搗碎同好酒隔湯煮一炷香隨意飲醉蓋被取汗數次自效又引黃賓江天葵丸專治瘰癧紫背天葵一兩五錢海藻海帶貝母昆布桔梗各一兩海螵蛸五錢為末酒糊丸如梧子大每服五七十丸食後溫酒下蓋以桔梗開泄氣分鬱結貝母消毒化痰海藻昆布等以軟堅也又引經驗集荔枝核十四枚小茴香二錢紫背天葵四兩蒸白酒頻服治諸疝初起寒熱疼痛欲成囊癰者壽頤謂囊癰子癰多屬厥陰濕熱不比寒疝之宜於溫藥此方以荔茴之溫宣通氣滯而以天葵之涼泄化濕熱立法頗良惟用酒服則仍以寒疝為宜而厥陰濕熱之壅非其治也終葵即燕脂子草發明本草經無終葵而別錄有落葵陶弘景謂落葵又名承露人多種之葉惟可飪鮮食冷滑其子紫色女人以漬粉傅面少入藥用馬志謂落藤葵俗呼謂胡燕脂瀕湖謂落葵葉冷滑如葵故得葵名爾雅曰終葵繁露郭注謂即承露以其葉最能承露而其子垂垂亦如綴露故得此名而終落二字相似疑落字乃注原作及於義未允改蔠字之訛壽頤按考工記鄭注齊人謂椎日終葵蓋急言之則曰椎緩言之則曰終葵本以形容其體圓上銳之詞此草葉圓剡上有但於椎因名終葵字不從草考工記及馬融廣成頌皆作終葵爾雅從草已是俗字本草之落葵則以形近而誤固無疑義別錄落葵一名繁露即本爾雅尤其明證蓋冕旒之垂名曰繁露而此草之實累累下垂又為近似韓保昇謂蔓生葉圓厚如杏葉子似五味子生青熟黑瀕湖謂其似杏葉而肥厚軟滑八九月開細紫花累累結實大如五味子熟則紫黑色揉取汁紅如燕脂女子飾面點唇亦可染物謂之胡燕脂亦曰染絳子但久則變色耳今按其葉作蔬甘滑鮮美但微有青草氣其清熱滑潤之功可見一斑別錄稱其氣味酸寒而滑中散熱瀕湖稱其利大小腸固亦錦葵之流亞也又按此草蔓生宜入蔓草部舊本皆在菜部以其可以為蔬也今列於此以葵之名而類之耳蜀葵發明蜀葵雖大於葵而氣味甘寒性亦滑利與葵不異其苗則孫思邈稱其除客熱利腸胃藏器治丹石發熱熱毒下痢日華謂搗塗火傷瀕湖謂滑竅治淋潤燥易產其花則別錄謂理心氣不足潔古謂治帶下赤治血燥白治氣燥皆取其寒滑潤利也瀕湖謂和血潤燥利大小腸其子則日華謂主淋瀝通小腸催生墮胎療水腫治瘡疥皆以寒滑見長惟宜於燥熱之證而虛者忌之黃蜀葵發明此又別是一種非即蜀葵之黃花者葉似雞爪秋深開花今之所謂秋葵花也性亦寒涼滑利因之亦以葵名嘉祐本草謂其花主小便淋催生治惡瘡膿水不差作末敷之瀕湖謂其花消癰腫其子亦消癰腫治五淋水腫通乳汁為催生利小便要藥瀕湖引經驗方黃蜀葵花麻油浸密收治湯火灼傷今多有預製以備緩急者最能止痛定腐甚有效也龍葵即老鴉眼睛草發明此草性質亦寒涼滑利故亦名葵莖柔而嫩似蔓非蔓延引甚長故以龍為名言其蜿蜒不已也吾吳土俗亦呼為老鴉眼睛藤結子渾圓一簇數顆生青熟黃故有老鴉眼睛之名亦有生青熟紅者其莖葉花蕊皆同蘇頌圖經謂之赤珠陳藏器本草拾遺謂之龍珠實即一類二種唐本草謂龍葵去熱退腫蘇頌謂治婦人敗血瀕湖謂消熱散血壓丹石毒療癰疽腫毒跌打損傷孟詵謂搗敷疔腫火丹蓋可敷可服以清熱通利為用故並治跌僕血瘀尤為外科退熱消腫之良品也酸漿即金燈籠草發明酸漿之苗葉形色頗與老鴉眼睛草近似李瀕湖謂本是一類二種但龍葵莖光無毛五月以後開小白花五出黃蕊結子無殼累累然數顆同枝子有蒂蓋生青熟紫黑而酸漿則同時開小花黃白花紫心白蕊其花如杯無瓣而有五尖結一五稜之鈴殼一枝一顆懸如燈籠殼中一子生青熟紅庚辛玉冊謂燈籠草產於川陝者最大葉似龍葵結實有四葉盛之如燈籠河北呼為酸漿陶弘景謂酸漿之子作房房中有子大如梅李黃赤色蓋土宜不同所產微異嘉祐本草作苦耽以其苗之味也本經言其味酸辛平主熱煩滿定志益氣利水道難產吞其實立產則亦寒涼泄熱滑利之功用弘景謂搗汁服治黃病唐本草謂燈籠草治上氣咳嗽風熱明目根莖花實並宜嘉祐本草謂苦耽苗子治鬼疰邪氣熱結目黃大小便澀骨熱勞乏嘔逆痰壅痃癖痞滿小兒無辜疳瘰癧大腹殺蟲落胎去蠱毒並煮汁飲亦注原作並誤據綱目改生搗汁服丹溪謂苦能除濕熱輕能治上焦主熱咳咽痛故此草治熱痰之咳嗽佛耳草治寒痰之咳嗽瀕湖謂寒能除熱故清肺除咳滑能利濕故降氣化痰蘇頌謂其子除熱治黃嘉祐謂其治骨蒸勞熱屍疰疳瘦痰癖熱結與莖苗同功然寒降滑泄皆實熱者為宜中氣虛寒弗用丹灶家以伏丹砂汞毒亦清涼以制其剛烈也敗漿發明此草有陳腐氣故以敗漿得名能清熱泄結利水消腫破瘀排膿惟宜於實熱之體本經稱其味苦平主暴熱火創赤氣疥搔疽痔馬鞍熱氣創今作瘡搔今作瘙馬鞍熱氣四字頗不經見蓋陰胯間熱氣蒸騰亦陰分之濕熱也別錄稱其味鹹微寒除癰腫浮腫結熱風痹產後痛甄權稱其辛苦微寒治毒風𤸷痹破凝血能化膿為水止煩渴療腹痛產後諸病日華治血氣心腹痛破癥結催生下胞定血運吐血衄血赤白帶下赤眼障膜胬肉聤耳瘡癤疥癬丹毒無一非實熱瘀滯之證惟產後諸痛當以瘀露作痛者為宜而瀕湖所引別錄竟作產後疾痛大明本草又以產後諸病渾言之則流弊良多不可不知所辨別者也苧麻根發明苧根見於別錄稱其氣寒主小兒赤丹又言漬苧汁療渴古今所引別錄之文止此惟瀕湖綱目引別錄則有安胎一說不知何據按白苧性寒古方多言其主治小便不通五淋熱結等症則有泄熱通利之力是以日華本草謂其甘寒而滑乃近人偏以為妊娠安胎之用蓋以苧麻之質堅韌取其堅固胎元之意實則既寒且滑必非胎動者所宜且根主下行尤為妊娠禁品考古今醫藥諸書惟梅師方用以治胎動忽下黃汁此外殊不多見丹溪且言其行滯血則更與胎動大相刺謬瀕湖所引未見古本恐不可訓雖大明亦有治胎漏下血一條則日華本草本多不經之論且與其所言性滑之文自相矛盾更不足據日華又謂治心膈熱天行熱病大渴大狂解金石藥熱心煩則皆其涼降之力也石頑謂治產後血暈腹痛專行滯血又謂麻莖苦溫專散陳久瘀血則皆以破血逐瘀為用矣蘇恭唐本草又謂苧麻子治赤白痢又是消積導滯之用皆足為滑泄一層證佐然則苧麻之根似未可視為安胎套藥胡蘆巴發明胡蘆巴始見嘉祐本草言其味苦大溫主治元臟虛冷氣腹脅脹滿面色青黑得茴香子治旁光氣甚效乃溫養下焦疏泄寒氣之藥後人以治疝瘕腳氣等證必系真陽式微水寒氣滯者為宜苟挾溫邪即為大忌石頑謂元陽不足冷氣潛伏者宜之又謂奔豚偏墜及小腹有形上下走痛者用胡蘆巴丸腎氣不攝上熱下寒厥熱嘔吐者用黑錫丹皆與金鈴子一寒一熱同用其導火歸元之功可知張子和儒門事親謂病目不睹服胡蘆巴頻頻不缺不周歲而目中微痛恍如蟲行入眥漸愈壽頤按此惟治腎氣真寒因而目盲者然目病之此證極少即曰有之亦非一物所能奏效而子和過甚言之殊不足信直指方胡蘆巴一味炒研末茴香湯下治小腸氣痛此亦腎氣虛寒者為宜辨之不可不審紅花古名紅藍花發明紅花其葉如藍而其花色紅故古有紅藍之名始見於開寶本草已名紅花稱其辛溫主治產後血暈口噤惡瘀不盡絞痛胎死腹中蓋以其色殷紅體質又輕揚疏達故專入血分為疏通經絡活血行滯之品海藏謂辛甘苦溫肝經血分之藥得酒尤良丹溪謂多用則破瘀少用則養血瀕湖謂活血潤燥止痛散腫通經景岳謂達痘瘡血熱之難出散斑疹血滯之不消者石頑謂其解痘毒散赤腫治產後血暈瘀痛宜和童便用之過用亦使血行不止且兼能上行不可不知要之性本溫和氣兼辛散凡瘀滯內積及經絡不利諸證皆其專主但走而不守迅利四達不宜大劑獨任苟僅以為疏達和血之用小劑亦無流弊若養疴漫筆所謂產悶已絕以紅花數十斤煮湯薰之半日乃蘇之說則小說家無稽之言不足取信李瀕湖雖以許胤宗薰柳太后中風一法相比然試以醫藥之實在功用言之許案治病在腠理藥氣薰蒸以通皮毛之氣猶可說也若產後悶絕則是里病豈薰蒸之氣所能達到且病在血分又非僅通其氣分可以有功況紅花又能氣分之藥注語不通順疑有誤植或脫漏壽頤每謂文學家不明醫理所載醫家治案異想天開不合醫藥之原理者所在而是二十四史方術傳中已多怪怪奇奇之事更何論乎邑志家乘傳記卮言壽頤輯錄古今醫案平議擬以怪誕不經諸案編為附錄一種頗覺牛鬼蛇神無其不有而考其原本多出正史多出志乘若小說讕言猶不在其列學者必須辨得真是非而後醫藥之真相乃不為邪說淫辭所蔽則此道其庶乎有昌明之一日也許治柳太后一條壽頤尚疑其文人附會果未必有是事說詳拙編古今醫案平議第二種內風腦神經病門真中風一類圖經本草紅花一大兩分為四分以酒一大升煮頓服治血氣痛壽頤按斤兩升斗皆古小而今大大約唐以前僅及今三分之一至隋唐之間則通行之權量已與今相近惟量藥則猶沿用古法所以其時有大稱小稱稱今作秤大斗小鬥之名大者即當時所通行小者即舊時之權量也唐人醫書時有大兩大斗大升字樣則即以當時通用之權量為計所以別於古法可見其時著書者之精細此方所謂一大升一大兩即其例也壽頤別有古今權量考言之頗詳已編入談醫考證集中藏紅花蕃紅花發明西藏紅花產於藏地趙恕軒本草綱目拾遺載之稱其形如菊干之入沸湯中水色如血可絞汁四次者真治各種痞結每服一朵沖湯服忌油膩鹽又引王士瑤謂治吐血不論虛實用花一朵以無灰酒一盞隔湯燉汁服入口即止屢試皆效蓋亦降逆順氣開結消瘀仍與川紅花相近而力量雄峻過之今人僅以為活血行滯之用殊未足盡其功用按瀕湖綱目已有番紅花稱其產西番回回及天方國似亦即今之所謂藏紅花稱其主心氣憂鬱結悶不散能活血治驚悸則散結行血功力亦同又引醫林集要用撒法即即番紅花之別名蓋彼中之土語二分水一盞浸服治傷寒發狂驚悸恍惚亦仍是消痰注原本痰上無消據另本增泄滯之意但加以清熱通導一層功力亦尚相近惟稱其氣味甘平則與藏紅花之膩澀濃厚者不類要之土宜各有微異疑皆川紅花之一類數種也但藏紅花價值甚貴其功力只較之川產峻烈一籌凡有貧病苟非必不得已可弗輕投燕脂發明即紅藍花汁製成閨中以為面脂潤色之用製法不止一種瀕湖綱目載之甚詳皆以紅汁染成以活血為用仍與紅花同意惟自海舶交通西人所造各種顏料盛行之時豔麗絕勝土產而皆含毒質今之燕脂錦燕脂棉已純是洋色製成斷不可入藥籠不如仍用紅花猶為穩妥大薊小薊發明大薊小薊莖葉有大小之殊其形色花蕊頗與紅花相近但花色青紫而不紅蓋亦紅花之類止血破瘀功用亦甚相近別錄稱其氣味俱甘溫日華則俱以為涼其大薊根別錄謂主治女子赤白沃止吐血鼻衄安胎甄權謂搗汁服半升主下血立瘥日華又謂其葉主腸癰腹中瘀血及跌撲損傷生研和酒童便服壽頤按二薊主治皆以下行導瘀為主別錄以大薊根止吐血鼻衄者正以下行為順而上逆之吐血可止又謂安胎則破瘀泄導之性適得其反恐不可從甄權謂主下血亦殊未允藏器謂小薊根破宿血生新血主暴下血血崩壽頤按此以有瘀者言之非虛脫症宜注重一暴字又謂主金瘡出血嘔血等蘇恭謂大小薊葉雖似而功不同大薊出山谷根療癰腫小薊生平澤不能消腫而破血則同石頑謂大小薊花俱甘溫根俱微涼但小薊力微可以止血退熱不似大薊之能破瘀散毒近醫止用其花則專於散血然皆下行脾胃虛弱泄瀉少食者禁用劉寄奴發明此草以劉裕小字得名南史所謂搗藥治傷者也其性苦溫善於破瘀宣通專為逐血攻脹之用並以外敷止血定痛治傷亦治產後瘀未淨諸疾及大小便血心腹結痛癥瘕經閉然專於攻破非實證不可妄用鱧腸即旱蓮草發明鱧腸草折其莖汁出須臾而黑故得此名言如鱧魚之腸也產於下隰地結實如小蓮房因有旱蓮之名古謂之金陵草亦稱墨菜汁黑而黏故入腎補陰而生長毛髮又能入血為涼血止血之品又消熱病癰腫但黑色之藥純陰用事非陽盛之體不應多用脾虛泄瀉尤忌凡勞怯諸證陰虛火旺者不可以此等陰藥專治其標須與補中健脾之劑相輔成功乃為萬全無弊之策若止知為熱徒事寒涼則虛火未必安潛而脾胃之陽先敗必有過中泄瀉不食之虞且虛火縱以逆折得息而反為純陰無陽之候又將何以善其後耶唐本草謂氣味甘酸而平主血痢及針灸瘡發血不可止者傅之立止汁塗眉發生速而繁日華謂通小腸治瘡瘍瀕湖謂烏髭發益腎陰棉花考證棉花種出異域宋季始入中土吾鄉自松江黃道婆攜來遂為土產之一大宗衣被蒼生六百餘年遍地都是童稚皆能識之固不煩再詳其形色考代醉編此物始為番使黃氏所傳雖一本叢生有似灌木然年年播種宿根不能再生確是草類李氏綱目名以木棉而列於灌木類中究非真相瀕湖亦謂棉有草木兩種木棉產於交廣樹高數丈而江南淮北所藝者皆似草之木棉則李氏亦知其非木本今復推廣益遠美洲大陸亦為恆產之一宗而木本之棉則出產無多不足供製紗織布之用然則元明時代所稱蘊絮織布之棉皆即此棉花也茲徑以棉花為名即以別於木本之棉雖棉花之稱未見於古書而農家習慣久為定名不僅一隅之方物婦孺咸知抑亦國產之大宗全球指目固中外通行之唯一名稱也發明棉花能御嚴寒其性溫暖理有固然瀕湖所謂氣甘溫是也然於主治止稱白棉治血崩金瘡燒灰用之子燒油塗惡瘡疥癬似未足以盡其功用趙氏綱目拾遺引百草鏡花可止血殼可治膈又引藥性考亦謂草棉甘溫燒灰止血敷凍瘃其子溫熱補虛治損暖腰膝蓋禦寒之品能助陽氣而其子又凝固之體則補中益下溫養脾腎真陽尤其可信又其中有紫花一種綿色殷紫則深入血分調和經絡以活血見長且更有黑核一種子濃如墨則直達腎家滋益真水以養陰奏績舊方每以棉花子仁為和血止血之品如治便血淋血崩帶痔漏等證則皆和血之義而無寒涼積瘀之患又為補腎起痿養老扶弱等用則又溫養之法而無剛暴燥烈之虞溫和滋潤頗為純粹能滋陰液助陽氣澤毛髮潤肌膚質本多脂終與桂附等之辛燥者有間惟此子一得土氣即易萌芽生長之機最迅則不無興陽作用必腎氣虛寒者為宜苟其虛陽不固相火不潛恐有擾動之弊又純屬油質更有滑泄之累其殼可以療膈者取其自然綻裂即有疏通之義又性溫能行可泄痰瘀也其子榨油瀕湖稱其有毒且有燃燈損目一說然今人幾為恆嗜之品市廛中久已普行甚且攙雜豆油之中令人無從分別雖其性偏溫不無注原作流顯誤改流弊然油則滑潤亦不致留有積熱貽人大害惟必須澄之極清則油中雜質無存方無戟喉之患又宜以鮮子榨油則清芬可口其陳年之花核核中子仁久已黴變其油本不可用昔人稱其有毒當即指此若鮮棉核之清油今多食之亦未見其毒也又採其莖葉花實連根全枝搗爛水煎濃成膏和酒溫服可戒鴉片煙癮蓋鴉片純以澀斂為用而此以陽和之氣疏通而溫潤之頗著靈效又鴉片來自印度而棉花亦由彼方傳來或者土宜物質自有剋制之理歟猶憶前人筆記中稱棉花初入江南之時有一老僧見而蹙額曰是物到此果然數百年衣被蒼生然五百年後必更有一毒物相繼而來索還鉅債則今人食其果而後人受其報寧不可嘆云云乃道光中和議既成鴉片之毒蔓延全國歲溢金錢何止鉅萬則老僧之言驗矣今雖禁令綦嚴頗似六百年棉花宿債漸次清償實則暗室一燈所在多有正不知鉅款宿逋何日方了聊記此言以為黑籍中人提斯警覺之一助云爾趙氏綱目拾遺引回生集棉子煮湯入甕坐而薰之治腎子偏墜壽頤按陰丸偏大木而不痛多屬寒氣治宜溫散嘗見有一兒患之偶乘船船中適裝花核榨油之餅熱氣未散兒坐其上至家即愈此法最佳得氣尤厚較之煮湯薰洗力量百倍而並不嫌其猛雖極尋常之事實即醫家之良導師也芍藥本經味苦平主邪氣腹痛除血痹破堅積寒熱疝瘕止痛利小便益氣別錄酸微寒通順血脈緩中散惡血逐賊血去水氣利旁光大小腸消癰腫時行寒熱中惡腹痛腰痛正義芍藥古無赤白之分而功用自別白者苦而微酸能益太陰之脾陰而收渙散之大氣亦補益肝陰而柔馴肝氣之橫逆本經主邪氣腹痛寒熱疝瘕止痛益氣別錄所謂緩中者無一非養毓肝脾二臟之真陰而收攝二臟之逆氣斯邪氣退臟正氣裨益腹痛及心胃之痛皆除中氣和調寒熱自已疝瘕自定皆白芍藥養脾柔肝之功用也赤者行滯破血直達下焦本經所謂除血痹破堅積別錄所謂通順血脈散惡血逐賊血消癰腫中惡腹痛皆惟赤芍藥行滯逐瘀足以當之利小便去水氣利旁光大小腸亦赤芍藥泄導之功石頑以本經之利小便三字繫於赤芍藥之下良有以也白芍非專利小便之藥真武湯別有用意見下廣義甄權謂強五臟補腎氣治時疾骨熱是指白者言之又治臟腑壅氣婦人血閉不通則指赤者言之潔古謂瀉肝安脾肺收胃氣止瀉利固腠理和血脈收陰氣斂逆氣皆白芍之功又謂白芍入脾補中焦乃下利必用之藥蓋瀉利者太陰病故不可缺此海藏謂理中氣治脾虛中滿心下痞脅下痛善噫肺急脹逆喘咳目澀肝血不足陽維病苦寒熱帶脈病苦腹痛滿腰溶溶如在水中亦皆白芍之主治瀕湖止下痢腹痛後重石頑逢原謂白芍酸寒斂津液而護營血收陰氣而散邪熱瀉肝之邪熱所以補脾之陰壽頤按白芍酸寒亦養肝陰而柔馴肝氣之恣橫與龍膽木賊之伐肝者不同不可謂瀉肝之邪熱即本經主邪氣腹痛益氣之謂故仲景以為補營上藥入肝脾血分治陽維寒熱帶脈腹痛補中下二焦能於土中瀉木為血痢必用之藥然須兼桂用之方得斂中寓散之意建中湯之妙用人所不知蓋瀉痢皆太陰之病建中專主太陰腹痛也壽頤按泄瀉與滯下固皆是太陰脾病故皆有腹痛一候芍藥能收脾氣之散漫而養脾陰故為太陰腹痛主藥而並治泄瀉滯下之腹痛仲景於腹痛例加芍藥此是上古相傳之聖法本經主治特提腹痛二字即是此旨可見仲聖用藥固與本經若合符節惟泄瀉之腹痛多由太陰之虛寒芍藥雖能補益太陰而酸寒與脾寒不合是以小建中湯專治中虛腹痛重用芍藥而以桂枝溫養建立中州元氣且能泄散陰寒此經方之妙用固泄瀉腹痛之神丹也若滯下之腹痛則多濕熱積滯雖亦是太陰失職乏健運之力而證是實熱宜清宜通且宜破滯導濁而血痢腹痛裡急後重欲下不下更是一團毒火深入血分蘊結於大腸迴轉之間非苦寒急下盪滌邪穢不可僅用芍藥猶虞不及樸枳硝黃芩連檳柏皆所宜選何以石頑既知芍為血痢必用而反謂必須兼桂用之豈有大實大熱之病而可雜以桂者是誤以建中治虛寒之例治濕熱矣潔古老人芍藥湯主治滯下最是實熱證之無上良方惟雜一肉桂大不可訓蓋亦誤認建中法可治滯下腸闢今得石頑此論可與潔古攜手同歸此均是賢者之過不可不辨石頑又曰凡人陽氣虛衰陰氣散漫患腹脹滿急於補中益氣藥中加白芍一味以收陰則陽虛不受陰制脹得陽藥便消又曰小便不利者禁用以旁光得酸收而愈秘也而真武湯中又用以利小便者則本治少陰精傷而證見虛寒非太陽旁光癃閉之候以其能益陰滋血培養津液小便自行非通利也壽頤按真武湯治少陰虛寒是少陰寒水泛諡陰盛漫天橫逆無制上凌心脾汗多心悸四肢沉重腹痛不利小便不利皆陰水汩沒真陽逆流奔騰懷山襄陵之候故以附子鎮攝水逆譬猶北方真武之神生薑溫中氣白朮實脾以堤水茯苓稟松根餘氣久伏深藏顧名思義亦是鎮伏功用且又必藉芍藥之陰同氣相求以收攝迷漫渙散之陰氣復歸於下庶幾水歸於壑復其潤下之常而導之流通乃不為害斯為真武治水芍藥通利小便之真旨真武之少陰證必非精傷之少陰石頑滋血及培養津液云云太覺膚淺殊不足徵而東垣且謂芍藥能益陰滋濕而停津液故小便自行非因通利云云試問當用真武之時陰霾之氣充塞宇宙而顧可用其益陰滋濕以停津液乎似此解經豈非魔道石頑蓋亦承東垣之謬讀古人書又安得不自具隻眼發明本經芍藥雖未分別赤白二者各有所主然尋繹其主治諸病一為補益肝脾真陰而收攝脾氣之散亂肝氣之恣橫則白芍也一為逐血導瘀破積泄降則赤芍也蘇頌圖經本草始有金芍藥白木芍藥赤之名成無己謂白補而赤瀉白收而赤散故益陰養血滋潤肝脾皆用白芍藥活血行滯宣化瘍毒皆用赤芍藥芍藥專治腹痛仲聖之法實即秦漢以前歷聖相傳之法說者每謂腹痛是肝木凌脾芍能助脾土而克肝木故為腹痛之主藥要之肝秉剛強之性非藉陰液以涵濡之則暴戾恣睢一發而不可制當其衝者厥惟脾胃先蒙其害凡心胃痛腹滿痛胸脅刺痛支撐脹悶無一非剛木凌脾之病宋元以來治此者多尚香燥氣藥以剛濟剛氣行而通則不痛非不暫圖目前之效然愈燥而陰愈耗肝愈橫頻發加劇卒至肝脾之陰兩竭而燥藥且不可復施仲聖以芍藥治腹痛一以益脾陰而收攝至陰耗散之氣一以養肝陰而和柔剛木桀驁之威與行氣之藥直折肝家悍氣者截然兩途此瀉肝與柔肝之辨而芍藥所以能治腹痛脹滿心胃刺痛胸脅脹滿者其全體大用即是此旨必不可與伐肝之劑作一例觀禁忌仲景云太陰為病脈弱其人續自便利設當行大黃芍藥者當減之以其人胃氣弱而動故也是指太陰虛證而言可見凡腹痛之當用芍藥者皆太陰氣滯肝絡郁窒不舒為病非屬於虛寒一邊而中氣虛寒則又有建中法在非芍藥一味之所能治此寇宗奭所以有氣虛寒人禁用之說也正訛丹溪謂產後不可用芍藥以其酸寒伐生髮之氣故也壽頤謂產後二字所賅者廣博而無涯矣芍是酸寒虛寒者固不可用然尚有小建中之成例在若是實熱當下硝黃芩連且皆不避又安有獨禁芍藥一味而乃曰產後不可用芍則凡是娩身之後獨忌此一味其理安在此必非丹溪之言而大明本草且謂治女人一切痛胎前產後諸疾則又是不問寒熱虛實而概言之適與丹溪相反究之有為而言兩者之說是是非非各有所當非可執死法以困活人者也荊芥本經假蘇味辛溫主寒熱鼠瘻瘰癧生創破結聚氣下瘀血除濕痹創今作瘡正義本經無荊芥而有假蘇吳普謂一名荊芥然陶弘景竟謂假蘇方藥不復用故別錄亦無荊芥主治至蘇恭則謂即荊芥瀕湖從吳普之說遂以假蘇標題而主治皆荊芥以後諸家本皆從瀕湖者也荊芥氣味本經雖曰辛溫而主治多風熱結氣為病故今人以為辛涼之藥石頑逢原則作微溫辛能散風熱宣結滯又入血分故能破結聚氣下瘀除痹鼠瘻瘰癧瘡瘍皆風熱入絡凝痰挾瘀之病而瘰癧又挾少陽相火鬱蒸內熱荊芥能治之則所謂溫者未必然而近人以為辛涼者是矣廣義藏器謂搗爛敷疔毒腫毒即本經治瘡瘍之旨也甄權謂單用惡風賊風口面喎斜遍身𤸷痹壽頤按古人以喎斜痹痛等症均認為外感惡風故治療皆用風藥然凡病起猝暴而不出戶庭未遇賊風者皆是氣火上升血沖腦經之病風藥必不可誤投士良治傷寒頭痛頭旋目眩壽頤按此風熱上乘之病荊芥辛涼泄風散熱是以治之蘇頌治婦人血風及瘡疥為要藥亦入血疏風清熱之功也孟詵治產後中風身強直研末酒服壽頤按產後風痙角弓反張古人亦無不謂是風寒外乘直犯太陽肘後千金外臺皆用獨活豆淋酒方後人乃有華佗愈風散一味荊芥炒末豆淋酒調服甚且隱其名曰舉卿古拜散即荊芥二字之反切以為無上妙品實則新產血虛孤陽上冒亦是腦神經病荊芥辛涼炒黃能導血下行尚無不可而酒是升散之性萬萬不可誤與且不獨產後為然即大人小兒一切痙直強急卒暴之病無一非神經激擾使然傷寒論金匱痙病二篇以及病源千金諸書論證用藥無一不誤非徒無益必有大害如果食古不化效顰西家無不頃刻變生速之立蹶固已屢見之矣瀕湖謂散風熱清頭目利咽喉消瘡腫皆辛涼泄熱之功又謂治吐血衄血下血血痢崩中痔漏則皆宜炒黑用之辛涼泄熱又入血分能導血下行而散瘀結也石頑謂長於祛經絡之中之風熱觀本經主治皆搜經絡中風熱痰血之病又能清頭目去瘀血破結氣消瘡毒故風病血病瘡瘍產後為要藥產後血暈荊芥為末熱童便調服壽頤按此亦炒黑用之入血導瘀而以童便速其下行則瘀可通而暈可止以視治痙之用酒者彼升此降性情天淵學者能於此辨別而知其所以異然後可與談醫發明荊芥味微辛而氣芳香臭味清芳質又輕揚故治風熱在表在上諸證能泄肺熱而達皮毛風熱咳嗽宜之風熱外感頭痛寒熱亦是主藥又入血分清血熱能治咽喉口舌發頤大頭諸證亦治瘡瘍風疥瘰癧吐衄下血崩漏能徹上徹下散結導注原作異顯誤改瘀厥功甚多而亦甚捷誠風熱血熱之一大法門不可以其微賤易得而忽視之香薷別錄味辛微溫主霍亂腹痛吐下散水腫發明香薷辛而微溫氣味清洌質又輕揚上之能開肺氣泄腠理達皮毛以解在表之新寒下之能通三焦疏旁光利小便以導在裡之水氣別錄主霍亂腹痛吐下者是夏月形寒飲冷傷其中陽以致大氣紊亂上吐下瀉腹痛如絞香薷能通陽氣所以可治然此特傷寒霍亂之輕者耳如果肢厥脈伏目陷面青唇舌淡白如紙則是真寒直中之陰證非大劑薑附連萸不能挽救於什一者亦非香薷輕清所能勝任散水腫者水溢於膚表本宜發表以通腠理且肺氣開則清肅之令順其下降之常而小溲自暢水腫自消香薷達表通陽又能利水故治腫甚捷此與麻黃解表亦能消腫之理無二致別錄用一散字則所以退腫之由重在散表不重在利導其旨更顯昔人每謂此物為治暑要藥者亦指暑月受涼外寒閉其內熱有發熱惡寒頭痛等症則香薷通陽解表是其專職而又能導水利濕更與暑月濕熱鬱蒸旁光不利者相合非謂暑天百病香薷一物能通治之也然鄉曲俗醫凡是暑天發熱無不用此則熱邪為病者亦如柴葛羌防助桀肆虐此其誤實由俗本醫書每錄局方香薷飲輒曰通治一切暑病則不學者流自然奉為夏天至寶而氣虛者得之已受累不淺廣義李瀕湖曰世醫治暑病以香薷飲為首藥然惟乘涼飲冷陽氣為陰邪所遏而有頭痛發熱煩躁口渴或吐或瀉霍亂者宜此以發越陽氣散水和脾若勞役斫喪之人斫喪指房勞言而本草綱目及石頑逢原引此全節皆作喪是誤字也今改之傷暑大熱大渴汗泄如雨煩躁喘促者乃勞倦內傷之證必用東垣清暑益氣湯壽頤按此證是暑傷元氣陰虛陽浮下虛上實治宜清暑熱而益元氣理法洵是不差但東垣之所謂清暑益氣湯者藥味叢雜最無法度升麻葛根黃耆當歸升提辛溫豈汗多喘促者所可妄試寧不拔其根株使之立蹶昔人已謂東垣此方有清暑益氣湯之名無清暑益氣之實近費伯雄方論亦嘗言之瀕湖此句不思之甚矣人參白虎湯之類以瀉火益元可也若用香薷是重虛其表而濟之以熱矣蓋香薷乃夏月解表之藥如冬月之用麻黃氣虛者尤不可多服今人不知暑傷元氣不問有病無病概用代茶謂能闢暑真是癡人說夢且其性溫不可熱飲反致吐逆惟宜冷服則無拒格之患其治水之功果有奇效繆仲淳本草經疏香薷辛散溫通故能解寒鬱之暑氣石頑本經逢原香薷辛溫先升後降故熱服能發散暑邪冷飲則解熱利小便治水甚捷霍亂有汗出如雨吐瀉脫元四肢清冷脈微欲脫者則宜大順散漿水散等方救之若用香薷重虛其表頃刻脫矣深師香薷丸治通身水腫以香薷熬膏丸白朮末米飲下之效注原廣義項名脫今補蒲公英發明蒲公英莖葉皆似萵苣吾鄉甚多折其莖葉有白汁溢出如乳汁故吳俗呼為羊奶奶草瀕湖謂關中謂之狗乳草亦此意也其性清涼治一切疔瘡癰瘍紅腫熱毒諸症可服可敷頗有應驗而治乳癰乳癤紅腫堅塊尤為捷效鮮者搗汁溫服乾者煎服一味亦可治之而煎藥方中亦必不可缺此蘇恭唐本草謂甘平無毒治婦人乳癰水腫煮汁飲及封之立消洵不誣也丹溪亦謂解食毒散滯氣化熱毒消惡腫結核丁腫石頑謂治乳癰必鮮者取汁和酒服服後欲睡是其功驗微汗而愈壽頤按乳癰乳核單方古法多用酒服蓋欲其迅行及於患處然此惟堅塊初起其形未大肌膚亦未變色時間或可施而乳證多兼肝膽陽邪酒能助火未可概投若形勢漸巨本欲釀膿者適以速成其潰耳自來著內科書者多不習瘍科所以不知其弊實則內外兩科理本相通且內外病之聯屬者尤非少數不知內科固萬不能治瘍即不知瘍科則治內亦每有養癰貽害之弊無如長於治內者輒謂吾是大方專家彼汙穢齷齪之瘡瘍又豈肯降格從事然一遇內外相兼之證勢必束手無措敷衍了事捫心清夜已昧天良須知治瘍雖似小伎要知非精於治內者亦不可與語此中神化也馬齒莧發明此草葉似苜蓿而肥厚異常其莖亦最肥碩曝於烈日之中不易乾燥其稟性陰寒已可概見故善解癰腫熱毒亦可作敷藥蜀本草稱其酸寒寇宗奭謂其寒滑陳藏器治諸腫破痃癖止消渴皆寒涼解熱之正治蘇恭亦謂飲汁治反胃金瘡流血諸淋破血癖癥瘕則不獨治癰腫兼能消痞蓋此草之葉面青而背紅紫莖亦作紫色故入血分而破血滯諸證蘇頌治女人赤白帶下則此證多由濕熱凝滯寒滑以利導之而濕熱可泄又兼能入血破瘀故亦治赤帶瀕湖謂散血消腫利腸滑胎解毒通淋又無一非寒滑二字之成績也地丁發明地丁專為癰腫丁毒通用之藥瀕湖綱目稱其苦辛寒治一切癰疽發背疔瘡瘰癧無名腫毒然辛涼散腫長於退熱惟血熱壅滯紅腫焮發之外瘍宜之若謂通治陰疽發背寒凝之證殊是不妥蓋腦疽發背古人多作火毒治者以六朝隋唐之世人多好服金石燥烈之藥故病源千金外臺皆有金石丹毒發一門古之腦疽發背皆是丹藥熱毒治宜寒涼亦固其所而自宋金以降金丹一派漸以銷沉蓋亦久無丹石發之一候而凡患有腦背之疽者純是太陽經寒水為病雖外形亦有紅腫焮熱頗似實火然項背必拘急不仁且皆畏寒畏風舌苔必白潤垢膩誤投涼劑內陷隨之即平塌頑水注水疑為誤植不可復救此其病確與古時熱毒正相對峙而外瘍諸書猶沿用大寒大涼之法皆是此證之戈戟石頑已謂地丁性寒不利陰證漫腫無頭不赤不高者禁用地丁之名以花蕊一莖直上有似於丁故蒲公英亦有黃花地丁之稱而此草又有紫花白花二種向來用者以紫花為主蓋取其色紫能入血分亦無所用其區別又有以治黃疸者亦清熱利濕之功用也蚤休即草河車本經味苦微寒主驚癇搖頭弄舌熱氣在腹中瘨疾癰腫陰蝕下三蟲去蛇毒考證瘨今本作癲按許氏說文曰瘨病也聲類曰風病也則瘨疾者猶上文所謂驚癇及搖頭弄舌之內風猝動也若癲字則廣韻集韻始有之乃後出之字廣韻明言與癲同字非後人所謂癲狂之義茲從注原作以據文義改孫氏平津館本癲疾以下十二字瀕湖引作別錄而孫本輯入本經姑從孫本發明蚤休乃苦泄解毒之品瀕湖謂足厥陰之藥蓋清解肝膽之鬱熱息風降氣亦能退腫消痰利水去濕本經治驚癇搖頭弄舌皆肝陽肆虐木火生風之症又謂之癲疾者癲即巔頂之巔字亦作顛皆氣火上凌直上頂巔之病今西學家所謂血沖腦經者頗似吾國舊學向所未聞然氣上不下注原作上據素問改頭痛巔疾見於素問方盛衰論掉眩巔疾見於五常政大論字皆作巔豈非明言其病在巔頂聲類謂癲為風病豈非風動上肆直到頂巔則其病在腦亦可於言外得之可證此種內風猝動之變吾國舊籍早已明知其為氣血上衝正不待西學家自矜創穫蚤休能治此證正以苦寒泄降能息風陽而清氣火則氣血不沖腦經不擾而癲疾驚癇搖頭弄舌諸病可已本經之旨直與素問諸條息息相通此皆古醫經之無上精義惜乎漢魏六朝以降誤以巔頂之巔認作顛狂之顛而驚癇昏僕等症之真旨遂晦是病乃不復可治此是後世醫學之陋固不可與素問本草經同日而語然即此可知本草經及素問論病探源竟有非漢魏以下醫家所能悟到者則信乎古書之真非易讀矣若其專治癰腫則苦寒清熱亦能解毒治陰濁下三蟲亦苦寒勝濕自能殺蟲其功用皆淺顯易知不煩多贅瀕湖引諺語有七葉一枝花深山是我家癰疽如遇著一似手拈拿云云知此草專治癰瘍古今無不推重然此類寒涼諸品惟陽發紅腫大痛者為宜而堅塊頑木之陰證大忌非謂凡是外科無不統治也蓖麻子發明氣味甘平瀕湖以為甘辛平其實全無辛味石頑以為溫壽頤且恆用以消散外瘍紅腫焮熱各症則可證其性必是清涼石頑之說亦非是其性善走善散丹溪以為能追膿取毒拔邪外出甚是不確壽頤業師朱氏世以兼治外瘍名凡拔毒提膿藥中從不用此惟退消瘍毒紅腫及發頤瘰癧乳癰等症有家制千捶膏一方專用蓖麻子仁杵細和乳香膠香銀硃麝香成膏即有紅赤腫高勢且釀膿者亦可十消八九則明是消散之功何可誤認提毒外出瀕湖以治偏風不舉口目喎斜蓋亦用其走竄入絡可以通痹非能拔出血絡經脈之風邪且偏風喎斜等症本是腦經為病何嘗有外風入絡認證先錯而用藥又是隔膜一誤再誤竊謂此法亦必無效據綱目所載一人偏風手足不舉瀕湖以此油同麝香鯪鯉甲等作膏摩之而愈則真是風寒濕三氣雜至之痹著關節者所以有驗此辨證之不可模糊隱約者也丹溪又以為能出有形之滯物故取胎產胞衣剩骨膿血者用之則亦因其善走而速之使動耳瀕湖又謂一人病手臂一塊腫痛以此搗膏貼之一夜而愈則即走竄消散之功耳又謂一婦產後子腸不收搗仁貼其丹田一夜而上壽頤則謂此藥性情止能流動而使之行不能收攝而使之斂古書謂產後腸出子宮不上用蓖麻仁搗塗頂心百會穴立刻收注原作放顯誤改上云云卻已陳陳相因數見不一均是空中樓閣瀕湖此說亦是依託古書欺人之語蓋蓖麻散腫之功極驗如果子宮子腸不收而亦用之豈不使其正氣愈散理當益復下墜萬無可愈之道此徵之實驗而鑿鑿有據者何得比附古人空談而害病家於實禍吾國醫籍最多此等荒唐之說苟非確有至理已覺不可輕信況似此走散之品而反謂之能收正是大相矛盾者耶石頑謂研塗瘰癧痘毒癰腫即消則是實驗此散之力而非收之功且瀕湖綱目於主治正文中連綴治女人胎不下子腸挺出開通關竅經絡三句則不下者必使之下挺出者必使之收此物既能下胎衣而開通關竅經絡又何以能收子腸一行之中出爾反爾更是可駭似此信手拈來實是誤人不小又主治中以消腫追注原作迫據綱目改膿拔毒六字並作一氣則消者欲其內消追者拔者欲其外出凡能內消之藥必不能拔毒而拔毒之藥以敷未潰之瘍適以提之成膿必不能消腫亦是兩相矛盾萬不可通蓋瀕湖本不諳外瘍之原理以致措辭乖謬如是究竟蓖麻治瘍內消最有奇功拔毒實無能力此壽頤所以恆謂內科分科之不足恃也又古書皆謂蓖麻有毒不可內服瀕湖且謂服蓖麻者一生不得食炒豆犯之必脹死一似此物必是大毒之品所以綱目列於毒草門中然壽頤幼時家圃中種此數年當時並不知其即是蓖麻子但見人家炒熟食之如落花生者然全家食之殆七八年若計其數奚啻百斤未有一人遇有脹病且亦何嘗不食炒豆迨逾冠之後閱醫家者言乃見是說始知宋元以後醫書苟非親驗多是妄談嗚呼安得更有神農氏作而再一一親嘗之耶鳳仙子發明金鳳花子成熟時其殼一動即自分裂其性最急故有急性子之名其氣味則瀕湖綱目謂之微苦溫有小毒主治產難催生積塊噎膈下哽透骨取齒牙皆取其迅速直達為義壽頤治外瘍堅塊痠痛麻木陰發大證研沫搗膏貼患處極能軟堅消腫如神根汁注汁疑衍搗敷跌撲傷紅腫紫瘀潰爛皆效亦急性走竄消散瘀滯之功用玉簪發明玉簪根性質據瀕湖綱目謂下骨鯁塗癰腫取齒牙頗與急性子約略相近壽頤嘗採鮮根搗自然汁日曬成膏作小丸治牙痛欲落者以一丸嵌痛處聽其自化一丸不落再嵌一次無不自落而無痛苦確驗又吾鄉有齒痛甚劇者聞人言玉簪根汁點牙自落乃搗汁漱口不一月而全口之齒無一存者此是實事可證此物透骨之猛且其人年僅三十餘也
