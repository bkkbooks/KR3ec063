body:
  text: 卷之二草部山草類下黃連本經味苦寒主熱氣目痛眥傷泣出明目腸澼腹痛下利婦人陰中腫痛別録微寒主五臟冷熱久下泄澼膿血止消渴大驚除水利骨調胃厚腸益膽療口瘡正義黃連苦寒所主皆濕積熱鬱之證目痛眥傷泣出濕熱之鬱於上者也目為肝之竅肝有鬱熱目為之病苦寒清肝則目自明腸澼腹痛乃膿血交黏之滯下病澼古止作闢即帷裳襞積之襞故闢字有積聚之義腸闢者謂腸間積聚之濕熱也燥濕清熱故黃連為治療滯下之主藥下利則泄瀉也惟泄瀉之病有因於暑熱亦有因於脾虛暑熱者宜苦以堅之而脾虛則非其治矣婦人陰中腫痛亦濕滯熱鬱證也別録主五注據別録引文五下當脫臟字冷熱久下泄澼膿血即本經之腸澼也消渴為胃腸之熱證大驚為心肝之熱證苦寒清熱是以主之除水者以熱結之水道不通言之非通治脾胃虛寒之水病也利骨者苦以堅之耳調胃厚腸謂泄化濕熱而腸胃調和益膽者清肝熱即所以祛膽邪亦即上文主大驚之意療口瘡者亦清脾胃之熱邪也備考腸澼之澼字今皆作澼惟浙江書局重刊仿宋本素問陰陽別論陰陽虛腸闢死其字作闢宋校正曰全元起本闢作澼則宋人所見舊本作闢而全元起注本已加水旁惟腸闢之義實難索解幸古本素問尚存一不加水旁之闢字猶可知其為闢積之義蓋此病實由腸中積滯使然古人命名之義乃始大白而後人加以水旁反不可解而集韻澼字乃訓為腸間水且因腸澼而附會為之非古義也然以腸澼之病解作腸間水亦殊未當此古書之所以不易讀而舊刻本之所以大可寶貴也近時楊守敬從東瀛轉抄之太素不全本桐廬袁忠節爽秋刻之於蕪湖道署黃陂肖耀南又刻之於武昌此二本凡是腸闢皆無水旁可知宋人舊本固皆作闢廣義日華治驚悸煩躁清心火而泄肝膽也主天行熱疾寒勝熱也主小兒疳病殺蟲則苦燥以除濕熱也潔古治鬱熱在中煩躁噁心兀兀欲吐心下痞滿苦燥泄降而平肝逆也又治諸瘡則泄火而清血熱耳丹溪治下痢胃口下熱噤口嘔吐則苦能泄降而定上衝之逆也但宜徐徐咽之使不作吐若驟服一杯則寒熱相爭必拒格而不納海藏謂黃連名為瀉心其實瀉脾蓋實則瀉其子也劉河間謂黃連治痢必兼辛散方通開通鬱結而苦能燥濕寒能勝熱其氣乃平其餘苦寒之藥多泄惟連檗能降火去濕而止瀉利景嶽謂平肝涼血肅胃清腸涼膽治驚癇瀉心除痞滿上以治吐血衄血下以治腸闢便紅除小兒熱疳殺蟲積消癰腫療火熱眼赤消痔漏解烏附巴豆之毒壽頤按痞滿以熱邪鬱結而言即仲景瀉心湯證發明黃連大苦大寒苦燥濕寒勝熱能泄降一切有餘之濕火而心脾肝腎之熱膽胃大小腸之火無不治之上以清風火之目病中以治平肝胃之嘔吐下以通腹痛之滯下皆燥濕清熱之效也又苦先入心清滌血熱故血家諸病如吐衄溲血便血淋濁痔漏崩帶等證及癰瘍斑疹丹毒並皆仰給於此但目疾須合泄風行血滯下須兼行氣導濁嘔吐須兼鎮墜化痰方有捷效僅恃苦寒亦不能操必勝之券且連之苦寒尤以苦勝故燥濕之功獨顯凡諸證必需於連者類皆濕熱鬱蒸恃以為苦燥泄降之資不僅以清熱見長凡非舌厚苔黃膩濁滿布者亦不任此大苦大燥之品即瘡瘍一科世人幾視為陽證通用之藥實則惟疔毒一證發於實火需連最多余惟濕熱交結亦所恆用此外血熱血毒之不挾濕邪者自有清血解毒之劑亦非專恃黃連可以通治也正訛楊仁齋謂黃連能去心竅惡血李氏綱目採之此妄説也心之有竅即是發血回血之管此乃血液循行之道路周流不息豈容阻留惡血而不行果其有之則瘀血凝滯血已不行其心已死而其人又安有生理且黃連苦寒亦無驅除敗血之能力蓋黃連之清心者寒以清其火而所謂涼血者亦清血中之熱耳乃合而言之竟謂心竅可有惡血真是盲人捫燭不復知有天下事矣吾國醫書止逞一時臆説而不顧其理者所在多有偶舉一隅為學者告俾知欲讀醫書須明真理必不可人云亦云而自墮於五里霧中也景嶽謂過服芩連必致敗脾其説甚是但其全書中痛詆黃連幾於濕熱滯下亦將不得輕用緣此公偏喜溫補之惡習遂視苦寒之藥如蛇蠍亦由此輩名望太重所見皆膏粱富貴之徒多虛病而少實證遂謂盡天下之人皆宜溫補抑知藜藿之人多於富貴者百千萬倍此等本少七情六欲之擾所病皆六氣之外感勞役飢飽之內傷而已藥以治病若僅株守一隅知有彼而不知有此終屬一偏之見惟寇宗奭謂黃連治痢不顧寒熱多少多致危困若虛而冷者慎勿輕用仲淳謂血虛煩熱忌用則皆扼要之論也泄瀉滯下本是二病一則清泄水穀多屬脾陽無權一則穢垢黏膩多是腸胃積滯一則屬虛病多里寒一則屬實病多濕熱正是背道分馳萬不能混為一例古書一名下利言其直下而滑利也一名滯下言其欲下而澀滯也病狀病名顯然可別本不慮其含混乃後人造一痢字而泄下亦痢滯下亦痢名之不正最足以淆亂後學俗醫無識注一本作乃姑相雜而名實淆亂矣俗醫不學甚至並此顯見之病而不能分別皆一痢字有以誤之黃連治痢本專指濕熱之滯下言之與脾虛之泄瀉無涉然夏秋之交暑濕相雜清濁不分亦令人暴注洞泄病狀固是泄瀉而證情實是濕熱黃連燥濕而苦以堅之又是針對必用之藥本經主治於腸澼腹痛之外更出下利二字即為濕熱之自利者言之本非通治虛寒泄瀉然本經不為分別辨析者蓋古書簡括其例如此為中人以上立法本不慮其誤認亦非有意故為含混欲陷後人於迷惘之中然後世之習醫者或有不明此理誤讀古書則黃連之主熱邪自利者或竟誤以為虛寒泄瀉之藥所以繆仲淳遂謂陽虛作泄脾胃虛寒泄瀉及陰虛人天明溏泄法皆大忌石頑亦復云然其所以諄諄而不憚煩言者可見熱泄寒泄之病俗人已多不能分別似此言醫可勝慨嘆石頑又有虛冷白痢及先瀉後痢之虛寒證誤用黃連致死之説壽頤則謂虛寒下痢不可妄用固也惟先瀉後痢若有暴病亦濕熱為多不可拘泥惟病久元虛則非實邪可比耳至白痢二字昔人有認作寒證者其説亦謬須以舌苔脈證參之要知濕熱蘊積未及血分其滯下不必紅色脈實舌膩腹痛及舌心黃膩尖邊紅者芩連均是要藥非白痢之必為虛冷胡黃連發明胡連本非黃連同類皮色雖黃而剖之色黑以其味苦性寒與黃連差近其種又來於異域因得胡黃連之名始見於唐本草蘇恭謂味苦大寒治三消五心煩熱泄利五痔厚腸胃浸入乳汁點目赤其功用與川連皆同又謂其補肝膽明目治骨蒸勞熱則因其清熱而過甚言之非篤論矣開寶稱其治小兒驚癇疳熱霍亂下痢溫瘧理腰腎去陰汗亦皆清熱燥濕之力丹溪獨稱其除果子積以苦能泄降而亦燥濕也石頑謂苦寒直降能伐臟腑骨髓邪熱為小兒疳熱積氣之峻藥同豬胰治楊梅瘡酒水煎服二劑輒效以其直達下焦善搜淫火之毒也壽頤按胡連情性悉與川連同功惟質重色黑沉降之性尤速故清導下焦濕熱其力愈專其效較川連為捷凡熱痢脫肛痔漏瘡瘍血痢血淋溲血濁血及梅毒疳瘡等證濕火結聚非此不能直達病所而小兒疳積腹膨之實證亦可用之蓋苦降直墜導熱下趨最為迅疾且不致久留中州妨礙脾胃沖和之氣耳正訛胡連大苦大寒純陰用事且較川連尤為峻烈自蘇恭有主婦人胎熱之説而後之本草皆仍其舊須知胎前實火止是百病中之一端抑知妊身養胎最重脾胃苦寒峻藥胡可輕投蘇恭又以治骨蒸勞瘵則熱入骨髓精血已枯雖曰火炎實由陰竭大寒大苦戕伐生機火縱可息而大命何如適以速之蹶耳繆氏經疏又謂主久痢成疳似以小兒疳勞言之然久痢之餘豈可峻用苦寒再戕脾氣喻西昌已謂小兒五疳猶之大人五勞實熱而用苦寒必初起之時乃可得效若胃虛得之有死而已膽草蘆薈川連胡連極苦大寒豈虛勞所能堪此設妄謂虛勞之外又有實勞而恣用苦寒則醫殺之也張石頑亦謂兒童腎實故實熱可用苦寒若脾胃腎陰不足者服此奪人壽算為害不淺凡用苦寒峻厲之品皆當識此弗恣意也仲淳又謂治傷寒咳嗽則寒邪在表為咳而可用此大是駭人自注謂邪熱在太陰陽明則冠以傷寒兩字更有不合其實即是脾胃熱咳亦萬萬用不到胡連也黃芩本經味苦平主諸熱黃疸腸澼泄利逐水下血閉惡瘡疽蝕火瘍別録大寒療痰熱胃中熱小腹絞痛消穀利小腸女子血閉淋露下血小兒腹痛子主腸澼膿血正義黃芩苦寒亦通治濕熱之品故本經先以主諸熱為提綱黃疸者胃中之濕熱也腸澼泄利腸中之濕熱也逐水者泄熱結之水道不通血閉者亦血熱之瘀結惡瘡疽蝕亦以濕熱之潰瘍而言火瘍則外瘍之屬於火邪者也黃芩涼血勝熱故為實熱癰瘍通用之藥別録療痰熱胃中熱消穀皆苦寒清熱之主治小腹絞痛則肝絡不疏鬱熱閉塞之痛非虛寒之腹痛也利小腸即本經逐水之意女子血閉淋露下血亦為濕熱鬱結之病而言小兒腹痛亦惟實熱窒滯之腹痛為宜皆非可一概統治其子專治腸澼膿血則苦寒泄降而子又堅實直達下焦故也消穀即善食易飢之中消病廣義甄權治熱毒日華主天行熱疾治疔瘡乳癰潔古涼心治肺火上逆清上焦及皮膚風熱療目赤腫痛除脾胃濕熱瀕湖治風熱濕熱頭痛火咳皆清熱燥濕之正治也東垣謂黃芩之中空而輕者瀉肺火利氣消痰除風熱清肌表之熱細實而堅者瀉大腸之火高下之分與枳實枳殼同例壽頤按李氏之説甚是凡質之輕者多上行橫行質之重者多沉降直下即本乎天者親上本乎地者親下之義凡物皆然可以類推景嶽枯者清上焦之火定肺熱之喘嗽止火炎之失血清咽喉治肺痿肺癰亦主斑疹實者泄下焦之熱治赤痢淋濁大腸熱結便血漏血石頑謂黃芩專主陽明蒸熱陽明居中非此不能開泄其蘊結之濕熱發明黃芩亦大苦大寒之品通治一切濕熱性質與黃連最近故主治亦與黃連相輔而行且味苦直降而氣亦輕清故能徹上徹下內而五臟六腑外而肌肉皮毛凡氣血痰鬱之實火內外女幼諸科之濕聚熱結病證無不治之為寒涼劑中必備之物然苦降礙胃必伐生氣且大苦大燥苟非濕漫亦弗浪用所宜所忌無不與黃連同歸繆仲淳經疏臚列許多虛寒病證而戒其不得妄投則學醫之謂何並寒熱之證而猶不知千古安得有此笨伯復何必為此無謂之叮嚀耶正訛甄權治骨蒸蓋謂苦寒之藥必能退熱然骨蒸之熱熱在骨髓非養血滋陰熱何由退苦寒直折縱令蒸熱得解而生氣難支況熱又未必能退乎又謂主寒熱往來則有虛有實實者濕熱黃芩清之尚矣若血虛氣虛之寒熱往來而亦以苦寒治之可乎日華本草謂黃芩治發背則古人此病多由膏粱藥石而發故有丹石發之名本屬邪熱唐宋成方皆主以大劑涼解日華之説本是正治然今之背疽則皆寒入督脈太陽之絡非溫經升散不為功古今證治正是相反誤與寒涼即致內陷不治慎不可誤信古人而不辨寒熱夭人天年也自張潔古有黃芩安胎之説丹溪遂以黃芩白朮為安胎聖藥謂胎孕宜清熱涼血血不妄行乃能養胎其意未嘗不是乃後人誤認為妊身必用之藥竟至俗子凡治胎孕無不用此則體質萬有不齊安得一概可通用注一本作則體質未必皆熱豈有一概通用之理石頑謂胎熱而升動不寧者宜之如胎寒下墜及食少便溏不可混用者是也禁忌繆仲淳謂芩連苦寒清肅之品能損胃氣而傷脾陽故虛熱忌之石頑亦謂陰虛伏熱虛陽發露者不可輕試龍膽本經味苦澀主骨間寒熱驚癇邪氣續絶傷定五臟殺蠱毒別録大寒除胃中伏熱時氣溫熱熱泄下痢去腸中小蟲益肝膽氣止驚惕正義龍膽草亦大苦大寒之品純以清熱見長主骨間熱者大寒能清骨熱也主驚癇止驚惕皆清熱寧心之效邪氣者即邪熱之氣也續絶傷定五臟則因其卻熱除邪而甚言之耳蠱毒是南方濕毒之厲氣腸中之蟲皆濕熱蘊隆所生也大苦大寒燥濕勝熱自能闢蠱殺蟲別録主胃中伏熱時氣溫熱皆苦寒之用主熱泄下痢亦苦燥濕寒勝熱與芩連之治濕熱泄瀉而並治積滯熱痢者同義益肝膽氣者清其邪熱即所以益其正氣非謂苦寒之品能補肝膽也廣義甄權治小兒壯熱時疾熱黃癰腫日華治熱狂止煩療瘡疥潔古去目中黃治睛赤腫脹瘀肉高起痛不可忍東垣退肝膽邪熱除下焦濕熱之腫瀉膀胱火瀕湖療煩熱黃疸小腸熱結淋閉癰瘍痛甚婦女血熱崩淋通治肝腎有餘之火石頑主酒疸黃腫發明龍膽草大苦大寒亦與連芩同功但本經稱其味澀則其性能守而行之於內故獨以治骨熱著余則清泄肝膽有餘之火疏通下焦濕熱之結足以盡其能事而黴瘡之毒疳痃之瘍皆屬淫火猖狂非此等大苦大寒不足以瀉其烈焰是又疏泄下焦之餘義矣禁忌瀕湖謂大苦大寒過用必傷胃中生髮之氣石頑謂胃氣虛者服之必嘔脾氣虛者服之必瀉苦參本經味苦寒主心腹結氣癥瘕積聚黃疸溺有餘瀝逐水除癰腫補中明目止淚別録養肝膽氣安五臟定志益精利九竅除伏熱腸澼止渴醒酒小便黃赤療惡瘡下部𧈟瘡平胃氣令人嗜食正義苦參亦苦寒燥濕之品主心腹結氣癥瘕積聚皆瘀熱蘊積之證也黃疸為胃中之濕熱溺有餘瀝小溲黃赤則膀胱之濕熱也逐水者以蘊熱而水道不利非通治虛寒之畜水癰腫則濕熱凝結之腫瘍也目淚乃肝經濕熱之病泄熱退熱則目自明而淚自止其所謂補中養肝膽氣安五臟定志益精利九竅除伏熱平胃氣令人嗜食種種功用皆濕熱既清而正氣自旺耳別録治腸澼者清理其濕熱之積滯也止渴醒酒皆清熱之效療惡瘡及下部𧈟瘡則燥濕清熱又能殺蟲耳廣義陶弘景漬酒飲治疥殺蟲蘇恭治惡蟲脛酸甄權治熱毒惡風赤癩眉脫蘇頌治風熱瘡疹瀕湖殺疳蟲皆苦寒除熱燥濕殺蟲也甄權又除大熱嗜睡則濕熱傷其中氣而為倦怠嗜臥也又治中惡腹痛則山嵐瘴癘蠱毒一類皆挾濕熱之毒燥濕清熱治之固宜猶龍膽之殺蠱毒耳景嶽止夢遺帶濁皆清泄肝腎之濕熱而伐相火之有餘也徐洄溪謂苦入心寒清火故苦參專治心經之火與黃連功用相近但黃連則清心臟之火為多苦參則清心腑小腸之火為多以黃連之氣味清而苦參之氣味濁也發明苦參大苦大寒退熱泄降蕩滌濕火其功效與芩連龍膽皆相近而苦參之苦愈甚其燥尤烈故能殺濕熱所生之蟲較之芩連力量益烈近人乃不敢以入煎劑蓋不特畏其苦味難服亦嫌其峻厲而避之也然毒風惡癩非此不除申韓刑名之學亦治世之所不可廢而今人但以為洗瘡之用恐未免因噎而廢食耳禁忌大苦大寒之物其性又必大燥過用無不傷脾損腎沈存中筆談謂病齒數年常以苦參擦齒乃苦腰重不能行後有舒昭亮亦用苦參而亦同病及至屏除不用而後皆愈則苦寒傷腎之明證也苦參子發明苦參子僅見於趙氏本草綱目拾遺一名鴉膽子其形如小豆與綱目苦參條中所載甚合其味極苦專主諸痔及滯下大有神效其功用亦與苦參相類其仁多油而氣味甚烈入胃易致引嘔故皆去油作丸或囫圇吞之雖古書所未載而功用必不可沒凡滯下赤白腹痛裡急後重者用鴉膽子輕輕敲去殼勿令肉破擇潔白明淨之仁以豆腐衣一小塊方寸許溫湯洗軟每七粒作一包整包吞服濕熱盛者每次吞三包一日三次夜二次極效濕熱稍輕則減之此是單方吾吳多知用之但舊用龍眼肉包吞壽頤謂濕熱之病不宜龍眼溫補改用豆腐衣包更妙或用西法之膠殼裝貯連殼吞服亦佳雖似大苦大寒非可恆用而在應用之時所服無多止見其利未見其弊爰為補之白頭翁本經味苦溫主溫瘧狂易寒熱癥瘕積聚癭氣逐血止痛療金瘡別録主鼻衄正義白頭翁之氣味本經以為苦溫吳綬改作苦辛寒石頑改作微寒詳本經主溫瘧狂易等證仲景以治熱痢下重決非溫性改者是也溫瘧狂易皆屬熱病惟苦能泄降寒能勝熱是以主之寒熱癥瘕積聚癭氣有由於血熱瘀滯者苦辛泄散而入血分則癥瘕積聚癭氣可消故並能逐血止痛療金瘡也鼻衄皆血熱上湧之證苦能泄降而寒以勝熱證治皆合本經之溫字必傳寫之誤矣狂易者發狂而變易其常度之謂古書多有之不為奇僻乃瀕湖仲淳石頑皆改之反致怪不可識異矣廣義陶弘景止毒痢甄權主赤痢腹痛齒痛項下瘤癧吳綬主熱毒下痢紫血鮮血者發明白頭翁苦寒之品亦專入血分而味又辛故清熱涼血而亦破瘀導滯其功用頗與紫草紫參地榆相似故主治亦復相近近見紹興何廉臣氏有新編藥物學謂白頭翁有白毛茸茸其性輕揚頗能升清以治滯下非特苦泄而有升舉下陷之意所以特有奇功壽頤每遇久痢之脾腎已虛者亦恆與參耆朮草山藥同用收效亦捷此則從物質上體驗得之確非臆説但總以有熱者為宜非虛寒之瀉利可一例論耳糾謬白頭翁能清血熱本經苦溫當是誤字乃日華本草竟以為暖腰膝顯與各家不符殆因本經溫字而附會之考瀕湖綱目所引諸家舊文多可信從惟日華本草最為叢雜甚至南轅北轍背道而馳大率皆此條暖腰膝之例也讀者萬勿為其所誤禁忌仲淳謂白頭翁苦寒凡滯下之胃虛及虛寒泄瀉者忌之石頑亦謂苦寒泄降久痢之淡血水者弗服白鮮本經味苦寒主頭風黃疸咳逆淋瀝女子陰中腫痛濕痹死肌不可屈伸起止行步別録咸療四肢不安時行腹中大熱飲水欲走大呼小兒驚癇正義白鮮乃苦寒勝濕之藥又能通行經隧脈絡本經主頭風者風濕熱之在上者也黃疸咳逆濕熱之在中者也濕痹死肌不可屈伸起止行步濕熱之痹於關節著於肌肉者也白鮮氣味甚烈故能徹上徹下通利關節勝濕除熱無微不至也別録療四肢不安者即痹著之病也時行腹中大熱飲水欲走大呼者則天行熱病狂易之類也小兒驚癇亦多內熱病耳別録又有主婦人産後余痛一語則有血虛血瘀之辨且皆不宜於苦寒之品雖容有血熱一證然白鮮亦非主要之藥仲淳已有血虛而熱非其所宜之説今刪之廣義甄權治一切熱毒風惡風風瘡疥癬赤爛眉發脫解熱黃酒黃急黃勞黃日華通關節利九竅通血脈主天行頭痛眼赤景嶽謂白鮮雖治瘡瘍而實為諸黃風痹之要藥發明白鮮味苦氣寒為勝濕除熱之品而其根蔓衍入土深遠故又能宣通肢節經絡內達臟腑骨節外行肌肉皮膚上清頭目之風熱中泄脾胃之濕熱又能通利機關宣化痹著而燥濕清熱外治皮毛肌肉濕熱之毒特其餘事惟諸痛癢瘡服之亦大有捷效乃合清火解毒祛風勝濕宣絡利竅蠲痹殺蟲諸功萃集為一以成其全體大用而後世俗醫但以為主治皮毛濕毒瘡瘍之用豈足以盡白鮮之功用耶正訛白鮮今俗皆作白蘚皮按蘚為苔蘚之蘚古書之白鮮無從草者且此藥用根亦不應稱之為皮考舊本皆止作白鮮而瀕湖綱目已有鮮皮之稱則沿誤亦久今人但用以治皮毛之病而忘其通痹宣絡許多大功未始不因其多一皮字而誤會者也白薇本經味苦平主暴中風身熱支滿忽忽不知人狂惑邪氣寒熱痠疼溫瘧洗洗發作有時別録咸大寒療傷中淋露下水氣利陰氣益精正義白薇味苦本經雖謂其平然詳其主治皆屬清熱之功用是以別録竟作鹹寒主暴中風身熱者苦寒能除風熱也支滿之支讀如搘拄搘撑之搘古書本多通用言邪熱之氣搘拄於胸中而氣逆滿悶苦寒以泄降之則搘撑可解而滿悶開矣自舊本多誤作肢滿而張隱菴本草注竟謂風邪淫於四末則認作四肢之肢試問滿字將作何解此既不知古書假借之理而又依據俗本遂成話柄醫家不通小學亦是一大憾事忽忽不知人及狂惑邪氣皆熱盛火升復擾腦神經而變易常度也寒熱痠疼則熱邪之留於脈絡也溫瘧發作有時則熱邪之傷及營衛也白薇清熱是其治矣別録主傷中淋露下水氣皆指熱鬱而言苦寒清之斯中氣安而淋露自通水道自利所謂利陰氣益精者則言其邪熱既除而陰精得所耳廣義陶弘景治驚邪風狂痓病百邪鬼魁海藏謂古方多用以治婦人以本草主治傷中淋露故也痓説文無此字玉篇廣韻皆訓惡也其實即痙字之隸變發明白薇之性本經謂之平而主治皆溫熱之邪則平當作寒別録乃作大寒當有所本考金匱竹皮大丸云有熱者倍白薇則白薇為寒是其確證凡苦寒之藥多偏於燥惟白薇則雖寒而不傷陰液精血故其主治各病多屬血分之熱邪而不及濕熱諸證蓋於清熱之中已隱隱含有養陰性質所以古方多用於婦女而別録有利陰氣益精之文蓋實有滋陰益精之效力初非因其能清熱而推廣言之也陶隱居稱其治驚邪風狂百邪鬼魅則邪熱去而陰精充斯正氣自旺鬼魅自遠亦實有真理非荒唐之空言可比此則白薇之寒涼既不嫌其傷津又不偏於濁膩誠清熱隊中不可多得之品凡陰虛有熱者自汗盜汗者久瘧傷津者病後陰液未復餘熱未清者皆為必不可少之藥而婦女血熱又為恆用之品矣正訛白薇雖亦苦寒之物而不燥不泄其弊最少繆仲淳經疏乃謂天行熱病不可服吾不知須菩提於意云何白前別録味甘微溫主胸脅逆氣咳嗽上氣呼吸欲絶發明白前專主肺家為治嗽降氣之要藥別録謂其微溫以其主治寒嗽則能疏散寒邪其性質必含溫養之氣也然白前治嗽亦不專於寒嗽一面即痰火氣壅上逆咳嗽亦能定之則又有似乎寒降是以蘇恭竟作微寒然其所以能止嗽者則在於平逆順氣使膈下之濁氣不上凌而犯肺斯肺氣得順其清肅之性而咳自除此以靜肅為用必不可遽謂其溫且古今主治恆用之於火逆氣升之證無不應手自當以蘇恭微寒之説為長凡寒邪寒飲之咳辛溫開肺別有專司固非白前之長技特微寒順氣非如沙參知母之寒涼直折亦非如桑根皮枇杷葉之清降遏抑故為定咳止嗽之主藥而絶無流弊雖不見於本經而別録主胸脅逆氣咳嗽上氣甚至稱其治呼吸欲絶可見其清肅肺家功效卓絶日華謂其主肺氣煩悶宗奭稱其能保定肺氣瀕湖謂其降氣下痰肺氣壅實而有痰者宜之皆足以表暴白前之功用無餘蘊矣程鍾齡醫學心悟止嗽散治新久咳嗽皆效方用荊芥紫菀白前百部桔根甘草陳皮為末新感生薑湯下久嗽米飲下皆每晚臨臥服三四錢立方極有深意實即本於外臺祕要引近效方之白前桔梗桑皮甘草治久咳唾血及深師方之白前紫菀半夏治久咳逆上氣體腫短氣脹滿晝夜不得臥喉中常作水雞鳴之白前湯兩方而程氏不用桑皮等之抑降又加荊芥陳皮之辛散再合紫菀百部之溫潤意理周密宜其投之輒效然非為散而臨臥服亦必不應其故何耶蓋欲其藥漬胃中遲遲消化借呼吸之氣熏蒸入肺收效乃捷制方選藥已極醇粹而服藥之法更別有巧思出人意表而確有實在並非故弄虛玄此中至理習醫者能體驗深思而得之方可許其共談此道也正訛白前順氣清肅肺金是其全體大用此外別無效力而日華本草且稱其治奔豚腎氣殆因其能降肺逆而推廣言之然白前性質甚輕所以主治上焦而不能下墜直降腎氣之治失其旨矣白前之與前胡功用頗近皆有下氣止嗽之效然前胡兼能散結白前止以順肺乃俗醫以前胡色白或則混稱白前胡或則竟誤認白前前胡為同用無別亦可怪也白茅根本經茅根味甘寒主勞傷虛羸補中益氣除瘀血血閉寒熱利小便其苗主下水別録下五淋除客熱在腸胃止渴堅筋婦人崩中正義白茅根甘寒清熱涼血本經稱其主勞傷虛羸補中益氣以寒能清熱甘能益陰邪熱不擾而津液敷布也除瘀血血閉寒熱者則血熱瘀結而營衛不通因發寒熱茅根涼血而能通導下行斯瘀者行閉者通而寒熱止矣小便不利亦以熱結言之其苗主下水亦清熱導水之效別本皆以此為名醫別録之文茲從孫氏問經堂本系之本經別録主五淋崩中除腸胃客熱皆言其清熱涼血之功效止渴則甘寒能生津也堅筋者筋為熱灼則軟短而拘攣清熱滋液斯筋骨堅強且茅根極長而其心又極堅韌故自有堅筋之能力別録一名地筋古人命名之意必有取義固非僅以其清涼而為此無謂之過譽也廣義日華主婦人月經不勻血脈淋瀝壽頤按此亦就血熱者言之非統治虛寒之愆期及血枯之淋瀝也但日華每稱月事為經脈血脈立言殊不妥當蓋經脈血脈包舉人身全體豈可作為婦女月事之別名而日華本草于丹參則曰調婦人經脈不勻於此又曰血脈淋瀝此等名詞最是笑語其書之陋劣即此可見一斑或謂此特字句間之小小齟齬耳苟於醫理無甚妨礙亦何必吹毛求疵好以攻擊前人為能事然名不正則言不順此乃全體大用萬萬不可含混如學者粗心讀過則眼熟手熟或且於無意之中強作東施之效顰恐通人見之必作三日惡矣瀕湖止吐血諸血肺熱氣喘水腫黃疸胃熱噦逆解酒毒石頑除伏熱主吐衄便溺諸血胃反上氣五淋氣痛及痘瘡實熱乾紫不起發明白茅根寒涼而味甚甘能清血分之熱而不傷於燥又不黏膩故涼血而不慮其積瘀以主吐衄嘔血泄降火逆其效甚捷故又主胃火噦逆嘔吐肺熱氣逆喘滿且甘寒而多脂液雖降逆而異於苦燥則又止渴生津而清滌肺胃腸間之伏熱能療消穀燥渴根長數尺一莖直達入土甚深故又能直趨下焦通淋閉而治溲血下血並主婦女血熱妄行崩中淋帶又通利小水泄熱結之水腫導瘀熱之黃疸皆甘寒通泄之實效然其甘寒之力清泄肺胃尤有專長凡齒痛齦腫牙疳口舌諸瘡及肺熱鬱窒之咽痛腐爛諸證用以佐使功效最著而無流弊乃隨處可得徵注當為微之誤賤品中純良之物李瀕湖謂世人因其易得而忽之乃從事於苦寒之劑致傷中和之氣皆未知茅根之真相者也禁忌石頑謂本經主勞傷虛羸以甘寒能滋虛熱而無傷胃之虞言補中益氣則胃熱去而中氣復皆以邪熱傷中漸成虛羸而言非治虛勞之本病也壽頤按虛勞之病本無寒涼主治之理此以中州熱邪言之以其灼鑠津液即為虛羸之源乃治之於勞熱發軔之初非治之於虛勞既成之後此中分寸次序自宜明辨否則中氣大虛再投寒劑未有不剿絶微陽速其隕滅者矣又按茅根治噦逆嘔吐專為胃火主劑若胃氣虛寒亦作厄逆則丁香柿蒂之主治證同而情異有識之士亦萬萬不致誤用俗醫治厄皆以丁香柿蒂一法熟在人口誤人最多幾不知有胃熱之厄惟瀕湖能言之知此公自有經驗而世俗竟不能用是亦讀書不多之陋近吾吳陸九芝封公世補齋文已備論之不佞輯入國醫針肓詳書其後讀者可互參之茅針本經主下水甄權治消渴藏器通小腸治鼻衄及暴下血瘡血節有膿未潰酒煮服一針一孔二針二孔茅花日華止吐血衄血柴胡本經茈胡味苦平主心腹去腸胃中結氣飲食積聚寒熱邪氣別録微寒除傷寒心下煩熱諸痰熱結實胸中邪逆五臟間遊氣大腸停積水脹及濕痹拘攣正義柴胡古本作茈胡今則通用柴字雖味苦而氣寒然性質輕清以升騰為用故凡寒熱之氣積滯不宣及痰食水停之不得疏通者得其升舉宣發則清陽敷布而積者化滯者行矣此本經所以主心腹腸胃中結氣並治飲食積聚寒熱邪氣而別録所以除傷寒心下煩熱並及痰熱結實胸中邪逆五臟間遊氣而又能治大腸停積水脹也皆就氣機窒滯而痰食水氣因以阻結者言之故以柴胡之輕清者鼓動其氣機則寒熱飲食痰結水停俱可治療此與破積導滯之義截然兩途非柴胡之能攻破積聚消痰逐水也其主濕痹拘攣者則陽氣宣布而絡脈通調斯痹著者行而拘攣者伸矣本經更有推陳致新及久服輕身明目益精之句亦謂其振動清陽之氣則氣血調和陳莝去而自然生新且清氣上升亦與明目益精之義本不相背然皆推廣言之而極意以形容其功效非用藥治病本旨且升清之藥過服則為害亦烈故刪之廣義潔古散肌熱潮熱寒熱往來膽疸皆以為散熱之用然只可少少佐使通達腠理暫為嚮導必非主任之才東垣謂能引清氣上行於陽分又能引胃氣升騰則芳香宣舉之功也又謂治瘧以柴胡為君則因其升發而能散寒熱耳又謂瘡疽用柴胡以散血結氣聚亦取其輕清散結之意瀕湖謂主治陽氣下陷即東垣升清之義也石頑謂脾胃有熱陽氣下陷柴胡能引清氣亦退熱故東垣補中益氣湯用之以引肝膽清陽之氣上行兼以升達參耆之力壽頤則謂柴胡能升清氣是升舉脾胃之氣而肝膽之氣必不可升教猱登木為害最厲石頑此説大不可訓發明柴胡味苦而專主寒熱名醫別録稱其微寒然春初即生香氣馥郁而體質輕清氣味俱薄則稟受升發之性與其他之苦寒泄降者性情功用大是不同本經別録主治多屬腸胃中食飲痰水停滯積聚之證則諸般積聚皆由於中氣無權不能宣布使然柴胡稟春升之氣能振舉其清陽則大氣斡旋而積滯自化徐洄溪謂其能於頑土中疏理滯氣蓋合於東方生髮之木德故能使土氣宣化而扶助肝木遂其暢茂條達之性正是木能疏土之本旨昔人每以柴胡為少陽藥者亦以其既具春升性質而又疏土達木最合少陽生髮之氣也其治外邪寒熱之病則必寒熱往來邪氣已漸入於裡不在肌表非僅散表諸藥所能透達則以柴胡之氣味輕清芳香疏泄者引而舉之以祛出邪氣仍自表分而解故柴胡亦為解表之藥而與麻桂荊防諸物專主肌表者有別此則所謂柴胡為少陽專藥而少陽之證屬於半表半裡者是也仲景小柴胡一方主治不一而必以寒熱往來胸脅苦滿心煩喜嘔或脅下痞硬而痛或乾嘔或往來寒熱休息有時如瘧等證為柴胡證蓋諸證皆屬少陽亦皆肝膽之氣鬱而不宣之證則邪已不復在表而亦未嘗及里既非表證又非里證無以名之乃名之為半表半裡蓋言病勢如此乃寒氣鬱結於半表半里之間非一半在表又一半在裡之謂正此而柴胡疏達肝膽之郁又能芳香透泄可以驅邪達表而散是為正當主治然昧者又因其可以達表而遽認為發表之品一見發熱動輒亂投是又大謬不然矣且柴胡證之嘔逆及胸脅痞痛諸症固皆肝膽木邪橫逆為患乃以柴胡之升騰疏泄者治之既非鎮攝之品何以能制剛木之橫則以病由外來之寒邪所乘肝膽之陽遏抑不得宣布失其條達之本性因而攻擾恣肆柴胡能疏泄外邪則寒鬱解而肝膽之氣亦舒木既暢茂斯諸證自已乃或又因此而謂柴胡能平肝膽之橫凡遇木火上凌如頭痛耳脹眩暈嘔逆脅肋痛等症不辨是郁非郁概投柴胡愈以助其鴟張是乃為虎傅翼則又毫釐之差千里之謬矣且柴胡之治寒熱往來本主外感之病也故傷寒溫熱濕溫諸病始則大寒大熱已而寒熱間斷發作有時胸脅不舒舌苔濁膩者斯為邪在半表半裡柴胡泄滿透表固是專司若乍病之時忽寒忽熱一日數作則邪在氣分尚是表病柴胡亦非其治若至病久氣虛亦復寒熱往來而脈見虛軟舌色光滑是謂虛熱又非邪盛之寒可比則柴胡升舉亦非所宜惟必審知其為脾陽不振中氣下陷則東垣補中益氣之方乃堪採用然升柴升清特其少少之輔佐品耳至如瘧病之寒熱往來既有不移時刻又似仲景小柴胡成法正為此證一定不易之主方然在寒熱方盛之初或多寒或多熱亦當分別見證各為治療並非用得一味柴胡便可自謂通治瘧病之祕鑰惟必至寒熱發作雖有定時而日至日晏則邪入漸深乃為正氣不足清陽下陷之候所謂陽病漸入於陰非柴胡升舉其清氣不能提出陰分還歸於表而病解則柴胡乃是必不可少之藥又瘧纏既久邪勢已衰而正氣亦憊是又所謂脾陽不振之候亦必以柴胡升舉中氣使其清陽敷布而後寒熱可止則須與補脾之藥並用東垣之補中益氣湯方最為合拍是乃虛瘧之宜於柴胡者此外則雖是往來之寒熱而柴胡亦非必用之藥矣乃歷觀古今議論信之者必謂柴胡為療瘧之主藥而畏之者且謂瘧病不當用柴胡是皆一偏之見徒以逞其辭鋒肆其攻擊而已吾未見其有當也若專論脾氣不振清陽下陷一證是為脾虛之候其原因於飢飽勞役傷其脾胃之陽因而氣息奄奄精神疲憊或能食而無氣以動或不能食而倦軟異常而又絶無別種見症但面色萎黃形神委頓脈來濡弱而已此惟藜藿之體操勞耐苦及服田力穡任勞任餓或受風雨寒冷傷其脾氣者乃有是證則宜補養脾土而少少升舉其下陷之清陽投之輒效東垣之升陽益氣等方皆為此病而設蓋東垣當時值金之末世大兵大疫其人民流離顛沛皆受飢飽勞役寒風淒雨之傷最多此種病證所以一生事業習用升麻柴胡幾如朝饔夕飧之不可一日而缺而脾胃之論尤其生平絶大著作專為此證而設是又應用柴胡之一端而膏粱之體及大邑通都之中此證有百不得一則雖有此升清舉陷之妙法又將苦於無所用之乃或者又謂東垣佳方無施不可開口益氣動手升柴如薛立齋趙養葵輩吾究不知其從何處覓得此許多對藥發病之人也若夫富貴之家晏安之輩恆多虛證則又嗜欲之害下元之傷同是虛也而病證絶異方且陰薄於下陽浮於上滋填潛鎮之不遑又安得漫與升清致令木已搖而速之立蹶乃或者又謂柴胡能通治虛勞發熱不又荒謬之尤者乎約而言之柴胡主治止有二層一為邪實則外寒之在半表半裡者引而出之使還於表而寒邪自散一為正虛則清氣之陷於陰分者舉而升之使返其宅而中氣自振此外則有肝絡不疏一證在上為脅肋搘撑在下為臍腹䐜脹實皆陽氣不宣木失條達所致於應用藥中加入少許柴胡以為佐使而作嚮導奏效甚捷此則柴胡之真實功用以外別無奧義凡古今各家之論苟有不合此三層作用者皆其立説之不無可議者也正訛柴胡稟春升之性而以氣勝故能宣通陽氣祛散寒邪是去病之藥非補虛之藥在脾虛之病用之者乃少許引導作用藉其升發之氣振動清陽提其下陷以助脾土之轉輸所以必與補脾之參耆術並用非即以柴胡補脾也甄權藥性論謂治熱勞骨節煩疼虛乏羸瘦蓋亦指脾氣不振清陽陷入陰分者言之故下文更有宣暢氣血四字明謂此是氣血不暢用柴胡以振舉其清氣則氣血自能宣暢且可透泄其熱斯為熱勞羸瘦之正治初非謂勞瘵既成之後血液耗竭灼熱將枯而亦以柴胡升散之也乃後人不知辨別竟誤以為勞瘵通治之良方日華本草竟有補五勞七傷之句以升陽散寒之藥而妄稱為補大錯鑄成實源於此潔古因之亦直以除虛勞三字為言蓋至此而柴胡遂為虛勞之專主矣亦知勞有五臟之分虛亦有中下之異而無不發內熱者心脾之勞陽氣鬱結而為灼熱以柴胡升舉而泄散其熱宜也若肝腎之勞陰精耗爍而為蒸熱亦以柴胡拔本而發揚其熱可乎中虛之熱為陽入於陰此柴胡提出陰分是使之返歸本位如人墜深淵挈之登岸是也若下虛之熱為陰出之陽亦以柴胡舉之上升是使之脫離根底如百穀麗土拔之石上可乎況東南之人體質多薄陰液本虛而在膏粱之家又復多逸少勞嗜欲不節肝腎陰虛十恆八九而脾胃陽虛十不一二則治虛熱而不辨陰陽浪用柴胡者真殺人惟恐其不速矣寇宗奭已謂柴胡治勞誤世甚多若無實熱不死何待張景嶽亦謂柴胡善泄善散大能走汗大能泄氣凡病陰虛水虧而孤陽勞熱者不可再損營氣固未有散而不泄氣者亦未有汗而不傷血者陰既虛矣又何可再損其陰雲云皆是剴切詳明之論若王海藏之所謂産後血熱必用柴胡李瀕湖之以治小兒五疳羸熱則皆含渾言之其流弊固不淺也仲景少陽病以胸脅滿痛心煩喜嘔脅下痞滿等為柴胡證本為外感之寒遏抑正氣肝膽剛木不得條達故以柴胡疏散其寒使肝膽之氣條暢而諸證自安前已明言之矣乃淺者猶因此而誤認柴胡統治肝病遂於肝火凌厲之頭痛眩暈耳鳴耳脹目痛耳聾脅痛䐜脹等症亦復以柴胡為必需之品不知其非外寒遏抑是為木火自旺法宜潛陽泄降為亟而亦妄與宣散適以張其烈焰不至痛徹頂巔脹塞胸膈不止是又藉寇兵而賚盜糧治病反以增病皆粗心讀書知其一不知其二之弊千里毫釐誤人最捷然潔古亦止謂柴胡治心下痞胸脅滿瀕湖綱目且謂平肝膽三焦包絡相火及頭痛眩暈目昏赤痛障翳耳聾耳鳴景嶽亦謂治肝膽火炎胸脅結痛少陽頭痛又皆囫圇吞棗最易有抱薪救火之禍俗醫之不知辨別實即諸先輩有以教之也惟遇諸般肝膽實火之證能於潛攝抑降隊中少加柴胡二三分以疏肝氣藉作嚮導或亦有效近人用醋炒柴胡即為此等證治而設固不可漫不加察而誤認肝家主將無施不可也仲景本論熱入血室證凡三條而以小柴胡湯主治者獨繫於經水適斷之一條此之適斷蓋謂月事已淨而自然停止非以熱盛灼爍成瘀而半途中止是其血室空虛而邪熱因以陷入故宜以柴胡提其下陷之熱邪而大棗參甘補虛諸品恰合分寸本論此節其血必結四字必是經水適來兩條中之錯簡不然豈有其血已結而不為攻破反投以參棗補住其瘀之理古今注家望文生義皆不可解觀其經水適來兩條一則曰胸脅下滿如結胸狀譫語者此為熱入血室當刺期門隨其實而瀉之一則曰晝日明瞭暮則譫語如見鬼狀此為熱入血室無犯胃氣及上二焦必自愈豈非以發熱之時適值月事與夫既熱之後月事本未及期而熱逼經行者皆為血室熱盛之候熱邪深入其血為瘀故宜刺肝之募穴期門以瀉肝經實熱並宜破血攻瘀直疏下焦因以無犯胃氣及上二焦為戒尋繹此經水適來兩條皆為實證則經水適斷一條明是虛證兩兩對勘極為曉暢而適斷者之主以柴胡參棗等藥其旨尤顯然則適來兩條之萬萬不能視同一例而主以小柴胡湯者亦可於言外得之今人治熱入血室之晝日明瞭暮則譫語如見鬼狀者恆用桃仁承氣等逐瘀之品其效最捷皆是熱逼經行經水適來之證治而如仲聖所謂適斷之熱入血室宜於小柴胡之證殊不多有即有熱盛而經水適斷者亦是熱邪蒸灼瘀而不行之適斷亦宜逐瘀必不可徒讀父書謬引小柴胡湯一法助桀為虐陸九芝世補齋前集陽明病釋第二卷於經水適來暮則譫語如見鬼狀一條釋之曰此言譫語之來路有不同熱入血室亦能譫語而病則不在胃即非承氣之證故曰無犯胃氣仲景於熱在血室必曰無犯胃氣則仲景於熱在胃氣必曰無犯胃氣注胃氣世補齋醫書作血室可知可證九芝意中於經水適來兩條亦知為血瘀之實證宜逐瘀而不宜於小柴胡湯奈何王海藏竟謂經水適來適斷易老俱用小柴胡湯加以四物湯及秦艽丹皮等為調經之劑易老此法非惟不辨虛寒注寒疑為實之誤且合用四物尤其庸陋更不可訓李氏綱目亦謂柴胡治熱入血室石頑逢原亦謂必用柴胡而徐靈胎之傷寒類方竟於如見鬼狀一條補出治以小柴胡湯之説尤為可駭夫以徐氏之高明而猶有此不辨虛實之謬宜乎今人讀書大非易事壽頤謂果以柴胡治經事適來之實熱證勢必瘀熱更熾陽氣上浮不僅助其昏憒可使發狂而逾垣上屋亦可使其逆經倒行變為吐衄嘉善沈堯封氏女科輯要所載熱入血室治案數條皆以誤服柴胡加劇壽頤曾為沈氏書作箋正二卷論之甚詳可互證也銀柴胡發明柴胡古以銀州産者為勝宋之蘇頌已有是説陳承亦謂銀夏者最良然雖有其説而尚未分用故瀕湖綱目仍未顯為區別仲淳經疏則已稱俗有兩種色白黃而大者為銀柴胡以治勞熱骨蒸色微黑而細軟者為北柴胡以解表發散然繆氏又謂其優於升散而非治虛熱之藥至張石頑逢原乃特出銀柴胡一種稱其甘而微寒清熱而能涼血謂和劑局方治上下諸血龍腦雞蘇丸中用之凡入虛勞方中惟銀州者為宜而北柴胡則升動虛陽發熱喘嗽愈無寧宇不可混用且又謂本經推陳致新明目益精皆指銀夏産者而言其推崇銀柴胡可謂極至今之二種分用者蓋即石頑提倡之力而以今之功用言之治虛熱骨蒸自有實效斷非北柴胡之升陽泄肝可比然則古人謂柴胡為虛勞之藥者亦指銀柴胡言之也趙恕軒綱目拾遺謂熱在骨髓非銀柴胡莫療則以治虛勞肌熱骨蒸熱勞瘧熱從髓出及小兒五疳羸熱蓋退熱而不苦泄理陰而不升騰固虛熱之良藥苟勞怯而未至血液枯絶以此清理虛火之燥灼再合之育陰補脾尚可徐圖挽救非北柴胡之發泄者所可同日語也前胡別録味苦微寒主療痰滿胸脅中痞心腹結氣風頭痛去痰實下氣治傷寒寒熱正義前胡之味別録謂之苦甄權則曰甘辛乃降氣消痰散結而亦能解表散熱疏風甄權稱其辛平蓋即因此主療痰滿胸脅痞心腹結氣去痰實下氣皆降氣消痰散結也治風頭痛則疏風之效治寒熱則解表而亦清熱矣廣義甄權去痰實治時氣內外俱熱日華治一切氣破癥結開胃下食主反胃嘔逆氣喘咳嗽瀕湖清肺熱化痰熱散風邪景嶽治火痰開氣逆結滯仲淳謂能散有餘之邪熱實痰發明前胡微苦而降以下氣消痰為長故能散結而泄痞滿又寒能勝熱辛能散邪故又治傷寒時行之寒熱主風邪頭痛亦感冒表證之藥也陶弘景謂似柴胡而柔軟治療殆同本經無此而近來用之則古時似與柴胡無別石頑謂柴胡前胡同為風藥但柴則主升前則主降耳瀕湖謂下氣治痰熱喘嗽嘔逆以氣降而火降痰亦降也禁忌仲淳謂前胡治實邪熱痰凡真氣虛之逆滿及陰虛之寒熱不用石頑亦謂治氣實之風痰而陰虛火動之痰禁用防風本經味甘溫主大風頭眩痛惡風風邪目盲無所見風行周身骨節疼痹痹太平御覽引作痛別録辛煩滿脅痛脅風頭面去來四肢攣急字乳金瘡內痙葉主中風熱汗出正義防風通治一切風邪故本經以主大風三字為提綱頭痛惡風及風邪而目盲無所見其外感風邪之盛可知風行周身而骨節為之疼痹亦風邪之深且重者而防風皆治之誠風藥中之首屈一指者矣別録主煩滿脅痛亦風淫於外而遏抑其清陽之氣不得宣布也脅風二字太不經見而下文接以頭面去來一句則所謂風者蓋即指頭面去來之風邪脅字疑誤瀕湖綱目引此無脅字亦疑而刪之也四肢攣急即本經風行周身骨節疼痹之證字乳者産育乳子之時金瘡則破傷也內痙二字直接字乳金瘡作一句讀即新産之中風及破傷風二證皆有發痙一候是血虛而內風煽動非外來之風邪故曰內痙而防風亦能通治頗似合外風內風而一以貫之然古人於中風一證無不從外來風邪治療是以産後發痙角弓反張千金外臺均用豆淋酒後方純以發表祛風為主究竟産後痙厥金瘡破傷兩者雖自有猝為寒風所來宜於解表之一證要知二者皆在血脫之後陰不涵陽肝風內煽發為痙瘛尤其多數此則宜於潛陽息風鎮定為亟萬不可再用風藥助其暴戾古人板法直同鴆毒別録內痙二字必非防風之辛溫發散者所可妄試凡讀古書不可不窺破此中疑竇者也廣義日華治三十六般風潔古治上焦風邪瀉肺實散頭目中滯氣經絡中留濕東垣治脊痛項強不可回顧又治瘡瘍在胸膈以上能散結去風發明防風為風病之主藥本經所主皆風門重證故首以主大風一句表揚其功用則驅除外風兼能通痹起廢其效最弘本經列於上品正以其足當大任而推重之非無故也後人但以為感冒風寒輕疏發散之用未免視之太淺而東垣且謂之為卒伍卑賤之職抑何薄之至於此極禁忌防風為泄風上劑然以走竄宣散成功必其人氣血充足體重堅實猝為外邪所乘乃能任此辛溫宣泄而無流弊凡古人治風諸方皆不能輕用於今時東南之人者以質脆陰薄不能勝此燥烈之性也防風雖不至如烏附薑辛之剛烈然溫燥之氣臭而可知確是溫辛一類故治吾鄉柔脆之人常須識得此中消息方不至徒讀父書誤人生命所以溫熱之風邪外受凡柴葛羌防皆當審慎而肝陽之動風血虛之風痙又必柔潤息風方為正治散風諸劑非徒無益而又害之繆仲淳已謂南方中風血虛痙急陰虛盜汗陽虛自汗皆忌防風石頑亦謂婦人産後血虛發風嬰兒瀉後脾虛發搐皆為切禁洵是見到之語獨活本經味苦平主風寒所擊金瘡止痛賁豚癇痓女子疝瘕別録微溫療諸賊風百節痛風無久新者正義獨活為祛風通絡之主藥本經主風寒所擊祛風之正治也主金瘡止痛蓋指風邪外襲之破傷風則能祛風而止其痛非能止血脫發熱之瘡痛也賁豚本屬腎水之邪上湧溫辛下達故亦治之癇痓亦因風動而發然寒風固宜於獨活而痰火生風非其治矣別録療賊風及百節痛風無問久新則芳香走竄固無微不至亦防風之流亞也廣義甄權治諸中風濕冷奔喘逆氣皮膚苦癢手足攣痛不遂口面喎斜遍身𤸷痹血癩日華治一切風氣筋骨攣拳關節疼痛東垣治風寒濕痹痠痛不仁頸項難伸海藏去腎間風邪治項強腰脊痛潔古治兩足濕痹不能動散癰疽敗血發明獨活氣味雄烈芳香四溢故能宣通百脈調和經絡通筋骨而利機關凡風寒濕邪之痹於肌肉著於關節者非利用此氣雄味烈之品不能直達於經脈骨節之間故為風痹痿軟諸大證必不可少之藥惟古時羌活獨活未嘗分別故古書以獨活通治內外上下諸證凡頭面肢體無一不在獨活範圍之內自宋以來則羌活別為一條而芳香之氣尤為濃郁則徹上旁行合讓羌活占其優勝而獨活之味較厚則以專治腰膝足脛等證雖古人尚未明言而海藏已謂羌活氣雄獨活氣細石頑亦稱其升中有降皆隱然有上下之別壽頤業師朱氏家法恆以獨活治下凡自腰及小腹以下通用獨活不僅風寒濕氣痿痹痠痛可以立已即瘍證之發於陰分者未潰易消已潰易斂功績顯然確乎可信此古人未嘗明言之奧旨也互詳下文羌活條正訛羌獨活皆辛溫之質主治風邪以外來之寒風言之故所治皆寒濕之證古恆以羌活治傷寒表病並及四時不正之表邪固皆指寒邪而言也若大江以南地氣溫暖寒風恆少昔人久稱南方無真傷寒病而四時外感又皆風熱雖有表邪亦非羌活等之辛散溫升所宜此荊防敗毒散九味羌活湯柴葛解肌湯等方古書皆稱四時感冒之神劑而江浙所不任用者亦病情病證之使然也且辛溫之不宜於東南又非僅時病已也即如羌獨本屬風寒濕邪痹著痿躄之良藥而在此邦之人陰血素薄即有是證亦半由於血虛而來果屬風寒亦系血虛生風氣虛主寒與西北之風痹悉因於賊風大寒者證情亦復大異而一味辛溫剛燥之藥又須隨時留意不容信筆塗鴉無所顧忌矣而東垣竟謂獨活治諸風掉眩潔古亦謂與細辛同用治少陰頭痛眩運海藏又謂搜肝風瀉肝氣則所述諸病皆屬陰不涵陽肝腎不攝之證明是內虛生風非外來賊邪可比潛藏鎮定之為宜何乃以溫升之藥助其狂肆抱薪救火之禍捷於影響最宜慎用然如著痹痿躄諸候又多氣血虛寒不得流利苟非羌獨辛散亦難速效則病本雖屬血虛又宜於養血滋液之中參入宣絡溫運徐圖奏績而石頑逢原又謂氣血虛者之痹痿肢節痛禁用羌獨又未免一偏之見非通論矣蓋羌獨治風本治外邪侵入之寒風非能治血虛內發之熱風所以肝陽眩暈必非辛溫升泄所能妄治若犯斯禁則烈焰愈騰燎原可畏然氣血虛寒而痿躄不仁非吹以和煦之氣亦不能振作有為春回黍谷所以滋調血液之劑亦必以宣通溫養之藥相輔而行但佐使之功止可少少參加用作引導不得喧賓奪主耳石頑乃欲一例禁絶之何耶壽頤按潔古所謂獨活與細辛同用治少陰頭痛眩暈一證蓋指腎臟真寒水邪上溢汩沒陽氣之真頭痛言之其證大寒大痛手足厥冷指爪青黑朝發夕死無藥可救惟用參附大劑合羌獨細辛等溫養真陽庶幾希冀什一立説未嘗不是固非指肝腎虛陽上凌之頭痛眩運也但措辭太嫌籠統不為辨別則一是真寒一是浮火病情大異治法殆若天淵學者誤認貽禍不小爰為申而明之羌活發明羌獨二活古皆不分本經且謂獨活一名羌活所以本經別録止有獨活而無羌活李氏綱目尚沿其舊然二者形色既異氣味亦有濃淡之殊雖皆以氣勝以疏導血氣為用通利機關宣行脈絡其功若一而羌活之氣尤勝則能直上頂顛橫行支臂以盡其搜風通痹之職而獨活止能通行胸腹腰膝耳考甄權藥性本草已分羌獨各為一條而所言治療尚無甚區別唯張潔古謂羌活與川芎同用治太陽少陰頭痛透利關節治督脈為病脊強而厥王海藏亦謂羌活氣雄治足太陰風濕相搏頭痛肢節痛一身盡痛者非此不能除二家之言深識羌活雄烈之真相壽頤師門恆以羌活專主上部之風寒濕邪顯與獨活之專主身半以下者截然分用其功尤捷而外瘍之一切風濕寒邪著於肌肉筋骨者亦分別身半以上身半以下而以羌獨各為主治若在腰脊背膂之部或肢節牽掣手足上下交痛則竟合而用之宣通絡脈更為神應固不僅內科著痹應手輒效而外科之風寒濕邪亦莫不投劑立驗考景嶽石頑等諸家本草皆以羌獨各立條目猶未分晰羌活主上獨活主下之治但自潔古以來亦已隱隱微露其端倪茲特揭而出之為學者明示以準則而發明從古未伸之義蘊蓋二活之宣通關節既有同功而唐宋以後必為區別之者其微義正在於此庶乎各有專主而是物之長技亦顯矣壽頤又按羌活本含辛溫之質其治療宜於風寒風濕而獨不宜濕熱以濕邪化熱即為溫病似無再用辛溫之理然此惟內科證治為然若外瘍之屬於濕熱者苟腫勢延蔓引及骨節筋肉伸縮不利非以羌獨之善走宣通為治則效力必緩故雖熱病亦不避用但僅以為嚮導而任佐使之職則分量甚輕其主任之君藥固猶是理濕清熱之正劑此亦發表不遠熱之大旨非抱薪救火者所得以為藉口也秦艽本經秦艽味苦平主寒熱邪氣寒濕風痹肢節痛下水利小便別録辛微溫療風無問久新通身攣急正義秦艽能通達關節流行脈胳亦治風寒濕痹之要藥本經主寒熱邪氣蓋即指寒熱之邪客於肌肉筋絡骨節間者秦艽善行百脈故以為主本經之所謂肢節痛別録之所謂通身攣急皆風寒濕三氣之邪留於肌腠著於骨節者又能下水利小便亦通達百脈故能驅濕下行耳廣義甄權利大小便療酒黃黃疸解酒毒去頭風潔古除陽明風濕及手足不遂口噤牙痛口瘡療腸風瀉血海藏泄熱瀕湖治胃氣景嶽謂為手足陽明清火之藥解溫疫熱毒除煩渴及婦人胎熱小兒疳熱瘦弱石頑治婦人帶疾發明秦艽之艽本從草下丩取糾結之意玉篇本作艽孫氏問經堂所刻本草經從之今皆作艽或作芁者皆其變體非從草下九及几也其根入土甚深互相糾結故以為名而能通行經絡流利骨節名義功用皆從此出其氣味則本經謂之苦平而別録加以辛及微溫以其主治風寒濕痹必有溫通性質也然其味本苦其功用亦治風熱而能通利二便已非溫藥本色後人且以治胃熱黃疸煩渴等症其非溫性更是彰明較著考本經別録主治功在舒筋通絡流利骨節惟治痹痛攣結之證蓋與防風羌獨同類之品甄權之治頭風即祛風也惟又稱其利大小便亦與本經下水利小便之旨相合蓋秦艽之根曲折通達既能外行於關節亦能內達於下焦故宣通諸府引導濕熱直走二陰而出昔人每謂秦艽為風家潤藥其意指此因之而並及腸風下血張石頑且謂其治帶皆從濕熱有餘宣泄積滯言之非統治諸虛不攝之下血帶下也又就其導濕去熱而引伸之則治胃熱泄內熱而黃疸酒毒牙痛口瘡溫疫熱毒及婦人懷胎蘊熱小兒疳熱煩渴等證皆胃家濕熱而秦艽又能通治之矣約而言之外通經隧內導二便是其真宰而通絡之功又在理濕之上要之皆以濕阻熱結一面著想而氣虛血弱之證皆非其治仍與川斷絡石等味異曲同工耳正訛秦艽之根以互相糾結得名故陶弘景謂相交而長大者佳無所謂左右也乃劉宋時之雷斆妄為區別竟謂左文為秦右文為艽杜撰可笑秦是地名艽是物理而可分以為二不通孰甚乃後人偏能為應聲之蟲皆以左者為佳不知草之根荄隨便糾結孰為左而孰為右將從何處分辨定斷亦猶牡蠣本無頭足定形而可謂左顧者佳均是無中生有指鹿為馬考雷氏之炮炙論詞句鄙俚本無足取因其書竟稱為雷公炮炙論而無識者流甚至誤認為黃帝時之雷公轉相援引李瀕湖亦悉收入本草綱目徒亂人意是亦吾國藥物學之怪現象也秦艽治熱本因其能通利二便遂以胃熱濕熱諸證一概歸其主治然皆治實熱非虛熱也自日華本草插入主傳尸骨蒸一語而俗醫又以為勞瘵身熱之要藥於是陰虛煩熱率以秦艽柴胡錯綜相間自謂已握治勞之祕鑰不知苦能傷胃寒能傷脾寧不輕者至重重者致死而病者醫者皆不覺悟則日華其作俑者也李東璧謂黃疸煩渴之用秦艽取其去陽明之濕熱也陽明有濕則身體痠疼而煩熱陽明有熱則日晡潮熱而骨蒸其説甚是清徹蓋其能治潮熱骨蒸亦皆胃有實熱之證而謬者遂以移之於虛熱其相去不太遠耶若小兒疳熱亦惟實證為宜挾虛者審之石頑亦謂肢體疼痛或浮腫挾有客邪者用以祛風利濕方為合劑若久痛虛羸血氣不能養而痛及下體虛寒痠疼枯瘦而小便清利者咸非所宜狗脊本經味苦平主腰背強關機緩急周痹寒濕膝痛頗利老人膝今作膝別録甘微溫療失溺不節男子腳弱腰痛風邪淋露少氣目暗堅脊利俯仰女子傷中關節重關機似當作機關以舊本皆如此仍之正義狗脊溫養肝腎能驅除風寒濕三氣為健腰膝利關節通經脈之藥腰背強膝痛腳弱腰痛及失溺不節淋露皆肝腎不攝之病也機關緩急周痹寒濕關節重則風寒濕三氣之病也老人肝腎已衰機關窒滯溫養而流利之則為養老之要藥矣別録主風邪者亦指痹著之風邪言之目暗亦肝腎陰虛之證也堅脊利俯仰主女子傷中皆伸言其效力耳廣義甄權主毒風軟腳腎氣虛弱續筋骨瀕湖強肝腎治風虛趙恕軒綱目拾遺金毛狗脊治頑痹皆本經別録之緒餘也發明狗脊本有二種一種似狗之脊骨古之所用也一種有金毛而極似狗形今謂之為金毛狗脊瀕湖綱目已備載之趙氏拾遺據職方典謂出於粵西之南寧府即蕨根也按此物雖藏之多年拔盡其毛尚能自生不多時而茸茸如故可見其生機洋溢雖枯稿而餘氣盎然今之所用皆即此種故能溫養肝腎通調百脈強腰膝堅脊骨利關節而驅痹著起痿廢又能固攝沖帶堅強督任療治女子經帶淋露功效甚宏誠虛弱衰老恆用之品且溫而不燥走而不泄尤為有利無弊頗有溫和中正氣象而人多忽之不以為重殊可惜也正訛繆氏經疏謂腎虛有熱小便不利或短澀赤黃口苦舌乾者忌用蓋以其性溫而示之禁例也然狗脊性溫乃溫和溫養之意非溫熱溫燥之例如果肝腎之虛陰不涵陽以此固攝下元引經嚮導亦無不可千年健發明千年健僅於趙氏本草綱目拾遺見之引朱氏柑園小識謂産於交趾及廣西氣極香烈可入藥酒治風氣痛壯筋骨今恆用之於宣通經絡祛風逐痹頗有應驗蓋氣味皆厚亦辛溫走竄之作用也象貝母本經貝母味辛平主傷寒煩熱淋瀝邪氣疝瘕喉痹乳難金瘡風痙別録苦微寒療腹中結實心下滿洗洗惡風寒目眩項直咳嗽上氣止煩熱渴出汗考證貝母今有兩種川産者形小而氣甚淡謂之川貝浙産者形大味苦謂之象貝又稱浙貝亦曰大貝母以其顆粒較大然産地頗多不獨生於浙寧之象山但尋常之土貝母味尤苦劣不如浙産為佳今之醫家僅以貝母為清肺化痰之用但知川産者為佳則因其氣味平和遂謂為味甘補肺實則市肆之川貝淡泊無味絶少功力而風熱痰壅氣逆胸滿等證非象山貝母不為功考詩之言採其虻管子地員篇之其山之旁有彼黃虻皆即爾雅之莔貝母亦即今之貝母可見齊衡之間本多此物且其時蜀道未通必非川産且諸家本草詳載貝母出産之處並未及於川蜀頗不知今人崇尚川貝何所緣起考貝母命名之義以其形似貝子也貝子種類良多其最小者即今之所謂貝齒大加人指亦惟象貝之橢圓者可以比擬而川貝則大如豆粒小如苡米又頗不類再以氣味氣注氣疑衍言之則本經稱其辛別録謂之苦又惟象貝苦而有氣猶近於辛若川貝則絶淡強名之苦已大不然而辛於何有更以本經別録所言主治證之則傷寒煩熱腹中結實心下滿咳嗽上氣皆惟象貝苦寒泄降是其正治斷非川貝輕微淡遠所能勝任此則少知醫理粗有經驗者當皆能知之而共信之亦不特智者而後能辨也石頑逢原已謂浙産治疝瘕喉痹乳難金瘡風痙則昔人已有明見及此者實則古方所用之貝母無一非此近道之土産博考古書隱隱可以識別特未有人顯為揭出耳而川貝入藥且不知昉於誰氏無如庸俗之輩耳食者多方且以道遠價貴為奇珍而象貝等之功在生民者則以近而易得敝屣視之猶幸習用久沿功力卓著尚堪與前賢著述互相印證不致淹沒失傳須知藥以治病生命所寄疑是疑非所關甚巨不得以耳為目附和盲從竟以遠來之物為可貴而鄙夷目前所易有者不為剖晰其功能也爰以古來主治之屬於象貝者悉繫於此而別以川貝附録於後雖似故為翻案未免駭人聽聞實則平情論之理固如此效力昭昭不可誣也好學之士試就古書之記述而合以主治之功能細為研究或不以此言為刺謬乎正義象貝母苦寒泄降而能散結本經主傷寒煩熱淋瀝邪氣別録止煩熱渴出汗皆泄降除熱也疝瘕以熱結而言泄熱散結故能治之喉痹熱之結於上者也乳難之乳即孳乳之乳指産難也貝母滑降且能散結故催生而治産難甄權藥性論謂貝母作末酒服治産難及胞衣不出近人保生無憂散一方為催生保産靈藥內有貝母程鍾齡釋之謂貝母滑潤義皆本此而注本經者僅以為下乳汁恐非真旨主金瘡者苦降清熱之功也不僅可以內服亦可外作摻藥後人以象貝通治陽症癰瘍消腫退熱殊有捷效亦本於此主風痙者苦寒清熱泄降定風之功也別録療腹中結實心下滿皆指邪熱窒塞之證苦泄散結故皆主之洗洗惡風寒者則風寒外襲於皮毛內合於肺象貝清泄肺氣而辛能疏散其效可知目眩為肝陽之上乘項直為風邪之外感苦降息風辛泄疏散治之宜也咳嗽上氣又痰熱之侵肺苦泄清金而又降逆之功用也詳繹本經別録所主各證皆惟象貝母之苦泄辛散足以當之非必川貝之淡泊而無味者所可混同施治者也廣義日華消痰止嗽甄權主胸滿逆氣時疾黃疸散項下癭瘤成無己謂辛散苦泄用以下氣蘇頌治惡瘡陳承謂能散心胸鬱結之氣故詩稱言採其虻本以不得志而云然今用以治心中不快氣結悶郁者殊有功效詩人之言信矣景嶽謂解肝家鬱結散心下逆氣肺痿肺癰膿痰喘嗽主熱實結胸乳癰流痰結核瘰癧降痰逆消脹滿清肝火明耳目解熱毒吐血衄血血淋便血溺血主一切癰瘍腫毒濕熱惡瘡痔漏金瘡出血火瘍疼痛為末可敷煎湯可服性味俱厚較之川貝清降之功不啻數倍石頑謂肺受火束因而生痰或為邪熱所幹喘嗽煩悶非此莫治浙産者治疝瘕喉痹乳難金瘡風痙一切癰瘍仲景之當歸貝母苦參丸治妊娠小便難合連翹治頸項結核皆其開鬱散結化痰解毒之功也趙恕軒本草綱目拾遺引葉暗齊云象貝苦寒解毒利痰開宣肺氣治肺家風火痰嗽為宜若虛人咳嗽則宜川貝又引百草鏡云土貝母各處皆産形大如錢安徽六安江南宜興浙江象山皆有之味苦微寒能散癰毒化膿行滯解廣瘡結毒除風濕利痰敷惡瘡斂瘡口又引茅昆來筆記味大苦消癰疽毒痰楊梅結毒非此不除發明象貝母味苦而性寒然含有辛散之氣故能除熱能泄降又能散結本經治傷寒煩熱別録主洗洗惡風寒今人乃以通治風熱濕熱時氣熱邪則寒能勝熱辛能散邪也本經治淋瀝疝瘕別録療腹中結實心下滿咳嗽上氣仲景則治寒實結胸而後人主鬱氣痰核等證則辛散苦泄開結散郁也本經治乳難後人以之催生下乳又其泄降之餘義至於治疸治瘍清喉咽主吐衄療痰嗽通二便種種功用無非清熱泄降四字足以賅之要之皆象貝之功用而市肆通行之川貝則淡泊異常斷不足以語此乃或者猶復誤認川貝價高十倍恆欲以本草所述貝母之大功悉以歸之於川産張石頑且有川産者味甘最佳之説又何論乎庸庸之俗子盍亦於臨證之時潛心體察而一較其功績之優劣耶正訛貝母之於半夏俗醫恆以為通用之藥一見咳嗽有痰往往互相更換龐雜亂投實則一燥一潤一以健脾一以清肺各有專長豈容相混汪石山已謂俗以半夏有毒代以貝母不知貝母主肺家之火半夏主脾胃之濕何可相代若虛勞咳嗽吐血咯血肺痿肺癰婦人乳癰及癰疽諸郁之證半夏嫌燥以貝母為嚮導可也若脾胃濕熱生痰因而氣逆上凌豈貝母所能代乎張景嶽亦謂半夏貝母俱治痰嗽但半夏兼治脾肺貝母獨善清金半夏用其辛貝母用其苦半夏用其溫貝母用其涼半夏散寒貝母清熱性味陰陽大有不同俗以代用其謬孰甚繆仲淳亦謂寒痰濕痰非貝母可治李士材又謂腎虛水泛成痰非其所司而石頑亦謂其寒潤治肺家燥痰半夏性燥治脾胃濕痰兩者天淵何可混用諸説皆最明晰辨之極細惟虛勞咳嗽一證如其邪熱甚熾消爍肺金貝母清降固猶可用若其陰虛火動象貝苦寒已宜相度其火焰之盛衰而與為消息進退不得恣肆過以戕生氣如至虛甚則不獨象貝苦降非所宜投即以川貝之淡亦含寒潤之性傷中敗脾當知顧慮弗謂川貝甘能補肺一往無前死而後已也彼未專以二母二冬之類加減出入以治勞損咳嗽者則專以殺人為天職前已論之茲勿重贅考貝母之名自瀕湖綱目以前尚無川象之分景嶽之本草正則已於貝母之外別出土貝母一條至石頑逢原則曰川者味甘最佳西者味薄次之象山者味苦又次之一種大而苦者僅能解毒象山貝母之名始見於此然據其所言以一種大者特提即景嶽之所謂土貝母也頗似石頑之所稱川者西者象山者皆不如土貝母之大然今則市肆通行象貝土貝其形皆大絶不與川貝相類矣趙氏拾遺又引百草鏡曰出川者曰川貝有一種出巴東者獨大出陝西省名西貝又號大貝且川中更有大者一種搗粉作漿不入藥用則皆土貝之類矣然則川産之小者為一種而各處及象山所産者為一種不必於象貝之外更別立一土貝母之名矣茲故不復以象貝土貝分晰云象貝之用世恆以為消痰止咳輔佐之品司空見慣往往視為無足輕重不知降氣化痰且能除熱解結其力頗猛抑且破堅消核治癰腫癧瘍痰核其效甚速則其性之峻利尤可想見故用之得當其功奇捷而用之過劑為害亦巨且苦寒泄降無不傷脾敗胃而人多忽之亦不可不察者也川貝母發明川産之貝母今人恆視為貴重之品每以為功用必在象山貝之上然考古書竟無川産之説則古人本不以川貝為珍品且貝母之為用雖多約言之僅苦寒泄降而已川産不苦而淡已失貝母之作用後人強以甘字加之乃市肆所售之物其甘又復何在惟趙氏拾遺引用藥識微有龍安所産一種龍安四川舊府屬稱其皮細白而帶黃斑其味甘謂為川貝中之第一不可多得則雖有此甘味之一種而非普通之品但以今時臨證所得之川貝功力言之其效力固遠在象貝之下雖曰虛人痰咳不宜象貝之苦寒然用川貝其功效亦不可見而世俗珍之者徒以價值漸昂以耳為目作坡公想當然之意見耳石頑雖謂川産味甘最佳而今則甘者既未得見即佳處自不可知豈從前有此味甘之佳品而市肆所售之非其真耶抑石頑亦不過人云亦云非其真知灼見耶果其所謂佳者即是今日通行之品則前人雖有補肺一説亦不過徒付之想象而已惟嬰兒肺熱痰嗽不肯飲味苦氣烈之藥者則以川貝研末拌冰糖粉飼之取其無氣無味不為嬰兒所拒絶此則無法之法不藥之藥亦尚覺其差有效力然較之用象貝者奏效之遲亦自鑿鑿有據此景嶽所以有功力頗緩用須加倍之説則何如投以象貝而價廉物美一舉兩得之為愈乎升麻本經味甘辛主解百毒殺百老物殃鬼闢溫疾障邪毒蠱溫今作瘟障今作瘴別録苦平微寒主中惡腹痛時氣毒癘頭痛寒熱風腫諸毒喉痛口瘡考證大觀本及諸本皆作味甘平主解百毒殺百老物殃鬼闢瘟疫瘴氣邪氣蠱毒入口皆吐出壽頤按升麻升散本有辛味潔古已稱其性溫微辛孫氏問經堂本從御覽所引作甘辛可據也主解百毒已下御覽所引與今本僅字句小異意亦無別溫疾今本作瘟疫障今作瘴皆古今字詳其文義御覽本較為高古當是舊本故孫氏本從之今皆仍孫氏而附記通行本於此正義升麻體質輕清氣味皆薄稟純陽之氣故本經以為辟惡殺魅之用而解百毒溫疾即時邪之瘟疫障邪即山嵐之瘴氣毒蠱亦精魅之類升麻辟惡故皆主之別録所載主治各病皆四時不正之氣即本經瘟疫瘴癘之類此其所以為解百毒之上劑也廣義日華主遊風腫毒甄權療癰腫豌豆瘡水煎棉沾拭瘡上豌豆瘡即小兒之痘瘡潔古治陽明頭痛乃手足陽明引經之藥散顛頂至高之風邪及皮膚間風邪解肌肉間風熱能發汗補脾胃藥非此為引不易得效東垣發散陽明風邪止陽明齒痛升胃中清氣元氣不足者用此於陰中升陽瀕湖治胸脅虛痛久泄久痢後重遺濁帶下崩中虛淋下血又謂升麻引陽明清氣上行柴胡引少陽清氣上行此乃稟賦素弱元氣虛餒及勞役飢飽生冷內傷脾胃引經最要之藥故升麻葛根湯本為發散陽明風寒之劑而以治陽氣鬱遏及元氣下陷殊效注又謂核對綱目原文有所刪節本經以升麻為解毒吐蠱毒要藥以其為陽明之藥而上升也發明升麻體質甚輕空松透徹氣味又淡輕清上升蓋得天地純陽之氣本經別録所主皆四時不正之癘氣而以為解百毒者純陽之氣能闢除疫癘而輕清之品能疏散外邪也是以上之則能散巔頂頭面之風邪中之則能通脾胃郁遏之滯氣下之又可升舉脾虛下陷之清陽外之則祛逐皮膚之風寒解散陽明之經熱皆其輕舉升浮之功用而透泄斑疹宣發痘瘡又其疏表清胃之真旨其性質頗與柴胡相近金元以來亦恆與柴胡相輔並行但柴胡宣發寒邪郁窒之少陽而疏達肝膽之抑遏升麻宣發肌肉腠理之陽明而升舉脾胃之滯氣其用甚近而其主不同最宜注意故脾胃虛餒清氣下陷諸證如久泄久痢遺濁崩帶腸風淋露久痔脫肛之類苟非濕熱阻結即當提舉清陽非升麻不可而柴胡猶為升麻之輔佐東垣益氣升陽諸方亦即此旨並非以升柴並轡而馳也至於肝腎之虛陰薄於下陽浮於上則不可妄與升舉以貽拔本之禍亦與柴胡同耳禁忌升麻能發散陽明肌腠之風邪透表發汗其力頗大惟表邪之郁遏者宜之而陰虛之熱自內發者不可妄試又上升之性能除巔頂風寒之頭痛然亦惟風寒外邪宜之而肝陽上凌之頭痛又為大忌瀕湖謂升麻治陽陷眩運則頭目眩運肝陽最多所謂陽陷甚不可解殊非升提之藥所宜也東垣謂止陽明齒痛蓋用以引清胃之藥入於陽明經耳非升麻之能止齒痛也仲淳謂陰虛火動腎經不足者忌之景嶽謂諸火炎上者禁用石頑謂升麻能解痘毒惟初發熱時可用見點後即忌用升麻葛根以其氣升發動蒸毒於上為害莫測又謂麻疹尤為切禁誤投則喘滿立至蓋麻疹本屬肺經虛熱或者且挾濕痰初非應用升散之病若誤以為表邪宜散而更為升發則肺氣已虛而復揚之寧非大謬又古有升麻透斑之説蓋為胃熱鬱窒欲其疏泄透達耳然熱鬱已極清解且虞不及乃復撥而散之譬如火起室中已有燎原之勢不為撲滅於內而反大啓門戶引風以煽之挑撥以揚之是助其烈焰飛騰矣亦大誤也玄胡索發明玄胡索其初産於異域故以胡字為名宋人諱玄因改為延味苦辛而溫溫能行血辛亦行氣故為血中氣藥開寶本草主破血治婦人月經不調腹中結塊崩中淋露産後諸血病血運暴血衝上損傷下血煮酒或酒磨服日華破癥痞下胎海藏治氣痛小腹痛李珣散氣通經絡破産後惡露血枕痛瀕湖專治上下諸痛行血中氣滯氣中血滯石頑謂獨行多功雜於他藥中則力緩按延胡雖為破滯行血之品然性情尚屬和緩不甚猛烈古人必以酒為導引助其運行其本性之不同於峻厲亦可想見而又兼能行氣不專以破瘀見長故能治內外上下氣血不宣之病通滯散結主一切肝胃胸腹諸痛蓋攻破通導中之沖和品也但走而不守能治有餘之實證不能治不足之虛證景嶽謂産後之血虛及血枯之經少不利氣虛作痛者非宜石頑亦謂宜於瘀滯而不宜於虛人然溫和運動之品本非猛力攻破亦是以振動虛人之氣血而助其流行凡補血滋養隊中輕用少許以為燠烋之計亦無不可貫衆本經味苦微寒主心腹邪熱氣諸毒殺三蟲別録去寸白破癥瘕除頭風止金瘡花療惡瘡令人泄正義貫衆苦寒故主邪熱氣諸毒殺三蟲及寸白蟲者除濕熱之功也又苦能泄散且性雖苦寒而亦以氣勝則固有行氣行血之功用故又主癥瘕除頭風者苦寒以除風熱也止金瘡則苦能泄降寒能勝熱之功耳其花治惡瘡令人泄者即以攻逐其毒也發明貫衆苦寒沉降之質故主邪熱而能止血並治血痢下血甚有捷效皆苦以燥濕寒以泄熱之功也然氣亦濃厚故能解時邪熱結之毒別録除頭風專指風熱言之凡大頭疫腫連耳目用泄散而不遽應者但加入貫衆一味即邪勢透泄而熱解神清不獨苦寒泄降亦氣之足以散邪也故時疫盛行宜浸入水缸中常飲則不傳染而井中沉一枚不犯百毒則解毒之功尤其獨著不得以輕賤而忽之禁忌苦寒之品非實熱者不用白芨本經白及味苦平主癰腫惡瘡敗疽傷陰死肌胃中邪氣賊風鬼擊痱緩不收別録辛微寒除白癬疥蟲正義白芨古本皆作及惟太平御覽引本經則作芨今皆從草蓋即本此本經主癰腫惡瘡敗疽傷陰死肌別録除白癬疥蟲皆以癰瘍外敷及摻藥言之味苦辛而氣寒故能消散血熱之癰腫性黏而多脂則能療敗疽之死肌苦辛之品又能殺蟲則除白癬疥蟲外瘍消腫生肌之要藥也主胃中邪氣者則苦寒之品能除胃熱耳惟賊風鬼擊痱緩不收其義未詳不敢強解廣義甄權主結熱不消蓋即本經主死肌之義又治撲損刀箭瘡湯火瘡皆寒能療熱黏膩能生肌也東垣以止肺血亦補傷而兼能清火也發明白芨味苦氣寒能內清肺胃邪熱而外以涼血止痛且黏膩之質脂液富有既可敷癰瘍之未成而消熱退腫亦可摻既潰而去腐生肌兼治金瘡湯火灼傷皆本經之義也後人以其清熱補傷而治肺癰頗有捷效惟邪勢方熾之時烈焰囂張咳嗆膿血則宜大劑清降化痰而白芨黏膩猶嫌力薄不勝重任逮火焰少殺即可與清泄化痰之品相輔成功惟猶有稱其治跌打骨折則未免譽之過甚恐非實在也正訛白芨治肺癰世每畏其膩滯而不敢用然苦寒本清肺胃又能補傷苟非火焰極盛之時而臭痰腥穢之氣已漸退舍即可用以兼補兼清不致助痰留患與二冬玉竹等比也三七發明三七一作山漆言其止血合瘡如漆之能黏合也始見於瀕湖綱目已言其有二種一種生於廣西番洞中用其根味微甘而苦頗似人參則今之所謂人參三七也又云一種苗高三五尺葉似菊艾而厚有歧尖莖有赤稜甚易蕃衍則今人種植之者甚多根莖葉皆可用止血甚效瀕湖稱其氣味甘微苦而澀止血散血定痛主金刃傷跌僕杖瘡血出不止搗爛塗或干為末摻之止血立效亦主吐血衄血下血血痢崩中經水不止産後惡血不下血暈血痛赤目癰腫虎咬蛇傷按三七以止血見稱而瀕湖又謂其治産後惡血不下血暈血痛則不獨止血而又能破血一守一走正自相反今皆用以止血而破血則未之驗也山慈姑發明山慈姑之名始見於嘉祐本草然陳藏器拾遺已有之則名金燈即其花也味甘微辛能散堅消結化痰解毒其力頗峻故諸家以為有小毒藏器治癰腫瘡瘻瘰癧結核皆醋磨塗之並不以為內服之藥至王璆百一選方乃有太乙紫金丹亦名玉樞丹即今通行之紫金錠也能解百毒通治惡瘡堅腫癰瘍楊梅毒厲瘟疫時氣瘴癘蠱毒中惡胸腹攻痛窒塞不通諸證及毒蛇蟲犬等傷外證可敷內證可服其效最捷則以合大戟千金子霜麝香皆通利迅疾之品所以行駛極速取效眉睫而病重者連服之則必利下是以攻逐惡物為專職藥力之猛烈可知此皆用以蕩滌腸胃驅除積垢以減邪毒憑凌之勢亦非能通百脈消除皮裡膜外之堅積也且氣味俱淡以質為用所以古來未入煎劑乃近人不知古意輒欲自詡新奇別開生面遂有用入煎方以為消積攻堅之法如瘰癧痞積之類皆喜用之而不能取效者則以此物體質堅重獨顆無枝止能直下而不能旁行其力雖峻而無寧絡通經之性何能行於肢體脈絡且瘰癧結核病在上部而此物又專於下趨更無氣味薰蒸及上又屬背道而馳何能中病彼徒知矜奇炫異而於此中理法全未體認亦何怪乎徒費心思攻伐無過而於病情之百無一當也所以腸胃之病如食積氣滯胸脘不舒服玉樞丹少許則頃刻即效此中微義亦可深長思矣用藥者能於此等處用心而融會貫通之然後可讀古人之書而治今人之病竊願好學深思之士有以三復斯言冬蟲夏草發明冬蟲夏草始見於吳儀洛本草從新稱其甘平保肺益腎補精髓止血化痰已勞嗽近人恆喜用之以治陰虛勞怯咳嗽失血之證皆從吳氏説也考趙恕軒本草綱目拾遺載之極詳産於四川滇黔及西域雪山中夏則為草冬則為蟲入藥用蟲而不用草其感冬至陽生之氣而積雪之中蠕蠕行動性不畏寒是其特長四川通志謂為溫暖其説可信又稱其補精益髓則陽生陰長既是動物亦等於血肉之有情也趙氏又引潘友新説入房中藥用周兼士亦謂其性溫治蠱脹近日種子丹用之云云則此物補腎必是溫暖作用宜於虛寒當然不宜於虛熱能治蠱脹者蓋脾腎虛寒真陽不能布護之證趙氏又引文房肆考稱孔裕堂之弟患怯而汗大泄盛暑密室猶畏風寒以此和作肴饌食之而愈此人虛怯洵是陽虛之候汗多近於亡陽且常畏寒則色澤慘白唇苦無華已可想見本是當用參附者而冬蟲夏草能愈之其為溫補可無疑義此種虛勞本與陰虛勞怯嗽嗽痰紅相火肆擾者相反本草從新但以止血化痰已勞嗽渾而言之似嫌空泛未能辨明涇渭山雷嘗於物理上體會求之此物入冬化蟲於至陰之令獨能黍谷春回盎然生意則可治腎陽不充效果必巨但既能溫養肝腎則攝納下焦元氣未始不可治陰虛於下沖氣上升之虛嗽吳氏謂已勞嗽蓋即此意不佞從前用此以治虛人氣衝乾咳面色慘白脈小不徑唇舌淡白滑潤者頗能得效蓋亦與蛤蚧之治虛嗽虛喘異薹同岑唯唇舌鮮赤虛火上炎者頗不敢用恐其助陽擾動陰中之火反以滋害此為不才曩日之主見繼而尋繹王孟英潛齋醫案則此公恆用是藥數見不鮮匯而參之並不為補腎助陽作用而專治陰虛氣衝之久嗽董哲卿二尹令正二條胎前作嗽娩後不瘥漸至寢汗減餐頭疼口燥脈則虛弦軟數舌則光赤無苔孟英以冬蟲草合蓯蓉石英龜版牡蠣茯苓穭豆衣甘草小麥紅棗藕用之數帖即嗽減餐加頭亦不痛再加熟地而痊愈見王案續編第七卷又王杞亭姊一條陡患咳嗽目不交睫而脈上溢左兼弦細口渴無苔斷為真陰久虛風陽上僭沖嗽不已孟英以冬蟲草合牡蠣龜版鱉甲石英蓯蓉茯苓熟地歸身牛膝胡桃肉連授四劑而眠食皆安見續編第八卷又錢氏婦咳已數月廢寢忘餐形削經停凜寒乍熱心悸耳鳴滋補填陰反加便泄脈虛弦緩大氣粗懶言動則自汗孟英豫參耆龍牡桂苓甘芍冬蟲草飴糖大劑旬日而安繼去龍牡加歸杞二十劑泛至而康見三編第二卷此皆陰不涵陽肝腎氣火不藏上衝作咳而以冬蟲草合於大劑填陰和陽收攝隊中即可歸納元氣返其窟宅絶無擾動腎陽之弊然後知此蟲雖屬溫補確有沉潛鎮定之功斷非躁動興奮可比是以孟英治陳舜廷痰嗽條中明謂以冬蟲草石英牡蠣息風陽見三編第三卷而歸硯録四卷姚歐亭大令夫人憂思謀慮擾動心肝之陽不寢悸汗脈且左寸關弦大以數舌尖獨紅孟英亦以冬蟲夏草合參連柏子仁蓮子心小麥紅棗核鱉甲為善後之方也合此諸案觀之則吳氏益腎補精之説蓋亦未可厚非唯孟英於失血諸案未見此藥不佞亦嘗匯而參之則潛齋失血諸條皆在氣火甚盛宜於清泄肅降之候是以選不到此而不佞近年凡治久咳纏綿陰虛氣衝之證即使痰紅未淨只須舌苔不甚濁厚而脈來小數虛弦胃納猶可者頻用是物合之滋填納氣方中效果頗多沉疴屢起皆孟英成案有以詔我飲水思源潛齋之啓迪後人功誠不小敢抒拙見貢之同儕蓋亦三致意焉
